<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 200" width="380" height="200" role="img" aria-label="Estrella Jewels">
  <title>Estrella Jewels</title>
  <defs>
    <linearGradient id="goldMark" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%"   stop-color="#E2C06A"/>
      <stop offset="45%"  stop-color="#C9A24B"/>
      <stop offset="100%" stop-color="#9A7829"/>
    </linearGradient>
  </defs>

  <!-- ── Diamond mark ── -->
  <g transform="translate(190,72)">
    <!-- Outer gold diamond -->
    <path d="M0,-64 L52,0 L0,64 L-52,0 Z" fill="url(#goldMark)"/>

    <!-- Inner geometric: two overlapping rotated rectangles (3-D cube / interlocking EJ) -->
    <!-- Left-face of cube -->
    <path d="M-22,-10 L0,-22 L0,6 L-22,18 Z"
          fill="none" stroke="#2A1800" stroke-width="2.4" stroke-linejoin="round"/>
    <!-- Right-face of cube -->
    <path d="M0,-22 L22,-10 L22,18 L0,6 Z"
          fill="none" stroke="#2A1800" stroke-width="2.4" stroke-linejoin="round"/>
    <!-- Top-face of cube (shared edge at top) -->
    <path d="M-22,-10 L0,-22 L22,-10 L0,2 Z"
          fill="none" stroke="#2A1800" stroke-width="2.4" stroke-linejoin="round"/>
  </g>

  <!-- ── ESTRELLA wordmark ── -->
  <text
    x="190" y="156"
    text-anchor="middle"
    font-family="'Cormorant Garamond','Garamond','Georgia','Times New Roman',serif"
    font-size="36"
    font-weight="400"
    letter-spacing="9"
    fill="#111111">ESTRELLA</text>

  <!-- ── JEWELS sub-mark ── -->
  <text
    x="190" y="188"
    text-anchor="middle"
    font-family="'Cormorant Garamond','Garamond','Georgia','Times New Roman',serif"
    font-size="19"
    font-weight="300"
    letter-spacing="14"
    fill="#333333">JEWELS</text>
</svg>
