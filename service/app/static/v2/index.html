<!-- Vendor-first loading: tries local copies in /v2/vendor/ first; falls back to CDN.
     Operator: run service/scripts/download-v2-vendor.ps1 on the Windows server to
     populate vendor/ with local copies (eliminates CDN dependency in production).
     PIN DISCIPLINE: every CDN dependency below MUST be version-pinned. @babel/standalone
     is pinned to 7.x ON PURPOSE — Babel 8 changed @babel/preset-react's default JSX
     runtime from "classic" to "automatic", which emits `import { jsx } from
     "react/jsx-runtime"` at the top of every compiled file. This in-browser pipeline
     appends compiled output as a CLASSIC <script>, so an injected ESM import throws
     "Cannot use import statement outside a module" and the whole shell fails to boot.
     Do NOT bump to @8 without first switching every text/babel tag to runtime:classic.
     Regression guard: service/tests/test_v2_babel_pin.py. -->
<script src="/v2/vendor/react.production.min.js" crossorigin onerror="window.__vnd_react=1"></script>
<script>if(window.__vnd_react)document.write('\x3Cscript src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin\x3E\x3C\/script\x3E');</script>
<script src="/v2/vendor/react-dom.production.min.js" crossorigin onerror="window.__vnd_rdom=1"></script>
<script>if(window.__vnd_rdom)document.write('\x3Cscript src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin\x3E\x3C\/script\x3E');</script>
<script src="/v2/vendor/babel.min.js" onerror="window.__vnd_babel=1"></script>
<script>if(window.__vnd_babel)document.write('\x3Cscript src="https://unpkg.com/@babel/standalone@7.26.4/babel.min.js"\x3E\x3C\/script\x3E');</script>
<!-- Boot guard: if either vendor files AND CDN both failed to load, show a visible
     message instead of a silent blank screen. -->
<script>
(function() {
  function _showBootError(msg) {
    document.addEventListener('DOMContentLoaded', function() {
      var el = document.getElementById('root') || document.body;
      el.innerHTML = '<div style="font-family:sans-serif;padding:40px;color:#c0392b;">'
        + '<h2>Estrella Atlas — failed to load</h2><p style="margin-top:8px">' + msg + '</p>'
        + '<p style="margin-top:12px;font-size:13px;color:#555">Open browser DevTools (F12) → Console for details.</p>'
        + '<p style="margin-top:8px;font-size:13px;color:#555">Fix: run <code>service/scripts/download-v2-vendor.ps1</code> on the server to add local vendor files.</p>'
        + '</div>';
    });
  }
  if (typeof React === 'undefined')  { _showBootError('React failed to load (vendor file missing and CDN unreachable). Check network or run download-v2-vendor.ps1.'); return; }
  if (typeof ReactDOM === 'undefined') { _showBootError('ReactDOM failed to load (vendor file missing and CDN unreachable). Check network or run download-v2-vendor.ps1.'); return; }
  if (typeof Babel === 'undefined')  { _showBootError('Babel failed to load (vendor file missing and CDN unreachable). Check network or run download-v2-vendor.ps1.'); return; }
  // Surface any uncaught errors (e.g. Babel compile failure or React render crash) visibly.
  window.addEventListener('error', function(ev) {
    var root = document.getElementById('root');
    if (root && root.childElementCount === 0) {
      root.innerHTML = '<div style="font-family:sans-serif;padding:40px;color:#c0392b;">'
        + '<h2>Estrella Atlas — JavaScript error</h2>'
        + '<pre style="margin-top:8px;font-size:12px;white-space:pre-wrap">' + (ev.message || ev) + '\n' + (ev.filename || '') + ':' + ev.lineno + '</pre>'
        + '<p style="margin-top:12px;font-size:13px;color:#555">Open browser DevTools (F12) → Console for full stack trace.</p>'
        + '</div>';
    }
  });
})();
</script>
<!-- apiFetch shim: provides EstrellaShared.apiFetch for pz-api.js.
     dashboard-shared.js intentionally excluded. Reason: only EstrellaShared.apiFetch is
     consumed by v2 (pz-api.js:_apiFetch, proforma-detail.jsx direct call). All other
     EstrellaShared exports are dead code in this context. Loading dashboard-shared.js would
     introduce unnecessary coupling to the Track-1 shared layer (ADR-028). -->
<script>
window.EstrellaShared = {
  apiFetch: async function(url, opts) {
    var res;
    try {
      res = await fetch(url, Object.assign({ credentials: 'include' }, opts || {}));
    } catch (netErr) {
      var ne = new Error('Service unreachable — check that the backend is running.');
      ne.type = 'network';
      throw ne;
    }
    if (res.status === 401 || res.status === 403) {
      var e = new Error('Session expired or access denied.');
      e.type = 'auth';
      e.status = res.status;
      throw e;
    }
    if (!res.ok) {
      var t = await res.text().catch(function(){return '';});
      throw new Error('HTTP ' + res.status + ': ' + t.slice(0, 200));
    }
    if (res.status === 204 || res.status === 205) return null;
    var ct = res.headers.get('content-type') || '';
    return ct.includes('json') ? res.json() : res.text();
  }
};
</script>

<script type="text/babel">

// tweaks-panel replaced with inline state (no omelette runtime needed)
const TWEAK_DEFAULTS = {
  "darkMode": false,
  "compactRows": false,
  "showApiChecklist": false
};

// Minimal useTweaks shim — replaces omelette-backed version
function useTweaks(defaults) {
  const [tweaks, setTweaks] = React.useState(defaults);
  const setTweak = (k, v) => setTweaks(prev => ({ ...prev, [k]: v }));
  return { tweaks, setTweak };
}

function App() {
  const { tweaks, setTweak } = useTweaks(TWEAK_DEFAULTS);
  const isDark = tweaks?.darkMode ?? false;
  const setIsDark = v => setTweak('darkMode', v);

  React.useEffect(() => {
    document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
  }, [isDark]);

  // ── URL helpers ──────────────────────────────────────────────────────────────
  // Pages that carry a persistent ?batch_id= param (preserved across their sub-routes)
  const BATCH_SCOPED_PAGES = ['proforma', 'proforma_detail'];

  // Legacy route slugs → canonical page ids.
  // Sprint 31: the 'dhl: shipments' redirect was removed — DHL is now a
  // discoverable top-level page (NAV_TREE entry + page === 'dhl' route).
  // Routing 'dhl' to 'shipments' would silently bypass the live DHL Hub.
  // B×7-1 → Phase B FOLD (2026-07-03): the move page (move_stock renamed
  // move_location) is RETIRED — its capability folded into the Inventory page
  // as the Move Stock modal (Lesson M relocation; PROJECT_STATE DECISIONS
  // "Phase B FOLD"). BOTH slugs now redirect to inventory (stale-URL
  // insurance): move_stock (also reserved for the future PZ-event promotion)
  // and move_location (the retired page). The redirects are stale-URL
  // insurance for unpromoted / retired slugs.
  const ROUTE_REDIRECTS = {
    actions:       'inbox',
    proposals:     'inbox',
    email_queue:   'inbox',
    reservation:   'inbox',
    shipping:      'shipments',
    scanner:       'inventory',
    identity:      'inventory',
    sample_out:    'inventory',
    sample_return: 'inventory',
    goods_return:  'inventory',
    return_prod:   'inventory',
    move_stock:    'inventory',
    move_location: 'inventory',
  };

  // Parse /v2/<page>[?query] → { page, search }
  function parseV2Location() {
    const raw = window.location.pathname.replace(/^\/v2\/?/, '') || 'dashboard';
    const slug = raw.split('/')[0] || 'dashboard';
    const target = ROUTE_REDIRECTS[slug] || slug;
    return { page: target, search: window.location.search };
  }

  // Build the URL for a given page, preserving batch_id for proforma pages
  function pageToUrl(target, currentSearch) {
    const sp = new URLSearchParams(currentSearch || '');
    const batchId = sp.get('batch_id') || '';
    const draftId = sp.get('draft') || '';
    const params = new URLSearchParams();
    if (BATCH_SCOPED_PAGES.includes(target) && batchId) {
      params.set('batch_id', batchId);
      if (target === 'proforma_detail' && draftId) params.set('draft', draftId);
    }
    const qs = params.toString();
    return '/v2/' + target + (qs ? '?' + qs : '');
  }

  // ── Initial state from URL ─────────────────────────────────────────────────
  const _initialLocation = parseV2Location();
  const [page, setPage] = React.useState(_initialLocation.page);
  const [activeNav, setActiveNav] = React.useState(_initialLocation.page);
  const [sidebarCollapsed, setSidebarCollapsed] = React.useState(false);
  const [selectedShipment, setSelectedShipment] = React.useState(null);
  const [showNewShipment, setShowNewShipment] = React.useState(false);
  const [showApiChecklist, setShowApiChecklist] = React.useState(false);
  const [mobileSidebarOpen, setMobileSidebarOpen] = React.useState(false);
  const [viewerDoc, setViewerDoc] = React.useState(null);
  const [searchOpen, setSearchOpen] = React.useState(false);
  const [proformaDraft, setProformaDraft] = React.useState(null);
  const [proformaHydrating, setProformaHydrating] = React.useState(_initialLocation.page === 'proforma_detail');
  const [proformaHydrateError, setProformaHydrateError] = React.useState(null);
  // Track current search string for URL construction
  const [currentSearch, setCurrentSearch] = React.useState(_initialLocation.search);

  const openViewer = (doc) => setViewerDoc(doc);
  const closeViewer = () => setViewerDoc(null);

  const handleProformaDrill = (draft) => {
    setProformaDraft(draft);
    const sp = new URLSearchParams(currentSearch || '');
    if (draft && draft.id) sp.set('draft', String(draft.id));
    const newSearch = sp.toString() ? '?' + sp.toString() : '';
    setCurrentSearch(newSearch);
    const url = pageToUrl('proforma_detail', newSearch);
    history.pushState({ page: 'proforma_detail' }, '', url);
    setPage('proforma_detail');
    setActiveNav('proforma');
  };

  const handleProformaBack = () => {
    setProformaDraft(null);
    const url = pageToUrl('proforma', currentSearch);
    history.pushState({ page: 'proforma' }, '', url);
    setPage('proforma');
  };

  // ── handleProformaSearchDrill: navigate from search results to batch list ──
  const handleProformaSearchDrill = (batchId) => {
    if (!batchId) return;
    const qs = '?batch_id=' + encodeURIComponent(batchId);
    setCurrentSearch(qs);
    history.pushState({ page: 'proforma' }, '', '/v2/proforma' + qs);
    setPage('proforma');
    setActiveNav('proforma');
  };

  // ── popstate: browser back/forward ─────────────────────────────────────────
  React.useEffect(() => {
    const onPop = () => {
      const loc = parseV2Location();
      setPage(loc.page);
      setActiveNav(loc.page);
      setCurrentSearch(loc.search);
      if (loc.page !== 'proforma_detail') setProformaDraft(null);
    };
    window.addEventListener('popstate', onPop);
    return () => window.removeEventListener('popstate', onPop);
  }, []);

  // ── proforma_detail URL-param hydration (bookmark / refresh / direct link) ─
  // Fires when the page is proforma_detail but no draft is in state.
  // Reads ?draft=<id> or falls back to ?batch_id= (first draft in batch).
  React.useEffect(() => {
    if (page !== 'proforma_detail' || proformaDraft) return;
    const sp      = new URLSearchParams(window.location.search);
    const rawId   = sp.get('draft');
    const batchId = sp.get('batch_id');
    if (!rawId && !batchId) {
      setProformaHydrating(false);
      setProformaHydrateError('No draft or batch_id in URL — cannot load draft.');
      return;
    }
    if (rawId) {
      const id = parseInt(rawId, 10);
      if (!id || id <= 0) {
        setProformaHydrating(false);
        setProformaHydrateError('Invalid draft ID in URL.');
        return;
      }
      setProformaHydrating(true);
      setProformaHydrateError(null);
      window.EstrellaShared.apiFetch('/api/v1/proforma/draft/' + id)
        .then(r => {
          if (!r || !r.draft) throw new Error('Draft not found.');
          setProformaDraft(r.draft);
          setProformaHydrating(false);
        })
        .catch(err => { setProformaHydrateError((err && err.message) || 'Failed to load draft.'); setProformaHydrating(false); });
      return;
    }
    setProformaHydrating(true);
    setProformaHydrateError(null);
    window.EstrellaShared.apiFetch('/api/v1/proforma/drafts/' + encodeURIComponent(batchId))
      .then(r => {
        if (!r || !r.drafts || !r.drafts.length) throw new Error('No proforma drafts found for this batch.');
        return window.EstrellaShared.apiFetch('/api/v1/proforma/draft/' + r.drafts[0].id);
      })
      .then(r => {
        if (!r || !r.draft) throw new Error('Draft not found.');
        setProformaDraft(r.draft);
        setProformaHydrating(false);
      })
      .catch(err => { setProformaHydrateError((err && err.message) || 'Failed to load draft.'); setProformaHydrating(false); });
  // `proformaDraft` is intentionally excluded from the dependency array.
  // The guard at the top of the effect (`|| proformaDraft`) already prevents a
  // double-fetch when the draft is already loaded. Including it in deps would
  // cause the effect to re-fire on every field update inside the draft object,
  // creating an infinite re-fetch loop.
  }, [page]); // eslint-disable-line react-hooks/exhaustive-deps

  // ── Cmd-K / Ctrl-K: global search ─────────────────────────────────────────
  React.useEffect(() => {
    const onKey = (e) => {
      if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 'k') {
        e.preventDefault();
        setSearchOpen(o => !o);
      }
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, []);

  const handleViewShipment = (shipment) => {
    setSelectedShipment(shipment);
    const url = pageToUrl('shipments', '');
    history.pushState({ page: 'shipments' }, '', url);
    setPage('detail');
    setActiveNav('shipments');
  };

  // ── handleNav: sidebar / programmatic navigation + pushState ───────────────
  const handleNav = (id) => {
    const target = ROUTE_REDIRECTS[id] || id;
    const url = pageToUrl(target, currentSearch);
    history.pushState({ page: target }, '', url);
    setActiveNav(target);
    setPage(target);
    setMobileSidebarOpen(false);
    if (!BATCH_SCOPED_PAGES.includes(target)) setProformaDraft(null);
  };

  return (
    <div style={{ display: 'flex', height: '100vh', overflow: 'hidden' }}>

      {/* Desktop Sidebar */}
      <div className="sidebar-desktop" style={{ display: 'flex', flexShrink: 0 }}>
        <Sidebar
          active={activeNav}
          onNav={handleNav}
          collapsed={sidebarCollapsed}
          onToggle={() => setSidebarCollapsed(v => !v)}
        />
      </div>

      {/* Mobile overlay */}
      {mobileSidebarOpen && (
        <div style={{ position: 'fixed', inset: 0, zIndex: 200, display: 'flex' }}>
          <div style={{ flex: 1, background: 'rgba(0,0,0,0.5)' }} onClick={() => setMobileSidebarOpen(false)} />
          <div style={{ width: 220, background: '#18160F', height: '100%', overflowY: 'auto', flexShrink: 0 }}>
            <Sidebar active={activeNav} onNav={handleNav} collapsed={false} onToggle={() => setMobileSidebarOpen(false)} />
          </div>
        </div>
      )}

      {/* Main */}
      <div style={{ flex: 1, display: 'flex', flexDirection: 'column', overflow: 'hidden', minWidth: 0 }}>
        <div style={{ position: 'relative', flexShrink: 0 }}>
          <TopBar onNewShipment={() => setShowNewShipment(true)} onToggleDark={() => setIsDark(d => !d)} isDark={isDark} onOpenSearch={() => setSearchOpen(true)} />
          <OperationalStatusStrip />
          <button
            className="mobile-hamburger"
            onClick={() => setMobileSidebarOpen(true)}
            style={{
              display: 'none', position: 'absolute', left: 12, top: '50%',
              transform: 'translateY(-50%)', background: 'none', border: 'none',
              cursor: 'pointer', fontSize: 20, alignItems: 'center',
            }}
          >☰</button>
        </div>

        <div style={{ flex: 1, overflow: 'hidden', display: 'flex', flexDirection: 'column', background: '#F2F0EB' }}>

          {/* MOCK badge — shown for every un-wired page (Sprint 1, Phase 3) */}
          {!viewerDoc && <MockBanner page={page} />}

          {/* Document viewer — full-page route */}
          {viewerDoc && (
            <DocumentViewerPage doc={viewerDoc} onBack={closeViewer} />
          )}

          {/* Dashboard — Kanban pipeline (simplified flow) */}
          {!viewerDoc && (page === 'dashboard') && (
            <>
              <PageHeader
                title="Dashboard"
                subtitle={`${new Date().toLocaleDateString('en-GB', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' })} · Pipeline view — every active shipment, one glance`}
                actions={<div style={{ display: 'flex', gap: 8 }}><Btn variant="outline" small onClick={() => setShowApiChecklist(true)}>API Checklist</Btn><Btn variant="outline" small>↓ Export CSV</Btn></div>}
              />
              <DashboardKanban onNav={handleNav} onOpenNewShipment={() => setShowNewShipment(true)} onOpenSearch={() => setSearchOpen(true)} />
            </>
          )}

          {/* Inbox — unified queue (replaces Action Center · Email Queue · Operator Queue · Action Proposals · Reservations) */}
          {!viewerDoc && page === 'inbox' && (
            <>
              <PageHeader title="Inbox"
                subtitle="Everything that needs your attention — emails · proposals · approvals · reservations · customs holds"
                actions={<div style={{ display: 'flex', gap: 8 }}><Btn variant="outline" small>↻ Sync now</Btn><Btn variant="outline" small>⚙ Rules</Btn></div>}
              />
              <InboxPage onNav={handleNav} />
            </>
          )}

          {/* Shipments */}
          {!viewerDoc && page === 'shipments' && (
            <>
              <PageHeader title="Shipments" subtitle="Read-only batch list — completed shipments from the engine, newest first. AWB links out to carrier tracking. No write actions." />
              <SubTabStrip active={page} onNav={handleNav} />
              <DashboardPage onViewShipment={handleViewShipment} />
            </>
          )}

          {/* Detail view */}
          {!viewerDoc && page === 'detail' && selectedShipment && (
            <>
              <div style={{ padding: '20px 32px 0', flexShrink: 0 }}>
                <h1 style={{ margin: 0, fontSize: 22, fontWeight: 700, fontFamily: '"DM Serif Display", serif', color: '#18160F' }}>Shipment Detail</h1>
              </div>
              <ShipmentDetailPage shipment={selectedShipment} onBack={() => { setPage('shipments'); setActiveNav('shipments'); }} />
            </>
          )}

          {/* DHL Hub — read-only observer (Sprint 31). Visibility only:
              Lane A / Lane B / Task Scheduler remain the sole automation authority.
              No Retry / Requeue / Scan / Lane / Force / Refresh affordances. */}
          {!viewerDoc && page === 'dhl' && (
            <>
              <PageHeader title="DHL / Customs" subtitle="Read-only DHL observer — live automation status, daily operations report, inbox-scanner health, and shipment queue. No write actions." />
              <SubTabStrip active={page} onNav={handleNav} />
              <DhlCustomsPage onViewShipment={handleViewShipment} />
            </>
          )}

          {/* Accounting — wFirma-mapped documents + ledgers */}
          {!viewerDoc && page === 'accounting' && (
            <>
              <PageHeader title="Accounting"
                subtitle="Proforma · Invoice · WZ · PZ · PW · RW · MM · Client Balance · Client Ledger · Supplier Ledger — all mapped from wFirma"
                actions={<div style={{ display: 'flex', gap: 8 }}><Btn variant="outline" small onClick={() => setShowApiChecklist(true)}>API Checklist</Btn><Btn variant="outline" small>↻ Sync wFirma</Btn><Btn variant="outline" small>↓ Export</Btn></div>}
              />
              <AccountingHub onNav={handleNav} />
            </>
          )}

          {/* Inventory — read-only live hub (Sprint 30). No shell-level write actions:
              the hub is read-only, so Upload/Move-Stock/Cycle-count/Export buttons
              were removed (they dispatched events the live component does not handle). */}
          {!viewerDoc && page === 'inventory' && (
            <>
              <PageHeader title="Inventory" subtitle="Read-only inventory hub — live Stage 2 counts, batch / piece / location lookups, and warehouse audit. No write actions." />
              <SubTabStrip active={page} onNav={handleNav} />
              <InventoryPage openViewer={openViewer} />
            </>
          )}

          {/* Move Location render block RETIRED (Phase B FOLD, 2026-07-03):
              the capability is folded into the Inventory page as the Move
              Stock modal (Lesson M relocation). /v2/move_location now
              redirects to inventory (ROUTE_REDIRECTS, stale-URL insurance). */}

          {/* Intelligence Hub — wired to live intelligence + invoice-learning authority (Sprint 34) */}
          {!viewerDoc && page === 'intelligence' && (
            <>
              <PageHeader title="Intelligence Hub" subtitle="Engine status, live trigger suggestions, risk warnings, config, and invoice-learning patterns" />
              <SubTabStrip active={page} onNav={handleNav} />
              <IntelligencePage />
            </>
          )}

          {/* AI Bridge — renamed Automation Center */}
          {!viewerDoc && page === 'automation' && (
            <>
              <PageHeader title="Automation Center" subtitle="Cowork task queue, results, errors, capabilities, and prompt templates" />
              <SubTabStrip active={page} onNav={handleNav} />
              <AiBridgePage />
            </>
          )}

          {/* Carriers — multi-carrier login & API integration */}
          {!viewerDoc && page === 'carriers' && (
            <>
              <PageHeader title="Carriers" subtitle="Multi-carrier login · API integration · webhooks · sessions · audit log. Backend wireframe — no live credentials."
                actions={<div style={{ display: 'flex', gap: 8 }}><Btn variant="outline" small onClick={() => setShowApiChecklist(true)}>API Checklist</Btn><Btn variant="gold" small disabled style={{ opacity: 0.7, cursor: 'not-allowed' }}>+ Connect Carrier</Btn></div>}
              />
              <SubTabStrip active={page} onNav={handleNav} />
              <CarriersPage />
            </>
          )}

          {/* API Status — consolidated single-page health for every integration */}
          {!viewerDoc && page === 'api_status' && (
            <>
              <PageHeader title="API Status" subtitle="Consolidated health for every backend integration · carriers · accounting · customs · internal services · webhooks. Replaces scattered API-status surfaces."
                actions={<div style={{ display: 'flex', gap: 8 }}><Btn variant="outline" small onClick={() => setShowApiChecklist(true)}>API Checklist</Btn><Btn variant="outline" small disabled style={{ opacity: 0.7, cursor: 'not-allowed' }}>↻ Re-probe All</Btn></div>}
              />
              <SubTabStrip active={page} onNav={handleNav} />
              <ApiStatusPage />
            </>
          )}

          {/* Documents Hub — full CRUD for every document type */}
          {!viewerDoc && page === 'documents' && (
            <>
              <PageHeader title="Documents" subtitle="Unified workspace for every document the system creates · Proforma · Invoice · PZ · Order · Customs · Shipping · Email. Full create / edit / delete / view / download."
                actions={<Btn variant="outline" small disabled style={{ opacity: 0.7, cursor: 'not-allowed' }}>⬇ Export CSV</Btn>}
              />
              <DocumentsHubPage />
            </>
          )}

          {/* Pro Forma — Screen A (list) */}
          {!viewerDoc && page === 'proforma' && (
            <>
              <PageHeader title="Pro Forma" subtitle="Draft pro forma invoices · Convert to invoice when ready"
                actions={<div style={{ display: 'flex', gap: 8 }}><Btn variant="outline" small onClick={() => handleNav('proforma_search')}>Search All Drafts</Btn><Btn variant="outline" small>↓ Export CSV</Btn></div>}
              />
              <ProformaListPage onDrill={handleProformaDrill} />
            </>
          )}

          {/* Pro Forma — Screen C (cross-batch search, M6) */}
          {!viewerDoc && page === 'proforma_search' && (
            <>
              <PageHeader title="Prior Proforma Search" subtitle="Cross-batch read-only search across all local proforma drafts"
                actions={<Btn variant="outline" small onClick={() => handleNav('proforma')}>Back to Pro Forma</Btn>}
              />
              <ProformaSearchPage onNav={handleNav} onDrillBatch={handleProformaSearchDrill} />
            </>
          )}

          {/* Pro Forma — Screen B (detail) */}
          {!viewerDoc && page === 'proforma_detail' && (
            proformaHydrating
              ? <div data-testid="proforma-detail-loading" style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', height: 200, color: 'var(--text-2)', fontSize: 14 }}>Loading draft…</div>
              : proformaHydrateError
                ? <div data-testid="proforma-detail-error" style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', height: 200, gap: 12 }}>
                    <div style={{ color: 'var(--badge-red-text)', fontSize: 14 }}>{proformaHydrateError}</div>
                    <Btn variant="outline" small onClick={handleProformaBack}>← Back to Proforma list</Btn>
                  </div>
                : proformaDraft
                  ? <ProformaDetailPage
                      draft={proformaDraft}
                      onBack={handleProformaBack}
                      onConvert={(draft) => {
                        alert(`Convert to Invoice: ${draft.number} → Invoice created (stub)`);
                        handleProformaBack();
                      }}
                    />
                  : null
          )}

          {/* Coverage Map — authority: /openapi.json */}
          {!viewerDoc && page === 'coverage' && (
            <>
              <PageHeader title="Coverage Map" subtitle="Live route registry from OpenAPI spec — every route registered in the running backend" />
              <SubTabStrip active={page} onNav={handleNav} />
              <CoverageMapPage />
            </>
          )}

          {/* Reports — financial & sales focused */}
          {!viewerDoc && page === 'reports' && (
            <>
              <PageHeader title="Reports" subtitle="Financial, sales, purchase, and shipping reports — date-filtered with drill-down"
                actions={<div style={{ display: 'flex', gap: 8 }}><Btn variant="outline" small>↓ Export PDF</Btn><Btn variant="outline" small>↓ Export CSV</Btn></div>}
              />
              <ReportsPage />
            </>
          )}

          {/* Master Data */}
          {!viewerDoc && page === 'master' && (
            <>
              <PageHeader title="Master Data" subtitle="Create and edit all master records — clients, suppliers, products, designs, HS codes, FX, users, roles" />
              <MasterPage />
            </>
          )}

          {/* wFirma Setup & Mapping */}
          {!viewerDoc && page === 'wfirma_setup' && (
            <>
              <PageHeader title="wFirma Mapping" subtitle="Customer + product mapping · capabilities · reservation gate readiness" />
              <SubTabStrip active={page} onNav={handleNav} />
              <WfirmaMappingPage />
            </>
          )}

          {/* System Diagnostics */}
          {!viewerDoc && page === 'diagnostics' && (
            <>
              <PageHeader title="System Diagnostics" subtitle="Health checks · storage · locks · CLI diagnostic tools" />
              <SubTabStrip active={page} onNav={handleNav} />
              <DiagnosticsPage />
            </>
          )}

          {/* Admin / Settings */}
          {!viewerDoc && page === 'admin' && (
            <>
              <PageHeader title="Admin / Settings" subtitle="API configuration, users, and system status"
                actions={<Btn variant="outline" small onClick={() => setShowApiChecklist(true)}>API Checklist</Btn>}
              />
              <SubTabStrip active={page} onNav={handleNav} />
              <AdminSettingsPage />
            </>
          )}

        </div>
      </div>

      {showNewShipment && (
        <NewShipmentModal
          onClose={() => setShowNewShipment(false)}
          onCreated={(data) => {
            setShowNewShipment(false);
            handleViewShipment({
              id: 'SHP-NEW', awb: data.awb, carrier: data.carrier,
              dhlStatus: data.runPrecheck ? 'Pre-check Pending' : 'Draft',
              dhlRec: '—', sadStatus: 'SAD Pending', mrn: '—',
              pzStatus: 'Locked', net: '—', gross: '—', duty: '—',
              overall: 'In Preparation',
            });
          }}
        />
      )}

      {showApiChecklist && <ApiChecklistModal onClose={() => setShowApiChecklist(false)} />}

      <GlobalSearch open={searchOpen} onClose={() => setSearchOpen(false)} onNav={handleNav} />

      {/* TweaksPanel removed — omelette runtime not available in production */}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
