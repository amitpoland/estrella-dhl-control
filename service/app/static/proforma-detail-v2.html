<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pro Forma Detail — Estrella Atlas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; }
    body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); }
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; } }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; }

    :root {
      --bg: #F4F1EA; --bg-subtle: #FAF8F2; --card: #FFFFFF;
      --row-hover: #F6F2EA; --border: #E5DECF; --border-subtle: #EFE9DA;
      --text: #1B2538; --text-2: #4E5A72; --text-3: #8B97AE;
      --shadow: rgba(27,37,56,0.06); --shadow-heavy: rgba(27,37,56,0.16);
      --overlay: rgba(19,28,46,0.6);
      --accent: #B89968; --accent-light: #D4B884; --accent-text: #1B2538;
      --accent-subtle: #F8EFD8; --accent-border: #CFB178;
      --sidebar-bg: #131C2E; --sidebar-border: #25334C;
      --sidebar-active: #1F2A42; --sidebar-hover: #1A2438;
      --sidebar-text: #F2EBD9; --sidebar-text-muted: #7C89A3; --sidebar-icon: #B89968;
      --badge-neutral-bg: #EEF0F4; --badge-neutral-text: #4A5A70; --badge-neutral-border: #CED4E0;
      --badge-blue-bg: #E8EFF8;   --badge-blue-text: #1A4A90;   --badge-blue-border: #AABEE0;
      --badge-amber-bg: #FBF5E0;  --badge-amber-text: #805A00;  --badge-amber-border: #DEC870;
      --badge-orange-bg: #FBF0E4; --badge-orange-text: #804000; --badge-orange-border: #DEB870;
      --badge-green-bg: #E8F5EE;  --badge-green-text: #186838;  --badge-green-border: #96CCA8;
      --badge-red-bg: #FBE8E6;    --badge-red-text: #902018;    --badge-red-border: #E0A8A0;
      --badge-purple-bg: #EEE8F8; --badge-purple-text: #481898; --badge-purple-border: #BEA4E8;
      --badge-accent-bg: #131C2E; --badge-accent-text: #B89968; --badge-accent-border: #B89968;
    }
    [data-theme="dark"] {
      --bg: #111928; --bg-subtle: #172030; --card: #1C2638;
      --border: #2C3C54; --border-subtle: #243050;
      --text: #EEE8DC; --text-2: #8A9AB6; --text-3: #566478;
      --shadow: rgba(0,0,0,0.3); --shadow-heavy: rgba(0,0,0,0.5); --overlay: rgba(0,0,0,0.72);
      --accent: #D4AA5C; --accent-text: #111928; --accent-subtle: #1E2808; --accent-border: #5A4A18;
      --sidebar-bg: #0E1A30; --sidebar-border: #1A2A48; --sidebar-active: #1A2A48; --sidebar-hover: #14223C;
      --sidebar-text: #F0EAE0; --sidebar-text-muted: #6E7E96; --sidebar-icon: #C9A456;
      --badge-neutral-bg: #1C2838; --badge-neutral-text: #8A9AB6; --badge-neutral-border: #2C3C54;
      --badge-blue-bg: #0E1E38;   --badge-blue-text: #80AAEE;   --badge-blue-border: #1E3A64;
      --badge-amber-bg: #20180A;  --badge-amber-text: #E8C040;  --badge-amber-border: #584010;
      --badge-green-bg: #0E2018;  --badge-green-text: #68CC88;  --badge-green-border: #1A4830;
      --badge-red-bg: #200E10;    --badge-red-text: #EE8880;    --badge-red-border: #581018;
      --badge-accent-bg: #1E2808; --badge-accent-text: #D4AA5C; --badge-accent-border: #5A4A18;
    }
    .sidebar-desktop { display: flex; }
    @media (max-width: 900px) { .sidebar-desktop { display: none !important; } }
    @media (max-width: 600px) {
      .party-grid { grid-template-columns: 1fr !important; }
      .overview-grid { grid-template-columns: 1fr 1fr !important; }
    }
  </style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel" data-presets="env,react" src="/dashboard/pz-design-v2.js"></script>
<script type="text/babel" data-presets="env,react" src="/dashboard/pz-api.js"></script>
<script type="text/babel" data-presets="env,react" src="/dashboard/pz-state.js"></script>

<script type="text/babel" data-presets="env,react">
(function () {
  'use strict';

  const { useState, useEffect, useCallback } = React;
  const { AppShell, PageHeader, Card, Btn, SectionHeader, InfoRow, Toast, EmptyState } = window.PzDesign;
  const apiFetch = window.EstrellaShared.apiFetch;
  const DRAFT_ID = parseInt(new URLSearchParams(window.location.search).get('draft_id') || '0', 10);
  const TABS = ['Overview', 'Lines', 'Customer Mapping', 'Reservation', 'History'];

  // ── Generic GET hook ──────────────────────────────────────────────────────
  function useGet(url, deps) {
    const [s, setS] = useState({ data: null, loading: !!url, error: null });
    const load = useCallback(async () => {
      if (!url) return;
      setS(p => ({ ...p, loading: true, error: null }));
      try { setS({ data: await apiFetch(url), loading: false, error: null }); }
      catch (e) { setS({ data: null, loading: false, error: e.message }); }
    }, deps); // eslint-disable-line
    useEffect(() => { load(); }, [load]);
    return { ...s, reload: load };
  }

  function Box({ loading, error, retry, children }) {
    if (loading) return <div style={{ padding: 32, textAlign: 'center' }}><span className="spinner" /></div>;
    if (error) return <EmptyState state="error" message={error} onRetry={retry} />;
    return children;
  }

  // ── §4.2 chip vocabulary ──────────────────────────────────────────────────
  const CHIPS = {
    DRAFT:             { bg: 'var(--badge-neutral-bg)', c: 'var(--badge-neutral-text)', b: 'var(--badge-neutral-border)' },
    EDITING:           { bg: 'var(--badge-neutral-bg)', c: 'var(--badge-neutral-text)', b: 'var(--badge-neutral-border)' },
    APPROVED:          { bg: 'var(--badge-blue-bg)',    c: 'var(--badge-blue-text)',    b: 'var(--badge-blue-border)' },
    'POSTING…':   { bg: 'var(--badge-blue-bg)',    c: 'var(--badge-blue-text)',    b: 'var(--badge-blue-border)' },
    'PROFORMA POSTED': { bg: 'var(--badge-blue-bg)',    c: 'var(--badge-blue-text)',    b: 'var(--badge-blue-border)' },
    'CONVERT BLOCKED': { bg: 'var(--badge-amber-bg)',   c: 'var(--badge-amber-text)',   b: 'var(--badge-amber-border)' },
    'POST FAILED':     { bg: 'var(--badge-red-bg)',     c: 'var(--badge-red-text)',     b: 'var(--badge-red-border)' },
    INVOICED:          { bg: 'var(--badge-green-bg)',   c: 'var(--badge-green-text)',   b: 'var(--badge-green-border)' },
    CANCELLED:         { bg: 'var(--badge-neutral-bg)', c: 'var(--badge-neutral-text)', b: 'var(--badge-neutral-border)' },
    SUPERSEDED:        { bg: 'var(--badge-neutral-bg)', c: 'var(--badge-neutral-text)', b: 'var(--badge-neutral-border)' },
  };
  function deriveChip(d, il) {
    if (!d) return 'DRAFT';
    if (il?.ok && il?.status === 'issued') return 'INVOICED';
    const m = { draft:'DRAFT', editing:'EDITING', approved:'APPROVED', posting:'POSTING…',
      posted:'PROFORMA POSTED', adopted_from_audit:'PROFORMA POSTED',
      post_failed:'POST FAILED', cancelled:'CANCELLED', superseded:'SUPERSEDED' };
    const st = d.draft_state || '';
    if ((st==='posted'||st==='adopted_from_audit') && d.readiness?.safe_to_defer===false) return 'CONVERT BLOCKED';
    return m[st] || st.toUpperCase().replace('_',' ');
  }
  function Chip({ label }) {
    const s = CHIPS[label] || CHIPS.DRAFT;
    return <span data-testid="draft-chip" style={{ display:'inline-flex', alignItems:'center', background:s.bg, color:s.c, border:`1px solid ${s.b}`, borderRadius:4, padding:'2px 8px', fontSize:11, fontWeight:700, letterSpacing:'0.05em', whiteSpace:'nowrap' }}>{label}</span>;
  }

  // ── Party card ────────────────────────────────────────────────────────────
  function Party({ title, name, street, city, zip, country, nip, vatEu, warn, tid }) {
    return (
      <Card style={{ padding:'14px 16px' }} data-testid={tid}>
        <div style={{ fontSize:10, fontWeight:700, color:'var(--text-3)', letterSpacing:'0.1em', textTransform:'uppercase', marginBottom:8 }}>{title}</div>
        {name && <div style={{ fontWeight:700, fontSize:13, marginBottom:4 }}>{name}</div>}
        {street && <div style={{ fontSize:12, color:'var(--text-2)' }}>{street}</div>}
        {(city||zip) && <div style={{ fontSize:12, color:'var(--text-2)' }}>{[zip,city].filter(Boolean).join(' ')}</div>}
        {country && <div style={{ fontSize:12, color:'var(--text-2)' }}>{country}</div>}
        {nip && <div style={{ fontSize:11, color:'var(--text-3)', marginTop:4 }}>NIP: {nip}</div>}
        {vatEu && <div style={{ fontSize:11, color:'var(--text-3)' }}>VAT UE: {vatEu}</div>}
        {warn && <div style={{ marginTop:8, fontSize:11, color:'var(--badge-amber-text)' }}>⚠ {warn}</div>}
      </Card>
    );
  }

  // ── Confirm modal ─────────────────────────────────────────────────────────
  function Confirm({ title, msg, ok, cancel, busy, label='Confirm', danger }) {
    return (
      <div style={{ position:'fixed', inset:0, background:'var(--overlay)', display:'flex', alignItems:'center', justifyContent:'center', zIndex:2000 }} onClick={e=>e.target===e.currentTarget&&!busy&&cancel()}>
        <div style={{ background:'var(--card)', borderRadius:10, padding:24, maxWidth:400, width:'90%', boxShadow:'0 16px 48px var(--shadow-heavy)', border:'1px solid var(--border)' }}>
          <div style={{ fontWeight:700, fontSize:15, marginBottom:10, color:danger?'var(--badge-red-text)':'var(--text)' }}>{title}</div>
          <div style={{ fontSize:13, color:'var(--text-2)', marginBottom:20, lineHeight:1.6 }}>{msg}</div>
          <div style={{ display:'flex', gap:8, justifyContent:'flex-end' }}>
            <Btn variant="ghost" onClick={cancel} disabled={busy} small>Cancel</Btn>
            <Btn variant={danger?'danger':'default'} onClick={ok} disabled={busy} small data-testid="confirm-ok">
              {busy?<><span className="spinner" style={{ marginRight:6 }}/>Working…</>:label}
            </Btn>
          </div>
        </div>
      </div>
    );
  }

  // ── Post Disclosure Modal (Phase 9 WF2.4) ────────────────────────────────
  // Fetches /api/v1/proforma/draft/{id}/disclose-post and shows the operator
  // exactly what will be written to wFirma before the final confirm.
  function PostDisclosureModal({ draftId, onCancel, onConfirm, busy }) {
    const [disclosure, setDisclosure] = useState(null);
    const [loading, setLoading]       = useState(true);
    const [err, setErr]               = useState('');
    React.useEffect(() => {
      let cancelled = false;
      apiFetch(`/api/v1/proforma/draft/${draftId}/disclose-post`)
        .then(d => { if (!cancelled) { setDisclosure(d); setLoading(false); } })
        .catch(e => { if (!cancelled) { setErr(e.message); setLoading(false); } });
      return () => { cancelled = true; };
    }, [draftId]);
    return (
      <div style={{ position:'fixed', inset:0, background:'var(--overlay)', display:'flex', alignItems:'center', justifyContent:'center', zIndex:2000 }} onClick={e=>e.target===e.currentTarget&&!busy&&onCancel()}>
        <div style={{ background:'var(--card)', borderRadius:10, padding:24, maxWidth:520, width:'95%', boxShadow:'0 16px 48px var(--shadow-heavy)', border:'1px solid var(--border)', maxHeight:'80vh', overflowY:'auto' }}>
          <div style={{ fontWeight:700, fontSize:15, marginBottom:10 }}>Post to wFirma — Confirm Payload</div>
          {loading && <div style={{ color:'var(--text-2)', fontSize:13, marginBottom:16 }}>Loading disclosure…</div>}
          {err && <div style={{ color:'var(--badge-red-text)', fontSize:13, marginBottom:16 }}>{err}</div>}
          {disclosure && (
            <div style={{ fontSize:12, marginBottom:16 }}>
              <div style={{ marginBottom:8, color:'var(--badge-amber-text)', fontWeight:600 }}>{disclosure.warning}</div>
              <div style={{ marginBottom:4 }}><b>Flag required:</b> {disclosure.flag_required}</div>
              <div style={{ marginBottom:4 }}><b>Client:</b> {disclosure.fields_to_write?.client_name}</div>
              <div style={{ marginBottom:4 }}><b>Currency:</b> {disclosure.fields_to_write?.currency}</div>
              <div style={{ marginBottom:4 }}><b>Lines:</b> {disclosure.fields_to_write?.line_count}</div>
              <div style={{ marginBottom:8 }}><b>Confirm token:</b> <code style={{ fontSize:11 }}>{disclosure.confirm_token_required}</code></div>
              {(disclosure.lines||[]).slice(0,5).map((l,i)=>(
                <div key={i} style={{ fontSize:11, color:'var(--text-2)', paddingLeft:8 }}>
                  {l.product_code} · qty {l.qty} · {l.unit_price} {l.currency}
                </div>
              ))}
              {/* ADR-027 D4 — VAT context frozen at draft creation */}
              {disclosure.vat_resolution && (
                <div data-testid="vat-resolution-disclosure"
                     style={{ marginTop:10, padding:'8px 10px', borderRadius:5,
                              background:'var(--badge-neutral-bg,#f0f1f4)',
                              border:'1px solid var(--border)' }}>
                  <div style={{ fontWeight:600, marginBottom:4, fontSize:11,
                                color:'var(--text-2)', textTransform:'uppercase',
                                letterSpacing:'0.3px' }}>VAT Treatment</div>
                  <div style={{ marginBottom:2 }}>
                    <b>Context:</b>{' '}
                    <code style={{ fontSize:11 }}>{disclosure.vat_resolution.vat_context || '—'}</code>
                    {' · '}
                    <b>Code:</b>{' '}
                    <code style={{ fontSize:11 }}>{disclosure.vat_resolution.vat_code || '—'}</code>
                    {' · '}
                    <b>Source:</b>{' '}
                    <code style={{ fontSize:11 }}>{disclosure.vat_resolution.decision_source || '—'}</code>
                  </div>
                  {!disclosure.vat_resolution.draft_has_vat_freeze && (
                    <div style={{ color:'var(--badge-amber-text)', fontSize:11, marginTop:4 }}>
                      ⚠ VAT context not yet frozen — will be resolved live at post.
                    </div>
                  )}
                </div>
              )}
            </div>
          )}
          <div style={{ display:'flex', gap:8, justifyContent:'flex-end', marginTop:16 }}>
            <Btn variant="ghost" onClick={onCancel} disabled={busy} small>Cancel</Btn>
            <Btn variant="default" onClick={onConfirm} disabled={busy||loading||!!err} small data-testid="btn-post-confirm-disclosure">
              {busy?<><span className="spinner" style={{ marginRight:6 }}/>Posting…</>:'Confirm Post to wFirma'}
            </Btn>
          </div>
        </div>
      </div>
    );
  }

  // ── Cancel modal (reason required) ───────────────────────────────────────
  function CancelModal({ draftId, onCancel, onDone }) {
    const [reason, setReason] = useState('');
    const [busy, setBusy] = useState(false);
    const [err, setErr] = useState('');
    const submit = async () => {
      if (!reason.trim()) { setErr('Reason required.'); return; }
      setBusy(true); setErr('');
      try {
        const d = await apiFetch(`/api/v1/proforma/draft/${draftId}`);
        await apiFetch(`/api/v1/proforma/draft/${draftId}/cancel`, {
          method:'POST', headers:{ 'Content-Type':'application/json', 'X-Operator': localStorage.getItem('pz_operator_name')||'operator' },
          body: JSON.stringify({ expected_updated_at:(d?.draft||d)?.updated_at||'', reason:reason.trim() }),
        });
        onDone('Draft cancelled.');
      } catch (e) { setErr(e.message); setBusy(false); }
    };
    return (
      <div style={{ position:'fixed', inset:0, background:'var(--overlay)', display:'flex', alignItems:'center', justifyContent:'center', zIndex:2000 }}>
        <div style={{ background:'var(--card)', borderRadius:10, padding:24, maxWidth:420, width:'90%', boxShadow:'0 16px 48px var(--shadow-heavy)', border:'1px solid var(--border)' }}>
          <div style={{ fontWeight:700, fontSize:15, color:'var(--badge-red-text)', marginBottom:8 }}>Delete Draft #{draftId}</div>
          <div style={{ fontSize:12, color:'var(--text-2)', marginBottom:12, lineHeight:1.5 }}>Voids this draft (marks as cancelled). The draft is <strong>retained for audit history</strong> — it is NOT permanently deleted and no change is made in wFirma. Reason required.</div>
          <label style={{ fontSize:11, fontWeight:600, color:'var(--text-2)', display:'block', marginBottom:4 }}>Reason <span style={{ color:'var(--badge-red-text)' }}>*</span></label>
          <textarea value={reason} onChange={e=>setReason(e.target.value)} rows={2} placeholder="e.g. Client withdrew order"
            style={{ width:'100%', padding:'8px 10px', borderRadius:6, border:'1px solid var(--border)', fontSize:12, background:'var(--bg-subtle)', color:'var(--text)', fontFamily:'inherit', resize:'vertical' }} />
          {err && <div style={{ color:'var(--badge-red-text)', fontSize:12, marginTop:6 }}>{err}</div>}
          <div style={{ display:'flex', gap:8, justifyContent:'flex-end', marginTop:16 }}>
            <Btn variant="ghost" onClick={onCancel} disabled={busy} small>Back</Btn>
            <Btn variant="danger" onClick={submit} disabled={busy||!reason.trim()} small data-testid="btn-confirm-cancel">
              {busy?<><span className="spinner" style={{ marginRight:6 }}/>…</>:'Cancel Draft'}
            </Btn>
          </div>
        </div>
      </div>
    );
  }

  // ── Edit Draft modal (PATCH /draft/{id} metadata) ────────────────────────
  const PAYMENT_METHODS = [
    { value: '', label: '— not set —' },
    { value: 'transfer', label: 'Transfer (przelew)' },
    { value: 'cash', label: 'Cash (gotówka)' },
    { value: 'card', label: 'Card (karta)' },
    { value: 'compensation', label: 'Compensation (kompensata)' },
    { value: 'advance', label: 'Advance (zaliczka)' },
  ];
  const INCOTERMS = ['', 'EXW', 'FCA', 'CPT', 'CIP', 'DAP', 'DPU', 'DDP', 'FAS', 'FOB', 'CFR', 'CIF'];

  function EditDraftModal({ draft, onClose, onDone }) {
    const pt = draft?.payment_terms || {};
    const [currency,      setCurrency]      = useState(draft?.currency || '');
    const [paymentMethod, setPaymentMethod] = useState(pt.paymentmethod || '');
    const [paymentDate,   setPaymentDate]   = useState(pt.paymentdate || '');
    const [saleDate,      setSaleDate]      = useState(pt.saledate || '');
    const [incoterm,      setIncoterm]      = useState(draft?.incoterm || '');
    const [exchangeRate,  setExchangeRate]  = useState(draft?.exchange_rate != null ? String(draft.exchange_rate) : '');
    const [remarks,       setRemarks]       = useState(draft?.remarks || '');
    const [busy, setBusy] = useState(false);
    const [err,  setErr]  = useState('');

    const submit = async () => {
      if (!currency.trim()) { setErr('Currency required.'); return; }
      setBusy(true); setErr('');
      const patch = { currency: currency.trim() };
      const newPt = {};
      if (paymentMethod) newPt.paymentmethod = paymentMethod;
      if (paymentDate)   newPt.paymentdate   = paymentDate;
      if (saleDate)      newPt.saledate      = saleDate;
      if (Object.keys(newPt).length || pt.paymentmethod || pt.paymentdate || pt.saledate) {
        patch.payment_terms = {
          ...(pt.paymentmethod ? { paymentmethod: pt.paymentmethod } : {}),
          ...(pt.paymentdate   ? { paymentdate:   pt.paymentdate   } : {}),
          ...(pt.saledate      ? { saledate:       pt.saledate      } : {}),
          ...newPt,
        };
      }
      if (incoterm.trim())        patch.incoterm      = incoterm.trim().toUpperCase();
      if (exchangeRate.trim())    patch.exchange_rate = parseFloat(exchangeRate);
      if (remarks.trim() !== (draft?.remarks || '')) patch.remarks = remarks.trim();
      try {
        await apiFetch(`/api/v1/proforma/draft/${draft.id}`, {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json', 'X-Operator': localStorage.getItem('pz_operator_name') || 'operator' },
          body: JSON.stringify({ expected_updated_at: draft.updated_at || '', patch }),
        });
        onDone('Draft updated.');
      } catch (e) { setErr(e.message); setBusy(false); }
    };

    const field = (label, children) => (
      <div style={{ marginBottom: 12 }}>
        <label style={{ fontSize: 11, fontWeight: 600, color: 'var(--text-2)', display: 'block', marginBottom: 4 }}>{label}</label>
        {children}
      </div>
    );
    const inputStyle = { width: '100%', padding: '8px 10px', borderRadius: 6, border: '1px solid var(--border)', fontSize: 12, background: 'var(--bg-subtle)', color: 'var(--text)', fontFamily: 'inherit' };
    const selectStyle = { ...inputStyle, cursor: 'pointer' };

    return (
      <div style={{ position:'fixed', inset:0, background:'var(--overlay)', display:'flex', alignItems:'center', justifyContent:'center', zIndex:2000 }} onClick={e=>e.target===e.currentTarget&&!busy&&onClose()}>
        <div style={{ background:'var(--card)', borderRadius:10, padding:'20px 24px', maxWidth:480, width:'94%', boxShadow:'0 16px 48px var(--shadow-heavy)', border:'1px solid var(--border)', maxHeight:'90vh', overflowY:'auto' }}>
          <div style={{ fontWeight:700, fontSize:15, fontFamily:'"DM Serif Display",serif', marginBottom:16, color:'var(--text)' }}>
            Edit Draft #{draft?.id}
          </div>

          <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:'0 16px' }}>
            {field('Currency *',
              <input value={currency} onChange={e=>setCurrency(e.target.value.toUpperCase())} placeholder="EUR" maxLength={4}
                style={inputStyle} data-testid="edit-currency" />
            )}
            {field('Incoterm',
              <select value={incoterm} onChange={e=>setIncoterm(e.target.value)} style={selectStyle} data-testid="edit-incoterm">
                {INCOTERMS.map(t => <option key={t} value={t}>{t || '— not set —'}</option>)}
              </select>
            )}
            {field('Payment Method',
              <select value={paymentMethod} onChange={e=>setPaymentMethod(e.target.value)} style={selectStyle} data-testid="edit-payment-method">
                {PAYMENT_METHODS.map(m => <option key={m.value} value={m.value}>{m.label}</option>)}
              </select>
            )}
            {field('Payment Due Date',
              <input type="date" value={paymentDate} onChange={e=>setPaymentDate(e.target.value)}
                style={inputStyle} data-testid="edit-payment-date" />
            )}
            {field('Sale Date',
              <input type="date" value={saleDate} onChange={e=>setSaleDate(e.target.value)}
                style={inputStyle} data-testid="edit-sale-date" />
            )}
            {field('Exchange Rate',
              <input type="number" step="0.0001" min="0" value={exchangeRate} onChange={e=>setExchangeRate(e.target.value)}
                placeholder="e.g. 4.2800" style={inputStyle} data-testid="edit-exchange-rate" />
            )}
          </div>

          {field('Remarks',
            <textarea value={remarks} onChange={e=>setRemarks(e.target.value)} rows={2} placeholder="Optional note"
              style={{ ...inputStyle, resize:'vertical' }} data-testid="edit-remarks" />
          )}

          {err && <div style={{ color:'var(--badge-red-text)', fontSize:12, marginTop:4, marginBottom:4 }}>{err}</div>}
          <div style={{ display:'flex', gap:8, justifyContent:'flex-end', marginTop:12, borderTop:'1px solid var(--border-subtle)', paddingTop:12 }}>

              {busy ? <><span className="spinner" style={{ marginRight:6 }}/>Saving…</> : 'Save changes'}

          </div>
        </div>
      </div>
    );
  }

  // ── Convert-to-Invoice modal ───────────────────────────────────────────────
  function ConvertModal({ draft, onClose, onDone }) {
    const draftId = draft?.id;
    const pid = draft?.wfirma_proforma_id || '';
    const idempKey = pid ? `prof-${pid.slice(0,12)}-conv` : `draft-${draftId}-conv`;
    const [preview, setPreview] = useState(null);
    const [previewLoading, setPreviewLoading] = useState(true);
    const [previewError, setPreviewError] = useState('');
    const [sessionUser, setSessionUser] = useState(null);
    const [submitting, setSubmitting] = useState(false);
    const [outcome, setOutcome] = useState(null);

    useEffect(() => {
      Promise.all([
        apiFetch(`/api/v1/proforma/draft/${draftId}/to-invoice-preview`).catch(e=>({ _err: e.message })),
        apiFetch('/auth/me').catch(()=>null),
      ]).then(([prev, user]) => {
        if (prev?._err) setPreviewError(prev._err);
        else setPreview(prev);
        setSessionUser(user);
        setPreviewLoading(false);
      });
    }, [draftId]);

    const doConvert = async () => {
      setSubmitting(true);
      try {
        const res = await apiFetch(`/api/v1/proforma/draft/${draftId}/to-invoice`, {
          method:'POST', headers:{ 'Content-Type':'application/json' },
          body: JSON.stringify({ confirm:'YES_CREATE_FINAL_INVOICE_FROM_PROFORMA' }),
        });
        if (res?.ok) {
          setOutcome({ type:'success', msg:`Invoice created: ${res.wfirma_invoice_number||res.wfirma_invoice_id}`, res });
        } else {
          const reasons = (res?.blocking_reasons||[]).join('; ');
          if (reasons.includes('WFIRMA_CREATE_INVOICE_ALLOWED')) {
            setOutcome({ type:'flag_off', msg:'Invoice creation is disabled. Ask admin to enable WFIRMA_CREATE_INVOICE_ALLOWED and restart the service.' });
          } else {
            setOutcome({ type:'rejected', msg:`wFirma rejected: ${reasons||res?.error||'Unknown'}`, res });
          }
        }
      } catch (e) {
        const m = e.message||'';
        if (m.includes('503')||m.toLowerCase().includes('disabled')) setOutcome({ type:'flag_off', msg:'Invoice creation is disabled. Ask admin to enable WFIRMA_CREATE_INVOICE_ALLOWED.' });
        else if (m.includes('504')||m.includes('502')||m.toLowerCase().includes('timeout')||m.includes('unreachable')) setOutcome({ type:'timeout', msg:'Network timeout — do NOT retry immediately. Verify with wFirma support. wfirma_post_retry Inbox proposal not yet registered — file manually if needed.' });
        else if (m.includes('500')) setOutcome({ type:'partial', msg:'Server error after wFirma call. Invoice may exist in wFirma but local record not updated. Check audit trail; use Adopt Existing if invoice is there.' });
        else setOutcome({ type:'rejected', msg:m });
      }
      setSubmitting(false);
    };

    const sum = preview?.summary || {};
    const operator = sessionUser?.full_name || sessionUser?.email || 'session user';
    const blocked = !previewLoading && (!!previewError || preview?.status==='blocked');

    if (outcome) {
      const isOk = outcome.type==='success';
      const col = { success:'var(--badge-green-text)', rejected:'var(--badge-red-text)', flag_off:'var(--badge-neutral-text)', timeout:'var(--badge-amber-text)', partial:'var(--badge-orange-text)' }[outcome.type]||'var(--badge-red-text)';
      return (
        <div style={{ position:'fixed', inset:0, background:'var(--overlay)', display:'flex', alignItems:'center', justifyContent:'center', zIndex:2000 }}>
          <div style={{ background:'var(--card)', borderRadius:10, padding:24, maxWidth:440, width:'92%', boxShadow:'0 16px 48px var(--shadow-heavy)', border:'1px solid var(--border)' }}>
            <div style={{ fontWeight:700, fontSize:14, color:col, marginBottom:10 }}>{isOk?'✓ Invoice created':'⚠ '+(outcome.type.toUpperCase().replace('_',' '))}</div>
            <div style={{ fontSize:13, color:'var(--text-2)', lineHeight:1.6, marginBottom:16 }}>{outcome.msg}</div>
            {isOk && outcome.res && <div style={{ fontSize:12, marginBottom:12 }}>Invoice ID: <strong>{outcome.res.wfirma_invoice_id}</strong> · Number: <strong>{outcome.res.wfirma_invoice_number}</strong></div>}
            <Btn variant={isOk?'gold':'outline'} onClick={()=>{ onDone(isOk?'success':'failed'); onClose(); }} small style={{ width:'100%' }} data-testid="convert-outcome-close">{isOk?'Done':'Close'}</Btn>
          </div>
        </div>
      );
    }

    const Cell = ({ k, v, mono }) => (
      <><div style={{ color:'var(--text-3)', fontWeight:600, fontSize:12 }}>{k}</div>
        <div style={{ color:'var(--text)', fontFamily:mono?'monospace':'inherit', fontSize:12, wordBreak:'break-all' }}>{v}</div></>
    );

    return (
      <div style={{ position:'fixed', inset:0, background:'var(--overlay)', display:'flex', alignItems:'flex-start', justifyContent:'center', zIndex:2000, paddingTop:48, overflowY:'auto' }}>
        <div style={{ background:'var(--card)', borderRadius:10, width:'92%', maxWidth:640, marginBottom:40, boxShadow:'0 16px 48px var(--shadow-heavy)', border:'1px solid var(--border)' }}>
          <div style={{ padding:'16px 20px', borderBottom:'1px solid var(--border)', display:'flex', alignItems:'center', justifyContent:'space-between' }}>
            <span style={{ fontWeight:700, fontSize:16, fontFamily:'"DM Serif Display",serif' }}>⚠ Convert Proforma → Invoice</span>
            <button onClick={onClose} style={{ background:'none', border:'none', cursor:'pointer', fontSize:18, color:'var(--text-3)' }} data-testid="convert-modal-close">×</button>
          </div>
          <div style={{ padding:'18px 20px' }}>
            {/* SENTENCE ONE — irreversibility */}
            <div style={{ padding:'10px 14px', background:'var(--badge-red-bg)', border:'1px solid var(--badge-red-border)', borderRadius:6, marginBottom:16, fontSize:13, color:'var(--badge-red-text)', fontWeight:600, lineHeight:1.5 }} data-testid="irreversibility-warning">
              This creates a wFirma invoice and cannot be cancelled — only corrected via Korekta.
            </div>

            {previewLoading ? <div style={{ textAlign:'center', padding:24 }}><span className="spinner" /></div>
            : previewError ? <div style={{ padding:'10px 14px', background:'var(--badge-amber-bg)', borderRadius:6, fontSize:12, color:'var(--badge-amber-text)' }}>Preview blocked: {previewError}</div>
            : preview?.status==='blocked' ? <div style={{ padding:'10px 14px', background:'var(--badge-amber-bg)', borderRadius:6, fontSize:12, color:'var(--badge-amber-text)' }}>Conversion blocked: {(preview?.blocking_reasons||[]).join('; ')}</div>
            : (
              <>
                <div style={{ fontSize:11, fontWeight:700, color:'var(--text-3)', letterSpacing:'0.08em', textTransform:'uppercase', marginBottom:8 }}>── PAYLOAD ─────────────────────────────</div>
                <div style={{ display:'grid', gridTemplateColumns:'140px 1fr', gap:'6px 12px', marginBottom:14 }}>
                  <Cell k="Endpoint" v={`POST /api/v1/proforma/draft/${draftId}/to-invoice`} mono />
                  <Cell k="Source" v={sum.source_proforma_number||'—'} />
                  <Cell k="wFirma Proforma" v={preview?.wfirma_proforma_id||'—'} mono />
                  <Cell k="Contractor ID" v={sum.contractor_id||'—'} mono />
                  <Cell k="Currency" v={sum.currency||'—'} />
                  <Cell k="Total (expected)" v={sum.source_proforma_total?`${sum.source_proforma_total} ${sum.currency}`:'—'} />
                  <Cell k="Series ID (auto)" v={(sum.series_id||'—') + ' (read-only)'} />
                  <Cell k="Lines" v={sum.line_count?`${sum.line_count} line(s)`:'—'} />
                  <Cell k="Issue Date" v={sum.final_date||'—'} />
                </div>
                <div style={{ fontSize:11, fontWeight:700, color:'var(--text-3)', letterSpacing:'0.08em', textTransform:'uppercase', marginBottom:8 }}>── AUDIT ────────────────────────────────</div>
                <div style={{ display:'grid', gridTemplateColumns:'140px 1fr', gap:'6px 12px', marginBottom:14 }}>
                  <Cell k="Idempotency key" v={idempKey + ' (deterministic)'} mono />
                  <Cell k="Audit row" v="written pre-call as pending; updated post-call" />
                  <Cell k="Actor" v={`${operator} (session-derived)`} />
                </div>
                <div style={{ fontSize:11, color:'var(--text-3)', padding:'8px 10px', background:'var(--bg-subtle)', borderRadius:4, marginBottom:14, lineHeight:1.5 }}>
                  On timeout: do NOT retry. wfirma_post_retry Inbox proposal not yet registered — verify manually with wFirma support or use Adopt Existing.
                </div>
              </>
            )}

            <div style={{ display:'flex', gap:8, justifyContent:'flex-end', paddingTop:8, borderTop:'1px solid var(--border-subtle)' }}>
              <Btn variant="ghost" onClick={onClose} disabled={submitting} small>Cancel</Btn>
              <Btn variant="danger" onClick={doConvert} disabled={submitting||previewLoading||blocked} small data-testid="btn-confirm-convert">
                {submitting?<><span className="spinner" style={{ marginRight:6 }}/>Converting…</>:'⚠ Convert to Invoice'}
              </Btn>
            </div>
          </div>
        </div>
      </div>
    );
  }

  // ── Tab bodies ────────────────────────────────────────────────────────────

  // ── Dual-Valuation panel (Phase 5 §6) ─────────────────────────────────────
  function DualValuationPanel({ batchId, clientName }) {
    const [dv, setDv]   = useState(null);
    const [dvErr, setDvErr] = useState('');
    React.useEffect(() => {
      if (!batchId || !clientName) return;
      apiFetch(`/api/v1/proforma/${encodeURIComponent(batchId)}/${encodeURIComponent(clientName)}/dual-valuation`)
        .then(d => setDv(d))
        .catch(e => setDvErr(e.message));
    }, [batchId, clientName]);
    if (dvErr) return null; // silent — dual valuation is supplementary
    if (!dv) return null;
    const fmt = v => v != null ? parseFloat(v).toLocaleString('pl-PL', {minimumFractionDigits:2, maximumFractionDigits:2}) : '—';
    return (
      <div data-testid="dual-valuation-panel" style={{ marginTop:12, padding:'10px 14px', background:'var(--bg-subtle)', borderRadius:6, border:'1px solid var(--border-subtle)', fontSize:12 }}>
        <div style={{ fontWeight:700, marginBottom:6, color:'var(--text-2)' }}>Dual Valuation (Phase 5 §6)</div>
        <div style={{ display:'flex', gap:24 }}>
          <div><span style={{ color:'var(--text-3)' }}>Purchase basis (customs/PZ):</span> <b>USD {fmt(dv.purchase_total_usd)}</b> <span style={{ color:'var(--text-3)', fontSize:11 }}>({dv.purchase_source})</span></div>
          <div><span style={{ color:'var(--text-3)' }}>Sales basis (warehouse):</span> <b>{dv.sales_currency} {fmt(dv.sales_total)}</b> <span style={{ color:'var(--text-3)', fontSize:11 }}>({dv.sales_source})</span></div>
          <div style={{ color:'var(--text-3)', fontSize:11 }}>confidence: {dv.confidence}</div>
        </div>
      </div>

        {d.needs_pricing_refresh && <div data-testid="pricing-warning" style={{ marginTop:10, padding:'8px 12px', background:'var(--badge-amber-bg)', border:'1px solid var(--badge-amber-border)', borderRadius:6, fontSize:12, color:'var(--badge-amber-text)', fontWeight:600 }}>⚠ One or more lines have unit price ≤ 0 — reset from packing list.</div>}

  function CustomerMappingTab({ draft, onRefresh }) {
    const cr = draft?.customer_resolution;
    // Priority: explicit operator selection (buyer_override.wfirma_customer_id) > resolution result
    const storedContractorId = (draft?.buyer_override?.wfirma_customer_id || '').trim();
    const [contractorId, setContractorId] = useState(storedContractorId || (cr?.wfirma_customer_id ? String(cr.wfirma_customer_id) : ''));
    const [country,      setCountry]      = useState('');
    const [saving,       setSaving]       = useState(false);
    const [saveMsg,      setSaveMsg]      = useState('');
    const [saveErr,      setSaveErr]      = useState('');

    if (!cr) return <EmptyState state="empty" message="No resolution data." />;

    const op = () => localStorage.getItem('pz_operator_name') || 'operator';

    const candidates    = Array.isArray(cr.candidates)   ? cr.candidates   : [];
    const candidateIds  = Array.isArray(cr.candidate_ids) ? cr.candidate_ids : [];

    const selectCandidate = (idx) => {
      if (candidateIds[idx]) {
        setContractorId(String(candidateIds[idx]));
        setSaveErr('');
        setSaveMsg('');
      }
    };

    const handleSave = async () => {
      const idVal = contractorId.trim();
      if (!idVal) { setSaveErr('wFirma contractor ID is required.'); return; }
      setSaving(true); setSaveMsg(''); setSaveErr('');
      try {
        // 1. Upsert the Customer Master record so freight/insurance data exists
        const body = { bill_to_name: draft.client_name || idVal };
        if (country.trim()) body.country = country.trim().toUpperCase();
        await apiFetch(`/api/v1/customer-master/${encodeURIComponent(idVal)}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json', 'X-Operator': op() },
          body: JSON.stringify(body),
        });
        // 2. Record the explicit contractor selection in the draft's buyer_override
        //    so _suggest_lookup uses it directly (bypasses ambiguous name resolution)
        const existingOverride = draft.buyer_override || {};
        const mergedOverride = { ...existingOverride, wfirma_customer_id: idVal };
        await apiFetch(`/api/v1/proforma/draft/${draft.id}`, {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json', 'X-Operator': op() },
          body: JSON.stringify({
            expected_updated_at: draft.updated_at,
            patch: { buyer_override: mergedOverride },
          }),
        });
        setSaveMsg('Customer mapping saved — freight and insurance are now available.');
        if (onRefresh) onRefresh();
      } catch (e) { setSaveErr(e.message || 'Save failed.'); }
      setSaving(false);
    };

    // If operator has explicitly selected a contractor, treat as resolved for banner purposes
    const explicitSelection = storedContractorId;
    const isResolved = cr.found || !!explicitSelection;
    const sBg     = isResolved ? 'var(--badge-green-bg)'  : cr.ambiguous ? 'var(--badge-amber-bg)'  : 'var(--badge-red-bg)';
    const sBorder = isResolved ? 'var(--badge-green-border)' : cr.ambiguous ? 'var(--badge-amber-border)' : 'var(--badge-red-border)';
    const sColor  = isResolved ? 'var(--badge-green-text)' : cr.ambiguous ? 'var(--badge-amber-text)' : 'var(--badge-red-text)';
    const sLabel  = cr.found
      ? '✓ Matched to Customer Master'
      : explicitSelection
        ? `✓ Buyer selected — contractor ID ${explicitSelection} (freight & insurance available)`
        : cr.ambiguous
          ? '⚠ Ambiguous — select the correct buyer below to enable freight & insurance'
          : '✗ Not mapped to Customer Master';

    return (
      <div data-testid="tab-customer-mapping" style={{ padding:'20px 24px', display:'flex', flexDirection:'column', gap:14 }}>
        <div style={{ padding:'10px 14px', background:sBg, border:`1px solid ${sBorder}`, borderRadius:6, fontSize:12, fontWeight:700, color:sColor }}>{sLabel}</div>

        {/* Ambiguous candidate picker — shown only when multiple CM records match */}
        {cr.ambiguous && candidates.length > 0 && (
          <Card style={{ padding:'12px 16px' }}>
            <SectionHeader label="Select the Correct Customer" />
            <div style={{ marginTop:6, fontSize:12, color:'var(--text-2)', marginBottom:10 }}>
              {candidates.length} Customer Master records match "<strong>{cr.raw_input || draft.client_name}</strong>". Click a row to pre-fill the contractor ID below, then save.
            </div>
            <table style={{ width:'100%', borderCollapse:'collapse', fontSize:12 }}>
              <thead>
                <tr>
                  <th style={{ textAlign:'left', padding:'4px 8px', fontSize:10, fontWeight:700, color:'var(--text-3)', textTransform:'uppercase', letterSpacing:'0.05em', borderBottom:'1px solid var(--border)' }}>Customer Name</th>
                  <th style={{ textAlign:'left', padding:'4px 8px', fontSize:10, fontWeight:700, color:'var(--text-3)', textTransform:'uppercase', letterSpacing:'0.05em', borderBottom:'1px solid var(--border)' }}>wFirma ID</th>
                  <th style={{ padding:'4px 8px', borderBottom:'1px solid var(--border)' }}></th>
                </tr>
              </thead>
              <tbody>
                {candidates.map((name, idx) => {
                  const cid = candidateIds[idx] || '—';
                  const isSelected = contractorId === String(cid);
                  return (
                    <tr key={idx} data-testid={`candidate-row-${idx}`} style={{ background: isSelected ? 'var(--badge-green-bg)' : 'transparent' }}>
                      <td style={{ padding:'6px 8px', fontWeight: isSelected ? 700 : 400 }}>{name}</td>
                      <td style={{ padding:'6px 8px', fontFamily:'monospace', color:'var(--text-2)' }}>{cid}</td>
                      <td style={{ padding:'6px 8px', textAlign:'right' }}>
                        <Btn variant={isSelected ? 'primary' : 'outline'} small onClick={() => selectCandidate(idx)} data-testid={`btn-select-candidate-${idx}`}>
                          {isSelected ? '✓ Selected' : 'Select'}
                        </Btn>
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </Card>
        )}

        <Card style={{ padding:'0 0 8px' }}>
          <SectionHeader label="Customer Mapping" />
          <div style={{ padding:'0 16px' }}>
            {[['Sales client name',cr.raw_input||'—'],['Normalized',cr.normalized_name||'—'],['wFirma customer ID',cr.wfirma_customer_id||'—',true],['wFirma name',cr.resolved_wfirma_name||'—'],['Match strategy',cr.match_strategy||'—'],['Found',cr.found?'✓ Yes':'✗ No']].map(([k,v,mono])=><InfoRow key={k} label={k} value={v} mono={mono} />)}
            {explicitSelection && <InfoRow label="Selected contractor ID (override)" value={explicitSelection} mono data-testid="selected-contractor-id-row" />}
          </div>
        </Card>

        <Card style={{ padding:'14px 16px' }}>
          <SectionHeader label={cr.found ? 'Update Customer Master Mapping' : cr.ambiguous ? 'Confirm & Save Mapping' : 'Add to Customer Master'} />
          <div style={{ marginTop:8, fontSize:12, color:'var(--text-2)', marginBottom:10 }}>
            {cr.found
              ? `Already linked as "${cr.resolved_wfirma_name}" (ID: ${cr.wfirma_customer_id}). Enter a different ID to re-map.`
              : cr.ambiguous
                ? `Select a candidate above or enter the wFirma contractor ID manually. Country is optional if the Customer Master record already exists.`
                : `"${cr.raw_input || draft.client_name}" is not in Customer Master. Enter the wFirma contractor ID (numeric) and country to create the entry.`}
          </div>
          <div style={{ display:'grid', gridTemplateColumns:'1fr 120px', gap:10, marginBottom:10 }}>
            <div>
              <div style={{ fontSize:10, fontWeight:700, color:'var(--text-3)', letterSpacing:'0.06em', textTransform:'uppercase', marginBottom:4 }}>wFirma Contractor ID *</div>
              <input
                type="text"
                value={contractorId}
                onChange={e => { setContractorId(e.target.value); setSaveErr(''); }}
                placeholder="numeric wFirma ID"
                data-testid="customer-contractor-id-input"
                style={{ fontSize:12, padding:'6px 10px', border:'1px solid var(--border)', borderRadius:4, fontFamily:'monospace', color:'var(--text)', background:'var(--bg-subtle)', width:'100%' }}
              />
            </div>
            <div>
              <div style={{ fontSize:10, fontWeight:700, color:'var(--text-3)', letterSpacing:'0.06em', textTransform:'uppercase', marginBottom:4 }}>Country (ISO-2)</div>
              <input
                type="text"
                value={country}
                onChange={e => { setCountry(e.target.value); setSaveErr(''); }}
                maxLength={2}
                placeholder="IN / PL"
                data-testid="customer-country-input"
                style={{ fontSize:12, padding:'6px 10px', border:'1px solid var(--border)', borderRadius:4, fontFamily:'monospace', color:'var(--text)', background:'var(--bg-subtle)', width:'100%' }}
              />
            </div>
          </div>
          <div style={{ display:'flex', gap:8, alignItems:'center', flexWrap:'wrap' }}>
            <Btn variant="primary" small onClick={handleSave} disabled={saving || !contractorId.trim()} data-testid="btn-save-customer-mapping">
              {saving ? '…' : cr.found ? 'Update Mapping' : 'Create & Map'}
            </Btn>
            <Btn variant="ghost" small onClick={() => onRefresh && onRefresh()} data-testid="btn-refresh-customer-mapping">↻ Refresh</Btn>
            <a href="/dashboard/customer-master-v2.html" target="_blank" style={{ fontSize:11, color:'var(--accent)', textDecoration:'none' }}>Open Customer Master →</a>
          </div>
          {saveMsg && <div style={{ marginTop:8, fontSize:11, color:'var(--badge-green-text)', fontWeight:600 }}>{saveMsg}</div>}
          {saveErr && <div style={{ marginTop:8, fontSize:11, color:'var(--badge-red-text)', fontWeight:600 }}>{saveErr}</div>}
        </Card>
      </div>
    );
  }

  function ReservationTab({ draft, onRefresh }) {
    const [creating, setCreating] = useState(false);
    const [createErr, setCreateErr] = useState('');
    const [confirmRes, setConfirmRes] = useState(false);
    const hook = useGet(
      draft?.batch_id && draft?.client_name ? `/api/v1/proforma/preview/${encodeURIComponent(draft.batch_id)}/${encodeURIComponent(draft.client_name)}` : null,
      [draft?.batch_id, draft?.client_name],
    );
    const p = hook.data;
    const blockers = Array.isArray(p?.export_blockers)?p.export_blockers:[];
    const chip = (label,ok) => <span style={{ display:'inline-flex', alignItems:'center', gap:4, padding:'3px 10px', borderRadius:4, fontSize:11, fontWeight:600, background:ok?'var(--badge-green-bg)':'var(--badge-amber-bg)', color:ok?'var(--badge-green-text)':'var(--badge-amber-text)', border:`1px solid ${ok?'var(--badge-green-border)':'var(--badge-amber-border)'}` }}>{ok?'✓':'⚠'} {label}</span>;
    const createRes = async () => {
      setCreating(true); setCreateErr('');
      try {
        await apiFetch('/api/v1/wfirma/reservations/create', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ batch_id:draft.batch_id, client_name:draft.client_name }) });
        onRefresh(); hook.reload();
      } catch (e) { setCreateErr(e.message); }
      setCreating(false); setConfirmRes(false);
    };
    return (
      <div data-testid="tab-reservation" style={{ padding:'20px 24px' }}>
        <Box loading={hook.loading} error={hook.error} retry={hook.reload}>
          <div style={{ display:'flex', gap:8, flexWrap:'wrap', marginBottom:14 }}>
            {chip('wFirma configured', p?.wfirma_capable!==false)}
            {chip('Audit clean', p?.audit_ok===true||p?.audit_status==='clean')}
            {chip('Reservation supported', p?.reservation_supported!==false)}
          </div>
          {blockers.length>0 && <Card style={{ padding:'12px 16px', marginBottom:14, background:'var(--badge-amber-bg)', borderColor:'var(--badge-amber-border)' }}><div style={{ fontWeight:700, fontSize:12, color:'var(--badge-amber-text)', marginBottom:6 }}>Blocking reasons</div><ul style={{ paddingLeft:16, fontSize:12, color:'var(--badge-amber-text)' }}>{blockers.map((b,i)=><li key={i} style={{ marginBottom:3 }}>{b}</li>)}</ul></Card>}
          {createErr && <div style={{ color:'var(--badge-red-text)', fontSize:12, marginTop:8, padding:'6px 10px', background:'var(--badge-red-bg)', borderRadius:4 }}>Reservation failed: {createErr}</div>}
          {confirmRes && <Confirm title="Create Reservation" msg={`Create wFirma reservation for ${draft?.client_name}? This calls the live wFirma API.`} label="Create Reservation" ok={createRes} cancel={()=>setConfirmRes(false)} busy={creating} />}
          <div style={{ display:'flex', justifyContent:'flex-end', marginTop:8 }}>
            <Btn variant="outline" small onClick={()=>setConfirmRes(true)} disabled={creating||blockers.length>0} data-testid="btn-create-reservation">
              {creating?<><span className="spinner" style={{ marginRight:6 }}/>Creating…</>:'Create Reservation'}
            </Btn>
          </div>
        </Box>
      </div>
    );
  }

  function HistoryTab({ draftId }) {
    const hook = useGet(`/api/v1/proforma/draft/${draftId}/events`, [draftId]);
    const events = hook.data?.events||[];
    return (
      <div data-testid="tab-history" style={{ padding:'20px 24px' }}>
        <Box loading={hook.loading} error={hook.error} retry={hook.reload}>
          {!events.length?<EmptyState state="empty" message="No events." />:(
            <div>{events.map((ev,i)=>(
              <div key={i} style={{ display:'flex', gap:12, padding:'9px 0', borderBottom:'1px solid var(--border-subtle)' }}>
                <div style={{ width:7, height:7, borderRadius:'50%', background:'var(--accent)', marginTop:5, flexShrink:0 }} />
                <div style={{ flex:1 }}>
                  <div style={{ fontSize:12, fontWeight:600 }}>{ev.event_type||ev.type||'event'}</div>
                  {ev.operator&&<div style={{ fontSize:11, color:'var(--text-2)' }}>by {ev.operator}</div>}
                  {ev.notes&&<div style={{ fontSize:11, color:'var(--text-3)', marginTop:2 }}>{ev.notes}</div>}
                </div>
                <div style={{ fontSize:10, color:'var(--text-3)', whiteSpace:'nowrap' }}>{(ev.created_at||ev.recorded_at||'').slice(0,16)}</div>
              </div>
            ))}</div>
          )}
        </Box>
      </div>
    );
  }

  // ── Main App ──────────────────────────────────────────────────────────────
  function App() {
    const [activeTab, setActiveTab] = useState('Overview');
    const [toast, setToast] = useState(null);
    const [modal, setModal] = useState(null);
    const [actionBusy, setActionBusy] = useState({});
    const [showGenerate, setShowGenerate] = useState(false);
    const [showOverflow, setShowOverflow] = useState(false);
    const showToast = (msg, type='info') => { setToast({msg,type}); setTimeout(()=>setToast(null),4000); };

    // Draft state
    const [draftRaw, setDraftRaw] = useState(null);
    const [draftLoading, setDraftLoading] = useState(true);
    const [draftError, setDraftError] = useState(null);
    const loadDraft = useCallback(async () => {
      if (!DRAFT_ID) return;
      setDraftLoading(true); setDraftError(null);
      try {
        const res = await apiFetch(`/api/v1/proforma/draft/${DRAFT_ID}`);
        setDraftRaw(res?.draft??res); setDraftLoading(false);
      } catch (e) { setDraftError(e.message); setDraftLoading(false); }
    }, []);
    useEffect(()=>{ loadDraft(); },[loadDraft]);

    const invLinkHook = useGet(DRAFT_ID?`/api/v1/proforma/draft/${DRAFT_ID}/invoice-link`:null,[DRAFT_ID]);
    const compHook = useGet('/api/v1/settings/company-profile',[]);

    const draft = draftRaw;
    const invoiceLink = invLinkHook.data;
    const chip = deriveChip(draft, invoiceLink);
    const op = ()=>localStorage.getItem('pz_operator_name')||'operator';

    // Mutation helper
    const mutate = async (path, body, successMsg, key) => {
      setActionBusy(b=>({...b,[key]:true}));
      try {
        await apiFetch(path, { method:'POST', headers:{'Content-Type':'application/json','X-Operator':op()}, body:JSON.stringify(body) });
        showToast(successMsg,'success'); loadDraft(); invLinkHook.reload&&invLinkHook.reload();
      } catch (e) { showToast(e.message,'error'); }
      setActionBusy(b=>({...b,[key]:false}));
    };

    const st = draft?.draft_state||'';
    const posted = st==='posted'||st==='adopted_from_audit';
    const canApprove = ['editing','draft'].includes(st);
    const canReopen = st==='approved';
    const canPost = st==='approved';
    const canCancel = !['cancelled','superseded'].includes(st)&&!posted&&chip!=='INVOICED';
    const canConvert = posted&&chip!=='INVOICED'&&!!draft?.wfirma_proforma_id;
    const canReset = ['editing','draft','approved'].includes(st);
    const canEdit = ['draft','editing'].includes(st);
    // Duplicate = clone to new draft; available for any non-terminal state
    const canDuplicate = !['cancelled','superseded'].includes(st);

    if (!DRAFT_ID) return <AppShell activeNav="proforma"><div style={{ padding:40 }}><EmptyState state="error" message="Missing draft_id" /></div></AppShell>;

    const backHref = draft?.batch_id?`/dashboard/proforma-v2.html?batch_id=${encodeURIComponent(draft.batch_id)}`:'/dashboard/proforma-v2.html';
    const company = compHook.data;
    const cr = draft?.customer_resolution;
    const buyer = cr?.customer;

    return (
      <AppShell activeNav="proforma" data-testid="proforma-detail-v2-root">
        {toast && <Toast msg={toast.msg} type={toast.type} />}

        {/* Modals */}
        {/* Cancel draft modal — uses CancelModal which requires a reason for audit */}
        {modal==='cancel' && <CancelModal draftId={DRAFT_ID} onCancel={()=>setModal(null)} onDone={msg=>{ showToast(msg,'success'); setModal(null); loadDraft(); }} />}
        {modal==='reopen' && <Confirm title="Re-open Draft" msg="Move approved draft back to editing?" label="Re-open" ok={()=>{ setModal(null); mutate(`/api/v1/proforma/draft/${DRAFT_ID}/re-open`,{expected_updated_at:draft?.updated_at||'',confirm_token:'YES_REOPEN_LOCAL_PROFORMA_DRAFT'},'Draft re-opened.','reopen'); }} cancel={()=>setModal(null)} busy={!!actionBusy.reopen} />}
        {modal==='approve' && <Confirm title="Approve Draft" msg="Lock draft as approved? Required before posting to wFirma." label="Approve" ok={()=>{ setModal(null); mutate(`/api/v1/proforma/draft/${DRAFT_ID}/approve`,{expected_updated_at:draft?.updated_at||'',confirm_token:'YES_APPROVE_LOCAL_PROFORMA_DRAFT'},'Draft approved.','approve'); }} cancel={()=>setModal(null)} busy={!!actionBusy.approve} />}
        {modal==='post' && <PostDisclosureModal draftId={DRAFT_ID} onCancel={()=>setModal(null)} onConfirm={()=>{ setModal(null); mutate(`/api/v1/proforma/draft/${DRAFT_ID}/post`,{expected_updated_at:draft?.updated_at||'',confirm_token:'YES_POST_LOCAL_PROFORMA_DRAFT_TO_WFIRMA'},'Proforma posted to wFirma.','post'); }} busy={!!actionBusy.post} />}
        {/* Duplicate = clone to NEW draft; source is untouched */}
        {modal==='duplicate' && <Confirm title="Duplicate Draft" msg={`Create a copy of Draft #${DRAFT_ID}? A NEW draft will be created — this draft's edits are NOT changed. The clone starts as unposted.`} label="Create duplicate" ok={async()=>{ setModal(null); setActionBusy(b=>({...b,duplicate:true})); try { const r = await apiFetch(`/api/v1/proforma/draft/${DRAFT_ID}/clone`,{method:'POST'}); showToast(`Duplicate created — Draft #${r.draft_id}`,'success'); window.location.href = `/dashboard/proforma-detail-v2.html?draft_id=${r.draft_id}`; } catch(e){ showToast(e.message,'error'); } setActionBusy(b=>({...b,duplicate:false})); }} cancel={()=>setModal(null)} busy={!!actionBusy.duplicate} />}
        {/* Reset lines from packing — only via overflow, with explicit overwrite warning */}
        {modal==='reset' && <Confirm title="Reset Lines from Packing" msg="⚠ This will OVERWRITE the current draft's manual line edits with lines from the latest packing data. This action cannot be undone. The draft itself stays — only its line items are replaced." label="Reset lines (overwrites edits)" danger ok={()=>{ setModal(null); mutate(`/api/v1/proforma/draft/${DRAFT_ID}/reset-from-sales-packing`,{expected_updated_at:draft?.updated_at||'',reset_all:false},'Lines reset from packing.','reset'); }} cancel={()=>setModal(null)} busy={!!actionBusy.reset} />}
        {modal==='edit' && draft && <EditDraftModal draft={draft} onClose={()=>setModal(null)} onDone={msg=>{ showToast(msg,'success'); setModal(null); loadDraft(); }} />}
        {modal==='convert' && draft && <ConvertModal draft={draft} onClose={()=>setModal(null)} onDone={(outcome)=>{ loadDraft(); invLinkHook.reload&&invLinkHook.reload(); if(outcome==='success')setActiveTab('Overview'); }} />}

        {/* Breadcrumb */}
        <div style={{ padding:'12px 24px 0', display:'flex', alignItems:'center', gap:8 }}>
          <a href={backHref} data-testid="back-to-screen-a" style={{ fontSize:12, color:'var(--accent)', textDecoration:'none', fontWeight:600 }}>← {draft?.batch_id?`Shipment ${draft.batch_id.slice(-8)}`:'All Drafts'}</a>
          <span style={{ color:'var(--text-3)' }}>/</span>
          <span style={{ fontSize:12, color:'var(--text-2)' }}>{draft?.client_name||`Draft #${DRAFT_ID}`}</span>
          {draft&&<Chip label={chip} />}
        </div>

        <PageHeader title={draft?(draft.wfirma_proforma_fullnumber||`Draft #${DRAFT_ID}`):`Draft #${DRAFT_ID}`} subtitle={draft?`${draft.client_name||'—'} · ${draft.currency||'—'}`:'Loading…'} />

        <div style={{ padding:'16px 24px 40px', flex:1, overflowY:'auto' }}>
          {draftLoading ? <div style={{ textAlign:'center', padding:40 }}><span className="spinner" /></div>
          : draftError ? <EmptyState state="error" message={draftError} onRetry={loadDraft} />
          : (
            <>
              {/* Toolbar: Edit · Cancel draft · Duplicate · Post · Convert⚠ · Print · Generate▾ · ⋯(Approve,Reopen,Reset,Send) */}
              <Card data-testid="action-toolbar" style={{ padding:'10px 16px', marginBottom:14, position:'relative' }}>
                <div style={{ display:'flex', gap:6, flexWrap:'wrap', alignItems:'center' }}
                  onClick={()=>{ setShowGenerate(false); setShowOverflow(false); }}>
                  <Btn variant="outline" small onClick={e=>{e.stopPropagation();setModal('edit');}} disabled={!canEdit} data-testid="btn-edit">Edit</Btn>
                  {/* Delete = soft cancel (POST /cancel); draft retained for audit — NOT permanently deleted */}
                  {/* "Cancel draft" = soft cancel (POST /cancel); draft retained for audit — NOT permanently deleted */}
                  <Btn variant="ghost" small onClick={e=>{e.stopPropagation();setModal('cancel');}} disabled={!canCancel} data-testid="btn-cancel-draft">Cancel draft</Btn>
                  {/* Duplicate = POST /clone → NEW unposted draft; source untouched */}
                  <Btn variant="ghost" small onClick={e=>{e.stopPropagation();setModal('duplicate');}} disabled={!canDuplicate} data-testid="btn-duplicate">Duplicate</Btn>
                  <div style={{ width:1, height:20, background:'var(--border)', margin:'0 2px' }} />
                  <Btn variant="outline" small onClick={e=>{e.stopPropagation();setModal('post');}} disabled={!canPost} data-testid="btn-post-wfirma" data-wf-id="WF2.4" data-wf-gate="WFIRMA_CREATE_PROFORMA_ALLOWED">Post to wFirma</Btn>
                  <Btn variant="outline" small onClick={e=>{e.stopPropagation();setModal('convert');}} disabled={!canConvert} style={canConvert?{color:'var(--badge-amber-text)',borderColor:'var(--badge-amber-border)'}:{}} data-testid="btn-convert-invoice" data-wf-id="WF2.5" data-wf-gate="WFIRMA_CREATE_INVOICE_ALLOWED">⚠ Convert to Invoice</Btn>
                  <div style={{ width:1, height:20, background:'var(--border)', margin:'0 2px' }} />
                  {/* Print = HTML preview (always available, no posting required) */}
                  <Btn variant="ghost" small onClick={e=>{e.stopPropagation();window.open(`/api/v1/proforma/draft/${DRAFT_ID}/preview.html`,'_blank');}} data-testid="btn-print">Print</Btn>
                  {/* Generate ▾ = PDF from wFirma (requires posted proforma; distinct from Print) */}
                  <div style={{ position:'relative' }}>
                    <Btn variant="ghost" small onClick={e=>{e.stopPropagation();setShowGenerate(g=>!g);setShowOverflow(false);}} data-testid="btn-generate">Generate ▾</Btn>
                    {showGenerate && <GenerateMenu draftId={DRAFT_ID} batchId={draft?.batch_id} clientName={draft?.client_name} onClose={()=>setShowGenerate(false)} />}
                  </div>
                  {/* ⋯ overflow: secondary/state-gated/unavailable actions */}
                  <div style={{ position:'relative', marginLeft:'auto' }}>
                    <Btn variant="ghost" small onClick={e=>{e.stopPropagation();setShowOverflow(o=>!o);setShowGenerate(false);}} data-testid="btn-overflow">⋯</Btn>
                    {showOverflow && <OverflowMenu
                      onClose={()=>setShowOverflow(false)}
                      canApprove={canApprove} onApprove={()=>setModal('approve')}
                      canReopen={canReopen}   onReopen={()=>setModal('reopen')}
                      canReset={canReset}     onReset={()=>setModal('reset')}
                      onSend={()=>{ setShowOverflow(false); showToast('Email send not yet available — download PDF via Generate ▾ and send manually.','info'); }}
                    />}
                  </div>
                </div>
              </Card>

              {/* Historical description advisory — advisory only, no gate */}
              {posted && (draft?.editable_lines||[]).some(l => l.name_pl_source === 'operator') && (
                <div data-testid="historical-description-advisory" style={{ marginBottom:14, padding:'10px 14px', background:'var(--badge-amber-bg)', color:'var(--badge-amber-text)', border:'1px solid var(--badge-amber-border)', borderRadius:6, fontSize:12, lineHeight:1.5 }}>
                  <span style={{ fontWeight:700 }}>Advisory:</span>{' '}
                  This posted proforma contains legacy or operator description text that differs from current product description authority. No automatic change will be made.
                </div>
              )}

              {/* Party cards */}
              <div className="party-grid" style={{ display:'grid', gridTemplateColumns:draft?.ship_to_override&&Object.keys(draft.ship_to_override).length?'1fr 1fr 1fr':'1fr 1fr', gap:12, marginBottom:14 }}>
                <Party tid="party-seller" title="Seller" name={company?.company_name||'Estrella Jewels sp. z o.o. sp.k.'} street={company?.address_street} city={company?.address_city} zip={company?.address_postal_code} country={company?.address_country||'PL'} nip={company?.nip} />
                <Party tid="party-buyer" title="Buyer" name={buyer?.bill_to_name||draft?.client_name||'—'} street={buyer?.bill_to_street} city={buyer?.bill_to_city} zip={buyer?.bill_to_postal_code} country={buyer?.country} nip={buyer?.nip} vatEu={buyer?.vat_eu_number} warn={cr&&!cr.found?'Not mapped to wFirma customer':null} />
                {draft?.ship_to_override&&Object.keys(draft.ship_to_override).length>0&&<Party tid="party-shipto" title="Ship-To" name={draft.ship_to_override.name} street={draft.ship_to_override.street} city={draft.ship_to_override.city} zip={draft.ship_to_override.zip} country={draft.ship_to_override.country} />}
              </div>

              {/* Tab strip */}
              <Card style={{ overflow:'hidden' }}>
                <div data-testid="tab-strip" style={{ display:'flex', borderBottom:'1px solid var(--border)', background:'var(--card)', overflowX:'auto' }}>
                  {TABS.map(tab=>(
                    <button key={tab} onClick={()=>setActiveTab(tab)} style={{ background:'transparent', border:'none', cursor:'pointer', padding:'10px 18px 11px', fontSize:12, fontWeight:activeTab===tab?700:500, color:activeTab===tab?'var(--text)':'var(--text-2)', borderBottom:activeTab===tab?'2px solid var(--accent)':'2px solid transparent', marginBottom:-1, whiteSpace:'nowrap', fontFamily:'inherit' }} data-testid={`tab-btn-${tab.toLowerCase().replace(/ /g,'-')}`}>{tab}</button>
                  ))}
                </div>
                {activeTab==='Overview' && <OverviewTab draft={draft} invoiceLink={invoiceLink} />}
                {activeTab==='Lines' && <LinesTab draft={draft} onRefresh={loadDraft} />}
                {activeTab==='Customer Mapping' && <CustomerMappingTab draft={draft} onRefresh={loadDraft} />}
                {activeTab==='Reservation' && <ReservationTab draft={draft} onRefresh={loadDraft} />}
                {activeTab==='History' && <HistoryTab draftId={DRAFT_ID} />}
              </Card>
            </>
          )}
        </div>
      </AppShell>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
})();
</script>
</body>
</html>
