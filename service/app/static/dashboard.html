            <div style={{ padding:'32px', textAlign:'center', color:'var(--text-3)', fontSize:13, background:'var(--card)', borderRadius:10, border:'1px solid var(--border)' }}>

              {warnItems.map((w, i) => (
                <div key={i} style={{ padding:'12px 16px', borderRadius:8, background:'var(--card)', border:'1px solid var(--border)', display:'grid', gridTemplateColumns:'auto 1fr auto', gap:12, alignItems:'start' }}>
                  <div style={{ paddingTop:1 }}><SeverityBadge severity={w.severity} /></div>

                    <div style={{ fontSize:12, color:'var(--text-2)', lineHeight:1.5 }}>{w.message}</div>
                    {w.detail && Object.keys(w.detail).length > 0 && (
                      <div style={{ marginTop:6, display:'flex', flexWrap:'wrap', gap:6 }}>
                        {Object.entries(w.detail).map(([k,v]) => v && (
                          <span key={k} style={{ fontSize:10, padding:'1px 7px', borderRadius:10, background:'var(--badge-neutral-bg)', color:'var(--badge-neutral-text)', border:'1px solid var(--badge-neutral-border)' }}>
                            {k}: {String(v).length > 40 ? String(v).slice(0,40)+'…' : String(v)}

                    <span key={t} style={{ fontSize:11, padding:'2px 10px', borderRadius:10, background:'var(--badge-blue-bg)', color:'var(--badge-blue-text)', border:'1px solid var(--badge-blue-border)', fontWeight:600 }}>
                      {t} × {n}

                  ))}
                </div>

              <div style={{ display:'flex', flexDirection:'column', gap:8 }}>

                  <div key={i} style={{ padding:'12px 16px', borderRadius:8, background:'var(--card)', border:'1px solid var(--border)' }}>

              <tbody>
                {batches.map((b, i) => (
                  <tr key={i} style={{ borderBottom:'1px solid var(--border)', background: i%2===0 ? 'transparent' : 'var(--card)' }}>
                    <td style={{ padding:'8px 12px', fontFamily:'monospace', fontSize:11 }}>{b.batch_id}</td>
                    <td style={{ padding:'8px 12px', fontFamily:'monospace' }}>{b.awb || '—'}</td>
                    <td style={{ padding:'8px 12px' }}>{b.carrier || '—'}</td>
                    <td style={{ padding:'8px 12px' }}>{b.status || '—'}</td>
                    <td style={{ padding:'8px 12px' }}>
                      {b.trigger_count > 0
                        ? <span style={{ fontWeight:700, color:'var(--badge-amber-text)' }}>{b.trigger_count}</span>
                        : <span style={{ color:'var(--text-3)' }}>0</span>
                      }
                    </td>
                    <td style={{ padding:'8px 12px' }}>
                      {b.warning_count > 0
                        ? <span style={{ fontWeight:700, color:'var(--badge-red-text)' }}>{b.warning_count}</span>

                    </td>
                  </tr>

            </table>

      {/* ── Knowledge base / insights tab ── */}
      {activeTab === 'insights' && (
        <div>
          {insightsLoading ? (
            <div style={{ padding:'32px', textAlign:'center', color:'var(--text-3)', fontSize:13 }}>⟳ Loading knowledge base…</div>
          ) : !insights || insights.status === 'not_built' ? (
            <div style={{ padding:'32px', textAlign:'center', background:'var(--card)', border:'1px solid var(--border)', borderRadius:10 }}>
              <div style={{ fontSize:32, marginBottom:12 }}>◈</div>
              <div style={{ fontSize:14, fontWeight:700, marginBottom:8 }}>Knowledge base not built yet</div>
              <div style={{ fontSize:12, color:'var(--text-2)', marginBottom:16, maxWidth:420, margin:'0 auto 16px' }}>
                Click "Build Knowledge Base" to parse all 14 Task F research documents and extract
                SLA benchmarks, automation opportunities, system gaps, and risk patterns.
              </div>
              <button onClick={handleBuildMaster} disabled={building}
                style={{ padding:'8px 20px', borderRadius:8, border:'1px solid var(--badge-blue-border)', background:'var(--badge-blue-bg)', color:'var(--badge-blue-text)', cursor: building ? 'default' : 'pointer', fontSize:13, fontWeight:700 }}>
                {building ? '⟳ Building…' : '◈ Build Now'}
              </button>
            </div>
          ) : (
            <div style={{ display:'flex', flexDirection:'column', gap:16 }}>

              {/* Stats row */}
              <div style={{ display:'grid', gridTemplateColumns:'repeat(auto-fill,minmax(160px,1fr))', gap:10 }}>
                {[
                  ['DHL Shipments', insights.shipment_stats?.confirmed_dhl_shipments, 'var(--badge-blue-bg)', 'var(--badge-blue-text)', 'var(--badge-blue-border)'],
                  ['FedEx Inbound', insights.shipment_stats?.confirmed_fedex_inbound, 'var(--card)', 'var(--text)', 'var(--border)'],
                  ['Total Duty (PLN)', insights.shipment_stats?.confirmed_total_duty_pln?.toLocaleString('pl-PL'), 'var(--badge-amber-bg)', 'var(--badge-amber-text)', 'var(--badge-amber-border)'],
                  ['Automation Opps', insights.automation_opportunities?.total, 'var(--badge-green-bg)', 'var(--badge-green-text)', 'var(--badge-green-border)'],
                  ['System Gaps', insights.system_gaps?.total, insights.system_gaps?.high > 0 ? 'var(--badge-red-bg)' : 'var(--card)', insights.system_gaps?.high > 0 ? 'var(--badge-red-text)' : 'var(--text)', insights.system_gaps?.high > 0 ? 'var(--badge-red-border)' : 'var(--border)'],
                  ['New Actors', insights.actor_discoveries?.new_in_docs, 'var(--badge-neutral-bg)', 'var(--badge-neutral-text)', 'var(--badge-neutral-border)'],
                ].map(([label, val, bg, txt, bd]) => (
                  <div key={label} style={{ padding:'12px 14px', borderRadius:8, background:bg, border:`1px solid ${bd}` }}>
                    <div style={{ fontSize:20, fontWeight:700, color:txt }}>{val ?? '—'}</div>
                    <div style={{ fontSize:11, color:'var(--text-2)', marginTop:2 }}>{label}</div>

                ))}

              {/* Automation opportunities */}
              <div style={{ padding:'16px 20px', borderRadius:10, background:'var(--card)', border:'1px solid var(--border)' }}>
                <div style={{ fontSize:13, fontWeight:700, marginBottom:10 }}>
                  Automation Opportunities
                  <span style={{ fontSize:11, fontWeight:400, color:'var(--text-3)', marginLeft:8 }}>
                    {insights.automation_opportunities?.not_implemented} not yet implemented
                  </span>
                </div>
                <div style={{ display:'flex', flexDirection:'column', gap:5 }}>
                  {(insights.automation_opportunities?.items || []).slice(0,8).map((op, i) => (
                    <div key={i} style={{ display:'grid', gridTemplateColumns:'60px 1fr 70px 70px 50px', gap:8, alignItems:'center', fontSize:12, padding:'4px 0', borderBottom:'1px solid var(--border)' }}>
                      <span style={{ fontWeight:700, fontFamily:'monospace', fontSize:11 }}>{op.id}</span>
                      <span style={{ color:'var(--text-2)' }}>{op.label}</span>
                      <span style={{ textAlign:'center' }}>
                        <span style={{ fontSize:10, padding:'1px 6px', borderRadius:8,
                          background: op.impact==='HIGH' ? 'var(--badge-red-bg)' : op.impact==='MEDIUM' ? 'var(--badge-amber-bg)' : 'var(--badge-neutral-bg)',
                          color: op.impact==='HIGH' ? 'var(--badge-red-text)' : op.impact==='MEDIUM' ? 'var(--badge-amber-text)' : 'var(--badge-neutral-text)',
                          border: `1px solid ${op.impact==='HIGH' ? 'var(--badge-red-border)' : op.impact==='MEDIUM' ? 'var(--badge-amber-border)' : 'var(--badge-neutral-border)'}`,
                        }}>{op.impact}</span>
                      </span>
                      <span style={{ fontSize:10, color:'var(--text-3)', textAlign:'center' }}>effort: {op.effort}</span>
                      <span style={{ fontSize:10, fontWeight:600, color: op.phase==='P1' ? 'var(--badge-green-text)' : 'var(--text-3)', textAlign:'right' }}>{op.phase}</span>
                    </div>
                  ))}
                  {(insights.automation_opportunities?.items || []).length > 8 && (
                    <div style={{ fontSize:11, color:'var(--text-3)', paddingTop:4 }}>
                      +{(insights.automation_opportunities?.items || []).length - 8} more
                    </div>
                  )}
                </div>
              </div>

              {/* Known delay incidents */}
              <div style={{ padding:'16px 20px', borderRadius:10, background:'var(--card)', border:'1px solid var(--border)' }}>
                <div style={{ fontSize:13, fontWeight:700, marginBottom:10 }}>Known Delay Incidents</div>
                {(insights.known_delay_incidents?.items || []).map((d, i) => (
                  <div key={i} style={{ marginBottom: i < (insights.known_delay_incidents?.items||[]).length-1 ? 12 : 0,
                    padding:'10px 12px', borderRadius:8,
                    background:'var(--badge-red-bg)', border:'1px solid var(--badge-red-border)' }}>
                    <div style={{ display:'flex', gap:8, alignItems:'center', marginBottom:4 }}>
                      <span style={{ fontFamily:'monospace', fontWeight:700, fontSize:12 }}>AWB {d.awb}</span>
                      <span style={{ fontSize:11, color:'var(--badge-red-text)' }}>{d.carrier}</span>
                      <span style={{ fontSize:11, color:'var(--text-2)' }}>{d.month}</span>
                      {d.delay_days && <span style={{ fontSize:11, fontWeight:700, color:'var(--badge-red-text)' }}>{d.delay_days} days delay</span>}
                    </div>
                    <div style={{ fontSize:12, color:'var(--text-2)', marginBottom:3 }}>{d.cause}</div>
                    <div style={{ fontSize:11, color:'var(--text-3)' }}>Prevention: {d.prevention}</div>
                  </div>
                ))}
              </div>

              {/* SLA benchmarks */}
              <div style={{ padding:'16px 20px', borderRadius:10, background:'var(--card)', border:'1px solid var(--border)' }}>
                <div style={{ fontSize:13, fontWeight:700, marginBottom:10 }}>SLA Benchmarks (1-Year Evidence)</div>
                <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:12 }}>
                  {[
                    ['DHL Clearance', insights.sla_benchmarks?.DHL_days + ' days'],
                    ['FedEx Clearance', insights.sla_benchmarks?.FEDEX_days + ' days'],
                    ['Duty payment warning', insights.sla_benchmarks?.duty_payment_warning_h + 'h'],
                    ['Duty payment critical', insights.sla_benchmarks?.duty_payment_critical_h + 'h'],
                    ['FedEx cesja deadline', insights.sla_benchmarks?.fedex_cesja_warning_h + 'h after arrival'],
                  ].map(([label, val]) => (
                    <div key={label} style={{ display:'flex', justifyContent:'space-between', fontSize:12, padding:'4px 0', borderBottom:'1px solid var(--border)' }}>
                      <span style={{ color:'var(--text-2)' }}>{label}</span>
                      <span style={{ fontWeight:600 }}>{val}</span>
                    </div>
                  ))}
                </div>
              </div>

              {/* System gaps */}
              {insights.system_gaps && insights.system_gaps.total > 0 && (
                <div style={{ padding:'16px 20px', borderRadius:10, background:'var(--card)', border:'1px solid var(--border)' }}>
                  <div style={{ fontSize:13, fontWeight:700, marginBottom:10 }}>
                    System Gaps
                    <span style={{ fontSize:11, fontWeight:400, color:'var(--badge-red-text)', marginLeft:8 }}>
                      {insights.system_gaps.high} HIGH priority
                    </span>
                  </div>
                  <div style={{ display:'flex', flexDirection:'column', gap:4 }}>
                    {(insights.system_gaps.items || []).filter(g=>g.severity==='HIGH').slice(0,6).map((g, i) => (
                      <div key={i} style={{ display:'flex', gap:8, alignItems:'center', fontSize:12 }}>
                        <SeverityBadge severity={g.severity} />
                        <span style={{ fontFamily:'monospace', fontSize:11, color:'var(--text-2)' }}>{g.id}</span>
                        <span style={{ color:'var(--text)', flex:1 }}>{g.label}</span>
                      </div>
                    ))}
                    {insights.system_gaps.open > 6 && (
                      <div style={{ fontSize:11, color:'var(--text-3)', paddingTop:4 }}>
                        +{insights.system_gaps.open - 6} more open gaps
                      </div>
                    )}
                  </div>
                </div>
              )}

              {/* Generation meta */}
              <div style={{ fontSize:11, color:'var(--text-3)', textAlign:'right' }}>
                Knowledge base v{insights.master_version} · built {insights.generated_at ? new Date(insights.generated_at).toLocaleString() : '—'} ·
                {insights.docs_coverage?.parsed} docs parsed
              </div>

            </div>
          )}
        </div>
      )}

      {/* ── Engine status tab ── */}
      {activeTab === 'config' && status && (
        <div style={{ display:'flex', flexDirection:'column', gap:14 }}>
          {/* Capabilities */}
          <div style={{ padding:'16px 20px', borderRadius:10, background:'var(--card)', border:'1px solid var(--border)' }}>
            <div style={{ fontSize:13, fontWeight:700, marginBottom:10 }}>Capabilities</div>
            <div style={{ display:'flex', flexDirection:'column', gap:5 }}>
              {(status.capabilities || []).map((c, i) => (
                <div key={i} style={{ display:'flex', gap:8, alignItems:'flex-start', fontSize:12 }}>
                  <span style={{ color:'var(--badge-green-text)', marginTop:1 }}>✓</span>
                  <span style={{ color:'var(--text-2)', fontFamily:'monospace', fontSize:11 }}>{c}</span>
                </div>
              ))}
            </div>
          </div>
          {/* Research docs */}
          <div style={{ padding:'16px 20px', borderRadius:10, background:'var(--card)', border:'1px solid var(--border)' }}>
            <div style={{ fontSize:13, fontWeight:700, marginBottom:10 }}>
              Research Documents
              <span style={{ fontWeight:400, fontSize:11, color:'var(--text-3)', marginLeft:8 }}>
                {docs.found}/{docs.total} available
              </span>
            </div>
            <div style={{ display:'flex', flexDirection:'column', gap:4 }}>
              {(docs.details || []).map((d, i) => (
                <div key={i} style={{ display:'flex', gap:8, alignItems:'center', fontSize:12 }}>
                  <span style={{ color: d.exists ? 'var(--badge-green-text)' : 'var(--badge-amber-text)' }}>
                    {d.exists ? '✓' : '✗'}
                  </span>
                  <span style={{ fontFamily:'monospace', fontSize:11, color: d.exists ? 'var(--text)' : 'var(--text-3)' }}>{d.name}</span>
                  {d.size_kb && <span style={{ fontSize:10, color:'var(--text-3)', marginLeft:'auto' }}>{d.size_kb} KB</span>}
                </div>
              ))}
            </div>
          </div>
          {/* Intelligence counts */}
          {status.intelligence && (
            <div style={{ padding:'16px 20px', borderRadius:10, background:'var(--card)', border:'1px solid var(--border)' }}>
              <div style={{ fontSize:13, fontWeight:700, marginBottom:10 }}>Engine Registry</div>
              <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:8 }}>
                {[
                  ['Triggers defined',   status.intelligence.triggers_defined],
                  ['Risks tracked',      status.intelligence.risks_tracked],
                  ['Carriers supported', (status.intelligence.carriers_supported || []).join(', ')],
                ].map(([label, val]) => (
                  <div key={label} style={{ display:'flex', justifyContent:'space-between', fontSize:12, padding:'4px 0', borderBottom:'1px solid var(--border)' }}>
                    <span style={{ color:'var(--text-2)' }}>{label}</span>
                    <span style={{ fontWeight:600 }}>{val}</span>
                  </div>
                ))}
              </div>
            </div>
          )}
          {/* Config path */}
          {cfg.path && (
            <div style={{ padding:'10px 14px', borderRadius:8, background:'var(--badge-neutral-bg)', border:'1px solid var(--badge-neutral-border)', fontSize:11, fontFamily:'monospace', color:'var(--text-3)', wordBreak:'break-all' }}>
              Config: {cfg.path}
            </div>
          )}
          {/* Errors from last suggestions call */}
          {(sug.errors || []).length > 0 && (
            <div style={{ padding:'12px 16px', borderRadius:8, background:'var(--badge-red-bg)', border:'1px solid var(--badge-red-border)' }}>
              <div style={{ fontSize:12, fontWeight:700, color:'var(--badge-red-text)', marginBottom:6 }}>Errors during last scan</div>
              {sug.errors.map((e, i) => (
                <div key={i} style={{ fontSize:11, color:'var(--badge-red-text)', fontFamily:'monospace', marginBottom:2 }}>{e}</div>
              ))}
            </div>
          )}
        </div>
      )}

    </div>
  );
}

function LearningPage({ onToast }) {
  const [summary, setSummary] = React.useState(null);
  const [loading, setLoading] = React.useState(true);
  const [expanded, setExpanded] = React.useState({});
  const [patterns, setPatterns] = React.useState({});
  const [pLoading, setPLoading] = React.useState({});
  const [resetting, setResetting] = React.useState({});
  const [feedback, setFeedback] = React.useState({});  // supplier_key → 'sending'|'done'|'error'

  const load = React.useCallback(async () => {
    setLoading(true);
    try {
      const d = await apiFetch('/api/v1/invoice-learning/summary');
      setSummary(d);
    } catch (e) {
      onToast('Failed to load learning summary: ' + e.message, 'error');
    }
    setLoading(false);
  }, []);

  React.useEffect(() => { load(); }, []);

  const toggleExpand = async (key) => {
    const next = !expanded[key];
    setExpanded(p => ({ ...p, [key]: next }));
    if (next && !patterns[key]) {
      setPLoading(p => ({ ...p, [key]: true }));
      try {
        const d = await apiFetch(`/api/v1/invoice-learning/patterns/${encodeURIComponent(key)}`);
        setPatterns(p => ({ ...p, [key]: d }));
      } catch (e) {
        onToast(`Could not load patterns for ${key}: ` + e.message, 'error');
      }
      setPLoading(p => ({ ...p, [key]: false }));
    }
  };

  const sendFeedback = async (supplierKey, fingerprint, correct) => {
    const fk = `${supplierKey}__${correct ? 'ok' : 'fail'}`;
    setFeedback(p => ({ ...p, [fk]: 'sending' }));
    try {
      const res = await apiFetch('/api/v1/invoice-learning/feedback', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ batch_id: '', supplier_key: supplierKey, layout_fingerprint: fingerprint, correct }),
      });
      setFeedback(p => ({ ...p, [fk]: 'done' }));
      onToast(`Feedback recorded — confidence now: ${res.confidence}`, 'success');
      // Refresh
      setPatterns(p => ({ ...p, [supplierKey]: undefined }));
      await load();
      if (expanded[supplierKey]) {
        setPLoading(p => ({ ...p, [supplierKey]: true }));
        const d = await apiFetch(`/api/v1/invoice-learning/patterns/${encodeURIComponent(supplierKey)}`);
        setPatterns(p => ({ ...p, [supplierKey]: d }));
        setPLoading(p => ({ ...p, [supplierKey]: false }));
      }
    } catch (e) {
      setFeedback(p => ({ ...p, [fk]: 'error' }));
      onToast(`Feedback failed: ` + e.message, 'error');
    }
  };

  const resetPatterns = async (key) => {
    if (!window.confirm(`Reset all learned patterns for "${key}"?\n\nThis supplier will be re-learned from scratch on the next successful parse.\nThis cannot be undone.`)) return;
    setResetting(p => ({ ...p, [key]: true }));
    try {
      await apiFetch(`/api/v1/invoice-learning/patterns/${encodeURIComponent(key)}`, { method: 'DELETE' });
      onToast(`Patterns reset for ${key}`, 'success');
      setPatterns(p => ({ ...p, [key]: undefined }));
      setExpanded(p => ({ ...p, [key]: false }));
      await load();
    } catch (e) {
      onToast(`Reset failed: ` + e.message, 'error');
    }
    setResetting(p => ({ ...p, [key]: false }));
  };

  const fmtDate = (iso) => { if (!iso) return '—'; try { return new Date(iso).toLocaleDateString('en-GB', { day:'2-digit', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit' }); } catch { return iso; } };

  if (loading) return (
    <div style={{ flex:1, display:'flex', alignItems:'center', justifyContent:'center', gap:10, color:'var(--text-3)' }}>
      <span style={{ animation:'spin 1s linear infinite', display:'inline-block' }}>◎</span> Loading learning data…
    </div>
  );

  const suppliers = summary?.suppliers || [];

  return (
    <div style={{ flex:1, overflowY:'auto', padding:'28px 32px' }}>
      {/* Header row */}
      <div style={{ display:'flex', alignItems:'center', gap:12, marginBottom:24 }}>
        <div>
          <div style={{ fontSize:16, fontWeight:700, color:'var(--text)', fontFamily:'"DM Serif Display",serif' }}>Invoice Learning / Parser Trust</div>
          <div style={{ fontSize:12, color:'var(--text-3)', marginTop:2 }}>Supplier patterns learned from parsed invoices · Confidence drives automatic field extraction</div>
        </div>
        <div style={{ flex:1 }} />
        <Btn small variant="outline" onClick={load}>↻ Refresh</Btn>
      </div>

      {/* Confidence legend */}
      <div style={{ display:'flex', gap:8, marginBottom:20, flexWrap:'wrap' }}>
        {Object.entries(CONF_META).map(([k, m]) => (
          <div key={k} title={m.tip} style={{ display:'flex', alignItems:'center', gap:5, padding:'4px 10px', borderRadius:5, background:'var(--card)', border:`1px solid ${m.border}`, fontSize:11, cursor:'default' }}>
            <span style={{ width:7, height:7, borderRadius:'50%', background:m.bar, display:'inline-block' }} />
            <span style={{ color:m.color, fontWeight:600 }}>{m.label}</span>
            <span style={{ color:'var(--text-3)' }}>— {m.tip.split('—')[0].trim()}</span>
          </div>
        ))}
      </div>

      {suppliers.length === 0 ? (
        <div style={{ padding:48, textAlign:'center', color:'var(--text-3)' }}>
          <div style={{ fontSize:32, marginBottom:12 }}>◎</div>
          <div style={{ fontSize:14, fontWeight:600, color:'var(--text-2)', marginBottom:6 }}>No suppliers learned yet</div>
          <div style={{ fontSize:12 }}>Process or recheck shipments with invoice PDFs to build patterns.</div>
        </div>
      ) : suppliers.map(sup => {
        const isOpen = expanded[sup.supplier_key];
        const pat = patterns[sup.supplier_key];
        const isLoading = pLoading[sup.supplier_key];
        const isResetting = resetting[sup.supplier_key];
        const m = CONF_META[sup.confidence] || CONF_META.unconfirmed;
        const reliability = sup.reliability_pct ?? 100;
        const hasIssue = sup.any_unstable || sup.failed_count > 0;

        return (
          <div key={sup.supplier_key} style={{ marginBottom:10, border:`1px solid ${hasIssue ? 'var(--badge-amber-border)' : 'var(--border)'}`, borderRadius:8, background:'var(--card)', overflow:'hidden' }}>

            {/* Supplier header row */}
            <div onClick={() => toggleExpand(sup.supplier_key)} style={{ padding:'14px 18px', cursor:'pointer', display:'flex', alignItems:'center', gap:14 }}
              onMouseEnter={e => e.currentTarget.style.background='var(--row-hover)'}
              onMouseLeave={e => e.currentTarget.style.background=''}>
              <span style={{ fontSize:16, color:m.bar, flexShrink:0 }}>◎</span>
              <div style={{ flex:1, minWidth:0 }}>
                <div style={{ display:'flex', alignItems:'center', gap:8, marginBottom:4 }}>
                  <span style={{ fontSize:13, fontWeight:700, color:'var(--text)', fontFamily:'monospace' }}>{sup.supplier_key}</span>
                  <ConfBadge level={sup.confidence} />
                  {hasIssue && <span style={{ fontSize:10, fontWeight:700, color:'var(--badge-amber-text)', padding:'1px 6px', background:'var(--badge-amber-bg)', border:'1px solid var(--badge-amber-border)', borderRadius:3 }}>⚠ Unstable patterns</span>}
                </div>
                <ConfBar count={sup.confirmed_count} level={sup.confidence} />
              </div>
              <div style={{ display:'flex', flexDirection:'column', alignItems:'flex-end', gap:3, flexShrink:0, minWidth:120 }}>
                <span style={{ fontSize:11, color:'var(--text-2)' }}>Reliability <strong style={{ color: reliability === 100 ? 'var(--badge-green-text)' : 'var(--badge-amber-text)' }}>{reliability}%</strong></span>
                <span style={{ fontSize:10, color:'var(--text-3)' }}>{sup.confirmed_count} confirmed · {sup.failed_count} failed</span>
              </div>
              <span style={{ color:'var(--text-3)', fontSize:12, flexShrink:0 }}>{isOpen ? '▴' : '▾'}</span>
            </div>

            {/* Expanded detail */}
            {isOpen && (
              <div style={{ borderTop:'1px solid var(--border)', padding:'16px 18px', background:'var(--bg-subtle)' }}>
                {isLoading ? (
                  <div style={{ color:'var(--text-3)', fontSize:12, padding:8 }}>⟳ Loading patterns…</div>
                ) : pat ? (
                  <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:20 }}>

                    {/* Left: metadata */}
                    <div>
                      <div style={{ fontSize:10, fontWeight:700, color:'var(--text-3)', letterSpacing:'0.08em', textTransform:'uppercase', marginBottom:10 }}>Supplier Profile</div>
                      <InfoRow label="Display Name"    value={pat.display_name || '—'} />
                      <InfoRow label="Invoice Format"  value={pat.invoice_format || '—'} />
                      <InfoRow label="GSTIN"           value={pat.gstin || 'Not in invoice'} mono />
                      <InfoRow label="First Seen"      value={fmtDate(pat.first_seen)} />
                      <InfoRow label="Last Seen"       value={fmtDate(pat.last_seen)} />
                      <InfoRow label="Total Parses"    value={pat.parse_count ?? '—'} />

                      {/* Item types */}
                      {sup.item_types_seen?.length > 0 && (
                        <div style={{ marginTop:10 }}>
                          <div style={{ fontSize:10, fontWeight:700, color:'var(--text-3)', letterSpacing:'0.08em', textTransform:'uppercase', marginBottom:6 }}>Item Types Seen</div>
                          <div style={{ display:'flex', flexWrap:'wrap', gap:4 }}>
                            {sup.item_types_seen.map(t => (
                              <span key={t} style={{ padding:'2px 8px', borderRadius:4, background:'var(--badge-blue-bg)', color:'var(--badge-blue-text)', border:'1px solid var(--badge-blue-border)', fontSize:10, fontWeight:600 }}>{t}</span>
                            ))}
                          </div>
                        </div>
                      )}
                    </div>

                    {/* Right: layouts */}
                    <div>
                      <div style={{ fontSize:10, fontWeight:700, color:'var(--text-3)', letterSpacing:'0.08em', textTransform:'uppercase', marginBottom:10 }}>Learned Layouts ({Object.keys(pat.layouts || {}).length})</div>
                      {Object.entries(pat.layouts || {}).map(([fp, layout]) => {
                        const isUnstable = layout.is_unstable;
                        const rel = layout.reliability_pct ?? 100;
                        return (
                          <div key={fp} style={{ marginBottom:10, padding:'10px 12px', borderRadius:6, border:`1px solid ${isUnstable ? 'var(--badge-amber-border)' : 'var(--border)'}`, background:'var(--card)' }}>
                            <div style={{ display:'flex', alignItems:'center', gap:8, marginBottom:6 }}>
                              <span style={{ fontFamily:'monospace', fontSize:11, fontWeight:700, color:'var(--accent)' }}>{fp}</span>
                              {isUnstable && <span style={{ fontSize:10, color:'var(--badge-amber-text)', fontWeight:700 }}>⚠ Unstable</span>}
                              <span style={{ marginLeft:'auto', fontSize:10, color: rel===100 ? 'var(--badge-green-text)' : 'var(--badge-amber-text)', fontWeight:600 }}>{rel}% reliable</span>
                            </div>
                            <div style={{ display:'grid', gridTemplateColumns:'auto 1fr', gap:'2px 10px', fontSize:10, color:'var(--text-2)' }}>
                              <span style={{ color:'var(--text-3)' }}>Confirmed:</span><span>{layout.confirmed_count}</span>
                              <span style={{ color:'var(--text-3)' }}>Successes:</span><span>{layout.success_count ?? '—'}</span>
                              <span style={{ color:'var(--text-3)' }}>Failures:</span><span style={{ color: layout.failure_count > 0 ? 'var(--badge-amber-text)' : 'inherit' }}>{layout.failure_count ?? 0}</span>
                              <span style={{ color:'var(--text-3)' }}>First seen:</span><span>{fmtDate(layout.first_seen)}</span>
                              {layout.last_failed && <><span style={{ color:'var(--text-3)' }}>Last failed:</span><span style={{ color:'var(--badge-amber-text)' }}>{fmtDate(layout.last_failed)}</span></>}
                            </div>
                            {/* Patterns learned */}
                            {layout.patterns && (
                              <div style={{ marginTop:8 }}>
                                <div style={{ fontSize:9, fontWeight:700, color:'var(--text-3)', letterSpacing:'0.08em', textTransform:'uppercase', marginBottom:4 }}>Patterns Learned</div>
                                <div style={{ display:'flex', flexWrap:'wrap', gap:3 }}>
                                  {Object.entries(layout.patterns).filter(([k,v]) => v && !['item_types_seen','product_words'].includes(k)).map(([k, v]) => (
                                    <span key={k} title={`${k}: ${v}`} style={{ padding:'1px 6px', borderRadius:3, background:'var(--bg)', border:'1px solid var(--border-subtle)', fontSize:9, fontFamily:'monospace', color:'var(--text-2)', maxWidth:160, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>
                                      {k.replace(/_label$|_pattern$/,'')}: <strong>{String(v)}</strong>
                                    </span>
                                  ))}
                                </div>
                              </div>
                            )}
                            {/* Feedback buttons */}
                            <div style={{ marginTop:10, display:'flex', gap:6, alignItems:'center' }}>
                              <span style={{ fontSize:10, color:'var(--text-3)', flex:1 }}>Parser feedback for this layout:</span>
                              <Btn small variant="outline"
                                disabled={feedback[`${sup.supplier_key}__ok`] === 'sending'}
                                onClick={() => sendFeedback(sup.supplier_key, fp, true)}
                                style={{ fontSize:10, color:'var(--badge-green-text)', borderColor:'var(--badge-green-border)' }}>
                                ✓ Parse was correct
                              </Btn>
                              <Btn small variant="outline"
                                disabled={feedback[`${sup.supplier_key}__fail`] === 'sending'}
                                onClick={() => sendFeedback(sup.supplier_key, fp, false)}
                                style={{ fontSize:10, color:'var(--badge-red-text)', borderColor:'var(--badge-red-border)' }}>
                                ✗ Parse had errors
                              </Btn>
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  </div>
                ) : (
                  <div style={{ fontSize:12, color:'var(--text-3)', padding:8 }}>No pattern detail available.</div>
                )}

                {/* Footer: last seen + reset */}
                <div style={{ marginTop:14, paddingTop:12, borderTop:'1px solid var(--border)', display:'flex', alignItems:'center', gap:10 }}>
                  <span style={{ fontSize:11, color:'var(--text-3)', flex:1 }}>Last parse: {fmtDate(sup.last_seen)}{sup.last_failed ? ` · Last failure: ${fmtDate(sup.last_failed)}` : ''}</span>
                  <Btn small variant="outline" disabled={isResetting}
                    onClick={() => resetPatterns(sup.supplier_key)}
                    style={{ fontSize:11, color:'var(--badge-red-text)', borderColor:'var(--badge-red-border)' }}>
                    {isResetting ? '⟳ Resetting…' : '⚠ Reset Patterns'}
                  </Btn>
                </div>
              </div>
            )}
          </div>
        );
      })}

      {/* Global footer note */}
      <div style={{ marginTop:20, padding:'10px 14px', borderRadius:6, background:'var(--bg-subtle)', border:'1px solid var(--border)', fontSize:11, color:'var(--text-3)', lineHeight:1.6 }}>
        <strong style={{ color:'var(--text-2)' }}>How confidence works:</strong>{' '}
        Patterns below <strong>Emerging</strong> (3 confirmations) are stored but never applied automatically.
        At <strong>Stable</strong> (10+) they become primary extraction hints.
        At <strong>Trusted</strong> (25+) they are used without fallback.
        Unstable patterns (3 consecutive failures) are suspended and flagged.
        Use <em>Reset Patterns</em> when a supplier significantly changes their invoice layout.
      </div>
    </div>
  );
}

// AI BRIDGE PAGE
// ══════════════════════════════════════════════════════════

function AiBridgePage({ onToast }) {
  const [tasks,       setTasks]     = React.useState([]);
  const [processed,   setProcessed] = React.useState([]);
  const [errors,      setErrors]    = React.useState([]);
  const [templates,   setTemplates] = React.useState({});
  const [loading,     setLoading]   = React.useState(true);
  const [tab,         setTab]       = React.useState('pending'); // 'pending' | 'processed' | 'errors'
  const [creating,    setCreating]  = React.useState(false);
  const [newType,     setNewType]   = React.useState('tracking_lookup');
  const [newBatch,    setNewBatch]  = React.useState('');
  const [newNote,     setNewNote]   = React.useState('');
  const [importing,   setImporting] = React.useState(null); // task_id being imported
  const [viewingJson, setViewingJson] = React.useState(null); // task_id whose JSON is expanded
  const [jsonData,    setJsonData]  = React.useState({});     // task_id → result JSON

  const load = React.useCallback(async () => {
    setLoading(true);
    try {
      const [pending, done, tmpl, errs] = await Promise.all([
        apiFetch('/api/v1/ai-bridge/tasks?status=pending'),
        apiFetch('/api/v1/ai-bridge/tasks?status=processed'),
        apiFetch('/api/v1/ai-bridge/templates'),
        apiFetch('/api/v1/ai-bridge/errors').catch(() => ({ errors: [] })),
      ]);
      setTasks(pending.tasks || []);
      setProcessed(done.tasks || []);
      setTemplates(tmpl.templates || {});
      setErrors(errs.errors || []);
    } catch (e) {
      onToast('Failed to load AI Bridge: ' + e.message, 'error');
    }
    setLoading(false);
  }, []);

  React.useEffect(() => { load(); }, []);

  const createTask = async () => {
    if (!newBatch.trim()) { onToast('Batch ID is required', 'error'); return; }
    setCreating(true);
    try {
      const res = await apiFetch(`/api/v1/ai-bridge/tasks/${encodeURIComponent(newBatch.trim())}`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ task_type: newType, note: newNote || null }),
      });
      onToast(`Task created: ${res.task_id}`, 'success');
      setNewBatch(''); setNewNote('');
      await load();
    } catch (e) {
      onToast('Create failed: ' + e.message, 'error');
    }
    setCreating(false);
  };

  const importResult = async (task) => {
    const statusVal = window.prompt(`Import result for task ${task.task_id.slice(0, 8)}…\n\nEnter tracking status (in_transit / delivered / customs / exception / unknown):`);
    if (!statusVal) return;
    const lastEvent = window.prompt('Last event description:') || '';
    const location  = window.prompt('Location (e.g. WARSAW - PL):') || '';
    setImporting(task.task_id);
    try {
      const body = {
        task_id:     task.task_id,
        result_data: { tracking: { status: statusVal, last_event: lastEvent, location } },
        summary:     `Manual import: ${statusVal}`,
        source:      'admin_manual',
      };
      await apiFetch(`/api/v1/ai-bridge/results/${encodeURIComponent(task.task_id)}`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      onToast('Result imported successfully', 'success');
      await load();
    } catch (e) {
      onToast('Import failed: ' + e.message, 'error');
    }
    setImporting(null);
  };

  const taskTypeColors = {
    tracking_lookup:   { bg: '#EFF6FF', border: '#93C5FD', text: '#1D4ED8' },
    document_summary:  { bg: '#F0FDF4', border: '#86EFAC', text: '#15803D' },
    risk_assessment:   { bg: '#FFF7ED', border: '#FCA5A5', text: '#B91C1C' },
    supplier_research: { bg: '#FAF5FF', border: '#C4B5FD', text: '#7C3AED' },
    email_draft:       { bg: '#FFFBEB', border: '#FCD34D', text: '#92400E' },
    general_research:  { bg: '#F8FAFC', border: '#CBD5E1', text: '#475569' },
  };

  const renderTask = (task) => {
    const col = taskTypeColors[task.task_type] || taskTypeColors.general_research;
    const isPending = task.status === 'pending';
    return (
      <div key={task.task_id} style={{ background: 'var(--card-bg)', border: '1px solid var(--border)', borderRadius: 8, padding: '14px 16px', marginBottom: 10 }}>
        <div style={{ display: 'flex', alignItems: 'flex-start', gap: 10, marginBottom: 8 }}>
          <span style={{ fontSize: 10, fontWeight: 700, padding: '2px 8px', borderRadius: 10, background: col.bg, color: col.text, border: `1px solid ${col.border}`, whiteSpace: 'nowrap' }}>
            {task.task_type.replace(/_/g, ' ').toUpperCase()}
          </span>
          <span style={{ fontSize: 11, color: 'var(--text-muted)', fontFamily: 'monospace' }}>{task.task_id.slice(0, 16)}…</span>
          <span style={{ fontSize: 11, color: 'var(--text-muted)', marginLeft: 'auto' }}>
            {task.batch_id && <span>batch: <b>{task.batch_id}</b></span>}
          </span>
        </div>
        <div style={{ fontSize: 12, color: 'var(--text)', marginBottom: 6 }}>{task.description}</div>
        {task.note && <div style={{ fontSize: 11, color: 'var(--text-muted)', fontStyle: 'italic', marginBottom: 6 }}>Note: {task.note}</div>}
        {task.payload && task.payload.tracking_url && (
          <div style={{ fontSize: 11, marginBottom: 6 }}>
            <a href={task.payload.tracking_url} target="_blank" rel="noreferrer" style={{ color: 'var(--accent)' }}>
              🔗 {task.payload.tracking_url}
            </a>
          </div>
        )}
        <div style={{ fontSize: 11, color: 'var(--text-muted)', marginBottom: isPending ? 8 : 0 }}>
          Created: {task.created_at ? new Date(task.created_at).toLocaleString() : '—'}
          {task.processed_at && <span style={{ marginLeft: 12 }}>Processed: {new Date(task.processed_at).toLocaleString()}</span>}
        </div>
        {isPending && task.task_type === 'tracking_lookup' && (() => {
          const hasError = errors.some(e => e.task_id === task.task_id);
          return (
            <div style={{ display: 'flex', gap: 8, marginTop: 4, flexWrap: 'wrap', alignItems: 'center' }}>
              {hasError && (
                <span style={{ fontSize: 10, padding: '2px 8px', borderRadius: 10, background: '#FEF2F2', border: '1px solid #FCA5A5', color: '#B91C1C', fontWeight: 600 }}>
                  ⚠ Previous attempt rejected — Re-import
                </span>
              )}
              <button
                onClick={() => importResult(task)}
                disabled={importing === task.task_id}
                style={{ fontSize: 11, padding: '4px 12px', borderRadius: 5, border: '1px solid #93C5FD', background: '#EFF6FF', color: '#1D4ED8', cursor: 'pointer' }}
              >
                {importing === task.task_id ? 'Importing…' : hasError ? '↻ Re-import Result' : '↓ Import Result'}
              </button>
            </div>
          );
        })()}
        {!isPending && (
          <div style={{ display: 'flex', gap: 8, marginTop: 4 }}>
            <button
              onClick={async () => {
                const tid = task.task_id;
                if (viewingJson === tid) { setViewingJson(null); return; }
                if (!jsonData[tid]) {
                  try {
                    const d = await apiFetch(`/api/v1/ai-bridge/results/${encodeURIComponent(tid)}`);
                    setJsonData(p => ({ ...p, [tid]: d }));
                  } catch(e) {
                    onToast('Could not load result: ' + e.message, 'error'); return;
                  }
                }
                setViewingJson(tid);
              }}
              style={{ fontSize: 11, padding: '4px 10px', borderRadius: 5, border: '1px solid var(--border)', background: 'transparent', color: 'var(--text-muted)', cursor: 'pointer' }}>
              {viewingJson === task.task_id ? '▲ Hide JSON' : '▼ View Result JSON'}
            </button>
          </div>
        )}
        {viewingJson === task.task_id && jsonData[task.task_id] && (
          <pre style={{ marginTop: 8, padding: '8px 10px', background: 'var(--bg-subtle)', border: '1px solid var(--border)', borderRadius: 5, fontSize: 10, overflowX: 'auto', color: 'var(--text)', maxHeight: 240 }}>
            {JSON.stringify(jsonData[task.task_id], null, 2)}
          </pre>
        )}
      </div>
    );
  };

  const tabStyle = (active) => ({
    padding: '6px 16px', fontSize: 12, fontWeight: active ? 700 : 400,
    border: 'none', borderBottom: active ? '2px solid var(--accent)' : '2px solid transparent',
    background: 'transparent', cursor: 'pointer', color: active ? 'var(--accent)' : 'var(--text-muted)',
  });

  return (
    <div style={{ flex: 1, overflowY: 'auto', padding: '0 32px 32px' }}>
      {/* Create task panel */}
      <div style={{ background: 'var(--card-bg)', border: '1px solid var(--border)', borderRadius: 8, padding: 16, marginBottom: 20, marginTop: 4 }}>
        <div style={{ fontWeight: 700, fontSize: 13, marginBottom: 12, color: 'var(--text)' }}>⇌ Create AI Bridge Task</div>
        <div style={{ display: 'flex', gap: 10, flexWrap: 'wrap', alignItems: 'flex-end' }}>
          <div style={{ flex: '0 0 160px' }}>
            <div style={{ fontSize: 11, color: 'var(--text-muted)', marginBottom: 4 }}>Task Type</div>
            <select value={newType} onChange={e => setNewType(e.target.value)}
              style={{ width: '100%', fontSize: 12, padding: '6px 8px', borderRadius: 5, border: '1px solid var(--border)', background: 'var(--card-bg)', color: 'var(--text)' }}>
              {Object.keys(templates).map(t => (
                <option key={t} value={t}>{t.replace(/_/g, ' ')}</option>
              ))}
            </select>
          </div>
          <div style={{ flex: '0 0 160px' }}>
            <div style={{ fontSize: 11, color: 'var(--text-muted)', marginBottom: 4 }}>Batch ID</div>
            <input value={newBatch} onChange={e => setNewBatch(e.target.value)} placeholder="e.g. abc12345"
              style={{ width: '100%', fontSize: 12, padding: '6px 8px', borderRadius: 5, border: '1px solid var(--border)', background: 'var(--card-bg)', color: 'var(--text)', boxSizing: 'border-box' }} />
          </div>
          <div style={{ flex: 1, minWidth: 160 }}>
            <div style={{ fontSize: 11, color: 'var(--text-muted)', marginBottom: 4 }}>Note (optional)</div>
            <input value={newNote} onChange={e => setNewNote(e.target.value)} placeholder="e.g. DHL pending for AWB 1234567890"
              style={{ width: '100%', fontSize: 12, padding: '6px 8px', borderRadius: 5, border: '1px solid var(--border)', background: 'var(--card-bg)', color: 'var(--text)', boxSizing: 'border-box' }} />
          </div>
          <button onClick={createTask} disabled={creating || !newBatch.trim()}
            style={{ padding: '6px 16px', fontSize: 12, borderRadius: 5, border: 'none', background: creating ? '#93C5FD' : 'var(--accent)', color: '#fff', cursor: creating ? 'default' : 'pointer', fontWeight: 700, whiteSpace: 'nowrap' }}>
            {creating ? 'Creating…' : '+ Create Task'}
          </button>
        </div>
        {templates[newType] && (
          <div style={{ marginTop: 10, fontSize: 11, color: 'var(--text-muted)', borderTop: '1px solid var(--border)', paddingTop: 8 }}>
            <b>Description:</b> {templates[newType].description}
          </div>
        )}
      </div>

      {/* Tabs */}
      <div style={{ borderBottom: '1px solid var(--border)', marginBottom: 16, display: 'flex' }}>
        <button style={tabStyle(tab === 'pending')}   onClick={() => setTab('pending')}>
          Pending ({tasks.length})
        </button>
        <button style={tabStyle(tab === 'processed')} onClick={() => setTab('processed')}>
          Processed ({processed.length})
        </button>
        <button style={{...tabStyle(tab === 'errors'), color: errors.length > 0 && tab !== 'errors' ? '#B91C1C' : undefined}} onClick={() => setTab('errors')}>
          Rejected {errors.length > 0 ? `(${errors.length})` : ''}
        </button>
        <button onClick={load} style={{ marginLeft: 'auto', fontSize: 11, padding: '4px 12px', border: '1px solid var(--border)', borderRadius: 5, background: 'transparent', cursor: 'pointer', color: 'var(--text-muted)' }}>
          ↻ Refresh
        </button>
      </div>

      {loading && <div style={{ fontSize: 13, color: 'var(--text-muted)' }}>Loading…</div>}

      {!loading && tab === 'pending' && (
        tasks.length === 0
          ? <div style={{ fontSize: 13, color: 'var(--text-muted)', padding: '24px 0', textAlign: 'center' }}>No pending AI Bridge tasks.</div>
          : tasks.map(renderTask)
      )}

      {!loading && tab === 'processed' && (
        processed.length === 0
          ? <div style={{ fontSize: 13, color: 'var(--text-muted)', padding: '24px 0', textAlign: 'center' }}>No processed tasks yet.</div>
          : processed.map(renderTask)
      )}

      {!loading && tab === 'errors' && (
        errors.length === 0
          ? <div style={{ fontSize: 13, color: 'var(--text-muted)', padding: '24px 0', textAlign: 'center' }}>No rejected results.</div>
          : errors.map((err, i) => (
            <div key={i} style={{ background: '#FEF2F2', border: '1px solid #FCA5A5', borderRadius: 8, padding: '12px 14px', marginBottom: 10 }}>
              <div style={{ display: 'flex', gap: 10, flexWrap: 'wrap', marginBottom: 6 }}>
                <span style={{ fontSize: 10, fontWeight: 700, padding: '2px 8px', borderRadius: 10, background: '#FEF2F2', color: '#B91C1C', border: '1px solid #FCA5A5' }}>REJECTED</span>
                <span style={{ fontSize: 11, color: 'var(--text-muted)', fontFamily: 'monospace' }}>{(err.task_id || '').slice(0,16)}…</span>
                <span style={{ fontSize: 11, color: 'var(--text-muted)', marginLeft: 'auto' }}>{err.rejected_at ? new Date(err.rejected_at).toLocaleString('pl-PL') : ''}</span>
              </div>
              <div style={{ fontSize: 11, color: '#B91C1C', marginBottom: 4 }}>
                {Array.isArray(err.rejection_reason) ? err.rejection_reason.join(' · ') : (err.rejection_reason || 'Unknown error')}
              </div>
              {err.result && (
                <details style={{ marginTop: 6 }}>
                  <summary style={{ fontSize: 11, color: 'var(--text-muted)', cursor: 'pointer' }}>▼ View submitted result</summary>
                  <pre style={{ marginTop: 6, fontSize: 10, background: 'var(--bg-subtle)', padding: '6px 8px', borderRadius: 4, overflowX: 'auto', maxHeight: 180, color: 'var(--text)' }}>
                    {JSON.stringify(err.result, null, 2)}
                  </pre>
                </details>
              )}
            </div>
          ))
      )}

      {/* Safety note */}
      <div style={{ marginTop: 16, padding: '10px 14px', borderRadius: 7, background: '#FFFBEB', border: '1px solid #FCD34D', fontSize: 11, color: '#92400E' }}>
        <b>⚠ Safety:</b> AI Bridge results may only update non-financial audit fields. Imports touching
        clearance_decision, duty, vat, invoice_totals, or customs values are automatically rejected.
      </div>
    </div>
  );
}

// APP ROOT
// ══════════════════════════════════════════════════════════

function App() {
  const [page, setPage] = React.useState('dashboard');
  const [selectedBatch, setSelectedBatch] = React.useState(null);
  const [user, setUser] = React.useState(null);
  const [batches, setBatches] = React.useState([]);
  const [batchesLoading, setBatchesLoading] = React.useState(true);
  const [isDark, setIsDark] = React.useState(false);
  const [sidebarCollapsed, setSidebarCollapsed] = React.useState(false);
  const [showNewShipment, setShowNewShipment] = React.useState(false);
  const [toast, setToast] = React.useState(null);
  const [sessionError, setSessionError] = React.useState(null); // 'auth' | 'network' | null

  const notify = (msg, type = 'info') => {
    setToast({ msg, type });
    setTimeout(() => setToast(null), 3500);
  };

  // Central error handler — catches auth/network errors from any apiFetch call
  const handleFetchError = React.useCallback((e) => {
    if (e.type === 'auth')    { setSessionError('auth');    return true; }
    if (e.type === 'network') { setSessionError('network'); return true; }
    return false;
  }, []);

  // URL param check — ?id= opens detail immediately
  React.useEffect(() => {
    const params = new URLSearchParams(window.location.search);
    const urlId = params.get('id');
    if (urlId) { setSelectedBatch(urlId); setPage('detail'); }
  }, []);

  // Auth check — show banner instead of silent redirect on failure
  React.useEffect(() => {
    fetch('/auth/me', { credentials: 'include' })
      .then(r => {
        if (r.status === 401 || r.status === 403) { setSessionError('auth'); return null; }
        return r.ok ? r.json() : null;
      })
      .then(u => { if (u) setUser(u); })
      .catch(() => setSessionError('network'));
  }, []);

  // Load batches
  const loadBatches = React.useCallback(async () => {
    setBatchesLoading(true);
    try {
      const data = await apiFetch('/dashboard/batches?all=1');
      setBatches((data || []).map(transformBatch));
      setSessionError(null); // clear any previous error on success
    } catch (e) {
      if (!handleFetchError(e)) notify('Failed to load shipments: ' + e.message, 'error');
    }
    setBatchesLoading(false);
  }, [handleFetchError]);

  React.useEffect(() => { if (user) loadBatches(); }, [user]);

  // Dark mode
  React.useEffect(() => {
    document.documentElement.setAttribute('data-theme', isDark ? 'dark' : '');
  }, [isDark]);

  const handleLogout = async () => {
    await fetch('/auth/logout', { method: 'POST', credentials: 'include' });
    window.location.href = '/login';
  };

  const viewShipment = (row) => {
    const id = row.batch_id || row.id;
    setSelectedBatch(id);
    setPage('detail');
    history.pushState({}, '', `?id=${encodeURIComponent(id)}`);
  };

  const goBack = () => {
    setPage('dashboard');
    setSelectedBatch(null);
    history.pushState({}, '', window.location.pathname);
    loadBatches();
  };

  const handleNav = (navId) => {
    setPage(navId);
    setSelectedBatch(null);
    history.pushState({}, '', window.location.pathname);
  };

  const sidebarActive = page === 'detail' ? 'shipments' : page;

  const PAGE_TITLES = {
    dashboard: { title: 'Dashboard',          subtitle: 'Overview of all shipments and customs workflow' },
    shipments: { title: 'Shipments',           subtitle: 'All shipments across all carriers' },
    dhl:       { title: 'DHL Clearance',       subtitle: 'DHL email monitoring, DSK generation, and reply workflow' },
    customs:   { title: 'Customs Documents',   subtitle: 'SAD / ZC429 uploads and verification status' },
    pz:        { title: 'PZ / Accounting',     subtitle: 'Generate PZ documents and export to wFirma' },
    wfirma:    { title: 'wFirma Export',       subtitle: 'Export completed PZ records to wFirma accounting' },
    reports:       { title: 'Analytics',            subtitle: 'Duty totals, shipment value, inventory, and wFirma sync status' },
    intelligence:  { title: 'Intelligence Insights', subtitle: 'Trigger suggestions, risk warnings, and clearance intelligence — suggest-only mode' },
    ai_bridge:     { title: 'AI Bridge',            subtitle: 'File-based coordination tasks for Claude Cowork / ChatGPT — no direct production access' },
    learning:      { title: 'Learning / Parser',   subtitle: 'Invoice learning patterns and parser feedback' },
    admin:         { title: 'Admin / Settings',    subtitle: 'System configuration and API health' },
  };
  const currentTitle = PAGE_TITLES[page];

  return (
    <div style={{ display: 'flex', height: '100vh', overflow: 'hidden' }}>
      {sessionError && <SessionBanner type={sessionError} onDismiss={sessionError === 'network' ? () => setSessionError(null) : null} />}
      {toast && <Toast msg={toast.msg} type={toast.type} />}

      <Sidebar active={sidebarActive} onNav={handleNav} collapsed={sidebarCollapsed} onToggle={() => setSidebarCollapsed(p => !p)} />

      <div style={{ flex: 1, display: 'flex', flexDirection: 'column', overflow: 'hidden' }}>
        <TopBar
          onNewShipment={() => setShowNewShipment(true)}
          onToggleDark={() => setIsDark(p => !p)}
          isDark={isDark}
          user={user}
          onLogout={handleLogout}
        />

        {/* Page header (not shown in detail view) */}
        {page !== 'detail' && currentTitle && (
          <PageHeader
            title={currentTitle.title}
            subtitle={currentTitle.subtitle}
            actions={page === 'dashboard'
              ? <Btn small variant="outline" onClick={loadBatches}>↻ Refresh</Btn>
              : null}
          />
        )}

        {/* Detail page */}
        {page === 'detail' && selectedBatch && (
          <BatchDetailPage batchId={selectedBatch} onBack={goBack} onToast={notify} />
        )}

        {/* Dashboard */}
        {page === 'dashboard' && (
          <DashboardPage onViewShipment={viewShipment} batches={batches} loading={batchesLoading} onReload={loadBatches} onToast={notify} />
        )}

        {/* Shipments list */}
        {page === 'shipments' && (
          <div style={{ flex: 1, overflowY: 'auto', padding: '0 32px 32px' }}>
            <ShipmentsTable batches={batches} onViewShipment={viewShipment} emptyMsg="No shipments found" />
          </div>
        )}

        {/* Module pages */}
        {page === 'dhl'      && <DhlClearancePage batches={batches} onViewShipment={viewShipment} />}
        {page === 'customs'  && <CustomsDocumentsPage batches={batches} onViewShipment={viewShipment} />}
        {page === 'pz'       && <PzAccountingPage batches={batches} onViewShipment={viewShipment} />}
        {page === 'wfirma'   && <WfirmaExportPage batches={batches} onViewShipment={viewShipment} />}
        {page === 'reports'       && <ReportsPage />}
        {page === 'intelligence'  && <IntelligencePage onToast={notify} />}
        {page === 'ai_bridge'     && <AiBridgePage onToast={notify} />}
        {page === 'learning'      && <LearningPage onToast={notify} />}
        {page === 'admin'         && <AdminPage user={user} />}
      </div>

      {showNewShipment && (
        <NewShipmentModal
          onClose={() => setShowNewShipment(false)}
          onCreated={(data) => {
            setShowNewShipment(false);
            if (data.batchId) {
              setSelectedBatch(data.batchId);
              setPage('detail');
              history.pushState({}, '', `?id=${encodeURIComponent(data.batchId)}`);
            }
            loadBatches();
          }}
        />
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);

</script>
</body>
</html>
