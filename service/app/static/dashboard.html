function DashboardPage({ onViewShipment, batches, loading, onReload, onToast }) {
  const [filter, setFilter] = React.useState('all');
  const [sortCol, setSortCol] = React.useState('timestamp');
  const [sortDir, setSortDir] = React.useState('desc');
  const [actionMenu, setActionMenu] = React.useState(null);
  const [recheckState, setRecheckState] = React.useState({});
  const [recheckResult, setRecheckResult] = React.useState({});
  // Archive view
  const [viewMode, setViewMode] = React.useState('active'); // 'active' | 'archived'
  const [archived, setArchived] = React.useState([]);
  const [archivedLoading, setArchivedLoading] = React.useState(false);
  const [archiveBusy, setArchiveBusy] = React.useState({});

  const loadArchived = React.useCallback(async () => {
    setArchivedLoading(true);
    try {
      const data = await apiFetch('/dashboard/archive');
      setArchived(Array.isArray(data) ? data : []);
    } catch (e) { setArchived([]); }
    setArchivedLoading(false);
  }, []);

  React.useEffect(() => { if (viewMode === 'archived') loadArchived(); }, [viewMode]);

  const filters = ['all', 'Ready for PZ', 'Awaiting DHL', 'Awaiting SAD', 'Action Required', 'Ready for Booking', 'Exported'];
  const filtered = filter === 'all' ? batches : batches.filter(s => s.overall === filter);
  const sorted = [...filtered].sort((a, b) => {
    const av = a._raw?.[sortCol] || a[sortCol] || '';
    const bv = b._raw?.[sortCol] || b[sortCol] || '';
    return sortDir === 'asc' ? (av > bv ? 1 : -1) : (av < bv ? 1 : -1);
  });

  const TH = ({ col, children }) => (
    <th onClick={() => { if (sortCol === col) setSortDir(d => d === 'asc' ? 'desc' : 'asc'); else { setSortCol(col); setSortDir('asc'); } }} style={{ padding: '10px 12px', textAlign: 'left', fontSize: 10, fontWeight: 700, color: 'var(--text-3)', letterSpacing: '0.06em', textTransform: 'uppercase', cursor: 'pointer', whiteSpace: 'nowrap', borderBottom: '1px solid var(--border)', background: 'var(--bg-subtle)', userSelect: 'none' }}>
      {children}{sortCol === col ? (sortDir === 'asc' ? ' ↑' : ' ↓') : ''}
    </th>
  );

  const counts = {
    total:        batches.length,
    awaitingDHL:  batches.filter(b => b.overall === 'Awaiting DHL').length,
    awaitingSAD:  batches.filter(b => b.overall === 'Awaiting SAD').length,
    readyPZ:      batches.filter(b => b.pzStatus === 'Ready for PZ').length,
    actionReq:    batches.filter(b => b.overall === 'Action Required').length,
    readyBooking: batches.filter(b => b.overall === 'Ready for Booking').length,
    totalDuty:    batches.reduce((s, b) => s + (b._raw && b._raw.duty ? Number(b._raw.duty) : 0), 0),
    totalGross:   batches.reduce((s, b) => s + (b._raw && b._raw.gross ? Number(b._raw.gross) : 0), 0),
  };

  const cards = [
    { label: 'Total Shipments',   value: counts.total,        icon: '⬡', colorVar: 'var(--text)' },
    { label: 'Awaiting DHL',      value: counts.awaitingDHL,  icon: '✈', colorVar: 'var(--badge-amber-text)' },
    { label: 'Awaiting SAD',      value: counts.awaitingSAD,  icon: '⊟', colorVar: 'var(--badge-orange-text)' },
    { label: 'Ready for PZ',      value: counts.readyPZ,      icon: '◈', colorVar: 'var(--badge-green-text)' },
    { label: 'Action Required',   value: counts.actionReq,    icon: '⚠', colorVar: 'var(--badge-red-text)' },
    { label: 'Ready for Booking', value: counts.readyBooking, icon: '✓', colorVar: 'var(--badge-purple-text)' },
    { label: 'Total Duty A00',    value: fmtPLN(counts.totalDuty),  icon: '₤', colorVar: 'var(--accent)', wide: true },
    { label: 'Total Gross Value', value: fmtPLN(counts.totalGross), icon: '◈', colorVar: 'var(--badge-blue-text)', wide: true },
  ];

  return (
    <div style={{ padding: '24px 32px', overflowY: 'auto', flex: 1 }}>
      {/* Summary Cards */}
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(6,1fr)', gap: 12, marginBottom: 28 }}>
        {cards.map((c, i) => (
          <Card key={i} style={{ padding: '16px 18px', cursor: 'default', gridColumn: c.wide ? 'span 2' : undefined }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start' }}>
              <div>
                <div style={{ fontSize: 11, color: 'var(--text-2)', fontWeight: 500, marginBottom: 6 }}>{c.label}</div>
                <div style={{ fontSize: 22, fontWeight: 700, color: c.colorVar, fontFamily: '"DM Serif Display",serif' }}>{loading ? '…' : c.value}</div>
              </div>
              <div style={{ width: 30, height: 30, borderRadius: 6, background: 'var(--accent-subtle)', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 14, color: c.colorVar }}>{c.icon}</div>
            </div>
          </Card>
        ))}
      </div>

      {/* View mode toggle + filter bar */}
      <div style={{ display: 'flex', gap: 8, marginBottom: 16, flexWrap: 'wrap', alignItems: 'center' }}>
        {/* Active / Archived toggle */}
        {['active', 'archived'].map(m => (
          <button key={m} onClick={() => setViewMode(m)} style={{ padding: '4px 12px', borderRadius: 20, border: viewMode === m ? '1px solid var(--accent)' : '1px solid var(--border)', background: viewMode === m ? 'var(--accent)' : 'transparent', color: viewMode === m ? '#fff' : 'var(--text-2)', fontSize: 11, fontWeight: viewMode === m ? 700 : 400, cursor: 'pointer', fontFamily: 'inherit', textTransform: 'capitalize' }}>
            {m === 'active' ? '● Active' : '⊘ Archived'}
          </button>
        ))}
        {viewMode === 'active' && <>
          <div style={{ width: 1, height: 18, background: 'var(--border)', margin: '0 4px' }} />
          <span style={{ fontSize: 11, color: 'var(--text-3)' }}>Filter:</span>
          {filters.map(f => (
            <button key={f} onClick={() => setFilter(f)} style={{ padding: '4px 10px', borderRadius: 20, border: filter === f ? `1px solid var(--accent)` : '1px solid var(--border)', background: filter === f ? 'var(--accent-subtle)' : 'transparent', color: filter === f ? 'var(--text)' : 'var(--text-2)', fontSize: 11, fontWeight: filter === f ? 600 : 400, cursor: 'pointer', fontFamily: 'inherit' }}>
              {f === 'all' ? 'All' : f}
            </button>
          ))}
        </>}
        {viewMode === 'archived' && (
          <Btn small variant="ghost" onClick={loadArchived} style={{ marginLeft: 4 }}>↻ Refresh</Btn>
        )}
      </div>

      {/* ── Archived view ── */}
      {viewMode === 'archived' && (
        <Card style={{ overflow: 'hidden' }}>
          <div style={{ padding: '12px 16px', borderBottom: '1px solid var(--border)', display: 'flex', alignItems: 'center', gap: 10 }}>
            <span style={{ fontSize: 12, fontWeight: 600, color: 'var(--text)' }}>Archived Shipments</span>
            <span style={{ fontSize: 11, color: 'var(--text-3)' }}>— kept for {14} days, then eligible for permanent deletion</span>
          </div>
          {archivedLoading && <div style={{ padding: 32, textAlign: 'center', color: 'var(--text-3)', fontSize: 13 }}>Loading archived shipments…</div>}
          {!archivedLoading && archived.length === 0 && <div style={{ padding: 32, textAlign: 'center', color: 'var(--text-3)', fontSize: 13 }}>No archived shipments</div>}
          {!archivedLoading && archived.length > 0 && (
            <div style={{ overflowX: 'auto' }}>
              <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: 12 }}>
                <thead>
                  <tr>
                    {['AWB / Batch', 'Carrier', 'Status', 'Archived At', 'Expires In', 'Reason', 'Actions'].map(h => (
                      <th key={h} style={{ padding: '10px 12px', textAlign: 'left', fontSize: 10, fontWeight: 700, color: 'var(--text-3)', letterSpacing: '0.06em', textTransform: 'uppercase', borderBottom: '1px solid var(--border)', background: 'var(--bg-subtle)', whiteSpace: 'nowrap' }}>{h}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {archived.map(row => {
                    const archivedAt  = row.archived_at ? new Date(row.archived_at).toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' }) : '—';
                    const deleteAfter = row.delete_after ? new Date(row.delete_after) : null;
                    const now         = new Date();
                    const daysLeft    = deleteAfter ? Math.ceil((deleteAfter - now) / 86400000) : null;
                    const expired     = daysLeft !== null && daysLeft <= 0;
                    const expiresLabel = daysLeft === null ? '—' : expired ? '⚠ Expired' : `${daysLeft}d remaining`;
                    const bKey = row.batch_id;
                    return (
                      <tr key={bKey}
                        onMouseEnter={e => e.currentTarget.style.background = 'var(--row-hover)'}
                        onMouseLeave={e => e.currentTarget.style.background = 'transparent'}
                        style={{ borderBottom: '1px solid var(--border-subtle)', transition: 'background 0.1s' }}>
                        <td style={{ padding: '10px 12px', fontFamily: 'monospace', fontSize: 11, color: 'var(--text)' }}>{row.awb || bKey}</td>
                        <td style={{ padding: '10px 12px', color: 'var(--text-2)' }}>{row.carrier || '—'}</td>
                        <td style={{ padding: '10px 12px' }}><Badge status={row.status} small /></td>
                        <td style={{ padding: '10px 12px', color: 'var(--text-2)', whiteSpace: 'nowrap' }}>{archivedAt}</td>
                        <td style={{ padding: '10px 12px', whiteSpace: 'nowrap', color: expired ? 'var(--badge-red-text)' : daysLeft <= 3 ? 'var(--badge-orange-text)' : 'var(--text-2)', fontWeight: expired ? 700 : 400 }}>{expiresLabel}</td>
                        <td style={{ padding: '10px 12px', color: 'var(--text-3)', fontSize: 11, maxWidth: 180, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }} title={row.reason}>{row.reason || '—'}</td>
                        <td style={{ padding: '8px 12px' }}>
                          <div style={{ display: 'flex', gap: 6 }}>
                            <Btn small variant="outline" disabled={!!archiveBusy[bKey]}
                              onClick={async () => {
                                if (!window.confirm(`Restore shipment ${row.awb || bKey} to the active dashboard?`)) return;
                                setArchiveBusy(s => ({ ...s, [bKey]: true }));
                                try {
                                  await apiFetch(`/dashboard/archive/${encodeURIComponent(bKey)}/restore`, { method: 'POST' });
                                  await loadArchived();
                                  if (onReload) onReload();
                                  if (onToast) onToast('Shipment restored to active dashboard.', 'success');
                                } catch (e) {
                                  if (onToast) onToast(`Restore failed: ${e.message}`, 'error');
                                }
                                setArchiveBusy(s => ({ ...s, [bKey]: false }));
                              }}>
                              {archiveBusy[bKey] ? '…' : 'Restore'}
                            </Btn>
                            <Btn small variant="ghost" disabled={!!archiveBusy[bKey]}
                              style={{ color: 'var(--badge-red-text)', borderColor: 'var(--badge-red-border)' }}
                              onClick={async () => {
                                if (!window.confirm(`PERMANENTLY DELETE shipment ${row.awb || bKey}?\n\nThis will permanently delete all archived files.\nThis action cannot be undone.`)) return;
                                if (!window.confirm(`Confirm: permanently delete ${row.awb || bKey}? There is no recovery after this.`)) return;
                                setArchiveBusy(s => ({ ...s, [bKey]: true }));
                                try {
                                  await apiFetch(`/dashboard/archive/${encodeURIComponent(bKey)}`, { method: 'DELETE' });
                                  await loadArchived();
                                  if (onToast) onToast('Shipment permanently deleted.', 'success');
                                } catch (e) {
                                  if (onToast) onToast(`Delete failed: ${e.message}`, 'error');
                                }
                                setArchiveBusy(s => ({ ...s, [bKey]: false }));
                              }}>
                              Delete permanently
                            </Btn>
                          </div>
                        </td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          )}
          <div style={{ padding: '10px 16px', borderTop: '1px solid var(--border)', display: 'flex', justifyContent: 'space-between', alignItems: 'center', flexWrap: 'wrap', gap: 8 }}>
            <span style={{ fontSize: 11, color: 'var(--text-3)' }}>{archived.length} archived shipment(s)</span>
            <Btn small variant="ghost" style={{ color: 'var(--badge-red-text)' }}
              onClick={async () => {
                if (!window.confirm('Run archive cleanup?\n\nThis will permanently delete all archived shipments that are past their 14-day retention period.\nThis action cannot be undone.')) return;
                try {
                  const res = await apiFetch('/dashboard/archive/cleanup', { method: 'POST' });
                  await loadArchived();
                  if (onToast) onToast(`Cleanup complete — ${(res.deleted || []).length} deleted, ${(res.skipped || []).length} skipped.`, 'success');
                } catch (e) {
                  if (onToast) onToast(`Cleanup failed: ${e.message}`, 'error');
                }
              }}>
              ⚠ Run Cleanup (delete expired)
            </Btn>
          </div>
        </Card>
      )}

      {/* ── Active shipments table ── */}
      {viewMode === 'active' && <Card style={{ overflow: 'hidden' }}>
        <div style={{ overflowX: 'auto', width: '100%' }}>
          <table style={{ minWidth: 1500, borderCollapse: 'collapse', fontSize: 12, tableLayout: 'fixed' }}>
            <colgroup>
              <col style={{ width: 220 }} />{/* AWB */}
              <col style={{ width: 100 }} />{/* Carrier */}
              <col style={{ width: 200 }} />{/* DHL Status */}
              <col style={{ width: 160 }} />{/* SAD Status */}
              <col style={{ width: 200 }} />{/* MRN */}
              <col style={{ width: 140 }} />{/* PZ Status */}
              <col style={{ width: 120 }} />{/* Net */}
              <col style={{ width: 120 }} />{/* Gross */}
              <col style={{ width: 120 }} />{/* Duty A00 */}
              <col style={{ width: 160 }} />{/* Overall */}
              <col style={{ width: 160 }} />{/* Actions */}
            </colgroup>
            <thead>
              <tr>
                <TH col="awb">AWB / Tracking</TH>
                <TH col="carrier">Carrier</TH>
                <TH col="dhlStatus">DHL Status</TH>
                <TH col="sadStatus">SAD Status</TH>
                <TH col="mrn">MRN</TH>
                <TH col="pzStatus">PZ Status</TH>
                <TH col="warehouseHint">Warehouse</TH>
                <TH col="salesHint">Sales</TH>
                <TH col="wfirmaHint">wFirma</TH>
                <TH col="net">Net</TH>
                <TH col="gross">Gross</TH>
                <TH col="duty">Duty A00</TH>
                <TH col="overall">Overall</TH>
                <th style={{ padding: '10px 12px', fontSize: 10, fontWeight: 700, color: 'var(--text-3)', letterSpacing: '0.06em', textTransform: 'uppercase', borderBottom: '1px solid var(--border)', background: 'var(--bg-subtle)', position: 'sticky', right: 0, zIndex: 3, boxShadow: '-2px 0 6px rgba(0,0,0,0.06)' }}>Actions</th>
              </tr>
            </thead>
            <tbody>
              {loading && (
                <tr><td colSpan={14} style={{ padding: 40, textAlign: 'center', color: 'var(--text-3)', fontSize: 13 }}>Loading shipments…</td></tr>
              )}
              {!loading && sorted.length === 0 && (
                <tr><td colSpan={14} style={{ padding: 40, textAlign: 'center', color: 'var(--text-3)', fontSize: 13 }}>No shipments found</td></tr>
              )}
              {!loading && sorted.map(row => {
                // Short labels for long DHL status values — full text in title tooltip
                const dhlShortLabels = {
                  'Awaiting DHL Email':     'Awaiting DHL',
                  'DHL Email Received':     'Email Received',
                  'Reply Package Prepared': 'Pkg Prepared',
                  'Pre-check Pending':      'Pre-check ⏳',
                  'Pre-check Completed':    'Pre-check ✓',
                  'Reply Queued':           'Reply Queued',
                  'Reply Sent':             'Reply Sent',
                };
                const dhlShort = dhlShortLabels[row.dhlStatus] || row.dhlStatus;
                const dhlStyle = (() => {
                  const s = STATUS_MAP[row.dhlStatus] || { bg: 'var(--badge-neutral-bg)', text: 'var(--badge-neutral-text)', border: 'var(--badge-neutral-border)' };
                  return { display: 'inline-block', padding: '2px 7px', background: s.bg, color: s.text, border: `1px solid ${s.border}`, borderRadius: 4, fontSize: 10, fontWeight: 600, whiteSpace: 'nowrap', maxWidth: '100%', overflow: 'hidden', textOverflow: 'ellipsis', cursor: 'default' };
                })();
                return (
                <tr key={row.id}
                  onMouseEnter={e => e.currentTarget.style.background = 'var(--row-hover)'}
                  onMouseLeave={e => e.currentTarget.style.background = 'transparent'}
                  style={{ borderBottom: '1px solid var(--border-subtle)', transition: 'background 0.1s' }}>
                  <td style={{ padding: '10px 12px', overflow: 'hidden' }}>
                    <button onClick={() => onViewShipment(row)} style={{ background: 'none', border: 'none', cursor: 'pointer', color: 'var(--badge-blue-text)', fontSize: 12, fontWeight: 600, fontFamily: 'monospace', textDecoration: 'underline', textDecorationStyle: 'dotted', whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis', maxWidth: '100%', display: 'block' }}>{row.awb}</button>
                    {row.doc_no && <div style={{ fontSize: 9, color: 'var(--text-3)', marginTop: 1, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{row.doc_no}</div>}
                  </td>
                  <td style={{ padding: '10px 12px' }}>
                    <span style={{ display: 'inline-block', padding: '1px 6px', background: row.carrier === 'DHL' ? 'var(--badge-blue-bg)' : row.carrier === 'FedEx' ? 'var(--badge-purple-bg)' : 'var(--badge-neutral-bg)', borderRadius: 4, fontSize: 10, fontWeight: 700, color: row.carrier === 'DHL' ? 'var(--badge-blue-text)' : row.carrier === 'FedEx' ? 'var(--badge-purple-text)' : 'var(--badge-neutral-text)', whiteSpace: 'nowrap' }}>{row.carrier}</span>
                  </td>
                  <td style={{ padding: '10px 12px', overflow: 'hidden' }}>
                    <span style={dhlStyle} title={row.dhlStatus}>{dhlShort}</span>
                  </td>
                  <td style={{ padding: '10px 12px', overflow: 'hidden' }}><Badge status={row.sadStatus} small /></td>
                  <td style={{ padding: '10px 12px', color: 'var(--text)', fontSize: 11, fontFamily: 'monospace', whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{row.mrn}</td>
                  <td style={{ padding: '10px 12px', overflow: 'hidden' }}><Badge status={row.pzStatus} small /></td>
                  <td style={{ padding: '10px 12px', overflow: 'hidden' }}>
                    {(() => {
                      const map = {
                        clean:   { bg: 'var(--badge-green-bg)',   text: 'var(--badge-green-text)',   border: 'var(--badge-green-border)',   label: 'Clean' },
                        partial: { bg: 'var(--badge-amber-bg)',   text: 'var(--badge-amber-text)',   border: 'var(--badge-amber-border)',   label: 'Partial' },
                        empty:   { bg: 'var(--badge-red-bg)',     text: 'var(--badge-red-text)',     border: 'var(--badge-red-border)',     label: 'Empty' },
                        'n/a':   { bg: 'var(--badge-neutral-bg)', text: 'var(--badge-neutral-text)', border: 'var(--badge-neutral-border)', label: '—' },
                      };
                      const c = map[row.warehouseHint] || map['n/a'];
                      return <span style={{ display: 'inline-block', padding: '2px 7px', background: c.bg, color: c.text, border: `1px solid ${c.border}`, borderRadius: 4, fontSize: 10, fontWeight: 700, whiteSpace: 'nowrap' }} title={`warehouse: ${row.warehouseHint}`}>{c.label}</span>;
                    })()}
                  </td>
                  <td style={{ padding: '10px 12px', overflow: 'hidden' }}>
                    {(() => {
                      const map = {
                        present: { bg: 'var(--badge-green-bg)',   text: 'var(--badge-green-text)',   border: 'var(--badge-green-border)',   label: 'Linked' },
                        none:    { bg: 'var(--badge-neutral-bg)', text: 'var(--badge-neutral-text)', border: 'var(--badge-neutral-border)', label: '—' },
                        'n/a':   { bg: 'var(--badge-neutral-bg)', text: 'var(--badge-neutral-text)', border: 'var(--badge-neutral-border)', label: '—' },
                      };
                      const c = map[row.salesHint] || map['n/a'];
                      return <span style={{ display: 'inline-block', padding: '2px 7px', background: c.bg, color: c.text, border: `1px solid ${c.border}`, borderRadius: 4, fontSize: 10, fontWeight: 700, whiteSpace: 'nowrap' }} title={`sales: ${row.salesHint}`}>{c.label}</span>;
                    })()}
                  </td>
                  <td style={{ padding: '10px 12px', overflow: 'hidden' }}>
                    {(() => {
                      const map = {
                        preview_built: { bg: 'var(--badge-blue-bg)',    text: 'var(--badge-blue-text)',    border: 'var(--badge-blue-border)',    label: 'Preview' },
                        none:          { bg: 'var(--badge-neutral-bg)', text: 'var(--badge-neutral-text)', border: 'var(--badge-neutral-border)', label: '—' },
                        'n/a':         { bg: 'var(--badge-neutral-bg)', text: 'var(--badge-neutral-text)', border: 'var(--badge-neutral-border)', label: '—' },
                      };
                      const c = map[row.wfirmaHint] || map['n/a'];
                      return <span style={{ display: 'inline-block', padding: '2px 7px', background: c.bg, color: c.text, border: `1px solid ${c.border}`, borderRadius: 4, fontSize: 10, fontWeight: 700, whiteSpace: 'nowrap' }} title={`wfirma: ${row.wfirmaHint}`}>{c.label}</span>;
                    })()}
                  </td>
                  <td style={{ padding: '10px 12px', color: 'var(--text)', fontWeight: 500, textAlign: 'right', whiteSpace: 'nowrap' }}>{row.net}</td>
                  <td style={{ padding: '10px 12px', color: 'var(--text)', fontWeight: 500, textAlign: 'right', whiteSpace: 'nowrap' }}>{row.gross}</td>
                  <td style={{ padding: '10px 12px', color: 'var(--accent)', fontWeight: 700, textAlign: 'right', whiteSpace: 'nowrap' }}>{row.duty}</td>
                  <td style={{ padding: '10px 12px', overflow: 'hidden' }}><Badge status={row.overall} small /></td>
                  <td style={{ padding: '8px 10px', position: 'sticky', right: 0, background: 'var(--card)', zIndex: 2, boxShadow: '-2px 0 6px rgba(0,0,0,0.06)' }}>
                    <div style={{ display: 'flex', gap: 4, alignItems: 'center', flexWrap: 'nowrap' }}>
                      <Btn small variant="outline" onClick={() => onViewShipment(row)} title="View detail">View</Btn>
                      {row.overall === 'Draft' && (
                        <Btn small variant="ghost" onClick={() => onViewShipment(row)} title="Edit draft">Edit</Btn>
                      )}
                      <div style={{ position: 'relative' }}>
                        <Btn small variant="ghost" onClick={() => setActionMenu(actionMenu === row.id ? null : row.id)} title="More actions">⋯</Btn>
                        {actionMenu === row.id && (
                          <div style={{ position: 'absolute', right: 0, top: '100%', zIndex: 200, background: 'var(--card)', border: '1px solid var(--border)', borderRadius: 6, boxShadow: '0 4px 16px var(--shadow-heavy)', minWidth: 190, overflow: 'hidden' }}>
                            {[
                              { label: 'View Detail',     color: 'var(--text)',            fn: () => onViewShipment(row) },
                              { label: 'Open in New Tab', color: 'var(--text)',            fn: () => window.open(`/dashboard/batch.html?id=${encodeURIComponent(row.id)}`, '_blank') },
                              { label: 'Recheck Parsed Data', color: 'var(--badge-blue-text)', fn: async () => {
                                  if (!window.confirm(`Recheck shipment ${row.awb}?\n\nThis will re-run parsers against existing uploaded files.\nParsed values may change. PZ will NOT be regenerated automatically.`)) return;
                                  setRecheckState(s => ({ ...s, [row.id]: 'pending' }));
                                  setRecheckResult(s => ({ ...s, [row.id]: null }));
                                  try {
                                    const res = await apiFetch(`/dashboard/batches/${encodeURIComponent(row.id)}/recheck`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ mode: 'all' }) });
                                    setRecheckState(s => ({ ...s, [row.id]: res.ok ? 'done' : 'error' }));
                                    setRecheckResult(s => ({ ...s, [row.id]: res }));
                                    if (onReload) onReload();
                                  } catch (e) {
                                    setRecheckState(s => ({ ...s, [row.id]: 'error' }));
                                    setRecheckResult(s => ({ ...s, [row.id]: { ok: false, errors: [e.message] } }));
                                  }
                              }},
                              { label: 'Archive',         color: 'var(--badge-red-text)',  fn: async () => {
                                  const MID_PROCESS = ['processing', 'awaiting_dhl_email', 'reply_queued', 'clearance_started'];
                                  const rowStatus = (row.status || '').toLowerCase();
                                  if (MID_PROCESS.includes(rowStatus)) {
                                    const proceed = window.confirm(
                                      `⚠️ Shipment ${row.awb} is mid-process (status: ${row.status}).\n\n` +
                                      `Archiving now may interrupt active clearance or DHL reply workflows.\n\n` +
                                      `Archive anyway?`
                                    );
                                    if (!proceed) return;
                                  }
                                  const reason = window.prompt(`Archive shipment ${row.awb}?\n\nIt will be hidden from active dashboard and kept for 14 days before becoming eligible for permanent deletion.\n\nOptional reason (or leave blank):`, '');
                                  if (reason === null) return; // user cancelled
                                  try {
                                    await apiFetch(`/dashboard/batches/${encodeURIComponent(row.id)}`, { method: 'DELETE', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ reason: reason.trim() || 'archived by user' }) });
                                    if (onToast) onToast('Shipment archived. It can be restored from Archived view.', 'success');
                                    if (onReload) onReload();
                                  } catch (e) {
                                    if (onToast) onToast(`Archive failed: ${e.message}`, 'error');
                                  }
                              }},
                            ].map(({ label, color, fn }) => (
                              <button key={label} onClick={() => { setActionMenu(null); fn(); }} style={{ display: 'block', width: '100%', padding: '8px 14px', textAlign: 'left', background: 'none', border: 'none', fontSize: 12, cursor: 'pointer', color, fontFamily: 'inherit' }}
                                onMouseEnter={e => e.currentTarget.style.background = 'var(--bg-subtle)'}
                                onMouseLeave={e => e.currentTarget.style.background = 'none'}
                              >{label}</button>
                            ))}
                          </div>
                        )}
                      </div>
                    </div>
                    {/* Recheck result inline panel */}
                    {recheckState[row.id] === 'pending' && (
                      <div style={{ marginTop: 4, fontSize: 10, color: 'var(--badge-blue-text)' }}>⟳ Rechecking…</div>
                    )}
                    {recheckState[row.id] === 'done' && recheckResult[row.id] && (
                      <div style={{ marginTop: 4, padding: '4px 6px', background: 'var(--badge-green-bg)', border: '1px solid var(--badge-green-border)', borderRadius: 4 }}>
                        <div style={{ fontSize: 10, fontWeight: 700, color: 'var(--badge-green-text)', marginBottom: 2 }}>✓ Recheck complete</div>
                        {Object.entries(recheckResult[row.id].updated || {}).filter(([_k,v])=>v).map(([k]) => (
                          <div key={k} style={{ fontSize: 9, color: 'var(--badge-green-text)' }}>• {k.replace(/_/g,' ')} updated</div>
                        ))}
                        {(recheckResult[row.id].warnings || []).map((w,i) => (
                          <div key={i} style={{ fontSize: 9, color: 'var(--badge-amber-text)' }}>⚠ {w}</div>
                        ))}
                      </div>
                    )}
                    {recheckState[row.id] === 'error' && recheckResult[row.id] && (
                      <div style={{ marginTop: 4, padding: '4px 6px', background: 'var(--badge-red-bg)', border: '1px solid var(--badge-red-border)', borderRadius: 4 }}>
                        <div style={{ fontSize: 10, fontWeight: 700, color: 'var(--badge-red-text)' }}>✗ Recheck failed</div>
                        {(recheckResult[row.id].errors || []).map((e,i) => (
                          <div key={i} style={{ fontSize: 9, color: 'var(--badge-red-text)' }}>{e}</div>
                        ))}
                      </div>
                    )}
                  </td>
                </tr>
                );
              })}
            </tbody>
          </table>
        </div>
        <div style={{ padding: '10px 16px', borderTop: '1px solid var(--border)', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
          <span style={{ fontSize: 11, color: 'var(--text-3)' }}>Showing {sorted.length} of {batches.length} shipments</span>
        </div>
      </Card>}
    </div>
  );
}

// ══════════════════════════════════════════════════════════
// READINESS BANNER  — read-only, no actions
// ══════════════════════════════════════════════════════════

/**
 * ReadinessBanner
 * Renders a compact status strip for a single domain (warehouse/sales/wfirma/dhl).
 * Props: domain, status, ready (bool), message, loading, error
 * No write buttons. No side effects.
 */
function ReadinessBanner({ domain, status, ready, message, loading, error, 'data-testid': testId }) {
  if (loading) {
    return (
      <div data-testid={testId || `readiness-banner-${domain}`}
        style={{ padding: '7px 12px', background: 'var(--bg-subtle)', border: '1px solid var(--border)', borderRadius: 6, marginBottom: 10, fontSize: 11, color: 'var(--text-3)' }}>
        ⟳ Loading readiness…
      </div>
    );
  }
  if (error || !status) {
    return (
      <div data-testid={testId || `readiness-banner-${domain}`}
        style={{ padding: '7px 12px', background: 'var(--bg-subtle)', border: '1px solid var(--border)', borderRadius: 6, marginBottom: 10, fontSize: 11, color: 'var(--text-3)' }}>
        Readiness data unavailable
      </div>
    );
  }
  const isNA = status === 'n/a' || status === 'none';
  const bgColor = isNA ? 'var(--bg-subtle)'
    : ready ? 'var(--badge-green-bg)'
    : (status === 'partial' || status === 'warnings' || status === 'missing' || status === 'blocked') ? 'var(--badge-amber-bg)'
    : 'var(--badge-red-bg)';
  const borderColor = isNA ? 'var(--border)'
    : ready ? 'var(--badge-green-border)'
    : (status === 'partial' || status === 'warnings' || status === 'missing' || status === 'blocked') ? 'var(--badge-amber-border)'
    : 'var(--badge-red-border)';
  const textColor = isNA ? 'var(--text-3)'
    : ready ? 'var(--badge-green-text)'
    : (status === 'partial' || status === 'warnings' || status === 'missing' || status === 'blocked') ? 'var(--badge-amber-text)'
    : 'var(--badge-red-text)';
  const icon = isNA ? '○' : ready ? '✓' : '⚠';
  return (
    <div data-testid={testId || `readiness-banner-${domain}`}
      style={{ padding: '7px 12px', background: bgColor, border: `1px solid ${borderColor}`, borderRadius: 6, marginBottom: 10, display: 'flex', alignItems: 'center', gap: 8, flexWrap: 'wrap' }}>
      <span style={{ fontSize: 12, color: textColor }}>{icon}</span>
      <span style={{ fontSize: 11, fontWeight: 700, color: textColor, textTransform: 'capitalize' }}>{status.replace(/_/g, ' ')}</span>
      {message && <span style={{ fontSize: 11, color: textColor, opacity: 0.85 }}>— {message}</span>}
    </div>
  );
}

/**
 * BrokerFollowupPanel
 * Surfaces operator-approvable broker email drafts generated by the
 * GET /dashboard/broker-followups detector for blocked batches that hit
 * forbidden override types (invoice_refs_match / cif_match).
 *
 * Strict rules:
 *  - No default broker recipient. The 'To' field is operator-entered.
 *  - No auto-send. Confirmation modal required before POST.
 *  - Send disabled when 'To' is empty or invalid.
 *  - Sent draft disables further sends.
 *  - On error, draft state is not marked sent.
 *  - This panel never modifies failed_checks, status, customs values.
 */
function BrokerFollowupPanel({ batchId }) {
  const [drafts,    setDrafts]    = React.useState([]);
  const [loading,   setLoading]   = React.useState(false);
  const [loadError, setLoadError] = React.useState('');
  const [forms,     setForms]     = React.useState({});  // {draft_id: {to, cc, from_address}}
  const [busy,      setBusy]      = React.useState({});  // {draft_id: bool}
  const [errors,    setErrors]    = React.useState({});  // {draft_id: string}
  const [confirmFor, setConfirmFor] = React.useState(null); // draft object or null
  const EMAIL_RE = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

  const loadDrafts = React.useCallback(async () => {
    setLoading(true); setLoadError('');
    try {
      const data = await apiFetch('/dashboard/broker-followups');
      const all  = (data && data.drafts) || [];
      // Filter to current batch only
      const mine = all.filter(d => d.batch_id === batchId);
      setDrafts(mine);
    } catch (ex) {
      setLoadError(ex.message || 'Failed to load broker follow-ups');
    } finally {
      setLoading(false);
    }
  }, [batchId]);

  React.useEffect(() => { loadDrafts(); }, [loadDrafts]);

  const updateForm = (draftId, field, value) => {
    setForms(prev => ({ ...prev, [draftId]: { ...(prev[draftId] || {}), [field]: value } }));
  };

  const isValidTo = (toVal) => !!toVal && EMAIL_RE.test(toVal.trim());

  const sendDraft = async (draft) => {
    const form = forms[draft.draft_id] || {};
    if (!isValidTo(form.to)) return;       // hard guard — should be unreachable from disabled button
    setBusy(prev => ({ ...prev, [draft.draft_id]: true }));
    setErrors(prev => ({ ...prev, [draft.draft_id]: '' }));
    try {
      const body = { to: form.to.trim(), cc: (form.cc || '').trim() };
      if (form.from_address && form.from_address.trim()) {
        body.from_address = form.from_address.trim();
      }
      await apiFetch(`/dashboard/broker-followups/${encodeURIComponent(batchId)}/send`, {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify(body),
      });
      setConfirmFor(null);
      await loadDrafts();   // refresh — sent drafts will show status:sent
    } catch (ex) {
      setErrors(prev => ({ ...prev, [draft.draft_id]: ex.message || 'Send failed' }));
    } finally {
      setBusy(prev => ({ ...prev, [draft.draft_id]: false }));
    }
  };

  return (
    <Card data-testid="broker-followup-panel" style={{ marginTop: 4 }}>
      <div style={{ padding: '14px 18px' }}>
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 10 }}>
          <div style={{ fontSize: 13, fontWeight: 700, color: 'var(--text)' }}>📧 Broker Follow-up</div>
          <Btn small variant="outline" onClick={loadDrafts} disabled={loading} data-testid="broker-followup-refresh-btn">
            {loading ? '⟳ Loading…' : 'Refresh'}
          </Btn>
        </div>
        <div data-testid="broker-followup-description" style={{ fontSize: 11, color: 'var(--text-3)', marginBottom: 12 }}>
          Drafts created automatically when the SAD references a missing invoice or the
          declared CIF value diverges from the invoice total. Operator must enter the recipient
          before any email is queued. This panel never modifies customs, PZ, or audit values.
        </div>

        {loadError && (
          <div data-testid="broker-followup-load-error" style={{ marginBottom: 10, padding: '8px 10px', borderRadius: 6, background: 'var(--badge-red-bg)', border: '1px solid var(--badge-red-border)', color: 'var(--badge-red-text)', fontSize: 11, fontWeight: 600 }}>
            {loadError}
          </div>
        )}

        {!loading && !loadError && drafts.length === 0 && (
          <div data-testid="broker-followup-empty" style={{ fontSize: 11, color: 'var(--text-3)' }}>
            No broker follow-up drafts for this shipment.
          </div>
        )}

        {drafts.map(draft => {
          const form     = forms[draft.draft_id] || {};
          const sent     = draft.status === 'sent' || draft.status === 'queued';
          const toValid  = isValidTo(form.to);
          const sendDisabled = sent || !toValid || !!busy[draft.draft_id];
          const err      = errors[draft.draft_id];

          return (
            <div
              key={draft.draft_id}
              data-testid="broker-followup-draft"
              data-draft-id={draft.draft_id}
              data-draft-status={draft.status}
              style={{ marginBottom: 14, padding: '10px 12px', border: '1px solid var(--border-subtle)', borderRadius: 6, background: 'var(--surface-2)' }}
            >
              <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 8 }}>
                <div style={{ fontSize: 11, fontWeight: 700, color: 'var(--text)' }}>
                  AWB {draft.awb || '—'} · MRN {draft.mrn || '—'}
                </div>
                <span data-testid="broker-followup-status-badge" style={{ fontSize: 10, padding: '2px 8px', borderRadius: 4, fontWeight: 700, border: '1px solid', background: sent ? 'var(--badge-green-bg)' : 'var(--badge-amber-bg)', color: sent ? 'var(--badge-green-text)' : 'var(--badge-amber-text)', borderColor: sent ? 'var(--badge-green-border)' : 'var(--badge-amber-border)' }}>
                  {sent ? 'Sent' : 'Draft'}
                </span>
              </div>

              {(draft.missing_invoices && draft.missing_invoices.length > 0) && (
                <div data-testid="broker-followup-missing-invoices" style={{ fontSize: 11, color: 'var(--text-2)', marginBottom: 4 }}>
                  Missing invoice{draft.missing_invoices.length > 1 ? 's' : ''}: <strong>{draft.missing_invoices.join(', ')}</strong>
                </div>
              )}
              {draft.cif_gap && (
                <div data-testid="broker-followup-cif-gap" style={{ fontSize: 11, color: 'var(--text-2)', marginBottom: 8 }}>
                  CIF gap — invoices ${Number(draft.cif_gap.invoices).toLocaleString()} vs SAD ${Number(draft.cif_gap.sad).toLocaleString()} (diff ${Number(draft.cif_gap.diff).toLocaleString()})
                </div>
              )}

              <div style={{ fontSize: 10, fontWeight: 700, color: 'var(--text-3)', textTransform: 'uppercase', letterSpacing: '0.05em', marginTop: 8, marginBottom: 4 }}>Subject</div>
              <div data-testid="broker-followup-subject" style={{ fontSize: 11, color: 'var(--text)', marginBottom: 8, padding: '6px 8px', background: 'var(--surface-1)', borderRadius: 4, border: '1px solid var(--border-subtle)' }}>
                {draft.subject}
              </div>

              <div style={{ fontSize: 10, fontWeight: 700, color: 'var(--text-3)', textTransform: 'uppercase', letterSpacing: '0.05em', marginBottom: 4 }}>Body preview</div>
              <pre data-testid="broker-followup-body" style={{ fontSize: 11, color: 'var(--text)', whiteSpace: 'pre-wrap', wordBreak: 'break-word', maxHeight: 220, overflow: 'auto', padding: '8px 10px', background: 'var(--surface-1)', borderRadius: 4, border: '1px solid var(--border-subtle)', margin: 0, marginBottom: 10 }}>
                {draft.body}
              </pre>

              {!sent && (
                <div data-testid="broker-followup-form" style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 8, marginBottom: 8 }}>
                  <label style={{ fontSize: 10, color: 'var(--text-3)' }}>
                    To <span style={{ color: 'var(--badge-red-text)' }}>*</span>
                    <input
                      data-testid="broker-followup-to"
                      type="email"
                      required
                      placeholder="broker@example.com"
                      value={form.to || ''}
                      onChange={e => updateForm(draft.draft_id, 'to', e.target.value)}
                      style={{ display: 'block', width: '100%', marginTop: 2, padding: '6px 8px', fontSize: 11, border: '1px solid var(--border-subtle)', borderRadius: 4, background: 'var(--surface-1)', color: 'var(--text)' }}
                    />
                  </label>
                  <label style={{ fontSize: 10, color: 'var(--text-3)' }}>
                    CC (optional)
                    <input
                      data-testid="broker-followup-cc"
                      type="text"
                      placeholder="cc@example.com"
                      value={form.cc || ''}
                      onChange={e => updateForm(draft.draft_id, 'cc', e.target.value)}
                      style={{ display: 'block', width: '100%', marginTop: 2, padding: '6px 8px', fontSize: 11, border: '1px solid var(--border-subtle)', borderRadius: 4, background: 'var(--surface-1)', color: 'var(--text)' }}
                    />
                  </label>
                  <details style={{ gridColumn: '1 / -1', fontSize: 10, color: 'var(--text-3)' }}>
                    <summary style={{ cursor: 'pointer' }}>Advanced — override sender</summary>
                    <input
                      data-testid="broker-followup-from"
                      type="text"
                      placeholder="from-override@estrellajewels.eu"
                      value={form.from_address || ''}
                      onChange={e => updateForm(draft.draft_id, 'from_address', e.target.value)}
                      style={{ display: 'block', width: '100%', marginTop: 4, padding: '6px 8px', fontSize: 11, border: '1px solid var(--border-subtle)', borderRadius: 4, background: 'var(--surface-1)', color: 'var(--text)' }}
                    />
                  </details>
                </div>
              )}

              {err && (
                <div data-testid="broker-followup-error" style={{ marginBottom: 8, padding: '6px 10px', borderRadius: 4, fontSize: 11, fontWeight: 600, background: 'var(--badge-red-bg)', color: 'var(--badge-red-text)', border: '1px solid var(--badge-red-border)' }}>
                  ⚠ {err}
                </div>
              )}

              {sent && draft.sent_to && (
                <div data-testid="broker-followup-sent-info" style={{ fontSize: 11, color: 'var(--badge-green-text)', marginBottom: 4 }}>
                  ✓ Sent to {draft.sent_to}{draft.sent_at ? ` at ${draft.sent_at}` : ''}
                </div>
              )}

              <div style={{ display: 'flex', gap: 8, alignItems: 'center' }}>
                <Btn
                  data-testid="broker-followup-send-btn"
                  small
                  variant="primary"
                  disabled={sendDisabled}
                  style={{ opacity: sendDisabled ? 0.45 : 1, cursor: sendDisabled ? 'not-allowed' : 'pointer' }}
                  onClick={() => setConfirmFor(draft)}
                >
                  {busy[draft.draft_id] ? '⟳ Sending…' : sent ? 'Sent' : 'Send…'}
                </Btn>
                <span style={{ fontSize: 10, color: 'var(--text-3)' }}>
                  {sent
                    ? 'Email already queued for this draft.'
                    : !toValid
                      ? 'Enter a valid recipient to enable send.'
                      : 'Confirmation required before queueing.'}
                </span>
              </div>
            </div>
          );
        })}

        {/* ── Confirmation modal ──────────────────────────────────────── */}
        {confirmFor && (() => {
          const f = forms[confirmFor.draft_id] || {};
          return (
            <div
              data-testid="broker-followup-confirm-modal"
              role="dialog"
              aria-modal="true"
              style={{ position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.5)', display: 'flex', alignItems: 'center', justifyContent: 'center', zIndex: 1000 }}
            >
              <div style={{ background: 'var(--surface-1)', border: '1px solid var(--border-subtle)', borderRadius: 8, padding: 20, width: 'min(560px, 90vw)', boxShadow: '0 8px 32px rgba(0,0,0,0.25)' }}>
                <div style={{ fontSize: 14, fontWeight: 700, marginBottom: 10, color: 'var(--text)' }}>Confirm broker follow-up email</div>
                <div style={{ fontSize: 11, color: 'var(--text-2)', marginBottom: 4 }}><strong>Batch:</strong> {confirmFor.batch_id}</div>
                <div style={{ fontSize: 11, color: 'var(--text-2)', marginBottom: 4 }}><strong>To:</strong> {f.to}</div>
                <div style={{ fontSize: 11, color: 'var(--text-2)', marginBottom: 4 }}><strong>CC:</strong> {f.cc || '—'}</div>
                <div style={{ fontSize: 11, color: 'var(--text-2)', marginBottom: 10 }}><strong>Subject:</strong> {confirmFor.subject}</div>
                <div data-testid="broker-followup-confirm-warning" style={{ marginBottom: 14, padding: '8px 10px', borderRadius: 4, background: 'var(--badge-amber-bg)', border: '1px solid var(--badge-amber-border)', color: 'var(--badge-amber-text)', fontSize: 11 }}>
                  ⚠ This will queue an email. It will not modify customs/PZ values.
                </div>
                <div style={{ display: 'flex', justifyContent: 'flex-end', gap: 8 }}>
                  <Btn small variant="outline" onClick={() => setConfirmFor(null)} data-testid="broker-followup-confirm-cancel">
                    Cancel
                  </Btn>
                  <Btn
                    small
                    variant="primary"
                    onClick={() => sendDraft(confirmFor)}
                    disabled={!!busy[confirmFor.draft_id]}
                    data-testid="broker-followup-confirm-send"
                  >
                    {busy[confirmFor.draft_id] ? '⟳ Sending…' : 'Confirm & queue email'}
                  </Btn>
                </div>
              </div>
            </div>
          );
        })()}
      </div>
    </Card>
  );
}

/**
 * BrokerReplyAnalyzerPanel
 * Helper-only paste-and-classify tool. Operator pastes a broker email
 * reply; the panel POSTs to /dashboard/broker-reply/analyze and renders
 * the structured suggestion.
 *
 * Strict rules:
 *  - No audit mutation. No drafts created. No emails sent.
 *  - The route is read-only (pure classifier).
 *  - The panel never auto-runs anything based on the result.
 */
function BrokerReplyAnalyzerPanel() {
  const [text,    setText]    = React.useState('');
  const [busy,    setBusy]    = React.useState(false);
  const [error,   setError]   = React.useState('');
  const [result,  setResult]  = React.useState(null);

  const analyze = async () => {
    if (!text.trim()) return;
    setBusy(true); setError(''); setResult(null);
    try {
      const data = await apiFetch('/dashboard/broker-reply/analyze', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ text }),
      });
      setResult(data);
    } catch (ex) {
      setError(ex.message || 'Analyze failed');
    } finally {
      setBusy(false);
    }
  };

  const clear = () => { setText(''); setResult(null); setError(''); };

  const caseColor = (c) =>
    c === 'A' ? 'var(--badge-green-text)' :
    c === 'B' ? 'var(--badge-amber-text)' :
    c === 'C' ? 'var(--badge-amber-text)' :
    c === 'D' ? 'var(--text-2)'           :
    c === 'E' ? 'var(--badge-red-text)'   :
                'var(--text-3)';

  return (
    <Card data-testid="broker-reply-analyzer-panel" style={{ marginTop: 4 }}>
      <div style={{ padding: '14px 18px' }}>
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 10 }}>
          <div style={{ fontSize: 13, fontWeight: 700, color: 'var(--text)' }}>📋 Paste Broker Reply</div>
        </div>
        <div data-testid="broker-reply-analyzer-description" style={{ fontSize: 11, color: 'var(--text-3)', marginBottom: 10 }}>
          Paste the broker's email body to get a quick case classification (A–E) and recommended
          next action. Read-only helper — no email is sent, no audit field is changed.
        </div>

        <textarea
          data-testid="broker-reply-input"
          value={text}
          onChange={e => setText(e.target.value)}
          placeholder="Paste broker reply text here…"
          rows={8}
          style={{ width: '100%', padding: '8px 10px', fontSize: 11, fontFamily: 'inherit', border: '1px solid var(--border-subtle)', borderRadius: 4, background: 'var(--surface-1)', color: 'var(--text)', resize: 'vertical' }}
        />

        <div style={{ display: 'flex', gap: 8, marginTop: 8 }}>
          <Btn
            data-testid="broker-reply-analyze-btn"
            small
            variant="primary"
            disabled={busy || !text.trim()}
            style={{ opacity: (busy || !text.trim()) ? 0.45 : 1, cursor: (busy || !text.trim()) ? 'not-allowed' : 'pointer' }}
            onClick={analyze}
          >
            {busy ? '⟳ Analyzing…' : 'Analyze'}
          </Btn>
          <Btn
            data-testid="broker-reply-clear-btn"
            small
            variant="outline"
            disabled={busy || (!text && !result && !error)}
            onClick={clear}
          >
            Clear
          </Btn>
        </div>

        {error && (
          <div data-testid="broker-reply-error" style={{ marginTop: 10, padding: '8px 10px', borderRadius: 4, fontSize: 11, fontWeight: 600, background: 'var(--badge-red-bg)', color: 'var(--badge-red-text)', border: '1px solid var(--badge-red-border)' }}>
            ⚠ {error}
          </div>
        )}

        {result && (
          <div data-testid="broker-reply-result" style={{ marginTop: 12, padding: '10px 12px', border: '1px solid var(--border-subtle)', borderRadius: 6, background: 'var(--surface-2)' }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 12, marginBottom: 8 }}>
              <div style={{ fontSize: 11, color: 'var(--text-3)' }}>Case</div>
              <div data-testid="broker-reply-result-case" style={{ fontSize: 16, fontWeight: 800, color: caseColor(result.case) }}>
                {result.case || '—'}
              </div>
              <div style={{ fontSize: 11, color: 'var(--text-3)' }}>·</div>
              <div data-testid="broker-reply-result-confidence" style={{ fontSize: 11, fontWeight: 600, color: 'var(--text-2)' }}>
                Confidence: {result.confidence}
              </div>
            </div>

            {result.extracted && (result.extracted.invoice_ids || []).length > 0 && (
              <div data-testid="broker-reply-result-invoices" style={{ fontSize: 11, color: 'var(--text-2)', marginBottom: 4 }}>
                Invoice IDs: <strong>{result.extracted.invoice_ids.join(', ')}</strong>
              </div>
            )}
            {result.extracted && (result.extracted.usd_amounts || []).length > 0 && (
              <div data-testid="broker-reply-result-amounts" style={{ fontSize: 11, color: 'var(--text-2)', marginBottom: 8 }}>
                USD amounts: <strong>{result.extracted.usd_amounts.join(', ')}</strong>
              </div>
            )}

            {result.recommended_action && (
              <div data-testid="broker-reply-result-recommendation" style={{ marginTop: 8, padding: '8px 10px', borderRadius: 4, background: 'var(--surface-1)', border: '1px solid var(--border-subtle)', fontSize: 11, color: 'var(--text)', lineHeight: 1.4 }}>
                {result.recommended_action}
              </div>
            )}

            <div data-testid="broker-reply-result-safety-note" style={{ fontSize: 10, color: 'var(--text-3)', marginTop: 8 }}>
              Suggestion only — does not run PZ, change customs values, send email, or apply overrides.
            </div>
          </div>
        )}
      </div>
    </Card>
  );
}

/**
 * BatchControlCenter
 * Read-only operator control panel showing batch progress checklist,
 * overall readiness, and navigation shortcuts to relevant tabs.
 * Data comes from existing batchReadiness + dhlReadiness — no new fetches.
 */
function BatchControlCenter({ batchId, audit, batchReadiness, batchReadinessLoading,
                               batchReadinessError, dhlReadiness, onTabSwitch }) {
  if (!batchId) return null;

  const br = batchReadiness;
  const dr = dhlReadiness;
  const aud = audit || {};

  // ── Derive step states ──────────────────────────────────────────────────────
  const hasSad        = !!(aud.sad_file || aud.sad_imported_at);
  const hasPz         = !!(aud.pz_pdf_filename || aud.pz_generated_at);
  const hasDhlContact = !!(aud.dhl_email_sent_at || (dr && dr.dhl_status && dr.dhl_status !== 'awaiting_start'));
  const hasDhlReply   = !!(dr && ['dhl_replied','agency_forwarded','customs_cleared'].includes(dr.dhl_status));
  const hasDsk        = !!(dr && dr.dsk_docs_received) || !!(aud.dsk_uploaded_at || (dr && dr.dhl_status && ['dhl_replied','agency_forwarded','customs_cleared'].includes(dr.dhl_status)));
  const hasAgency     = !!(dr && dr.agency_forwarded) || !!(dr && dr.dhl_status && ['agency_forwarded','customs_cleared'].includes(dr.dhl_status));
  const hasSadPzc     = !!(dr && dr.sad_received) || !!(dr && dr.dhl_status === 'customs_cleared');
  const whReady       = br && br.warehouse && br.warehouse.ready;
  const salesReady    = br && br.sales && br.sales.ready;
  const wfirmaReady   = br && br.wfirma && (br.wfirma.status === 'ready' || br.wfirma.status === 'created');
  const allReady      = br && br.overall && br.overall.ready_for_closure;
  const nextStep      = br && br.overall && br.overall.next_step;
  const blockedDomains = br && br.overall && br.overall.blocked_domains || [];

  const steps = [
    { label: 'Batch created',         done: !!batchId,      tab: null },
    { label: 'SAD / customs doc uploaded', done: hasSad,    tab: 'DHL / Customs' },
    { label: 'PZ document generated', done: hasPz,          tab: 'PZ / wFirma' },
    { label: 'DHL contacted',         done: hasDhlContact,  tab: 'DHL / Customs' },
    { label: 'DHL reply received',    done: hasDhlReply,    tab: 'DHL / Customs' },
    { label: 'DSK docs received',     done: hasDsk,         tab: 'DHL / Customs' },
    { label: 'Forwarded to agency',   done: hasAgency,      tab: 'DHL / Customs' },
    { label: 'SAD / PZC from agency', done: hasSadPzc,      tab: 'DHL / Customs' },
    { label: 'Warehouse scanned',     done: whReady,        tab: 'Warehouse' },
    { label: 'Sales linked',          done: salesReady,     tab: 'Sales' },
    { label: 'wFirma reservation',    done: wfirmaReady,    tab: 'PZ / wFirma' },
    { label: 'Customs cleared',       done: hasSadPzc && hasDsk, tab: 'DHL / Customs' },
    { label: 'Ready for closure',     done: allReady,       tab: null },
  ];

  // Find current active step (first not done)
  const activeStepIdx = steps.findIndex(s => !s.done);

  const cardStyle = { marginBottom: 16, padding: 16 };
  const stepRowStyle = { display: 'flex', alignItems: 'center', gap: 8, padding: '4px 0', fontSize: 12 };
  const pillStyle = (blocked) => ({
    display: 'inline-block', padding: '2px 8px', borderRadius: 12, fontSize: 10,
    fontWeight: 600, marginLeft: 4,
    background: blocked ? '#fef2f2' : '#f0fdf4',
    color: blocked ? '#991b1b' : '#166534',
  });

  return (
    <Card data-testid="batch-control-center" style={cardStyle}>
      <SectionHeader icon="⊞" title="Batch Control Center"
        subtitle={allReady ? 'All domains ready — batch can be closed' : (nextStep || 'Checking readiness…')} />

      {batchReadinessLoading && (
        <div style={{ fontSize: 12, color: 'var(--text-3)', padding: '8px 0' }}>⟳ Loading readiness…</div>
      )}
      {batchReadinessError && (
        <div style={{ fontSize: 12, color: '#991b1b', padding: '8px 0' }}>⚠ {batchReadinessError}</div>
      )}

      {/* Step checklist */}
      <div style={{ marginBottom: 12 }}>
        {steps.map((step, i) => {
          const isCurrent = i === activeStepIdx;
          const icon = step.done ? '✅' : isCurrent ? '🔵' : '⬜';
          return (
            <div key={i} style={{...stepRowStyle, fontWeight: isCurrent ? 700 : 400}}>
              <span>{icon}</span>
              <span style={{ flex: 1, color: step.done ? 'var(--text-2)' : isCurrent ? 'var(--text-1)' : 'var(--text-3)' }}>
                {step.label}
              </span>
              {step.tab && isCurrent && (
                <button
                  style={{ fontSize: 10, padding: '2px 8px', cursor: 'pointer', border: '1px solid var(--border)', borderRadius: 4, background: 'var(--surface-2)', color: 'var(--text-1)' }}
                  onClick={() => onTabSwitch && onTabSwitch(step.tab)}
                >
                  Go →
                </button>
              )}
            </div>
          );
        })}
      </div>

      {/* Blocked domains */}
      {blockedDomains.length > 0 && (
        <div style={{ fontSize: 11, marginBottom: 8 }}>
          <span style={{ fontWeight: 600, color: 'var(--text-2)' }}>Blocked: </span>
          {blockedDomains.map(d => <span key={d} style={pillStyle(true)}>{d}</span>)}
        </div>
      )}

      {/* Next step highlight */}
      {nextStep && !allReady && (
        <div style={{ background: '#fffbeb', border: '1px solid #fde68a', borderRadius: 6, padding: '8px 12px', fontSize: 12, color: '#92400e' }}>
          <strong>Next: </strong>{nextStep}
        </div>
      )}

      {/* Parked modules note */}
      <div style={{ marginTop: 12, padding: '8px 12px', background: 'var(--surface-2)', borderRadius: 6, fontSize: 11, color: 'var(--text-3)' }}>
        <strong>Parked modules:</strong> Proforma converter · Barcode / label print
      </div>
    </Card>
  );
}

/**
 * DecisionBanner
 * Renders the decision engine output passed in via props (fetched by BatchDetailPage).
 * Falls back to the readiness-layer next_step when decisionData is absent.
 */
function DecisionBanner({ decisionData, decisionLoading, fallbackStep }) {
  if (decisionLoading) return null;

  const action = decisionData && decisionData.primary_action;
  const displayText = action || fallbackStep;
  if (!displayText) return null;

  const isDecision = !!(action);
  return (
    <div
      data-testid="decision-banner"
      style={{
        fontSize: 11, padding: '7px 10px', borderRadius: 5,
        border: `1px solid ${isDecision ? 'var(--badge-blue-border, var(--border))' : 'var(--border)'}`,
        background: isDecision ? 'var(--badge-blue-bg, var(--bg-subtle))' : 'var(--bg-subtle)',
        color: isDecision ? 'var(--badge-blue-text, var(--text-2))' : 'var(--text-2)',
      }}
    >
      <span style={{ fontWeight: 700 }}>{isDecision ? '▶ Next Action: ' : 'Next: '}</span>
      <span data-testid="overall-next-step" data-decision-action="true">{displayText}</span>
    </div>
  );
}

/**
 * OverallReadinessCard
 * Shows batch-level aggregated readiness summary in the Pipeline tab.
 * Read-only. No buttons.
 */
function OverallReadinessCard({ batchReadiness, loading, error, decisionData, decisionLoading }) {
  if (loading) {
    return (
      <Card data-testid="overall-readiness-card">
        <div style={{ padding: 16, fontSize: 12, color: 'var(--text-3)' }}>⟳ Loading readiness…</div>
      </Card>
    );
  }
  if (error || !batchReadiness) {
    return (
      <Card data-testid="overall-readiness-card">
        <div style={{ padding: 16, fontSize: 12, color: 'var(--text-3)' }}>
          {error || 'Readiness data unavailable'}
        </div>
      </Card>
    );
  }
  const overall = batchReadiness.overall || {};
  const ready = overall.ready_for_closure;
  const blocked = overall.blocked_domains || [];
  const nextStep = overall.next_step || '';
  const DOMAIN_ICONS = { warehouse: '📦', sales: '🛒', wfirma: '↗', dhl: '✈' };
  const DOMAINS = ['warehouse', 'sales', 'wfirma', 'dhl'];
  return (
    <Card data-testid="overall-readiness-card">
      <div style={{ padding: '14px 18px' }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 12 }}>
          <span style={{ fontSize: 13, fontWeight: 700, color: 'var(--text)' }}>🔍 Batch Readiness</span>
          <span style={{ fontSize: 11, fontWeight: 700, padding: '2px 8px', borderRadius: 4,
            background: ready ? 'var(--badge-green-bg)' : 'var(--badge-amber-bg)',
            color: ready ? 'var(--badge-green-text)' : 'var(--badge-amber-text)',
            border: `1px solid ${ready ? 'var(--badge-green-border)' : 'var(--badge-amber-border)'}` }}>
            {ready ? 'Ready for closure' : `${blocked.length} domain(s) blocked`}
          </span>
        </div>
        <div style={{ display: 'flex', gap: 10, flexWrap: 'wrap', marginBottom: 12 }}>
          {DOMAINS.map(d => {
            const dom = batchReadiness[d] || {};
            const isReady = dom.ready;
            const st = dom.status || 'n/a';
            const isNA = st === 'n/a' || st === 'none';
            return (
              <div key={d} style={{ display: 'flex', alignItems: 'center', gap: 5, padding: '4px 10px',
                borderRadius: 5, fontSize: 11, fontWeight: 600,
                background: isNA ? 'var(--bg-2)' : isReady ? 'var(--badge-green-bg)' : 'var(--badge-amber-bg)',
                color: isNA ? 'var(--text-3)' : isReady ? 'var(--badge-green-text)' : 'var(--badge-amber-text)',
                border: `1px solid ${isNA ? 'var(--border)' : isReady ? 'var(--badge-green-border)' : 'var(--badge-amber-border)'}`,
              }} title={dom.message || ''}>
                <span>{DOMAIN_ICONS[d] || '•'}</span>
                <span style={{ textTransform: 'capitalize' }}>{d}</span>
                <span style={{ fontWeight: 400 }}>— {st.replace(/_/g, ' ')}</span>
              </div>
            );
          })}
        </div>
        <DecisionBanner decisionData={decisionData} decisionLoading={decisionLoading} fallbackStep={nextStep} />
      </div>
    </Card>
  );
}
