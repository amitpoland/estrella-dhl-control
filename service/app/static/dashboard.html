function WfirmaExportPage({ batches, onViewShipment }) {
  const [subTab, setSubTab] = React.useState('Export');
  const ready    = batches.filter(s => s.pzStatus === 'Generated' || s.pzStatus === 'Complete');
  const exported = batches.filter(s => s.pzStatus === 'Exported');
  const locked   = batches.filter(s => s.pzStatus === 'Ready for PZ' || s.pzStatus === 'Locked');

  // ── Setup sub-tab state ───────────────────────────────────────────────────
  const [capabilities, setCapabilities] = React.useState(null);
  const [customers, setCustomers] = React.useState(null);
  const [products, setProducts] = React.useState(null);
  const [customerFilter, setCustomerFilter] = React.useState('');
  const [productFilter, setProductFilter] = React.useState('');
  const [setupLoading, setSetupLoading] = React.useState(false);
  const [editingCustomer, setEditingCustomer] = React.useState(null); // null | { client_name, ...row, _isNew }
  const [editingProduct, setEditingProduct] = React.useState(null);   // null | { product_code, ...row, _isNew }
  const [modalBusy, setModalBusy] = React.useState(false);
  const [modalError, setModalError] = React.useState(null);

  const loadCapabilities = React.useCallback(async () => {
    try {
      const d = await apiFetch('/api/v1/wfirma/capabilities');
      setCapabilities(d);
    } catch (e) { setCapabilities({ error: e.message }); }
  }, []);
  const loadCustomers = React.useCallback(async (status) => {
    try {
      const qs = status ? `?match_status=${encodeURIComponent(status)}` : '';
      const d = await apiFetch(`/api/v1/wfirma/customers${qs}`);
      setCustomers(d);
    } catch (e) { setCustomers({ error: e.message }); }
  }, []);
  const loadProducts = React.useCallback(async (status) => {
    try {
      const qs = status ? `?sync_status=${encodeURIComponent(status)}` : '';
      const d = await apiFetch(`/api/v1/wfirma/products${qs}`);
      setProducts(d);
    } catch (e) { setProducts({ error: e.message }); }
  }, []);

  React.useEffect(() => {
    if (subTab !== 'Setup') return;
    setSetupLoading(true);
    Promise.all([loadCapabilities(), loadCustomers(customerFilter), loadProducts(productFilter)])
      .finally(() => setSetupLoading(false));
  }, [subTab]);

  React.useEffect(() => { if (subTab === 'Setup') loadCustomers(customerFilter); }, [customerFilter]);
  React.useEffect(() => { if (subTab === 'Setup') loadProducts(productFilter); }, [productFilter]);

  // ── Modal save handlers ────────────────────────────────────────────────────
  const saveCustomer = async () => {
    if (!editingCustomer || !editingCustomer.client_name?.trim()) {
      setModalError('Client name is required');
      return;
    }
    setModalBusy(true);
    setModalError(null);
    try {
      const body = {
        wfirma_customer_id: editingCustomer.wfirma_customer_id || null,
        vat_id:             editingCustomer.vat_id || '',
        country:            editingCustomer.country || '',
        match_status:       editingCustomer.match_status || 'pending',
      };
      await apiFetch(`/api/v1/wfirma/customers/${encodeURIComponent(editingCustomer.client_name.trim())}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      setEditingCustomer(null);
      await loadCustomers(customerFilter);
    } catch (e) { setModalError(e.message); }
    setModalBusy(false);
  };
  const saveProduct = async () => {
    if (!editingProduct || !editingProduct.product_code?.trim()) {
      setModalError('Product code is required');
      return;
    }
    setModalBusy(true);
    setModalError(null);
    try {
      const body = {
        wfirma_product_id: editingProduct.wfirma_product_id || null,
        product_name_pl:   editingProduct.product_name_pl || '',
        unit:              editingProduct.unit || 'szt.',
        vat_rate:          editingProduct.vat_rate || '23',
        warehouse_id:      editingProduct.warehouse_id || '',
        sync_status:       editingProduct.sync_status || 'pending',
      };
      await apiFetch(`/api/v1/wfirma/products/${encodeURIComponent(editingProduct.product_code.trim())}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      setEditingProduct(null);
      await loadProducts(productFilter);
    } catch (e) { setModalError(e.message); }
    setModalBusy(false);
  };

  // ── Shared style helpers (Setup sub-tab) ──────────────────────────────────
  const wfPillStyle = (kind) => {
    const map = {
      ok:   { bg: 'var(--badge-green-bg)',   text: 'var(--badge-green-text)',   border: 'var(--badge-green-border)' },
      warn: { bg: 'var(--badge-amber-bg)',   text: 'var(--badge-amber-text)',   border: 'var(--badge-amber-border)' },
      err:  { bg: 'var(--badge-red-bg)',     text: 'var(--badge-red-text)',     border: 'var(--badge-red-border)' },
      info: { bg: 'var(--badge-blue-bg)',    text: 'var(--badge-blue-text)',    border: 'var(--badge-blue-border)' },
      neutral: { bg: 'var(--badge-neutral-bg)', text: 'var(--badge-neutral-text)', border: 'var(--badge-neutral-border)' },
    };
    const c = map[kind] || map.neutral;
    return { fontSize: 10, fontWeight: 700, padding: '2px 8px', borderRadius: 4, background: c.bg, color: c.text, border: `1px solid ${c.border}`, display: 'inline-block', whiteSpace: 'nowrap' };
  };
  const statusKind = (s) => s === 'matched' ? 'ok' : s === 'pending' ? 'warn' : s === 'missing' ? 'err' : 'neutral';
  const tblStyle = { width: '100%', borderCollapse: 'collapse', fontSize: 11 };
  const thStyle  = { textAlign: 'left', padding: '6px 8px', borderBottom: '1px solid var(--border)', fontWeight: 700, color: 'var(--text-3)', textTransform: 'uppercase', fontSize: 10, letterSpacing: '0.04em' };
  const tdStyle  = { padding: '6px 8px', borderBottom: '1px solid var(--border-subtle)', color: 'var(--text-2)' };

  return (
    <div style={{ padding: '24px 32px', overflowY: 'auto', flex: 1 }}>
      {/* Sub-tab strip */}
      <div style={{ display: 'flex', gap: 4, marginBottom: 20, background: 'var(--surface)', borderRadius: 8, padding: 4, width: 'fit-content', border: '1px solid var(--border)' }}>
        {['Export', 'Setup'].map(t => (
          <button key={t} onClick={() => setSubTab(t)} style={{
            padding: '6px 18px', borderRadius: 6, border: 'none', cursor: 'pointer',
            background: subTab === t ? 'var(--text)' : 'transparent',
            color:      subTab === t ? '#fff' : 'var(--text-2)',
            fontSize: 12, fontWeight: subTab === t ? 600 : 400, fontFamily: 'inherit',
          }}>{t}</button>
        ))}
      </div>

      {subTab === 'Export' && (<>
        <StatsRow stats={[
          { label: 'Ready for wFirma',    value: ready.length,    color: 'var(--badge-blue-text)' },
          { label: 'Exported to wFirma',  value: exported.length, color: 'var(--accent)' },
          { label: 'PZ Pending',          value: locked.length,   color: 'var(--text-3)' },
        ]} />

        <div style={{ background: 'var(--card)', border: '1px solid var(--border)', borderRadius: 10, padding: '16px 20px', marginBottom: 20 }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 6 }}>
            <span style={{ fontSize: 14 }}>↗</span>
            <span style={{ fontSize: 13, fontWeight: 700, color: 'var(--text)' }}>How wFirma export works</span>
          </div>
          <div style={{ fontSize: 12, color: 'var(--text-2)', lineHeight: 1.55 }}>
            1. Open a shipment with PZ generated → 2. In the <b>wFirma Export</b> section, copy the rows or download <code>PZ_READY.json</code> → 3. Use the Chrome AutoFill script on wFirma's <i>Nowe PZ</i> page → 4. Review every value, click <b>Zapisz</b> manually. The script never submits.
          </div>
          <div style={{ marginTop: 10, display: 'flex', gap: 10, flexWrap: 'wrap' }}>
            <a href="/chrome_wfirma_autofill/README.md" target="_blank" rel="noreferrer" style={{ fontSize: 12, color: 'var(--accent)', textDecoration: 'none', padding: '6px 12px', border: '1px solid var(--accent-border)', borderRadius: 6 }}>⚙ Chrome AutoFill Guide</a>
            <a href="/chrome_wfirma_autofill/autofill_pz.js" target="_blank" rel="noreferrer" style={{ fontSize: 12, color: 'var(--text-2)', textDecoration: 'none', padding: '6px 12px', border: '1px solid var(--border)', borderRadius: 6 }}>↓ autofill_pz.js</a>
          </div>
        </div>

        <div style={{ fontSize: 11, fontWeight: 700, color: 'var(--text-3)', letterSpacing: '0.08em', textTransform: 'uppercase', marginBottom: 8 }}>Ready for wFirma — Open shipment to export</div>
        <ShipmentsTable batches={batches} onViewShipment={onViewShipment} filterFn={s => s.pzStatus === 'Generated' || s.pzStatus === 'Complete'} emptyMsg="No PZ-generated shipments awaiting wFirma export" />

        <div style={{ fontSize: 11, fontWeight: 700, color: 'var(--text-3)', letterSpacing: '0.08em', textTransform: 'uppercase', marginBottom: 8, marginTop: 24 }}>Exported to wFirma</div>
        <ShipmentsTable batches={batches} onViewShipment={onViewShipment} filterFn={s => s.pzStatus === 'Exported'} emptyMsg="None exported yet" />
      </>)}

      {subTab === 'Setup' && (() => {
        const caps = capabilities;
        const capsErr = caps && caps.error;
        const cust = customers;
        const custErr = cust && cust.error;
        const prod = products;
        const prodErr = prod && prod.error;
        const blocking = caps && !capsErr ? (caps.blocking_reasons || []) : [];

        return (
          <div style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
            {/* Capability strip */}
            <Card style={{ padding: 14 }}>
              <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', flexWrap: 'wrap', gap: 8, marginBottom: 10 }}>
                <div style={{ fontSize: 13, fontWeight: 700, color: 'var(--text)' }}>Capability</div>
                <Btn small variant="ghost" onClick={loadCapabilities} title="Refresh">↺</Btn>
              </div>
              {!caps && <div style={{ fontSize: 11, color: 'var(--text-3)' }}>Loading…</div>}
              {capsErr && <div style={{ fontSize: 11, color: 'var(--badge-red-text)' }}>Error: {caps.error}</div>}
              {caps && !capsErr && (
                <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap' }}>
                  <span style={wfPillStyle(caps.api_configured ? 'ok' : 'err')}>{caps.api_configured ? '✓' : '✗'} API configured</span>
                  <span style={wfPillStyle(caps.warehouse_module_enabled ? 'ok' : 'warn')}>{caps.warehouse_module_enabled ? '✓' : '⚠'} Warehouse module</span>
                  <span style={wfPillStyle(caps.reservation_supported ? 'ok' : 'warn')}>{caps.reservation_supported ? '✓' : '⚠'} Reservation supported</span>
                  <span style={wfPillStyle(caps.customer_api_supported ? 'ok' : 'warn')}>{caps.customer_api_supported ? '✓' : '⚠'} Customer API</span>
                  <span style={wfPillStyle(caps.product_api_supported ? 'ok' : 'warn')}>{caps.product_api_supported ? '✓' : '⚠'} Product API</span>
                </div>
              )}
            </Card>

            {/* Diagnostic helper */}
            {caps && !capsErr && blocking.length > 0 && (

function fmtMonth(m) {
  if (!m || m === '0000-00') return '—';
  try {
    const [y, mo] = m.split('-');
    const d = new Date(Number(y), Number(mo) - 1, 1);
    return d.toLocaleString('en-GB', { month: 'short', year: '2-digit' });
  } catch { return m; }
}

function fmtK(n) {
  if (!n && n !== 0) return '—';
  if (Math.abs(n) >= 1000) return 'PLN ' + (n / 1000).toLocaleString('pl-PL', { maximumFractionDigits: 1 }) + ' k';
  return 'PLN ' + n.toLocaleString('pl-PL', { minimumFractionDigits: 0, maximumFractionDigits: 0 });
}

// Inline SVG bar chart — no external dependencies
function BarChart({ data, valueKey, labelKey, color, height = 120, maxBars = 12 }) {
  if (!data || !data.length) return (
    <div style={{ height, display:'flex', alignItems:'center', justifyContent:'center', color:'var(--text-3)', fontSize:12 }}>No data yet</div>
  );
  const visible = data.slice(-maxBars);
  const maxVal  = Math.max(...visible.map(d => d[valueKey] || 0), 1);
  const BAR_W   = 28;
  const GAP     = 6;
  const PAD_L   = 0;
  const LABEL_H = 32;
  const chartH  = height - LABEL_H;
  const totalW  = visible.length * (BAR_W + GAP) - GAP;

  return (
    <svg width="100%" viewBox={`0 0 ${totalW + PAD_L} ${height}`} style={{ overflow:'visible', display:'block' }}>
      {visible.map((d, i) => {
        const val  = d[valueKey] || 0;
        const barH = Math.max(4, Math.round((val / maxVal) * chartH));
        const x    = PAD_L + i * (BAR_W + GAP);
        const y    = chartH - barH;
        const lbl  = fmtMonth(d[labelKey]);
        const isLast = i === visible.length - 1;
        return (
          <g key={i}>
            <rect x={x} y={y} width={BAR_W} height={barH} rx={3} fill={isLast ? 'var(--accent)' : color || 'var(--badge-blue-border)'} opacity={isLast ? 1 : 0.72} />
            <text x={x + BAR_W / 2} y={chartH + 12} textAnchor="middle" fontSize={8} fill="var(--text-3)" fontFamily="inherit">{lbl}</text>
            {val > 0 && (
              <text x={x + BAR_W / 2} y={y - 3} textAnchor="middle" fontSize={7.5} fill="var(--text-2)" fontFamily="inherit">{fmtK(val).replace('PLN ','')}</text>
            )}
          </g>
        );
      })}
    </svg>
  );
}

// Stacked bar chart — net + vat band
function StackedBarChart({ data, height = 120, maxBars = 12 }) {
  if (!data || !data.length) return (
    <div style={{ height, display:'flex', alignItems:'center', justifyContent:'center', color:'var(--text-3)', fontSize:12 }}>No data yet</div>
  );
  const visible = data.slice(-maxBars);
  const maxVal  = Math.max(...visible.map(d => (d.gross_pln || 0)), 1);
  const BAR_W   = 28;
  const GAP     = 6;
  const LABEL_H = 32;
  const chartH  = height - LABEL_H;
  const totalW  = visible.length * (BAR_W + GAP) - GAP;

  return (
    <svg width="100%" viewBox={`0 0 ${totalW} ${height}`} style={{ overflow:'visible', display:'block' }}>
      {visible.map((d, i) => {
        const net  = d.net_pln  || 0;
        const grs  = d.gross_pln || 0;
        const vat  = Math.max(0, grs - net);
        const netH = Math.max(net > 0 ? 2 : 0, Math.round((net / maxVal) * chartH));
        const vatH = Math.max(vat > 0 ? 2 : 0, Math.round((vat / maxVal) * chartH));
        const x    = i * (BAR_W + GAP);
        const lbl  = fmtMonth(d.month);
        const isLast = i === visible.length - 1;
        const alpha = isLast ? 1 : 0.72;
        return (
          <g key={i}>
            {/* net band */}
            <rect x={x} y={chartH - netH - vatH} width={BAR_W} height={netH} rx={0} fill={isLast ? '#1E5A90' : 'var(--badge-blue-border)'} opacity={alpha} />
            {/* vat band */}
            <rect x={x} y={chartH - vatH} width={BAR_W} height={vatH} rx={0} fill={isLast ? 'var(--accent)' : 'var(--accent-border)'} opacity={alpha * 0.8} />
            {/* bottom rounding */}
            <rect x={x} y={chartH - Math.max(3,vatH)} width={BAR_W} height={Math.min(vatH+netH,3)} rx={3} fill="transparent" />
            <text x={x + BAR_W / 2} y={chartH + 12} textAnchor="middle" fontSize={8} fill="var(--text-3)" fontFamily="inherit">{lbl}</text>
          </g>
        );
      })}
    </svg>
  );
}

function ReportsPage() {
  const [data,    setData]    = React.useState(null);
  const [loading, setLoading] = React.useState(true);
  const [error,   setError]   = React.useState(null);
  const [expanded, setExpanded] = React.useState({});
  const [trackingExport, setTrackingExport] = React.useState(null);    // { size_bytes, generated_at } | null
  const [trackingExportBusy, setTrackingExportBusy] = React.useState(false);
  const [trackingExportError, setTrackingExportError] = React.useState(null);

  const load = React.useCallback(async () => {
    setLoading(true);
    setError(null);
    try {
      const d = await apiFetch('/api/v1/analytics/phase-a');
      setData(d);
    } catch (e) {
      setError(e.message);
    } finally {
      setLoading(false);
    }
  }, []);

  const regenerateTrackingExport = React.useCallback(async () => {
    setTrackingExportBusy(true);
    setTrackingExportError(null);
    try {
      const d = await apiFetch('/api/v1/tracking/events/export', { method: 'POST' });
      setTrackingExport({ size_bytes: d.size_bytes, generated_at: new Date().toISOString() });
    } catch (e) {
      setTrackingExportError(e.message);
    }
    setTrackingExportBusy(false);
  }, []);

  React.useEffect(() => { load(); }, [load]);

  const toggle = (key) => setExpanded(p => ({ ...p, [key]: !p[key] }));

  if (loading) return (
    <div style={{ flex:1, display:'flex', alignItems:'center', justifyContent:'center', flexDirection:'column', gap:12, color:'var(--text-3)' }}>
      <div style={{ fontSize: 28, animation:'spin 1.2s linear infinite' }}>⟳</div>
      <div style={{ fontSize: 13 }}>Loading analytics…</div>
    </div>
  );

  if (error) return (
    <div style={{ flex:1, display:'flex', alignItems:'center', justifyContent:'center', flexDirection:'column', gap:12, color:'var(--badge-red-text)' }}>
      <div style={{ fontSize: 28 }}>⚠</div>
      <div style={{ fontSize: 13, fontWeight: 600 }}>Analytics load failed</div>
      <div style={{ fontSize: 12, color:'var(--text-3)', maxWidth: 380, textAlign:'center' }}>{error}</div>
      <button onClick={load} style={{ marginTop:8, padding:'6px 18px', borderRadius:6, border:'1px solid var(--border)', background:'var(--card)', color:'var(--text)', cursor:'pointer', fontSize:12 }}>↻ Retry</button>
    </div>
  );

  if (!data) return null;

  const duty      = data.duty_by_month || [];
  const shipVal   = data.shipment_value_by_month || [];
  const inv       = data.inventory || {};
  const sync      = data.wfirma_sync || {};

  // Duty — YTD total
  const ytdDuty   = duty.reduce((s, d) => s + (d.duty_pln || 0), 0);
  // Latest month duty
  const latestDuty = duty.length ? duty[duty.length - 1] : null;

  // Value — YTD
  const ytdNet  = shipVal.reduce((s, d) => s + (d.net_pln || 0), 0);
  const ytdGrs  = shipVal.reduce((s, d) => s + (d.gross_pln || 0), 0);

  // Sync %
  const syncPct = sync.total_pz_batches
    ? Math.round(sync.exported / sync.total_pz_batches * 100)
    : 0;

  return (
    <div style={{ flex:1, overflowY:'auto', padding:'24px 32px 40px' }}>

      {/* Phase badge + meta */}
      <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom: 20 }}>
        <div style={{ display:'flex', alignItems:'center', gap: 10 }}>
          <span style={{ fontSize: 11, fontWeight: 700, padding: '3px 10px', borderRadius: 20, background:'var(--accent-subtle)', color:'var(--accent)', border:'1px solid var(--accent-border)', letterSpacing:'0.06em' }}>PHASE A — LOCAL</span>
          <span style={{ fontSize: 11, color:'var(--text-3)' }}>{data.batches_scanned} batches · {data.generated_at?.slice(0,16).replace('T',' ')} UTC</span>
        </div>
        <button onClick={load} style={{ display:'flex', alignItems:'center', gap:5, padding:'5px 12px', borderRadius:6, border:'1px solid var(--border)', background:'var(--card)', color:'var(--text-2)', cursor:'pointer', fontSize:11, fontFamily:'inherit' }}>
          <span>↻</span> Refresh
        </button>
      </div>

      {/* Tracking Master Export */}
      <div style={{ background:'var(--card)', border:'1px solid var(--border)', borderRadius:10, padding:'14px 18px', marginBottom:16, display:'flex', alignItems:'center', justifyContent:'space-between', flexWrap:'wrap', gap:12 }}>
        <div style={{ display:'flex', alignItems:'center', gap:12, minWidth:0 }}>
          <div style={{ width:32, height:32, borderRadius:8, background:'var(--bg-2)', border:'1px solid var(--border)', display:'flex', alignItems:'center', justifyContent:'center', fontSize:14 }}>↧</div>
          <div style={{ minWidth:0 }}>
            <div style={{ fontSize:13, fontWeight:700, color:'var(--text)' }}>Tracking Master Export</div>
            <div style={{ fontSize:11, color:'var(--text-3)', marginTop:2 }}>
              {trackingExport
                ? <>Last regenerated: <b style={{ color:'var(--text-2)' }}>{trackingExport.generated_at.slice(0,16).replace('T',' ')} UTC</b> · Size: <b style={{ color:'var(--text-2)' }}>{(trackingExport.size_bytes / 1024).toLocaleString('en-US', { maximumFractionDigits: 1 })} KB</b></>
                : 'All shipment tracking events as a single XLSX file'}
            </div>
            {trackingExportError && (
              <div style={{ fontSize:11, color:'var(--badge-red-text)', marginTop:4 }}>Regenerate failed: {trackingExportError}</div>
            )}
          </div>
        </div>
        <div style={{ display:'flex', gap:8, alignItems:'center', flexWrap:'wrap' }}>
          <Btn small variant="outline" onClick={regenerateTrackingExport} disabled={trackingExportBusy} title="Regenerate the master XLSX from current DB state">
            {trackingExportBusy ? 'Regenerating…' : '↺ Regenerate'}
          </Btn>
          <a
            href="/api/v1/tracking/events/export/download"
            download="SHIPMENT_TRACKING_MASTER.xlsx"
            style={{
              display:'inline-flex', alignItems:'center', gap:5, padding:'4px 10px',
              fontSize:11, fontWeight:600, fontFamily:'inherit',
              background:'var(--text)', color:'var(--card)',
              border:'1px solid var(--text)', borderRadius:6,
              textDecoration:'none', cursor:'pointer', whiteSpace:'nowrap',
            }}
            title="Download the latest master XLSX (regenerates if missing)"
          >
            ↧ Download
          </a>
        </div>
      </div>

      {/* Top KPI strip */}
      <div style={{ display:'grid', gridTemplateColumns:'repeat(4,1fr)', gap:12, marginBottom:24 }}>
        {[
          { label:'YTD Duty A00',      value: fmtPLN(ytdDuty),        icon:'₤', color:'var(--accent)' },
          { label:'YTD Net Value',     value: fmtPLN(ytdNet),         icon:'◈', color:'var(--badge-blue-text)' },
          { label:'Inventory (PZ)',    value: fmtPLN(inv.total_net_pln), icon:'⊞', color:'var(--badge-green-text)' },
          { label:'wFirma Sync',       value: sync.total_pz_batches ? `${sync.exported}/${sync.total_pz_batches}` : '—', icon:'↗', color: syncPct === 100 ? 'var(--badge-green-text)' : syncPct > 50 ? 'var(--accent)' : 'var(--badge-amber-text)' },
        ].map((c,i) => (
          <div key={i} style={{ background:'var(--card)', border:'1px solid var(--border)', borderRadius:10, padding:'16px 18px', display:'flex', justifyContent:'space-between', alignItems:'flex-start' }}>
            <div>
              <div style={{ fontSize:11, color:'var(--text-2)', fontWeight:500, marginBottom:6 }}>{c.label}</div>
              <div style={{ fontSize:20, fontWeight:700, color:c.color, fontFamily:'"DM Serif Display",serif', lineHeight:1.1 }}>{c.value}</div>
            </div>
            <div style={{ width:30, height:30, borderRadius:6, background:'var(--accent-subtle)', display:'flex', alignItems:'center', justifyContent:'center', fontSize:14, color:c.color }}>{c.icon}</div>
          </div>
        ))}
      </div>

      {/* Row 1: Duty chart | Shipment value chart */}
      <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:16, marginBottom:16 }}>

        {/* Card 1 — Duty A00 by Month */}
        <AnalyticsCard title="Import Duty A00 by Month" icon="₤" badge="A00">
          {duty.length === 0 ? (
            <div style={{ fontSize:12, color:'var(--text-3)', padding:'8px 0' }}>No SAD-processed batches yet. Upload a ZC429 to populate.</div>
          ) : (
            <>
              <BarChart data={duty} valueKey="duty_pln" labelKey="month" color="var(--badge-blue-border)" height={140} />
              <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:8, marginTop:4 }}>
                <div style={{ background:'var(--bg-subtle)', borderRadius:8, padding:'10px 14px' }}>
                  <div style={{ fontSize:10, color:'var(--text-3)', marginBottom:3 }}>YTD Total</div>
                  <div style={{ fontSize:16, fontWeight:700, color:'var(--accent)', fontFamily:'"DM Serif Display",serif' }}>{fmtPLN(ytdDuty)}</div>
                </div>
                {latestDuty && (
                  <div style={{ background:'var(--bg-subtle)', borderRadius:8, padding:'10px 14px' }}>
                    <div style={{ fontSize:10, color:'var(--text-3)', marginBottom:3 }}>{fmtMonth(latestDuty.month)}</div>
                    <div style={{ fontSize:16, fontWeight:700, color:'var(--text)', fontFamily:'"DM Serif Display",serif' }}>{fmtPLN(latestDuty.duty_pln)}</div>
                  </div>
                )}
              </div>
              {/* Breakdown table */}
              <div>
                <button onClick={() => toggle('duty')} style={{ fontSize:11, color:'var(--text-3)', background:'none', border:'none', cursor:'pointer', padding:'4px 0', fontFamily:'inherit' }}>
                  {expanded.duty ? '▾ Hide breakdown' : '▸ Monthly breakdown'}
                </button>
                {expanded.duty && (
                  <table style={{ width:'100%', borderCollapse:'collapse', fontSize:11, marginTop:6 }}>
                    <thead>
                      <tr style={{ background:'var(--bg-subtle)' }}>
                        {['Month','Duty A00','Batches'].map(h => (
                          <th key={h} style={{ padding:'6px 8px', textAlign: h==='Batches'?'right':'left', color:'var(--text-3)', fontWeight:600, fontSize:10, letterSpacing:'0.05em', textTransform:'uppercase', borderBottom:'1px solid var(--border)' }}>{h}</th>
                        ))}
                      </tr>
                    </thead>
                    <tbody>
                      {[...duty].reverse().map((d,i) => (
                        <tr key={i} style={{ background: i%2===0 ? 'transparent' : 'var(--bg-subtle)' }}>
                          <td style={{ padding:'5px 8px', color:'var(--text-2)' }}>{fmtMonth(d.month)}</td>
                          <td style={{ padding:'5px 8px', fontWeight:600, color:'var(--text)', fontVariantNumeric:'tabular-nums' }}>{fmtPLN(d.duty_pln)}</td>
                          <td style={{ padding:'5px 8px', textAlign:'right', color:'var(--text-3)' }}>{d.batches}</td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                )}
              </div>
            </>
          )}
        </AnalyticsCard>

        {/* Card 2 — Monthly Shipment Value */}
        <AnalyticsCard title="Monthly Shipment Value" icon="◈">
          {shipVal.length === 0 ? (
            <div style={{ fontSize:12, color:'var(--text-3)', padding:'8px 0' }}>No processed shipments yet.</div>
          ) : (
            <>
              <StackedBarChart data={shipVal} height={140} />
              <div style={{ display:'flex', alignItems:'center', gap:12, fontSize:10, color:'var(--text-3)', marginTop:-6 }}>
                <span style={{ display:'flex', alignItems:'center', gap:4 }}><span style={{ display:'inline-block', width:10, height:8, background:'var(--badge-blue-border)', borderRadius:2 }}/> Net</span>
                <span style={{ display:'flex', alignItems:'center', gap:4 }}><span style={{ display:'inline-block', width:10, height:8, background:'var(--accent-border)', borderRadius:2 }}/> VAT portion</span>
              </div>
              <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:8 }}>
                <div style={{ background:'var(--bg-subtle)', borderRadius:8, padding:'10px 14px' }}>
                  <div style={{ fontSize:10, color:'var(--text-3)', marginBottom:3 }}>YTD Net</div>
                  <div style={{ fontSize:15, fontWeight:700, color:'var(--badge-blue-text)', fontFamily:'"DM Serif Display",serif' }}>{fmtPLN(ytdNet)}</div>
                </div>
                <div style={{ background:'var(--bg-subtle)', borderRadius:8, padding:'10px 14px' }}>
                  <div style={{ fontSize:10, color:'var(--text-3)', marginBottom:3 }}>YTD Gross</div>
                  <div style={{ fontSize:15, fontWeight:700, color:'var(--text)', fontFamily:'"DM Serif Display",serif' }}>{fmtPLN(ytdGrs)}</div>
                </div>
              </div>
              <div>
                <button onClick={() => toggle('value')} style={{ fontSize:11, color:'var(--text-3)', background:'none', border:'none', cursor:'pointer', padding:'4px 0', fontFamily:'inherit' }}>
                  {expanded.value ? '▾ Hide breakdown' : '▸ Monthly breakdown'}
                </button>
                {expanded.value && (
                  <table style={{ width:'100%', borderCollapse:'collapse', fontSize:11, marginTop:6 }}>
                    <thead>
                      <tr style={{ background:'var(--bg-subtle)' }}>
                        {['Month','Net (PLN)','Gross (PLN)','Batches'].map(h => (
                          <th key={h} style={{ padding:'6px 8px', textAlign: h==='Batches'?'right':'left', color:'var(--text-3)', fontWeight:600, fontSize:10, letterSpacing:'0.05em', textTransform:'uppercase', borderBottom:'1px solid var(--border)' }}>{h}</th>
                        ))}
                      </tr>
                    </thead>
                    <tbody>
                      {[...shipVal].reverse().map((d,i) => (
                        <tr key={i} style={{ background: i%2===0 ? 'transparent' : 'var(--bg-subtle)' }}>
                          <td style={{ padding:'5px 8px', color:'var(--text-2)' }}>{fmtMonth(d.month)}</td>
                          <td style={{ padding:'5px 8px', fontWeight:600, color:'var(--badge-blue-text)', fontVariantNumeric:'tabular-nums' }}>{fmtPLN(d.net_pln)}</td>
                          <td style={{ padding:'5px 8px', color:'var(--text)', fontVariantNumeric:'tabular-nums' }}>{fmtPLN(d.gross_pln)}</td>
                          <td style={{ padding:'5px 8px', textAlign:'right', color:'var(--text-3)' }}>{d.batches}</td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                )}
              </div>
            </>
          )}
        </AnalyticsCard>
      </div>

      {/* Row 2: Inventory | wFirma Sync */}
      <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:16 }}>

        {/* Card 3 — Inventory / PZ Value */}
        <AnalyticsCard title="Inventory Value (PZ basis)" icon="⊞" badge="Local only">
          <div style={{ fontSize:11, color:'var(--text-3)', marginTop:-6 }}>Sum of all net values from processed batches (status: success/partial). Phase C will sync with wFirma warehouse documents.</div>
          <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:8 }}>
            <div style={{ background:'var(--bg-subtle)', borderRadius:8, padding:'12px 16px' }}>
              <div style={{ fontSize:10, color:'var(--text-3)', marginBottom:4 }}>Total PZ Value (netto)</div>
              <div style={{ fontSize:20, fontWeight:700, color:'var(--badge-green-text)', fontFamily:'"DM Serif Display",serif' }}>{fmtPLN(inv.total_net_pln)}</div>
            </div>
            <div style={{ background:'var(--bg-subtle)', borderRadius:8, padding:'12px 16px' }}>
              <div style={{ fontSize:10, color:'var(--text-3)', marginBottom:4 }}>Total PZ Value (brutto)</div>
              <div style={{ fontSize:20, fontWeight:700, color:'var(--text)', fontFamily:'"DM Serif Display",serif' }}>{fmtPLN(inv.total_gross_pln)}</div>
            </div>
          </div>
          <StatRow label="Processed batches" value={inv.batch_count || '0'} />
          {inv.last_batch && (
            <>
              <StatRow label="Last PZ document" value={inv.last_batch.doc_no || '—'} />
              <StatRow label="Last PZ date" value={inv.last_batch.date || '—'} muted />
              <StatRow label="Last batch netto" value={fmtPLN(inv.last_batch.net_pln)} muted />
            </>
          )}
          <div style={{ marginTop: 4, padding:'8px 12px', borderRadius:6, background:'var(--bg-subtle)', border:'1px dashed var(--border)', fontSize:11, color:'var(--text-3)' }}>
            ⚠ wFirma warehouse sync not enabled · Phase C pending endpoint verification
          </div>
        </AnalyticsCard>

        {/* Card 4 — wFirma Sync Status */}
        <AnalyticsCard title="wFirma Sync Status" icon="↗">
          {/* Progress bar */}
          <div>
            <div style={{ display:'flex', justifyContent:'space-between', marginBottom:5 }}>
              <span style={{ fontSize:11, color:'var(--text-2)' }}>Clipboard exports</span>
              <span style={{ fontSize:11, fontWeight:700, color: syncPct === 100 ? 'var(--badge-green-text)' : 'var(--text-2)' }}>{sync.exported || 0}/{sync.total_pz_batches || 0} ({syncPct}%)</span>
            </div>
            <div style={{ height:6, borderRadius:3, background:'var(--border)', overflow:'hidden' }}>
              <div style={{ height:'100%', borderRadius:3, background: syncPct===100 ? 'var(--badge-green-border)' : 'var(--accent)', width: `${Math.min(100, syncPct)}%`, transition:'width 0.4s ease' }} />
            </div>
          </div>

          <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:8 }}>
            <div style={{ background:'var(--bg-subtle)', borderRadius:8, padding:'10px 14px' }}>
              <div style={{ fontSize:10, color:'var(--text-3)', marginBottom:2 }}>Exported</div>
              <div style={{ fontSize:18, fontWeight:700, color:'var(--badge-green-text)', fontFamily:'"DM Serif Display",serif' }}>{sync.exported || 0}</div>
              <div style={{ fontSize:10, color:'var(--text-3)' }}>clipboard / json</div>
            </div>
            <div style={{ background:'var(--bg-subtle)', borderRadius:8, padding:'10px 14px' }}>
              <div style={{ fontSize:10, color:'var(--text-3)', marginBottom:2 }}>Pending</div>
              <div style={{ fontSize:18, fontWeight:700, color: (sync.pending||0) > 0 ? 'var(--badge-amber-text)' : 'var(--text-3)', fontFamily:'"DM Serif Display",serif' }}>{sync.pending || 0}</div>
              <div style={{ fontSize:10, color:'var(--text-3)' }}>not yet exported</div>
            </div>
          </div>

          {sync.last_exported_doc && (
            <StatRow label="Last exported" value={`${sync.last_exported_doc}  ${sync.last_exported_at ? '· ' + sync.last_exported_at.slice(0,10) : ''}`} />
          )}

          <StatRow label="Export mode" value="Phase 1 — Clipboard" muted />
          <StatRow label="API write (Phase 3)" value="Not enabled" muted />

          {/* Pending list */}
          {(sync.pending || 0) > 0 && sync.pending_list && sync.pending_list.length > 0 && (
            <div style={{ marginTop: 4 }}>
              <button onClick={() => toggle('syncGaps')} style={{ fontSize:11, color:'var(--badge-amber-text)', background:'none', border:'none', cursor:'pointer', padding:'4px 0', fontFamily:'inherit' }}>
                {expanded.syncGaps ? '▾ Hide gaps' : `▸ ${sync.pending} batch${sync.pending>1?'es':''} not exported`}
              </button>
              {expanded.syncGaps && (
                <div style={{ marginTop:6, display:'flex', flexDirection:'column', gap:4 }}>
                  {sync.pending_list.map((b,i) => (
                    <div key={i} style={{ display:'flex', justifyContent:'space-between', padding:'5px 10px', borderRadius:6, background:'var(--bg-subtle)', fontSize:11 }}>
                      <span style={{ color:'var(--text-2)', fontWeight:600 }}>{b.doc_no || b.batch_id}</span>
                      <span style={{ color:'var(--text-3)' }}>{b.awb || '—'}</span>
                    </div>
                  ))}
                </div>
              )}
            </div>
          )}
          {(sync.pending || 0) === 0 && (sync.total_pz_batches || 0) > 0 && (
            <div style={{ padding:'8px 12px', borderRadius:6, background:'var(--badge-green-bg)', border:'1px solid var(--badge-green-border)', fontSize:11, color:'var(--badge-green-text)', textAlign:'center' }}>
              ✓ All PZ batches exported to wFirma
            </div>
          )}
        </AnalyticsCard>
      </div>

      {/* Phase B/C placeholder */}
      <div style={{ marginTop:16, padding:'14px 20px', borderRadius:8, border:'1px dashed var(--border)', background:'var(--card)', display:'flex', alignItems:'center', gap:14 }}>
        <div style={{ fontSize:22, opacity:0.4 }}>⊟</div>
        <div>
          <div style={{ fontSize:12, fontWeight:700, color:'var(--text-2)', marginBottom:2 }}>Phase B — wFirma Read API</div>
          <div style={{ fontSize:11, color:'var(--text-3)' }}>Supplier outstanding · Customer outstanding · Courier cost charged · Requires wFirma API keys (accessKey + secretKey + appKey)</div>
        </div>
        <div style={{ marginLeft:'auto', fontSize:11, padding:'3px 10px', borderRadius:20, border:'1px solid var(--border)', color:'var(--text-3)', whiteSpace:'nowrap' }}>Pending keys</div>
      </div>

    </div>
  );
}

// ADMIN PAGE
// ══════════════════════════════════════════════════════════

function AdminPage({ user }) {
  const [health, setHealth] = React.useState(null);
  const [queueStats, setQueueStats] = React.useState(null);
  const [version, setVersion] = React.useState(null);
  const [healthFull, setHealthFull] = React.useState(null);
  const [healthFullLoading, setHealthFullLoading] = React.useState(false);
  const [healthExpanded, setHealthExpanded] = React.useState(false);
  const [storageHealth, setStorageHealth] = React.useState(null);
  const [storageHealthLoading, setStorageHealthLoading] = React.useState(false);
  const [storageExpanded, setStorageExpanded] = React.useState(false);

  const loadVersion = React.useCallback(() => {
    apiFetch('/api/v1/system/version').then(setVersion).catch(e => setVersion({ error: e.message }));
  }, []);
  const loadHealthFull = React.useCallback(async () => {
    setHealthFullLoading(true);
    try {
      const d = await apiFetch('/api/v1/debug/health-full');
      setHealthFull(d);
    } catch (e) { setHealthFull({ error: e.message }); }
    setHealthFullLoading(false);
  }, []);
  const loadStorageHealth = React.useCallback(async () => {
    setStorageHealthLoading(true);
    try {
      const d = await apiFetch('/api/v1/debug/storage/health');
      setStorageHealth(d);
    } catch (e) { setStorageHealth({ error: e.message }); }
    setStorageHealthLoading(false);
  }, []);

  React.useEffect(() => {
    apiFetch('/api/v1/health').then(setHealth).catch(() => {});
    apiFetch('/api/v1/admin/email-queue').then(d => {
      const emails = d.emails || [];
      setQueueStats({
        total: emails.length,
        pending: emails.filter(e => e.status === 'pending').length,
        sent: emails.filter(e => e.status === 'sent').length,
      });
    }).catch(() => {});
    loadVersion();
    loadHealthFull();
    loadStorageHealth();
  }, []);

  const isAdmin = user && user.role === 'admin';

  const cardStyle = {
    background: 'var(--card)', border: '1px solid var(--border)', borderRadius: 10,
    padding: '20px 24px', boxShadow: '0 1px 3px var(--shadow)',
  };
  const linkCardStyle = {
    ...cardStyle, cursor: 'pointer', transition: 'all .15s', textDecoration: 'none', display: 'block',
  };

  // System Diagnostics — small helpers
  const _diagPill = (kind, label) => {
    const map = {
      ok:   { bg: 'var(--badge-green-bg)',   text: 'var(--badge-green-text)',   border: 'var(--badge-green-border)' },
      warn: { bg: 'var(--badge-amber-bg)',   text: 'var(--badge-amber-text)',   border: 'var(--badge-amber-border)' },
      err:  { bg: 'var(--badge-red-bg)',     text: 'var(--badge-red-text)',     border: 'var(--badge-red-border)' },
      info: { bg: 'var(--badge-blue-bg)',    text: 'var(--badge-blue-text)',    border: 'var(--badge-blue-border)' },
    };
    const c = map[kind] || map.info;
    return <span style={{ display: 'inline-block', padding: '2px 8px', borderRadius: 4, fontSize: 10, fontWeight: 700, background: c.bg, color: c.text, border: `1px solid ${c.border}`, whiteSpace: 'nowrap' }}>{label}</span>;
  };

  // health-full returns { "1_fastapi_running": { ok: true, ... }, ... }
  const healthChecks = healthFull && !healthFull.error
    ? Object.entries(healthFull).filter(([k]) => /^\d+_/.test(k)).map(([k, v]) => ({ key: k, ...(v || {}) }))
    : [];
  const healthPass = healthChecks.filter(c => c.ok === true).length;
  const healthWarn = healthChecks.filter(c => c.ok === false && (c.severity === 'warn' || /warn/i.test(c.message || ''))).length;
  const healthFail = healthChecks.filter(c => c.ok === false && c.severity !== 'warn' && !/warn/i.test(c.message || '')).length;
  const healthOverall = healthChecks.length === 0 ? 'info' : (healthFail > 0 ? 'err' : healthWarn > 0 ? 'warn' : 'ok');

  return (
    <div style={{ flex: 1, overflowY: 'auto', padding: '0 32px 32px' }}>
      {/* ── System Diagnostics ──────────────────────────────────────── */}
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(280px, 1fr))', gap: 16, marginBottom: 24 }}>

        {/* Version card */}
        <div style={cardStyle}>
          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 10 }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
              <div style={{ width: 32, height: 32, borderRadius: 8, background: 'var(--bg-2)', border: '1px solid var(--border)', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 14 }}>⚙</div>
              <div style={{ fontSize: 13, fontWeight: 700, color: 'var(--text)' }}>Version</div>
            </div>
            <Btn small variant="ghost" onClick={loadVersion} title="Refresh">↺</Btn>
          </div>
          {!version && <div style={{ fontSize: 11, color: 'var(--text-3)' }}>Loading…</div>}
          {version && version.error && <div style={{ fontSize: 11, color: 'var(--badge-red-text)' }}>Error: {version.error}</div>}
          {version && !version.error && (
            <div style={{ fontSize: 11, color: 'var(--text-2)', lineHeight: 1.6 }}>
              <div><span style={{ color: 'var(--text-3)' }}>Commit:</span> <b style={{ fontFamily: 'ui-monospace,monospace', color: 'var(--text)' }}>{version.commit || '—'}</b></div>
              <div><span style={{ color: 'var(--text-3)' }}>Deployed:</span> <b style={{ color: 'var(--text)' }}>{version.deployed_at || version.display || '—'}</b></div>

            <div>
              <div style={{ fontSize: 14, fontWeight: 700, color: 'var(--text)' }}>System Health</div>
              <div style={{ fontSize: 11, color: 'var(--text-3)' }}>API and engine status</div>

    </div>
  );

function ActionsV2Panel({ batchId }) {
  const [data,  setData]  = React.useState(null);
  const [err,   setErr]   = React.useState(null);
  const [busy,  setBusy]  = React.useState({});

  const reload = React.useCallback(async () => {
    try {
      const res = await fetch(`/dashboard/batches/${encodeURIComponent(batchId)}/actions`, { credentials: 'include' });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const j = await res.json();
      setData(j); setErr(null);
    } catch (e) { setErr(e.message); }
  }, [batchId]);

  React.useEffect(() => { reload(); }, [reload]);

  const handleClick = async (action) => {
    if (action.requires_confirmation) {
      if (!window.confirm(`Confirm action: ${action.label}\n\n${action.reason || ''}\n\n${action.method} ${action.endpoint}`)) return;
    }
    setBusy(p => ({ ...p, [action.id]: true }));
    try {
      // GET-method actions navigate to the endpoint (download/preview)
      if (action.method === 'GET' && action.endpoint && !action.endpoint.startsWith('/dashboard/batches/')) {
        window.open(action.endpoint, '_blank', 'noopener');
      } else {
        // POST/DELETE/PUT: send action.body (registry-owned payload).
        // Falls back to {} when the action declares no body. Never relies on
        // backend defaults — every body field is explicit at the registry layer.
        const hasBody = action.method !== 'GET';
        const res = await fetch(action.endpoint, {
          method: action.method, credentials: 'include',
          headers: hasBody ? { 'Content-Type': 'application/json' } : {},
          body:   hasBody ? JSON.stringify(action.body || {}) : undefined,
        });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const ct = res.headers.get('content-type') || '';
        if (ct.includes('json')) await res.json();
      }
      await reload();
    } catch (e) {
      window.alert(`Action failed: ${action.label}\n${e.message}`);
    } finally {
      setBusy(p => ({ ...p, [action.id]: false }));
    }
  };

  if (err) return (
    <div style={{ background: 'var(--badge-red-bg)', color: 'var(--badge-red-text)', border: '1px solid var(--badge-red-border)', borderRadius: 10, padding: 14, fontSize: 12 }}>
      Actions V2 failed to load: {err}
    </div>
  );
  if (!data) return (
    <div style={{ padding: 14, fontSize: 12, color: 'var(--text-3)' }}>Loading actions…</div>
  );

  const ns = data.normalized_state || {};
  const broken = data.broken_routes || [];

  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
      <div style={{ background: 'var(--accent-subtle)', border: '1px solid var(--accent-border)', borderRadius: 10, padding: '12px 16px', display: 'flex', alignItems: 'center', gap: 12, flexWrap: 'wrap' }}>
        <span style={{ fontSize: 11, fontWeight: 700, color: 'var(--accent)', letterSpacing: '0.06em', textTransform: 'uppercase' }}>Actions V2 (registry)</span>
        <span style={{ fontSize: 11, color: 'var(--text-2)' }}>
          pz_generated={String(ns.pz_generated)} · wfirma_ready={String(ns.wfirma_ready)} · agency_path={String(ns.clearance_path === 'external_agency_clearance')}
        </span>
        <span style={{ fontSize: 11, color: broken.length ? 'var(--badge-red-text)' : 'var(--badge-green-text)', marginLeft: 'auto' }}>
          {broken.length ? `⚠ ${broken.length} broken endpoint(s)` : '✓ all endpoints validated'}
        </span>
      </div>

      {ACTIONS_V2_SECTION_ORDER.map(sec => (
        <ActionsV2Section
          key={sec.key}
          sectionKey={sec.key}
          label={sec.label}
          icon={sec.icon}
          actions={(data.sections || {})[sec.key] || []}
          onActionClick={handleClick}
        />
      ))}

      {broken.length > 0 && (
        <details style={{ background: 'var(--badge-red-bg)', color: 'var(--badge-red-text)', border: '1px solid var(--badge-red-border)', borderRadius: 10, padding: '10px 14px' }}>
          <summary style={{ cursor: 'pointer', fontSize: 12, fontWeight: 600 }}>{broken.length} broken endpoint(s) — click to expand</summary>
          <ul style={{ marginTop: 8, fontSize: 11, fontFamily: 'monospace', listStyle: 'none', padding: 0 }}>
            {broken.map((b, i) => (
              <li key={i} style={{ padding: '4px 0' }}>{b.action_id}: {b.method} {b.endpoint} — {b.reason}</li>
            ))}
          </ul>
        </details>
      )}
    </div>
  );
}

function EmailEvidenceTimeline({ batchId }) {
  const [data, setData] = React.useState(null);
  const [err,  setErr]  = React.useState(null);
  const [busy, setBusy] = React.useState(null);

  const reload = React.useCallback(async () => {
    try {
      const res = await fetch(`/dashboard/batches/${encodeURIComponent(batchId)}/email-evidence`, { credentials: 'include' });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      setData(await res.json()); setErr(null);
    } catch (e) { setErr(e.message); }
  }, [batchId]);

  React.useEffect(() => { reload(); }, [reload]);

  const doRescan = async () => {
    setBusy('rescan');
    try {
      const res = await fetch(`/dashboard/batches/${encodeURIComponent(batchId)}/email-evidence/rescan`, { method: 'POST', credentials: 'include' });
      const j = await res.json();
      const scanned  = j.total_scanned ?? j.scanned ?? 0;
      const ingested = j.ingested ?? 0;
      const query    = j.query_used ? ` (${j.query_used})` : '';
      window.alert(`Rescan ${j.ok ? 'OK' : 'FAILED'}: scanned=${scanned}, ingested=${ingested}${query}${j.error ? ', err=' + j.error : ''}`);
      await reload();
    } finally { setBusy(null); }
  };

  const doProcess = async () => {
    setBusy('process');
    try {
      const res = await fetch(`/dashboard/batches/${encodeURIComponent(batchId)}/email-evidence/process`, { method: 'POST', credentials: 'include' });
      const j = await res.json();
      const acted = (j.result?.actions || []).length;
      window.alert(`Process ${j.ok ? 'OK' : 'FAILED'}: actions=${acted}, skipped=${j.result?.skipped ?? 0}`);
      await reload();
    } finally { setBusy(null); }
  };

  if (err) return (
    <div style={{ background: 'var(--badge-red-bg)', color: 'var(--badge-red-text)', border: '1px solid var(--badge-red-border)', borderRadius: 10, padding: 14, fontSize: 12 }}>
      Email evidence load failed: {err}
    </div>
  );
  if (!data) return null;
  if (!data.awb) return (
    <div style={{ padding: 12, fontSize: 12, color: 'var(--text-3)', fontStyle: 'italic' }}>
      Email evidence not available — batch has no AWB.
    </div>
  );

  const stages = data.stages || [];
  const messages = data.messages || [];

  return (
    <div style={{ background: 'var(--card)', border: '1px solid var(--border)', borderRadius: 10, padding: '14px 18px' }}>
      <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 12 }}>
        <span style={{ fontSize: 14 }}>📧</span>
        <span style={{ fontSize: 12, fontWeight: 700, color: 'var(--text)', letterSpacing: '0.04em', textTransform: 'uppercase' }}>Email Evidence Timeline</span>
        <span style={{ fontSize: 10, color: 'var(--text-3)', marginLeft: 4 }}>AWB {data.awb}</span>
        <span style={{ fontSize: 10, color: 'var(--text-3)' }}>· {messages.length} messages stored</span>
        {data.last_scan_at && <span style={{ fontSize: 10, color: 'var(--text-3)' }}>· last scan {data.last_scan_at}</span>}
        <div style={{ marginLeft: 'auto', display: 'flex', gap: 6 }}>
          <button onClick={doRescan} disabled={busy === 'rescan'} style={{ padding: '5px 12px', fontSize: 11, fontWeight: 600, fontFamily: 'inherit', borderRadius: 5, border: '1px solid var(--border)', background: 'transparent', color: 'var(--text-2)', cursor: 'pointer' }}>
            {busy === 'rescan' ? '⟳…' : '↻ Rescan'}
          </button>
          <button onClick={doProcess} disabled={busy === 'process'} style={{ padding: '5px 12px', fontSize: 11, fontWeight: 600, fontFamily: 'inherit', borderRadius: 5, border: '1px solid var(--accent-border)', background: 'var(--accent-subtle)', color: 'var(--accent)', cursor: 'pointer' }}>
            {busy === 'process' ? '⟳…' : '▶ Process'}
          </button>
        </div>
      </div>

      {/* 9-stage fixed sequence */}
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(140px, 1fr))', gap: 6, marginBottom: 14 }}>
        {stages.map((st, i) => {
          const sty = EE_STATUS_STYLE[st.status] || EE_STATUS_STYLE.missing;
          return (
            <div key={st.key} style={{ padding: '8px 10px', borderRadius: 6, border: '1px solid var(--border)', background: sty.bg }}>
              <div style={{ display: 'flex', alignItems: 'center', gap: 6, marginBottom: 4 }}>
                <span style={{ fontSize: 12, color: 'var(--text-3)' }}>{i+1}</span>
                <span style={{ fontSize: 13 }}>{EE_STAGE_ICON[st.key] || '·'}</span>
                <span style={{ fontSize: 11, fontWeight: 600, color: 'var(--text)', flex: 1 }}>{st.label}</span>
              </div>
              <div style={{ fontSize: 10, fontWeight: 700, color: sty.color, textTransform: 'uppercase', letterSpacing: '0.04em' }}>{sty.label}</div>
              {st.timestamp && <div style={{ fontSize: 9, color: 'var(--text-3)', marginTop: 2 }}>{st.timestamp}</div>}
              {st.attachment_count > 0 && <div style={{ fontSize: 9, color: 'var(--text-3)', marginTop: 1 }}>📎 {st.attachment_count}</div>}
            </div>
          );
        })}
      </div>

      {/* Messages list */}
      {messages.length > 0 && (
        <details style={{ borderTop: '1px solid var(--border)', paddingTop: 10 }}>
          <summary style={{ cursor: 'pointer', fontSize: 11, fontWeight: 600, color: 'var(--text-2)' }}>
            {messages.length} message(s) — click to expand
          </summary>
          <div style={{ marginTop: 8, fontSize: 11, fontFamily: 'monospace', maxHeight: 240, overflowY: 'auto' }}>
            {messages.sort((a,b) => (b.timestamp || '').localeCompare(a.timestamp || '')).map((m, i) => (
              <div key={i} style={{ padding: '4px 6px', borderBottom: '1px solid var(--border-subtle)', display: 'grid', gridTemplateColumns: '110px 90px 70px 1fr 50px', gap: 8, alignItems: 'center' }}>
                <span style={{ color: 'var(--text-3)', fontSize: 10 }}>{m.timestamp || '—'}</span>
                <span style={{ color: 'var(--text-2)', fontSize: 10 }}>{m.event_type || 'other'}</span>
                <span style={{ color: m.direction === 'outgoing' ? 'var(--badge-green-text)' : 'var(--badge-blue-text)', fontSize: 10, fontWeight: 600 }}>{m.direction || ''}</span>
                <span style={{ color: 'var(--text)', fontSize: 11, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }} title={m.subject}>{m.subject || ''}</span>
                <span style={{ color: 'var(--text-3)', fontSize: 10, textAlign: 'right' }}>{m.attachment_count > 0 ? `📎${m.attachment_count}` : ''}</span>
              </div>
            ))}
          </div>
        </details>
      )}
    </div>
  );
}

const CONF_META = {
  unconfirmed: { label: 'Unconfirmed', color: 'var(--badge-neutral-text)',  bg: 'var(--badge-neutral-bg)',  border: 'var(--badge-neutral-border)',  bar: '#9AABB8', tip: '0–2 parses — stored but not applied as hints yet' },
  emerging:    { label: 'Emerging',    color: 'var(--badge-amber-text)',    bg: 'var(--badge-amber-bg)',    border: 'var(--badge-amber-border)',    bar: '#E8C040', tip: '3–9 confirmed — used as secondary fallback' },
  stable:      { label: 'Stable',      color: 'var(--badge-blue-text)',     bg: 'var(--badge-blue-bg)',     border: 'var(--badge-blue-border)',     bar: '#4A90D9', tip: '10–24 confirmed — primary extraction hint' },
  trusted:     { label: 'Trusted',     color: 'var(--badge-green-text)',    bg: 'var(--badge-green-bg)',    border: 'var(--badge-green-border)',    bar: '#48C878', tip: '25+ confirmed — fully reliable, used without fallback' },
};
const CONF_THRESHOLDS = [{ n: 25, k: 'trusted' }, { n: 10, k: 'stable' }, { n: 3, k: 'emerging' }, { n: 0, k: 'unconfirmed' }];
function nextThreshold(count) {
  for (const { n, k } of CONF_THRESHOLDS) { if (count >= n) { const next = CONF_THRESHOLDS[CONF_THRESHOLDS.findIndex(t => t.k === k) - 1]; return next ? next.n : null; } }
  return 3;
}

function ConfBadge({ level }) {
  const m = CONF_META[level] || CONF_META.unconfirmed;
  return <span title={m.tip} style={{ display:'inline-flex', alignItems:'center', padding:'2px 8px', borderRadius:4, fontSize:11, fontWeight:700, background:m.bg, color:m.color, border:`1px solid ${m.border}`, letterSpacing:'0.03em', cursor:'default' }}>{m.label}</span>;
}

function ConfBar({ count, level }) {
  const m = CONF_META[level] || CONF_META.unconfirmed;
  const next = nextThreshold(count);
  const pct = next ? Math.min(100, Math.round((count / next) * 100)) : 100;
  return (
    <div title={next ? `${count} / ${next} confirmations to next level` : 'Maximum confidence reached'} style={{ display:'flex', alignItems:'center', gap:8 }}>
      <div style={{ flex:1, height:5, background:'var(--border)', borderRadius:3, overflow:'hidden' }}>
        <div style={{ height:'100%', width:`${pct}%`, background:m.bar, borderRadius:3, transition:'width 0.4s' }} />
      </div>
      <span style={{ fontSize:10, color:'var(--text-3)', whiteSpace:'nowrap', minWidth:48 }}>
        {next ? `${count} / ${next}` : `${count} ✓`}
      </span>
    </div>
  );
}

function SeverityBadge({ severity }) {
  const cfg = {
    HIGH:   { bg: 'var(--badge-red-bg)',    text: 'var(--badge-red-text)',    border: 'var(--badge-red-border)' },
    MEDIUM: { bg: 'var(--badge-amber-bg)',  text: 'var(--badge-amber-text)',  border: 'var(--badge-amber-border)' },
    LOW:    { bg: 'var(--badge-neutral-bg)',text: 'var(--badge-neutral-text)',border: 'var(--badge-neutral-border)' },
  }[severity] || { bg: 'var(--badge-neutral-bg)', text: 'var(--badge-neutral-text)', border: 'var(--badge-neutral-border)' };
  return (
    <span style={{ fontSize: 10, fontWeight: 700, padding: '1px 7px', borderRadius: 10, background: cfg.bg, color: cfg.text, border: `1px solid ${cfg.border}`, letterSpacing: '0.04em' }}>
      {severity}
    </span>
  );
}

function IntelligencePage({ onToast }) {
  const [suggestions, setSuggestions] = React.useState(null);
  const [status,      setStatus]      = React.useState(null);
  const [insights,    setInsights]    = React.useState(null);
  const [insightsLoading, setInsightsLoading] = React.useState(false);
  const [building,    setBuilding]    = React.useState(false);
  const [loading,     setLoading]     = React.useState(true);
  const [refreshing,  setRefreshing]  = React.useState(false);
  const [error,       setError]       = React.useState(null);
  const [includeLow,  setIncludeLow]  = React.useState(false);
  const [activeTab,   setActiveTab]   = React.useState('warnings');

  const loadAll = React.useCallback(async (low = includeLow) => {
    setLoading(true);
    setError(null);
    try {
      const [sug, st] = await Promise.all([
        apiFetch(`/api/v1/intelligence/suggestions?include_low=${low}`),
        apiFetch('/api/v1/intelligence/status'),
      ]);
      setSuggestions(sug);
      setStatus(st);
    } catch (e) {
      setError(e.message);
    } finally {
      setLoading(false);
    }
  }, [includeLow]);

  const loadInsights = React.useCallback(async () => {
    setInsightsLoading(true);
    try {
      const d = await apiFetch('/api/v1/intelligence/insights');
      setInsights(d);
    } catch (e) {
      // insights may return 404 if master not built yet — not an error
      setInsights({ status: 'not_built', message: e.message });
    } finally {
      setInsightsLoading(false);
    }
  }, []);

  React.useEffect(() => { loadAll(); }, []);
  React.useEffect(() => { if (activeTab === 'insights') loadInsights(); }, [activeTab]);

  const handleRefreshConfig = async () => {
    setRefreshing(true);
    try {
      await apiFetch('/api/v1/intelligence/refresh', { method: 'POST' });
      onToast && onToast('Intelligence config refreshed', 'success');
      loadAll();
    } catch (e) {
      onToast && onToast(`Refresh failed: ${e.message}`, 'error');
    } finally {
      setRefreshing(false);
    }
  };

  const handleBuildMaster = async () => {
    setBuilding(true);
    try {
      const res = await apiFetch('/api/v1/intelligence/build', { method: 'POST' });
      onToast && onToast(
        `Knowledge base built: ${res.summary?.automation_opportunities || 0} opps, ${res.summary?.system_gaps || 0} gaps`,
        'success',
      );
      loadInsights();
    } catch (e) {
      onToast && onToast(`Build failed: ${e.message}`, 'error');
    } finally {
      setBuilding(false);
    }
  };

  const handleToggleLow = () => {
    const next = !includeLow;
    setIncludeLow(next);
    loadAll(next);
  };

  if (loading) return (
    <div style={{ flex:1, display:'flex', alignItems:'center', justifyContent:'center', flexDirection:'column', gap:12, color:'var(--text-3)' }}>
      <div style={{ fontSize: 28, animation:'spin 1.2s linear infinite' }}>⟳</div>
      <div style={{ fontSize: 13 }}>Loading intelligence…</div>
    </div>
  );

  if (error) return (
    <div style={{ flex:1, display:'flex', alignItems:'center', justifyContent:'center', flexDirection:'column', gap:12, color:'var(--badge-red-text)' }}>
      <div style={{ fontSize: 28 }}>⚠</div>
      <div style={{ fontSize: 13, fontWeight: 600 }}>Intelligence load failed</div>
      <div style={{ fontSize: 12, color:'var(--text-3)', maxWidth: 400, textAlign:'center' }}>{error}</div>
      <button onClick={() => loadAll()} style={{ marginTop:8, padding:'6px 18px', borderRadius:6, border:'1px solid var(--border)', background:'var(--card)', color:'var(--text)', cursor:'pointer', fontSize:12 }}>↻ Retry</button>
    </div>
  );

  const sug  = suggestions || {};
  const warn = sug.warnings || {};
  const trig = sug.suggestions || {};
  const batches = sug.batch_summary || [];

  const warnItems = warn.items || [];
  const trigItems = trig.items || [];

  const highCount   = warnItems.filter(w => w.severity === 'HIGH').length;
  const medCount    = warnItems.filter(w => w.severity === 'MEDIUM').length;

  // Engine status
  const docs = (status && status.research_docs) || {};
  const cfg  = (status && status.config) || {};

  return (
    <div style={{ flex:1, overflowY:'auto', padding:'0 32px 40px' }}>

      {/* ── Status bar ── */}
      <div style={{ display:'flex', gap:10, flexWrap:'wrap', marginBottom:20, marginTop:4 }}>
        {/* Engine status */}
        <div style={{ display:'flex', alignItems:'center', gap:6, padding:'6px 14px', borderRadius:8, background:'var(--card)', border:'1px solid var(--border)', fontSize:12 }}>
          <span style={{ width:8, height:8, borderRadius:'50%', background: status ? 'var(--badge-green-text)' : 'var(--text-3)', display:'inline-block' }} />
          <span style={{ fontWeight:600 }}>Engine</span>
          <span style={{ color:'var(--text-3)' }}>{status ? status.status : '—'}</span>
        </div>
        {/* Docs */}
        <div style={{ display:'flex', alignItems:'center', gap:6, padding:'6px 14px', borderRadius:8, background:'var(--card)', border:'1px solid var(--border)', fontSize:12 }}>
          <span>📄</span>
          <span style={{ fontWeight:600 }}>Research docs</span>
          <span style={{ color: docs.missing > 0 ? 'var(--badge-amber-text)' : 'var(--badge-green-text)' }}>
            {docs.found || 0} / {docs.total || 0}
          </span>
          {docs.missing > 0 && <span style={{ color:'var(--badge-amber-text)', fontSize:10 }}>{docs.missing} missing</span>}
        </div>
        {/* Config age */}
        <div style={{ display:'flex', alignItems:'center', gap:6, padding:'6px 14px', borderRadius:8, background:'var(--card)', border:'1px solid var(--border)', fontSize:12 }}>
          <span>⚙</span>
          <span style={{ fontWeight:600 }}>Config</span>
          <span style={{ color: cfg.exists ? (cfg.age_hours > 24 ? 'var(--badge-amber-text)' : 'var(--badge-green-text)') : 'var(--badge-red-text)' }}>
            {cfg.exists ? `${cfg.age_hours}h old` : 'not generated'}
          </span>
        </div>
        {/* Batches checked */}
        <div style={{ display:'flex', alignItems:'center', gap:6, padding:'6px 14px', borderRadius:8, background:'var(--card)', border:'1px solid var(--border)', fontSize:12 }}>
          <span>⬡</span>
          <span style={{ fontWeight:600 }}>Batches checked</span>
          <span style={{ color:'var(--text)' }}>{sug.batches_checked || 0}</span>
        </div>
        {/* Spacer + actions */}
        <div style={{ flex:1 }} />
        <div style={{ display:'flex', gap:8, alignItems:'center' }}>
          <label style={{ display:'flex', alignItems:'center', gap:5, fontSize:12, color:'var(--text-2)', cursor:'pointer' }}>
            <input type="checkbox" checked={includeLow} onChange={handleToggleLow} style={{ cursor:'pointer' }} />
            Show LOW severity
          </label>
          <button onClick={() => loadAll()} style={{ padding:'5px 14px', borderRadius:6, border:'1px solid var(--border)', background:'var(--card)', color:'var(--text)', cursor:'pointer', fontSize:12 }}>
            ↻ Refresh
          </button>
          <button onClick={handleRefreshConfig} disabled={refreshing} style={{ padding:'5px 14px', borderRadius:6, border:'1px solid var(--border)', background: refreshing ? 'var(--card)' : 'var(--text)', color: refreshing ? 'var(--text-3)' : '#fff', cursor: refreshing ? 'default' : 'pointer', fontSize:12, fontWeight:600 }}>
            {refreshing ? '⟳ Rebuilding…' : '⚙ Rebuild Config'}
          </button>
          <button onClick={handleBuildMaster} disabled={building} style={{ padding:'5px 14px', borderRadius:6, border:'1px solid var(--border)', background: building ? 'var(--card)' : 'var(--badge-blue-bg)', color: building ? 'var(--text-3)' : 'var(--badge-blue-text)', borderColor:'var(--badge-blue-border)', cursor: building ? 'default' : 'pointer', fontSize:12, fontWeight:600 }}>
            {building ? '⟳ Building…' : '◈ Build Knowledge Base'}
          </button>
        </div>
      </div>

      {/* ── Risk summary cards ── */}
      <div style={{ display:'grid', gridTemplateColumns:'repeat(auto-fill,minmax(180px,1fr))', gap:12, marginBottom:24 }}>
        <div style={{ padding:'14px 18px', borderRadius:10, background: highCount > 0 ? 'var(--badge-red-bg)' : 'var(--card)', border:`1px solid ${highCount > 0 ? 'var(--badge-red-border)' : 'var(--border)'}` }}>
          <div style={{ fontSize:22, fontWeight:700, color: highCount > 0 ? 'var(--badge-red-text)' : 'var(--text)' }}>{highCount}</div>
          <div style={{ fontSize:12, color:'var(--text-2)', marginTop:2 }}>HIGH severity risks</div>
        </div>
        <div style={{ padding:'14px 18px', borderRadius:10, background: medCount > 0 ? 'var(--badge-amber-bg)' : 'var(--card)', border:`1px solid ${medCount > 0 ? 'var(--badge-amber-border)' : 'var(--border)'}` }}>
          <div style={{ fontSize:22, fontWeight:700, color: medCount > 0 ? 'var(--badge-amber-text)' : 'var(--text)' }}>{medCount}</div>
          <div style={{ fontSize:12, color:'var(--text-2)', marginTop:2 }}>MEDIUM severity risks</div>
        </div>
        <div style={{ padding:'14px 18px', borderRadius:10, background:'var(--card)', border:'1px solid var(--border)' }}>
          <div style={{ fontSize:22, fontWeight:700 }}>{trigItems.length}</div>
          <div style={{ fontSize:12, color:'var(--text-2)', marginTop:2 }}>Trigger suggestions</div>
        </div>
        <div style={{ padding:'14px 18px', borderRadius:10, background:'var(--badge-neutral-bg)', border:'1px solid var(--badge-neutral-border)' }}>
          <div style={{ fontSize:11, fontWeight:700, color:'var(--badge-neutral-text)', textTransform:'uppercase', letterSpacing:'0.05em', marginBottom:4 }}>Mode</div>
          <div style={{ fontSize:12, color:'var(--text-2)' }}>Suggest-only — read-only</div>
          <div style={{ fontSize:10, color:'var(--text-3)', marginTop:2 }}>No writes. No emails sent.</div>
        </div>
      </div>

      {/* ── Tabs ── */}
      <div style={{ display:'flex', gap:4, marginBottom:16 }}>
        {[
          { key:'warnings',    label:`Risks (${warnItems.length})` },
          { key:'triggers',    label:`Triggers (${trigItems.length})` },
          { key:'batches',     label:`Batch Summary (${batches.length})` },
          { key:'insights',    label:'Knowledge Base' },
          { key:'config',      label:'Engine Status' },
        ].map(({ key, label }) => (
          <button key={key} onClick={() => setActiveTab(key)}

        <div>

            <div style={{ padding:'32px', textAlign:'center', color:'var(--text-3)', fontSize:13, background:'var(--card)', borderRadius:10, border:'1px solid var(--border)' }}>

          ) : (
            <div style={{ display:'flex', flexDirection:'column', gap:8 }}>
              {warnItems.map((w, i) => (
                <div key={i} style={{ padding:'12px 16px', borderRadius:8, background:'var(--card)', border:'1px solid var(--border)', display:'grid', gridTemplateColumns:'auto 1fr auto', gap:12, alignItems:'start' }}>
                  <div style={{ paddingTop:1 }}><SeverityBadge severity={w.severity} /></div>
                  <div>
                    <div style={{ fontSize:12, fontWeight:700, fontFamily:'monospace', color:'var(--text)', marginBottom:3 }}>{w.code}</div>
                    <div style={{ fontSize:12, color:'var(--text-2)', lineHeight:1.5 }}>{w.message}</div>
                    {w.detail && Object.keys(w.detail).length > 0 && (
                      <div style={{ marginTop:6, display:'flex', flexWrap:'wrap', gap:6 }}>
                        {Object.entries(w.detail).map(([k,v]) => v && (
                          <span key={k} style={{ fontSize:10, padding:'1px 7px', borderRadius:10, background:'var(--badge-neutral-bg)', color:'var(--badge-neutral-text)', border:'1px solid var(--badge-neutral-border)' }}>
                            {k}: {String(v).length > 40 ? String(v).slice(0,40)+'…' : String(v)}

        <div>

            <div>

                <div style={{ display:'flex', gap:6, flexWrap:'wrap', marginBottom:14 }}>

                    <span key={t} style={{ fontSize:11, padding:'2px 10px', borderRadius:10, background:'var(--badge-blue-bg)', color:'var(--badge-blue-text)', border:'1px solid var(--badge-blue-border)', fontWeight:600 }}>
                      {t} × {n}
                    </span>
                  ))}
                </div>
              )}
              <div style={{ display:'flex', flexDirection:'column', gap:8 }}>
                {trigItems.map((s, i) => (
                  <div key={i} style={{ padding:'12px 16px', borderRadius:8, background:'var(--card)', border:'1px solid var(--border)' }}>
