<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Estrella PZ Customs Control</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous" />
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body, #root { height: 100%; }
  body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); }
  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

  :root {
    --bg: #F5F2EE; --bg-subtle: #FAF8F4; --card: #FFFFFF;
    --row-hover: #F8F5F0; --border: #E4DDD0; --border-subtle: #EEE8DE;
    --text: #1E2D4A; --text-2: #4A5A70; --text-3: #8A9AB0;
    --shadow: rgba(30,45,74,0.06); --shadow-heavy: rgba(30,45,74,0.16);
    --overlay: rgba(20,30,55,0.6);
    --accent: #C9A456; --accent-light: #E0BC74; --accent-text: #1E2D4A;
    --accent-subtle: #FBF5E4; --accent-border: #DCBE7A;
    --sidebar-bg: #1E2D4A; --sidebar-border: #28395E;
    --sidebar-active: #2A3D5E; --sidebar-hover: #253558;
    --sidebar-text: #F0EAE0; --sidebar-text-muted: #6A7A96; --sidebar-icon: #8A9AB6;
    --badge-neutral-bg: #EEF0F4; --badge-neutral-text: #4A5A70; --badge-neutral-border: #CED4E0;
    --badge-blue-bg: #E8EFF8; --badge-blue-text: #1A4A90; --badge-blue-border: #AABEE0;
    --badge-amber-bg: #FBF5E0; --badge-amber-text: #805A00; --badge-amber-border: #DEC870;
    --badge-orange-bg: #FBF0E4; --badge-orange-text: #804000; --badge-orange-border: #DEB870;
    --badge-green-bg: #E8F5EE; --badge-green-text: #186838; --badge-green-border: #96CCA8;
    --badge-red-bg: #FBE8E6; --badge-red-text: #902018; --badge-red-border: #E0A8A0;
    --badge-purple-bg: #EEE8F8; --badge-purple-text: #481898; --badge-purple-border: #BEA4E8;
    --badge-accent-bg: #1E2D4A; --badge-accent-text: #C9A456; --badge-accent-border: #C9A456;
  }
  [data-theme="dark"] {
    --bg: #111928; --bg-subtle: #172030; --card: #1C2638;
    --row-hover: #223040; --border: #2C3C54; --border-subtle: #243050;
    --text: #EEE8DC; --text-2: #8A9AB6; --text-3: #566478;
    --shadow: rgba(0,0,0,0.3); --shadow-heavy: rgba(0,0,0,0.5);
    --overlay: rgba(0,0,0,0.72);
    --accent: #D4AA5C; --accent-light: #ECC870; --accent-text: #111928;
    --accent-subtle: #1E2808; --accent-border: #5A4A18;
    --sidebar-bg: #0E1828; --sidebar-border: #1A2840;
    --sidebar-active: #1A2E48; --sidebar-hover: #162438;
    --sidebar-text: #EEE8DC; --sidebar-text-muted: #566478; --sidebar-icon: #6A7A96;
    --badge-neutral-bg: #1C2838; --badge-neutral-text: #8A9AB6; --badge-neutral-border: #2C3C54;
    --badge-blue-bg: #0E1E38; --badge-blue-text: #80AAEE; --badge-blue-border: #1E3A64;
    --badge-amber-bg: #20180A; --badge-amber-text: #E8C040; --badge-amber-border: #584010;
    --badge-orange-bg: #201008; --badge-orange-text: #E89860; --badge-orange-border: #582010;
    --badge-green-bg: #0E2018; --badge-green-text: #68CC88; --badge-green-border: #1A4830;
    --badge-red-bg: #200E10; --badge-red-text: #EE8880; --badge-red-border: #581018;
    --badge-purple-bg: #160E28; --badge-purple-text: #AA88EE; --badge-purple-border: #341860;
    --badge-accent-bg: #1E2808; --badge-accent-text: #D4AA5C; --badge-accent-border: #5A4A18;
  }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

// ══════════════════════════════════════════════════════════
// CONSTANTS
// ══════════════════════════════════════════════════════════

const GOLD = 'var(--accent)';
const SIDEBAR_W = 220;

const NAV_ITEMS = [
  { id: 'dashboard',  label: 'Dashboard',         icon: '▦' },
  { id: 'shipments',  label: 'Shipments',          icon: '⬡' },
  { id: 'dhl',        label: 'DHL Clearance',      icon: '✈' },
  { id: 'customs',    label: 'Customs Documents',  icon: '⊟' },
  { id: 'pz',         label: 'PZ / Accounting',    icon: '⊞' },
  { id: 'wfirma',     label: 'wFirma Export',      icon: '↗' },
  { id: 'reports',       label: 'Analytics',          icon: '≡' },
  { id: 'intelligence',  label: 'Intelligence',       icon: '◈' },
  { id: 'ai_bridge',    label: 'AI Bridge',          icon: '⇌' },
  { id: 'learning',      label: 'Learning / Parser',  icon: '◎' },
  { id: 'admin',         label: 'Admin / Settings',   icon: '⚙' },
];

const STATUS_MAP = {
  'Draft':                 { bg: 'var(--badge-neutral-bg)', text: 'var(--badge-neutral-text)', border: 'var(--badge-neutral-border)' },
  'In Transit':            { bg: 'var(--badge-blue-bg)',    text: 'var(--badge-blue-text)',    border: 'var(--badge-blue-border)' },
  'Pre-check Pending':     { bg: 'var(--badge-amber-bg)',   text: 'var(--badge-amber-text)',   border: 'var(--badge-amber-border)' },
  'Pre-check Completed':   { bg: 'var(--badge-green-bg)',   text: 'var(--badge-green-text)',   border: 'var(--badge-green-border)' },
  'Awaiting DHL Email':    { bg: 'var(--badge-orange-bg)',  text: 'var(--badge-orange-text)',  border: 'var(--badge-orange-border)' },
  'DHL Email Received':    { bg: 'var(--badge-blue-bg)',    text: 'var(--badge-blue-text)',    border: 'var(--badge-blue-border)' },
  'Reply Sent':            { bg: 'var(--badge-green-bg)',   text: 'var(--badge-green-text)',   border: 'var(--badge-green-border)' },
  'Reply Queued':          { bg: 'var(--badge-amber-bg)',   text: 'var(--badge-amber-text)',   border: 'var(--badge-amber-border)' },
  'SAD Pending':           { bg: 'var(--badge-amber-bg)',   text: 'var(--badge-amber-text)',   border: 'var(--badge-amber-border)' },
  'SAD Uploaded':          { bg: 'var(--badge-blue-bg)',    text: 'var(--badge-blue-text)',    border: 'var(--badge-blue-border)' },
  'Customs Parsed':        { bg: 'var(--badge-green-bg)',   text: 'var(--badge-green-text)',   border: 'var(--badge-green-border)' },
  'Verification Needed':   { bg: 'var(--badge-red-bg)',     text: 'var(--badge-red-text)',     border: 'var(--badge-red-border)' },
  'Customs Verified':      { bg: 'var(--badge-green-bg)',   text: 'var(--badge-green-text)',   border: 'var(--badge-green-border)' },
  'Locked':                { bg: 'var(--badge-neutral-bg)', text: 'var(--badge-neutral-text)', border: 'var(--badge-neutral-border)' },
  'Ready for PZ':          { bg: 'var(--badge-green-bg)',   text: 'var(--badge-green-text)',   border: 'var(--badge-green-border)' },
  'Generated':             { bg: 'var(--badge-green-bg)',   text: 'var(--badge-green-text)',   border: 'var(--badge-green-border)' },
  'Ready for Booking':     { bg: 'var(--badge-purple-bg)',  text: 'var(--badge-purple-text)',  border: 'var(--badge-purple-border)' },
  'Exported':              { bg: 'var(--badge-accent-bg)',  text: 'var(--badge-accent-text)',  border: 'var(--badge-accent-border)' },
  'Awaiting DHL':          { bg: 'var(--badge-amber-bg)',   text: 'var(--badge-amber-text)',   border: 'var(--badge-amber-border)' },
  'Awaiting SAD':          { bg: 'var(--badge-orange-bg)',  text: 'var(--badge-orange-text)',  border: 'var(--badge-orange-border)' },
  'Action Required':       { bg: 'var(--badge-red-bg)',     text: 'var(--badge-red-text)',     border: 'var(--badge-red-border)' },
  'In Preparation':        { bg: 'var(--badge-neutral-bg)', text: 'var(--badge-neutral-text)', border: 'var(--badge-neutral-border)' },
  'Completed':             { bg: 'var(--badge-green-bg)',   text: 'var(--badge-green-text)',   border: 'var(--badge-green-border)' },
  'Pending':               { bg: 'var(--badge-amber-bg)',   text: 'var(--badge-amber-text)',   border: 'var(--badge-amber-border)' },
  'Live':                  { bg: 'var(--badge-green-bg)',   text: 'var(--badge-green-text)',   border: 'var(--badge-green-border)' },
  'Awaiting Clearance':    { bg: 'var(--badge-blue-bg)',    text: 'var(--badge-blue-text)',    border: 'var(--badge-blue-border)' },
};

// ══════════════════════════════════════════════════════════
// HELPERS
// ══════════════════════════════════════════════════════════

function fmtPLN(n) {
  if (n == null || n === '') return '—';
  const num = Number(n);
  if (isNaN(num)) return '—';
  return 'PLN ' + num.toLocaleString('pl-PL', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function mapOverall(status) {
  const m = {
    success: 'Ready for Booking', partial: 'Action Required',
    blocked: 'Action Required', failed: 'Action Required',
    awaiting_dhl_email: 'Awaiting DHL', awaiting_sad: 'Awaiting SAD',
    awaiting_clearance: 'Awaiting Clearance',
    in_preparation: 'In Preparation', draft: 'Draft',
    ready: 'Ready for PZ', processing: 'In Preparation',
    collecting: 'In Preparation',
  };
  return m[status] || (status ? status.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase()) : 'Pending');
}

function mapDhlStatus(s) {
  if (!s) return '—';
  const m = {
    awaiting_dhl_email: 'Awaiting DHL Email',
    dhl_email_received: 'DHL Email Received',
    reply_sent: 'Reply Sent',
    reply_queued: 'Reply Queued',
    pre_check_completed: 'Pre-check Completed',
    pre_check_pending: 'Pre-check Pending',
    reply_package_prepared: 'Reply Package Prepared',
  };
  return m[s] || s.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
}

function mapSadStatus(s) {
  if (!s) return 'SAD Pending';
  const m = {
    // frontend legacy values
    sad_pending:          'SAD Pending',
    sad_uploaded:         'SAD Uploaded',
    customs_parsed:       'Customs Parsed',
    customs_verified:     'Customs Verified',
    verification_needed:  'Verification Needed',
    // backend _derive_sad_status() values
    missing:              'SAD Pending',
    uploaded:             'SAD Uploaded',
    uploaded_parsed:      'Customs Parsed',
  };
  return m[s] || s.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
}

function mapPzStatus(s) {
  if (!s) return 'Locked';
  const m = { locked: 'Locked', ready: 'Ready for PZ', generated: 'Generated', exported: 'Exported' };
  return m[s] || s.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
}

function transformBatch(b) {
  return {
    id:        b.batch_id,
    batch_id:  b.batch_id,
    awb:       b.tracking_no || b.doc_no || b.batch_id,
    carrier:   b.carrier || '—',
    dhlStatus: mapDhlStatus(b.dhl_status),
    dhlRec:    b.dhl_status === 'reply_sent' ? 'Completed'
             : b.dhl_status === 'reply_queued' ? 'Queued'
             : b.dhl_status === 'pre_check_completed' ? 'No Reply Needed'
             : b.dhl_status === 'dhl_email_received' ? 'Reply Required' : '—',
    sadStatus: mapSadStatus(b.sad_status),
    mrn:       b.mrn || '—',
    pzStatus:  mapPzStatus(b.pz_status),
    net:       fmtPLN(b.net),
    gross:     fmtPLN(b.gross),
    duty:      fmtPLN(b.duty),
    overall:   mapOverall(b.status),
    doc_no:    b.doc_no || '',
    timestamp: b.timestamp || '',
    has_sad:   b.has_sad,
    _raw:      b,
  };
}

async function apiFetch(url, opts = {}) {
  let res;
  try {
    res = await fetch(url, { credentials: 'include', ...opts });
  } catch (netErr) {
    // Network-level failure (service down, no connection)
    const err = new Error('Service unreachable — check that the backend is running.');
    err.type = 'network';
    throw err;
  }
  if (res.status === 401 || res.status === 403) {
    const err = new Error('Session expired or access denied.');
    err.type = 'auth';
    err.status = res.status;
    throw err;
  }
  if (!res.ok) {
    const text = await res.text().catch(() => '');
    throw new Error(`HTTP ${res.status}: ${text.slice(0, 200)}`);
  }
  const ct = res.headers.get('content-type') || '';
  return ct.includes('json') ? res.json() : res.text();
}

// ══════════════════════════════════════════════════════════
// SESSION BANNER
// ══════════════════════════════════════════════════════════

function SessionBanner({ type, onDismiss }) {
  // type: 'auth' | 'network'
  const isAuth = type === 'auth';
  return (
    <div style={{
      position: 'fixed', top: 0, left: 0, right: 0, zIndex: 9999,
      background: isAuth ? '#7A2000' : '#4A3A00',
      color: '#FFF', padding: '10px 20px',
      display: 'flex', alignItems: 'center', gap: 12,
      fontSize: 13, fontWeight: 500, boxShadow: '0 2px 8px rgba(0,0,0,0.3)',
      animation: 'fadeIn 0.2s ease',
    }}>
      <span style={{ fontSize: 16 }}>{isAuth ? '🔒' : '⚠️'}</span>
      <span style={{ flex: 1 }}>
        {isAuth
          ? 'Session expired or access denied.'
          : 'Service unreachable — the backend may be down.'}
        {' '}
        {isAuth
          ? <a href="/login" style={{ color: '#FFD080', textDecoration: 'underline' }}>Sign in again</a>
          : <span style={{ color: '#FFD080', cursor: 'pointer', textDecoration: 'underline' }}
              onClick={() => window.location.reload()}>Retry</span>}
      </span>
      {onDismiss && (
        <button onClick={onDismiss} style={{
          background: 'none', border: 'none', color: '#FFF', cursor: 'pointer',
          fontSize: 16, padding: '0 4px', lineHeight: 1,
        }}>✕</button>
      )}
    </div>
  );
}

// ══════════════════════════════════════════════════════════
// BASE COMPONENTS
// ══════════════════════════════════════════════════════════

function Badge({ status, small }) {
  const s = STATUS_MAP[status] || { bg: 'var(--badge-neutral-bg)', text: 'var(--badge-neutral-text)', border: 'var(--badge-neutral-border)' };
  return (
    <span style={{
      display: 'inline-flex', alignItems: 'center',
      background: s.bg, color: s.text, border: `1px solid ${s.border}`,
      borderRadius: 4, padding: small ? '1px 6px' : '2px 8px',
      fontSize: small ? 10 : 11, fontWeight: 600, letterSpacing: '0.03em', whiteSpace: 'nowrap',
    }}>{status || 'Unknown'}</span>
  );
}

function Card({ children, style, onClick }) {
  return (
    <div onClick={onClick} style={{
      background: 'var(--card)', borderRadius: 8,
      border: '1px solid var(--border)',
      boxShadow: '0 1px 3px var(--shadow)', ...style,
    }}>{children}</div>
  );
}

function Btn({ children, onClick, variant = 'default', small, disabled, style: xs }) {
  const variants = {
    default: { background: 'var(--text)', color: 'var(--card)', border: '1px solid var(--text)' },
    gold:    { background: 'var(--accent)', color: 'var(--accent-text)', border: '1px solid var(--accent)' },
    outline: { background: 'transparent', color: 'var(--text)', border: '1px solid var(--border)' },
    ghost:   { background: 'transparent', color: 'var(--text-2)', border: '1px solid transparent' },
    danger:  { background: 'var(--badge-red-bg)', color: 'var(--badge-red-text)', border: '1px solid var(--badge-red-border)' },
    success: { background: 'var(--badge-green-bg)', color: 'var(--badge-green-text)', border: '1px solid var(--badge-green-border)' },
  };
  const v = variants[variant] || variants.default;
  return (
    <button onClick={onClick} disabled={disabled} style={{
      ...v, borderRadius: 6, cursor: disabled ? 'not-allowed' : 'pointer',
      padding: small ? '4px 10px' : '7px 14px',
      fontSize: small ? 11 : 12, fontWeight: 600,
      opacity: disabled ? 0.45 : 1,
      display: 'inline-flex', alignItems: 'center', gap: 4,
      whiteSpace: 'nowrap', transition: 'opacity 0.15s',
      fontFamily: 'inherit', ...xs,
    }}>{children}</button>
  );
}

function Modal({ title, onClose, children, wide }) {
  return (
    <div style={{
      position: 'fixed', inset: 0, background: 'var(--overlay)',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      zIndex: 1000, padding: 24,
    }} onClick={e => e.target === e.currentTarget && onClose()}>
      <div style={{
        background: 'var(--card)', borderRadius: 10,
        width: wide ? 680 : 480, maxWidth: '100%',
        maxHeight: '90vh', overflow: 'auto',
        boxShadow: '0 20px 60px var(--shadow-heavy)',
        border: '1px solid var(--border)',
      }}>
        <div style={{ padding: '18px 24px', borderBottom: '1px solid var(--border)', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
          <h2 style={{ margin: 0, fontSize: 16, fontWeight: 700, fontFamily: '"DM Serif Display",serif', color: 'var(--text)' }}>{title}</h2>
          <button onClick={onClose} style={{ background: 'none', border: 'none', cursor: 'pointer', fontSize: 18, color: 'var(--text-3)' }}>×</button>
        </div>
        <div style={{ padding: 24 }}>{children}</div>
      </div>
    </div>
  );
}

function FormField({ label, children, hint }) {
  return (
    <div style={{ marginBottom: 16 }}>
      <label style={{ display: 'block', fontSize: 11, fontWeight: 600, color: 'var(--text-2)', marginBottom: 5, letterSpacing: '0.04em', textTransform: 'uppercase' }}>{label}</label>
      {children}
      {hint && <div style={{ fontSize: 10, color: 'var(--text-3)', marginTop: 3 }}>{hint}</div>}
    </div>
  );
}

function Inp({ value, onChange, placeholder, type = 'text', style: s }) {
  return (
    <input value={value} onChange={onChange} placeholder={placeholder} type={type} style={{
      width: '100%', padding: '8px 10px', borderRadius: 6,
      border: '1px solid var(--border)', fontSize: 12, color: 'var(--text)',
      background: 'var(--bg-subtle)', outline: 'none',
      boxSizing: 'border-box', fontFamily: 'inherit', ...s,
    }} />
  );
}

function Sel({ value, onChange, children }) {
  return (
    <select value={value} onChange={onChange} style={{
      width: '100%', padding: '8px 10px', borderRadius: 6,
      border: '1px solid var(--border)', fontSize: 12, color: 'var(--text)',
      background: 'var(--bg-subtle)', outline: 'none',
      boxSizing: 'border-box', fontFamily: 'inherit',
    }}>{children}</select>
  );
}

function SectionHeader({ icon, title, subtitle, status }) {
  return (
    <div style={{ display: 'flex', alignItems: 'center', gap: 12, padding: '14px 20px', borderBottom: '1px solid var(--border)', background: 'var(--bg-subtle)' }}>
      <div style={{ width: 32, height: 32, borderRadius: 6, background: 'var(--accent-subtle)', border: '1px solid var(--accent-border)', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 14, color: 'var(--accent)' }}>{icon}</div>
      <div style={{ flex: 1 }}>
        <div style={{ fontSize: 13, fontWeight: 700, color: 'var(--text)' }}>{title}</div>
        {subtitle && <div style={{ fontSize: 11, color: 'var(--text-2)', marginTop: 1 }}>{subtitle}</div>}
      </div>
      {status && <Badge status={status} />}
    </div>
  );
}

function InfoRow({ label, value, mono }) {
  return (
    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline', padding: '6px 0', borderBottom: '1px solid var(--border-subtle)' }}>
      <span style={{ fontSize: 11, color: 'var(--text-2)', fontWeight: 500 }}>{label}</span>
      <span style={{ fontSize: 11, color: 'var(--text)', fontWeight: 600, fontFamily: mono ? 'monospace' : 'inherit', textAlign: 'right', maxWidth: '60%', wordBreak: 'break-all' }}>{value ?? '—'}</span>
    </div>
  );
}

function Toast({ msg, type }) {
  const colors = { success: 'var(--badge-green-text)', info: 'var(--badge-blue-text)', error: 'var(--badge-red-text)', warn: 'var(--badge-amber-text)' };
  return (
    <div style={{
      position: 'fixed', top: 70, right: 24, zIndex: 9999,
      background: colors[type] || colors.info,
      color: '#fff', padding: '10px 18px', borderRadius: 8,
      fontSize: 12, fontWeight: 600, boxShadow: '0 4px 16px rgba(0,0,0,0.15)',
      animation: 'fadeIn 0.2s', maxWidth: 380, wordBreak: 'break-word',
    }}>{msg}</div>
  );
}

// ══════════════════════════════════════════════════════════
// SIDEBAR
// ══════════════════════════════════════════════════════════

function Sidebar({ active, onNav, collapsed, onToggle }) {
  return (
    <aside style={{
      width: collapsed ? 52 : SIDEBAR_W, minWidth: collapsed ? 52 : SIDEBAR_W,
      background: 'var(--sidebar-bg)', display: 'flex', flexDirection: 'column',
      transition: 'width 0.2s,min-width 0.2s', overflow: 'hidden', zIndex: 10,
      borderRight: '1px solid var(--sidebar-border)',
    }}>

// NEW SHIPMENT MODAL (real API)
// ══════════════════════════════════════════════════════════

function NewShipmentModal({ onClose, onCreated }) {
  const [awb, setAwb] = React.useState('');
  const [carrier, setCarrier] = React.useState('DHL');
  const [note, setNote] = React.useState('');
  const [step, setStep] = React.useState(1);
  const [invoiceFiles, setInvoiceFiles] = React.useState([]);
  const [awbFileName, setAwbFileName] = React.useState('');
  const [error, setError] = React.useState('');
  const invoiceInputRef = React.useRef();
  const awbInputRef = React.useRef();

  const handleSave = async (runPrecheck) => {
    if (!awb.trim()) return;
    setStep(2); setError('');
    try {
      const fd = new FormData();
      fd.append('tracking_no', awb.trim());
      fd.append('carrier', carrier);
      if (note) fd.append('note', note);
      if (awbInputRef.current && awbInputRef.current.files[0]) fd.append('awb', awbInputRef.current.files[0]);
      if (invoiceInputRef.current && invoiceInputRef.current.files) {
        Array.from(invoiceInputRef.current.files).forEach(f => fd.append('invoices', f));
      }
      const r = await fetch('/api/v1/upload/shipment', { method: 'POST', body: fd, credentials: 'include' });
      if (!r.ok) throw new Error(await r.text().catch(() => 'Upload failed'));
      const data = await r.json();
      setStep(3);
      setTimeout(() => onCreated({ awb, carrier, runPrecheck, batchId: data.batch_id || data.id }), 900);
    } catch (e) {
      setStep(1); setError(e.message || 'Upload failed. Check the server.');
    }
  };

  return (
    <Modal title="New Shipment" onClose={onClose} wide>
      {step === 1 && (
        <>
          {error && <div style={{ marginBottom: 12, padding: '10px 14px', borderRadius: 6, background: 'var(--badge-red-bg)', border: '1px solid var(--badge-red-border)', fontSize: 12, color: 'var(--badge-red-text)' }}>{error}</div>}
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 16 }}>
            <FormField label="AWB / Tracking Number" hint="Required">
              <Inp value={awb} onChange={e => setAwb(e.target.value)} placeholder="e.g. DHL-1234567890" />
            </FormField>
            <FormField label="Carrier">
              <Sel value={carrier} onChange={e => setCarrier(e.target.value)}>
                <option>DHL</option><option>FedEx</option><option>Other</option>
              </Sel>
            </FormField>
          </div>
          <FormField label="Invoice PDFs" hint="Upload one or more commercial invoices">
            <label style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '24px 16px', borderRadius: 6, border: '2px dashed var(--badge-neutral-border)', cursor: 'pointer', background: 'var(--bg-subtle)', justifyContent: 'center', flexDirection: 'column' }}>
              <input ref={invoiceInputRef} type="file" accept=".pdf" multiple onChange={e => setInvoiceFiles(Array.from(e.target.files).map(f => f.name))} style={{ display: 'none' }} />
              <span style={{ fontSize: 24, color: 'var(--text-3)' }}>📄</span>
              <span style={{ fontSize: 12, color: 'var(--text-2)', textAlign: 'center' }}>{invoiceFiles.length > 0 ? invoiceFiles.join(', ') : 'Click to upload invoice PDFs (multiple allowed)'}</span>
            </label>
          </FormField>
          <FormField label="AWB / Tracking PDF" hint="Optional">
            <label style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '18px 16px', borderRadius: 6, border: '2px dashed var(--badge-neutral-border)', cursor: 'pointer', background: 'var(--bg-subtle)', justifyContent: 'center' }}>
              <input ref={awbInputRef} type="file" accept=".pdf" onChange={e => setAwbFileName(e.target.files[0] ? e.target.files[0].name : '')} style={{ display: 'none' }} />
              <span style={{ fontSize: 18, color: 'var(--text-3)' }}>📎</span>
              <span style={{ fontSize: 12, color: 'var(--text-2)' }}>{awbFileName || 'Click to upload AWB PDF'}</span>
            </label>
          </FormField>
          <FormField label="Optional Note">
            <textarea value={note} onChange={e => setNote(e.target.value)} placeholder="Notes about this shipment…" rows={2}
              style={{ width: '100%', padding: '8px 10px', borderRadius: 6, border: '1px solid var(--border)', fontSize: 12, color: 'var(--text)', background: 'var(--bg-subtle)', outline: 'none', resize: 'vertical', boxSizing: 'border-box', fontFamily: 'inherit' }} />
          </FormField>
          <div style={{ marginTop: 4, padding: '12px 14px', borderRadius: 6, background: 'var(--badge-amber-bg)', border: '1px solid var(--badge-amber-border)', fontSize: 11, color: '#8A5A00' }}>
            ℹ PZ number will be assigned at the end of the workflow. SAD is not required at this stage.
          </div>
          <div style={{ display: 'flex', justifyContent: 'flex-end', gap: 8, marginTop: 20, paddingTop: 16, borderTop: '1px solid var(--border)' }}>
            <Btn variant="outline" onClick={onClose}>Cancel</Btn>
            <Btn variant="outline" onClick={() => handleSave(false)} disabled={!awb.trim()}>Save Draft</Btn>
            <Btn variant="gold" onClick={() => handleSave(true)} disabled={!awb.trim()}>Save &amp; Run Pre-check</Btn>
          </div>
        </>
      )}
      {step === 2 && (
        <div style={{ padding: '40px 0', textAlign: 'center' }}>
          <div style={{ fontSize: 36, marginBottom: 12, display: 'inline-block', animation: 'spin 1s linear infinite' }}>⟳</div>
          <div style={{ fontSize: 14, fontWeight: 600, color: 'var(--text)' }}>Creating shipment…</div>
          <div style={{ fontSize: 12, color: 'var(--text-2)', marginTop: 4 }}>Uploading files and creating batch…</div>
        </div>
      )}
      {step === 3 && (
        <div style={{ padding: '40px 0', textAlign: 'center' }}>
          <div style={{ fontSize: 36, marginBottom: 12 }}>✅</div>
          <div style={{ fontSize: 14, fontWeight: 600, color: 'var(--badge-green-text)' }}>Shipment created!</div>
          <div style={{ fontSize: 12, color: 'var(--text-2)', marginTop: 4 }}>Redirecting to shipment detail…</div>
        </div>
      )}
    </Modal>
  );
}

// DASHBOARD PAGE (real API)
// ══════════════════════════════════════════════════════════

function DashboardPage({ onViewShipment, batches, loading, onReload, onToast }) {
  const [filter, setFilter] = React.useState('all');
  const [sortCol, setSortCol] = React.useState('timestamp');
  const [sortDir, setSortDir] = React.useState('desc');
  const [actionMenu, setActionMenu] = React.useState(null);
  const [recheckState, setRecheckState] = React.useState({});
  const [recheckResult, setRecheckResult] = React.useState({});
  // Archive view
  const [viewMode, setViewMode] = React.useState('active'); // 'active' | 'archived'
  const [archived, setArchived] = React.useState([]);
  const [archivedLoading, setArchivedLoading] = React.useState(false);
  const [archiveBusy, setArchiveBusy] = React.useState({});

  const loadArchived = React.useCallback(async () => {
    setArchivedLoading(true);
    try {
      const data = await apiFetch('/dashboard/archive');
      setArchived(Array.isArray(data) ? data : []);
    } catch (e) { setArchived([]); }
    setArchivedLoading(false);
  }, []);

  React.useEffect(() => { if (viewMode === 'archived') loadArchived(); }, [viewMode]);

  const filters = ['all', 'Ready for PZ', 'Awaiting DHL', 'Awaiting SAD', 'Action Required', 'Ready for Booking', 'Exported'];
  const filtered = filter === 'all' ? batches : batches.filter(s => s.overall === filter);
  const sorted = [...filtered].sort((a, b) => {
    const av = a._raw?.[sortCol] || a[sortCol] || '';
    const bv = b._raw?.[sortCol] || b[sortCol] || '';
    return sortDir === 'asc' ? (av > bv ? 1 : -1) : (av < bv ? 1 : -1);
  });

  const TH = ({ col, children }) => (
    <th onClick={() => { if (sortCol === col) setSortDir(d => d === 'asc' ? 'desc' : 'asc'); else { setSortCol(col); setSortDir('asc'); } }} style={{ padding: '10px 12px', textAlign: 'left', fontSize: 10, fontWeight: 700, color: 'var(--text-3)', letterSpacing: '0.06em', textTransform: 'uppercase', cursor: 'pointer', whiteSpace: 'nowrap', borderBottom: '1px solid var(--border)', background: 'var(--bg-subtle)', userSelect: 'none' }}>
      {children}{sortCol === col ? (sortDir === 'asc' ? ' ↑' : ' ↓') : ''}
    </th>
  );

  const counts = {
    total:        batches.length,
    awaitingDHL:  batches.filter(b => b.overall === 'Awaiting DHL').length,
    awaitingSAD:  batches.filter(b => b.overall === 'Awaiting SAD').length,
    readyPZ:      batches.filter(b => b.pzStatus === 'Ready for PZ').length,
    actionReq:    batches.filter(b => b.overall === 'Action Required').length,
    readyBooking: batches.filter(b => b.overall === 'Ready for Booking').length,
    totalDuty:    batches.reduce((s, b) => s + (b._raw && b._raw.duty ? Number(b._raw.duty) : 0), 0),
    totalGross:   batches.reduce((s, b) => s + (b._raw && b._raw.gross ? Number(b._raw.gross) : 0), 0),
  };

  const cards = [
    { label: 'Total Shipments',   value: counts.total,        icon: '⬡', colorVar: 'var(--text)' },
    { label: 'Awaiting DHL',      value: counts.awaitingDHL,  icon: '✈', colorVar: 'var(--badge-amber-text)' },
    { label: 'Awaiting SAD',      value: counts.awaitingSAD,  icon: '⊟', colorVar: 'var(--badge-orange-text)' },
    { label: 'Ready for PZ',      value: counts.readyPZ,      icon: '◈', colorVar: 'var(--badge-green-text)' },
    { label: 'Action Required',   value: counts.actionReq,    icon: '⚠', colorVar: 'var(--badge-red-text)' },
    { label: 'Ready for Booking', value: counts.readyBooking, icon: '✓', colorVar: 'var(--badge-purple-text)' },
    { label: 'Total Duty A00',    value: fmtPLN(counts.totalDuty),  icon: '₤', colorVar: 'var(--accent)', wide: true },
    { label: 'Total Gross Value', value: fmtPLN(counts.totalGross), icon: '◈', colorVar: 'var(--badge-blue-text)', wide: true },
  ];

  return (
    <div style={{ padding: '24px 32px', overflowY: 'auto', flex: 1 }}>
      {/* Summary Cards */}
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(6,1fr)', gap: 12, marginBottom: 28 }}>
        {cards.map((c, i) => (
          <Card key={i} style={{ padding: '16px 18px', cursor: 'default', gridColumn: c.wide ? 'span 2' : undefined }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start' }}>
              <div>
                <div style={{ fontSize: 11, color: 'var(--text-2)', fontWeight: 500, marginBottom: 6 }}>{c.label}</div>
                <div style={{ fontSize: 22, fontWeight: 700, color: c.colorVar, fontFamily: '"DM Serif Display",serif' }}>{loading ? '…' : c.value}</div>
              </div>
              <div style={{ width: 30, height: 30, borderRadius: 6, background: 'var(--accent-subtle)', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 14, color: c.colorVar }}>{c.icon}</div>
            </div>
          </Card>
        ))}
      </div>

      {/* View mode toggle + filter bar */}
      <div style={{ display: 'flex', gap: 8, marginBottom: 16, flexWrap: 'wrap', alignItems: 'center' }}>
        {/* Active / Archived toggle */}
        {['active', 'archived'].map(m => (
          <button key={m} onClick={() => setViewMode(m)} style={{ padding: '4px 12px', borderRadius: 20, border: viewMode === m ? '1px solid var(--accent)' : '1px solid var(--border)', background: viewMode === m ? 'var(--accent)' : 'transparent', color: viewMode === m ? '#fff' : 'var(--text-2)', fontSize: 11, fontWeight: viewMode === m ? 700 : 400, cursor: 'pointer', fontFamily: 'inherit', textTransform: 'capitalize' }}>
            {m === 'active' ? '● Active' : '⊘ Archived'}
          </button>
        ))}
        {viewMode === 'active' && <>
          <div style={{ width: 1, height: 18, background: 'var(--border)', margin: '0 4px' }} />
          <span style={{ fontSize: 11, color: 'var(--text-3)' }}>Filter:</span>
          {filters.map(f => (
            <button key={f} onClick={() => setFilter(f)} style={{ padding: '4px 10px', borderRadius: 20, border: filter === f ? `1px solid var(--accent)` : '1px solid var(--border)', background: filter === f ? 'var(--accent-subtle)' : 'transparent', color: filter === f ? 'var(--text)' : 'var(--text-2)', fontSize: 11, fontWeight: filter === f ? 600 : 400, cursor: 'pointer', fontFamily: 'inherit' }}>
              {f === 'all' ? 'All' : f}
            </button>
          ))}
        </>}
        {viewMode === 'archived' && (
          <Btn small variant="ghost" onClick={loadArchived} style={{ marginLeft: 4 }}>↻ Refresh</Btn>
        )}
      </div>

      {/* ── Archived view ── */}
      {viewMode === 'archived' && (
        <Card style={{ overflow: 'hidden' }}>
          <div style={{ padding: '12px 16px', borderBottom: '1px solid var(--border)', display: 'flex', alignItems: 'center', gap: 10 }}>
            <span style={{ fontSize: 12, fontWeight: 600, color: 'var(--text)' }}>Archived Shipments</span>
            <span style={{ fontSize: 11, color: 'var(--text-3)' }}>— kept for {14} days, then eligible for permanent deletion</span>
          </div>
          {archivedLoading && <div style={{ padding: 32, textAlign: 'center', color: 'var(--text-3)', fontSize: 13 }}>Loading archived shipments…</div>}
          {!archivedLoading && archived.length === 0 && <div style={{ padding: 32, textAlign: 'center', color: 'var(--text-3)', fontSize: 13 }}>No archived shipments</div>}
          {!archivedLoading && archived.length > 0 && (
            <div style={{ overflowX: 'auto' }}>
              <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: 12 }}>
                <thead>
                  <tr>
                    {['AWB / Batch', 'Carrier', 'Status', 'Archived At', 'Expires In', 'Reason', 'Actions'].map(h => (
                      <th key={h} style={{ padding: '10px 12px', textAlign: 'left', fontSize: 10, fontWeight: 700, color: 'var(--text-3)', letterSpacing: '0.06em', textTransform: 'uppercase', borderBottom: '1px solid var(--border)', background: 'var(--bg-subtle)', whiteSpace: 'nowrap' }}>{h}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {archived.map(row => {
                    const archivedAt  = row.archived_at ? new Date(row.archived_at).toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' }) : '—';
                    const deleteAfter = row.delete_after ? new Date(row.delete_after) : null;
                    const now         = new Date();
                    const daysLeft    = deleteAfter ? Math.ceil((deleteAfter - now) / 86400000) : null;
                    const expired     = daysLeft !== null && daysLeft <= 0;
                    const expiresLabel = daysLeft === null ? '—' : expired ? '⚠ Expired' : `${daysLeft}d remaining`;
                    const bKey = row.batch_id;
                    return (
                      <tr key={bKey}
                        onMouseEnter={e => e.currentTarget.style.background = 'var(--row-hover)'}
                        onMouseLeave={e => e.currentTarget.style.background = 'transparent'}
                        style={{ borderBottom: '1px solid var(--border-subtle)', transition: 'background 0.1s' }}>
                        <td style={{ padding: '10px 12px', fontFamily: 'monospace', fontSize: 11, color: 'var(--text)' }}>{row.awb || bKey}</td>
                        <td style={{ padding: '10px 12px', color: 'var(--text-2)' }}>{row.carrier || '—'}</td>
                        <td style={{ padding: '10px 12px' }}><Badge status={row.status} small /></td>
                        <td style={{ padding: '10px 12px', color: 'var(--text-2)', whiteSpace: 'nowrap' }}>{archivedAt}</td>
                        <td style={{ padding: '10px 12px', whiteSpace: 'nowrap', color: expired ? 'var(--badge-red-text)' : daysLeft <= 3 ? 'var(--badge-orange-text)' : 'var(--text-2)', fontWeight: expired ? 700 : 400 }}>{expiresLabel}</td>
                        <td style={{ padding: '10px 12px', color: 'var(--text-3)', fontSize: 11, maxWidth: 180, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }} title={row.reason}>{row.reason || '—'}</td>
                        <td style={{ padding: '8px 12px' }}>
                          <div style={{ display: 'flex', gap: 6 }}>
                            <Btn small variant="outline" disabled={!!archiveBusy[bKey]}
                              onClick={async () => {
                                if (!window.confirm(`Restore shipment ${row.awb || bKey} to the active dashboard?`)) return;
                                setArchiveBusy(s => ({ ...s, [bKey]: true }));
                                try {
                                  await apiFetch(`/dashboard/archive/${encodeURIComponent(bKey)}/restore`, { method: 'POST' });
                                  await loadArchived();
                                  if (onReload) onReload();
                                  if (onToast) onToast('Shipment restored to active dashboard.', 'success');
                                } catch (e) {
                                  if (onToast) onToast(`Restore failed: ${e.message}`, 'error');
                                }
                                setArchiveBusy(s => ({ ...s, [bKey]: false }));
                              }}>
                              {archiveBusy[bKey] ? '…' : 'Restore'}
                            </Btn>
                            <Btn small variant="ghost" disabled={!!archiveBusy[bKey]}
                              style={{ color: 'var(--badge-red-text)', borderColor: 'var(--badge-red-border)' }}
                              onClick={async () => {
                                if (!window.confirm(`PERMANENTLY DELETE shipment ${row.awb || bKey}?\n\nThis will permanently delete all archived files.\nThis action cannot be undone.`)) return;
                                if (!window.confirm(`Confirm: permanently delete ${row.awb || bKey}? There is no recovery after this.`)) return;
                                setArchiveBusy(s => ({ ...s, [bKey]: true }));
                                try {
                                  await apiFetch(`/dashboard/archive/${encodeURIComponent(bKey)}`, { method: 'DELETE' });
                                  await loadArchived();
                                  if (onToast) onToast('Shipment permanently deleted.', 'success');
                                } catch (e) {
                                  if (onToast) onToast(`Delete failed: ${e.message}`, 'error');
                                }
                                setArchiveBusy(s => ({ ...s, [bKey]: false }));
                              }}>
                              Delete permanently
                            </Btn>
                          </div>
                        </td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          )}
          <div style={{ padding: '10px 16px', borderTop: '1px solid var(--border)', display: 'flex', justifyContent: 'space-between', alignItems: 'center', flexWrap: 'wrap', gap: 8 }}>
            <span style={{ fontSize: 11, color: 'var(--text-3)' }}>{archived.length} archived shipment(s)</span>
            <Btn small variant="ghost" style={{ color: 'var(--badge-red-text)' }}
              onClick={async () => {
                if (!window.confirm('Run archive cleanup?\n\nThis will permanently delete all archived shipments that are past their 14-day retention period.\nThis action cannot be undone.')) return;
                try {
                  const res = await apiFetch('/dashboard/archive/cleanup', { method: 'POST' });
                  await loadArchived();
                  if (onToast) onToast(`Cleanup complete — ${(res.deleted || []).length} deleted, ${(res.skipped || []).length} skipped.`, 'success');
                } catch (e) {
                  if (onToast) onToast(`Cleanup failed: ${e.message}`, 'error');
                }
              }}>
              ⚠ Run Cleanup (delete expired)
            </Btn>
          </div>
        </Card>
      )}

      {/* ── Active shipments table ── */}
      {viewMode === 'active' && <Card style={{ overflow: 'hidden' }}>
        <div style={{ overflowX: 'auto', width: '100%' }}>
          <table style={{ minWidth: 1500, borderCollapse: 'collapse', fontSize: 12, tableLayout: 'fixed' }}>
            <colgroup>
              <col style={{ width: 220 }} />{/* AWB */}
              <col style={{ width: 100 }} />{/* Carrier */}
              <col style={{ width: 200 }} />{/* DHL Status */}
              <col style={{ width: 160 }} />{/* SAD Status */}
              <col style={{ width: 200 }} />{/* MRN */}
              <col style={{ width: 140 }} />{/* PZ Status */}
              <col style={{ width: 120 }} />{/* Net */}
              <col style={{ width: 120 }} />{/* Gross */}
              <col style={{ width: 120 }} />{/* Duty A00 */}
              <col style={{ width: 160 }} />{/* Overall */}
              <col style={{ width: 160 }} />{/* Actions */}
            </colgroup>
            <thead>
              <tr>
                <TH col="awb">AWB / Tracking</TH>
                <TH col="carrier">Carrier</TH>
                <TH col="dhlStatus">DHL Status</TH>
                <TH col="sadStatus">SAD Status</TH>
                <TH col="mrn">MRN</TH>
                <TH col="pzStatus">PZ Status</TH>
                <TH col="net">Net</TH>
                <TH col="gross">Gross</TH>
                <TH col="duty">Duty A00</TH>
                <TH col="overall">Overall</TH>
                <th style={{ padding: '10px 12px', fontSize: 10, fontWeight: 700, color: 'var(--text-3)', letterSpacing: '0.06em', textTransform: 'uppercase', borderBottom: '1px solid var(--border)', background: 'var(--bg-subtle)', position: 'sticky', right: 0, zIndex: 3, boxShadow: '-2px 0 6px rgba(0,0,0,0.06)' }}>Actions</th>
              </tr>
            </thead>
            <tbody>
              {loading && (
                <tr><td colSpan={11} style={{ padding: 40, textAlign: 'center', color: 'var(--text-3)', fontSize: 13 }}>Loading shipments…</td></tr>
              )}
              {!loading && sorted.length === 0 && (
                <tr><td colSpan={11} style={{ padding: 40, textAlign: 'center', color: 'var(--text-3)', fontSize: 13 }}>No shipments found</td></tr>
              )}
              {!loading && sorted.map(row => {
                // Short labels for long DHL status values — full text in title tooltip
                const dhlShortLabels = {
                  'Awaiting DHL Email':     'Awaiting DHL',
                  'DHL Email Received':     'Email Received',
                  'Reply Package Prepared': 'Pkg Prepared',
                  'Pre-check Pending':      'Pre-check ⏳',
                  'Pre-check Completed':    'Pre-check ✓',
                  'Reply Queued':           'Reply Queued',
                  'Reply Sent':             'Reply Sent',
                };
                const dhlShort = dhlShortLabels[row.dhlStatus] || row.dhlStatus;
                const dhlStyle = (() => {
                  const s = STATUS_MAP[row.dhlStatus] || { bg: 'var(--badge-neutral-bg)', text: 'var(--badge-neutral-text)', border: 'var(--badge-neutral-border)' };
                  return { display: 'inline-block', padding: '2px 7px', background: s.bg, color: s.text, border: `1px solid ${s.border}`, borderRadius: 4, fontSize: 10, fontWeight: 600, whiteSpace: 'nowrap', maxWidth: '100%', overflow: 'hidden', textOverflow: 'ellipsis', cursor: 'default' };
                })();
                return (
                <tr key={row.id}
                  onMouseEnter={e => e.currentTarget.style.background = 'var(--row-hover)'}
                  onMouseLeave={e => e.currentTarget.style.background = 'transparent'}
                  style={{ borderBottom: '1px solid var(--border-subtle)', transition: 'background 0.1s' }}>
                  <td style={{ padding: '10px 12px', overflow: 'hidden' }}>
                    <button onClick={() => onViewShipment(row)} style={{ background: 'none', border: 'none', cursor: 'pointer', color: 'var(--badge-blue-text)', fontSize: 12, fontWeight: 600, fontFamily: 'monospace', textDecoration: 'underline', textDecorationStyle: 'dotted', whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis', maxWidth: '100%', display: 'block' }}>{row.awb}</button>
                    {row.doc_no && <div style={{ fontSize: 9, color: 'var(--text-3)', marginTop: 1, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{row.doc_no}</div>}
                  </td>
                  <td style={{ padding: '10px 12px' }}>
                    <span style={{ display: 'inline-block', padding: '1px 6px', background: row.carrier === 'DHL' ? 'var(--badge-blue-bg)' : row.carrier === 'FedEx' ? 'var(--badge-purple-bg)' : 'var(--badge-neutral-bg)', borderRadius: 4, fontSize: 10, fontWeight: 700, color: row.carrier === 'DHL' ? 'var(--badge-blue-text)' : row.carrier === 'FedEx' ? 'var(--badge-purple-text)' : 'var(--badge-neutral-text)', whiteSpace: 'nowrap' }}>{row.carrier}</span>
                  </td>
                  <td style={{ padding: '10px 12px', overflow: 'hidden' }}>
                    <span style={dhlStyle} title={row.dhlStatus}>{dhlShort}</span>
                  </td>
                  <td style={{ padding: '10px 12px', overflow: 'hidden' }}><Badge status={row.sadStatus} small /></td>
                  <td style={{ padding: '10px 12px', color: 'var(--text)', fontSize: 11, fontFamily: 'monospace', whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{row.mrn}</td>
                  <td style={{ padding: '10px 12px', overflow: 'hidden' }}><Badge status={row.pzStatus} small /></td>
                  <td style={{ padding: '10px 12px', color: 'var(--text)', fontWeight: 500, textAlign: 'right', whiteSpace: 'nowrap' }}>{row.net}</td>
                  <td style={{ padding: '10px 12px', color: 'var(--text)', fontWeight: 500, textAlign: 'right', whiteSpace: 'nowrap' }}>{row.gross}</td>
                  <td style={{ padding: '10px 12px', color: 'var(--accent)', fontWeight: 700, textAlign: 'right', whiteSpace: 'nowrap' }}>{row.duty}</td>
                  <td style={{ padding: '10px 12px', overflow: 'hidden' }}><Badge status={row.overall} small /></td>
                  <td style={{ padding: '8px 10px', position: 'sticky', right: 0, background: 'var(--card)', zIndex: 2, boxShadow: '-2px 0 6px rgba(0,0,0,0.06)' }}>
                    <div style={{ display: 'flex', gap: 4, alignItems: 'center', flexWrap: 'nowrap' }}>
                      <Btn small variant="outline" onClick={() => onViewShipment(row)} title="View detail">View</Btn>
                      {row.overall === 'Draft' && (
                        <Btn small variant="ghost" onClick={() => onViewShipment(row)} title="Edit draft">Edit</Btn>
                      )}
                      <div style={{ position: 'relative' }}>
                        <Btn small variant="ghost" onClick={() => setActionMenu(actionMenu === row.id ? null : row.id)} title="More actions">⋯</Btn>
                        {actionMenu === row.id && (
                          <div style={{ position: 'absolute', right: 0, top: '100%', zIndex: 200, background: 'var(--card)', border: '1px solid var(--border)', borderRadius: 6, boxShadow: '0 4px 16px var(--shadow-heavy)', minWidth: 190, overflow: 'hidden' }}>
                            {[
                              { label: 'View Detail',     color: 'var(--text)',            fn: () => onViewShipment(row) },
                              { label: 'Open in New Tab', color: 'var(--text)',            fn: () => window.open(`/dashboard/batch.html?id=${encodeURIComponent(row.id)}`, '_blank') },
                              { label: 'Recheck Parsed Data', color: 'var(--badge-blue-text)', fn: async () => {
                                  if (!window.confirm(`Recheck shipment ${row.awb}?\n\nThis will re-run parsers against existing uploaded files.\nParsed values may change. PZ will NOT be regenerated automatically.`)) return;
                                  setRecheckState(s => ({ ...s, [row.id]: 'pending' }));
                                  setRecheckResult(s => ({ ...s, [row.id]: null }));
                                  try {
                                    const res = await apiFetch(`/dashboard/batches/${encodeURIComponent(row.id)}/recheck`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ mode: 'all' }) });
                                    setRecheckState(s => ({ ...s, [row.id]: res.ok ? 'done' : 'error' }));
                                    setRecheckResult(s => ({ ...s, [row.id]: res }));
                                    if (onReload) onReload();
                                  } catch (e) {
                                    setRecheckState(s => ({ ...s, [row.id]: 'error' }));
                                    setRecheckResult(s => ({ ...s, [row.id]: { ok: false, errors: [e.message] } }));
                                  }
                              }},
                              { label: 'Archive',         color: 'var(--badge-red-text)',  fn: async () => {
                                  const MID_PROCESS = ['processing', 'awaiting_dhl_email', 'reply_queued', 'clearance_started'];
                                  const rowStatus = (row.status || '').toLowerCase();
                                  if (MID_PROCESS.includes(rowStatus)) {
                                    const proceed = window.confirm(
                                      `⚠️ Shipment ${row.awb} is mid-process (status: ${row.status}).\n\n` +
                                      `Archiving now may interrupt active clearance or DHL reply workflows.\n\n` +
                                      `Archive anyway?`
                                    );
                                    if (!proceed) return;
                                  }
                                  const reason = window.prompt(`Archive shipment ${row.awb}?\n\nIt will be hidden from active dashboard and kept for 14 days before becoming eligible for permanent deletion.\n\nOptional reason (or leave blank):`, '');
                                  if (reason === null) return; // user cancelled
                                  try {
                                    await apiFetch(`/dashboard/batches/${encodeURIComponent(row.id)}`, { method: 'DELETE', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ reason: reason.trim() || 'archived by user' }) });
                                    if (onToast) onToast('Shipment archived. It can be restored from Archived view.', 'success');
                                    if (onReload) onReload();
                                  } catch (e) {
                                    if (onToast) onToast(`Archive failed: ${e.message}`, 'error');
                                  }
                              }},
                            ].map(({ label, color, fn }) => (
                              <button key={label} onClick={() => { setActionMenu(null); fn(); }} style={{ display: 'block', width: '100%', padding: '8px 14px', textAlign: 'left', background: 'none', border: 'none', fontSize: 12, cursor: 'pointer', color, fontFamily: 'inherit' }}
                                onMouseEnter={e => e.currentTarget.style.background = 'var(--bg-subtle)'}
                                onMouseLeave={e => e.currentTarget.style.background = 'none'}
                              >{label}</button>
                            ))}
                          </div>
                        )}
                      </div>
                    </div>
                    {/* Recheck result inline panel */}
                    {recheckState[row.id] === 'pending' && (
                      <div style={{ marginTop: 4, fontSize: 10, color: 'var(--badge-blue-text)' }}>⟳ Rechecking…</div>
                    )}
                    {recheckState[row.id] === 'done' && recheckResult[row.id] && (
                      <div style={{ marginTop: 4, padding: '4px 6px', background: 'var(--badge-green-bg)', border: '1px solid var(--badge-green-border)', borderRadius: 4 }}>
                        <div style={{ fontSize: 10, fontWeight: 700, color: 'var(--badge-green-text)', marginBottom: 2 }}>✓ Recheck complete</div>
                        {Object.entries(recheckResult[row.id].updated || {}).filter(([,v])=>v).map(([k]) => (
                          <div key={k} style={{ fontSize: 9, color: 'var(--badge-green-text)' }}>• {k.replace(/_/g,' ')} updated</div>
                        ))}
                        {(recheckResult[row.id].warnings || []).map((w,i) => (
                          <div key={i} style={{ fontSize: 9, color: 'var(--badge-amber-text)' }}>⚠ {w}</div>
                        ))}
                      </div>
                    )}
                    {recheckState[row.id] === 'error' && recheckResult[row.id] && (
                      <div style={{ marginTop: 4, padding: '4px 6px', background: 'var(--badge-red-bg)', border: '1px solid var(--badge-red-border)', borderRadius: 4 }}>
                        <div style={{ fontSize: 10, fontWeight: 700, color: 'var(--badge-red-text)' }}>✗ Recheck failed</div>
                        {(recheckResult[row.id].errors || []).map((e,i) => (
                          <div key={i} style={{ fontSize: 9, color: 'var(--badge-red-text)' }}>{e}</div>
                        ))}
                      </div>
                    )}
                  </td>
                </tr>
                );
              })}
            </tbody>
          </table>
        </div>
        <div style={{ padding: '10px 16px', borderTop: '1px solid var(--border)', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
          <span style={{ fontSize: 11, color: 'var(--text-3)' }}>Showing {sorted.length} of {batches.length} shipments</span>
        </div>
      </Card>}
    </div>
  );
}

// ══════════════════════════════════════════════════════════
// BATCH DETAIL PAGE (real API)
// ══════════════════════════════════════════════════════════

const DETAIL_TABS = ['Pipeline', 'Documents', 'Timeline', 'Intelligence', 'Proposals'];

function BatchDetailPage({ batchId, onBack, onToast }) {
  const [audit, setAudit] = React.useState(null);
  const [loading, setLoading] = React.useState(true);
  const [err, setErr] = React.useState('');
  const [activeTab, setActiveTab] = React.useState('Pipeline');
  const [timeline, setTimeline] = React.useState([]);
  const [busy, setBusy] = React.useState({});
  const [pzNumber, setPzNumber] = React.useState('');
  const [confirmingPz, setConfirmingPz] = React.useState(false);
  const [wfirmaPreview, setWfirmaPreview] = React.useState(null);   // {rows, clipboard} or null
  const [wfirmaCopied, setWfirmaCopied] = React.useState(false);     // timestamp of last copy
  const [scanResult, setScanResult] = React.useState(null);          // DHL inbox scan response
  const [confirmingMarkRec, setConfirmingMarkRec] = React.useState(false);
  const _markRecDefaults = { sender: 'odprawacelna@dhl.com', subject: '', ticket: '', request_type: 'unknown', note: '' };
  const [markRecFields, setMarkRecFields] = React.useState(_markRecDefaults);
  const [replyStatus, setReplyStatus] = React.useState(null);   // live delivery check result
  const [recheckBusy, setRecheckBusy] = React.useState(false);
  const [recheckPanel, setRecheckPanel] = React.useState(null); // null | result object
  const [trackingData, setTrackingData] = React.useState(null); // null | tracking API result
  const [trackingBusy, setTrackingBusy] = React.useState(false);
  const [intelData, setIntelData] = React.useState(null);       // null | per-batch intel response
  const [intelLoading, setIntelLoading] = React.useState(false);
  const [proposals, setProposals] = React.useState([]);          // action proposals list
  const [proposalsBusy, setProposalsBusy] = React.useState({});  // proposal_id → bool
  const [proposalsLoading, setProposalsLoading] = React.useState(false);
  const [timelineFilter, setTimelineFilter] = React.useState('all'); // 'all' | 'ai_bridge'
  const sadRef = React.useRef();

  const setBusyKey = (k, v) => setBusy(p => ({ ...p, [k]: v }));

  const load = React.useCallback(async () => {
    setLoading(true); setErr('');
    try {
      const a = await apiFetch(`/dashboard/batches/${encodeURIComponent(batchId)}`);
      setAudit(a);
      if (a.doc_no) setPzNumber(a.doc_no);
    } catch (e) { setErr(e.message); }
    setLoading(false);
  }, [batchId]);

  const loadTimeline = React.useCallback(async () => {
    try {
      const tl = await apiFetch(`/api/v1/tracking/shipment/${encodeURIComponent(batchId)}/timeline`);
      setTimeline(Array.isArray(tl) ? tl : (tl.timeline || tl.events || []));
    } catch (e) {}
  }, [batchId]);

  const fetchTracking = React.useCallback(async (refresh = false) => {
    // Only fetch if there is an AWB on the audit object
    const awb = (audit || {}).tracking_no;
    if (!awb) return;
    const carr = (audit || {}).carrier || 'DHL';
    setTrackingBusy(true);
    try {
      const url = refresh
        ? `/api/v1/tracking/${encodeURIComponent(awb)}/refresh?carrier=${encodeURIComponent(carr)}&batch_id=${encodeURIComponent(batchId)}`
        : `/api/v1/tracking/${encodeURIComponent(awb)}?carrier=${encodeURIComponent(carr)}&batch_id=${encodeURIComponent(batchId)}`;
      const method = refresh ? 'POST' : 'GET';
      const td = await apiFetch(url, { method });
      setTrackingData(td);
    } catch (e) {
      setTrackingData({ available: false, source: 'error', error: e.message, tracking_url: '' });
    } finally { setTrackingBusy(false); }
  }, [batchId, audit]);

  const loadIntelligence = React.useCallback(async () => {
    setIntelLoading(true);
    try {
      const d = await apiFetch(`/api/v1/intelligence/suggestions/${encodeURIComponent(batchId)}`);
      setIntelData(d);
    } catch (e) { setIntelData({ error: e.message }); }
    setIntelLoading(false);
  }, [batchId]);

  const loadProposals = React.useCallback(async () => {
    setProposalsLoading(true);
    try {
      const d = await apiFetch(`/api/v1/action-proposals/${encodeURIComponent(batchId)}`);
      setProposals(d.proposals || []);
    } catch (e) { setProposals([]); }
    setProposalsLoading(false);
  }, [batchId]);

  const proposalAction = async (proposalId, action, body) => {
    setProposalsBusy(p => ({ ...p, [proposalId]: true }));
    try {
      await apiFetch(`/api/v1/action-proposals/${encodeURIComponent(proposalId)}/${action}`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      onToast(`Proposal ${action}d.`, 'success');
      await loadProposals();
    } catch (e) { onToast(e.message || `Failed to ${action}`, 'error'); }
    setProposalsBusy(p => ({ ...p, [proposalId]: false }));
  };

  React.useEffect(() => { load(); loadTimeline(); }, [batchId]);
  // Fetch tracking once the audit loads (audit is needed for tracking_no)
  React.useEffect(() => { if (audit) fetchTracking(); }, [audit?.tracking_no]);
  // Fetch intelligence when tab is activated
  React.useEffect(() => { if (activeTab === 'Intelligence' && !intelData) loadIntelligence(); }, [activeTab]);
  // Fetch proposals when tab is activated
  React.useEffect(() => { if (activeTab === 'Proposals') loadProposals(); }, [activeTab]);

  const doAction = async (key, label, fn) => {
    setBusyKey(key, true);
    onToast(`Running: ${label}…`, 'info');
    try {
      await fn();
      onToast(`${label} completed.`, 'success');
      await load();
    } catch (e) {
      onToast(`${label} failed: ${e.message}`, 'error');
    } finally { setBusyKey(key, false); }
  };

  if (loading) return (
    <div style={{ flex: 1, display: 'flex', alignItems: 'center', justifyContent: 'center', color: 'var(--text-3)', flexDirection: 'column', gap: 12 }}>
      <div style={{ fontSize: 32, animation: 'spin 1s linear infinite', display: 'inline-block' }}>⟳</div>
      <div style={{ fontSize: 13 }}>Loading shipment…</div>
    </div>
  );

  if (err) return (
    <div style={{ flex: 1, padding: 40 }}>
      <div style={{ padding: 16, borderRadius: 8, background: 'var(--badge-red-bg)', border: '1px solid var(--badge-red-border)', color: 'var(--badge-red-text)', fontSize: 13, marginBottom: 16 }}>{err}</div>
      <Btn variant="outline" onClick={load}>↻ Retry</Btn>
    </div>
  );
  if (!audit) return null;

  const t = audit.totals || {};
  const inp = audit.inputs || {};
  const ver = audit.verification || {};
  const _fd_raw = audit.files_detail || {};
  const fd = _fd_raw.files || _fd_raw || {};
  const sf = audit.source_files || _fd_raw.source_files || {};
  const status = audit.status || 'unknown';
  // Feature flag: V2 is default-on. Use ?actions_v2=0 to revert to legacy action controls.
  // Informational sections (shipment info, customs values, PZ totals, tracking, audit notes) stay visible.
  const v2Active = new URLSearchParams(window.location.search).get('actions_v2') !== '0';
  const trackingNo = audit.tracking_no || '';
  const carrier = audit.carrier || 'Unknown';
  const mrn = inp.zc429_mrn || audit.mrn || '—';
  const dhlClearance = audit.clearance_status || '';
  const hasSad = !!(inp.zc429) || ['sad_uploaded','customs_parsed','customs_verified','verification_needed'].includes(audit.sad_status);
  const pzGenerated = !!(fd.pz_pdf?.exists);

  const fileUrl = (key) => fd[key]?.url || '';
  const fileExists = (key) => !!(fd[key]?.exists);

  return (
    <div style={{ flex: 1, overflowY: 'auto', display: 'flex', flexDirection: 'column' }}>
      {/* Sub-header */}
      <div style={{ padding: '14px 32px', background: 'var(--card)', borderBottom: '1px solid var(--border)', display: 'flex', alignItems: 'center', gap: 16, flexShrink: 0, flexWrap: 'wrap' }}>
        <button onClick={onBack} style={{ background: 'none', border: 'none', cursor: 'pointer', display: 'flex', alignItems: 'center', gap: 4, color: 'var(--text-2)', fontSize: 12, fontFamily: 'inherit' }}>← Back</button>
        <div style={{ width: 1, height: 20, background: 'var(--border)' }} />
        <div>
          <span style={{ fontSize: 11, color: 'var(--text-3)' }}>Shipment / </span>
          <span style={{ fontSize: 13, fontWeight: 700, color: 'var(--text)', fontFamily: 'monospace' }}>{trackingNo || batchId}</span>
          {audit.doc_no && <span style={{ fontSize: 11, color: 'var(--text-3)', marginLeft: 8 }}>| {audit.doc_no}</span>}
        </div>
        <Badge status={mapOverall(status)} />
        <div style={{ flex: 1 }} />
        {DETAIL_TABS.map(tab => (

            setRecheckBusy(true); setRecheckPanel(null);
            try {
              const res = await apiFetch(`/dashboard/batches/${encodeURIComponent(batchId)}/recheck`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ mode: 'all' }) });
              setRecheckPanel(res);
              await load(); await loadTimeline();
              onToast(res.ok ? 'Recheck complete — values updated' : 'Recheck completed with errors', res.ok ? 'success' : 'error');
            } catch (e) {
              setRecheckPanel({ ok: false, errors: [e.message] });
              onToast(`Recheck failed: ${e.message}`, 'error');

        </Btn>
      </div>

      {recheckPanel && (
        <div style={{ margin: '0 32px 0', padding: '10px 14px', background: recheckPanel.ok ? 'var(--badge-green-bg)' : 'var(--badge-red-bg)', border: `1px solid ${recheckPanel.ok ? 'var(--badge-green-border)' : 'var(--badge-red-border)'}`, borderRadius: 6, display: 'flex', alignItems: 'flex-start', gap: 12, flexWrap: 'wrap' }}>
          <div style={{ flex: 1, minWidth: 200 }}>
            <div style={{ fontSize: 12, fontWeight: 700, color: recheckPanel.ok ? 'var(--badge-green-text)' : 'var(--badge-red-text)', marginBottom: 4 }}>
              {recheckPanel.ok ? '✓ Recheck complete' : '✗ Recheck failed'}
            </div>
            <div style={{ display: 'flex', flexWrap: 'wrap', gap: '2px 12px' }}>
              {Object.entries(recheckPanel.updated || {}).filter(([,v])=>v).map(([k]) => (

              ))}
            </div>
            {(recheckPanel.warnings || []).length > 0 && (
              <div style={{ marginTop: 4 }}>

            {(recheckPanel.errors || []).length > 0 && (
              <div style={{ marginTop: 4 }}>
                {recheckPanel.errors.map((e,i) => <div key={i} style={{ fontSize: 10, color: 'var(--badge-red-text)' }}>{e}</div>)}

        </div>
      )}

      <div style={{ padding: '24px 32px', display: 'flex', flexDirection: 'column', gap: 16 }}>

        {/* ── ACTIONS V2 (feature flag: ?actions_v2=1) ── */}
        {activeTab === 'Pipeline' && v2Active && (
          <ActionsV2Panel batchId={batchId} />
        )}

        {/* ── EMAIL EVIDENCE TIMELINE (always visible on Pipeline tab) ── */}
        {activeTab === 'Pipeline' && (
          <EmailEvidenceTimeline batchId={batchId} />
