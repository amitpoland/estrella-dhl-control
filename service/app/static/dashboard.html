<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Estrella PZ Customs Control</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous" />
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body, #root { height: 100%; }
  body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); }
  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

  :root {
    --bg: #F5F2EE; --bg-subtle: #FAF8F4; --card: #FFFFFF;
    --row-hover: #F8F5F0; --border: #E4DDD0; --border-subtle: #EEE8DE;
    --text: #1E2D4A; --text-2: #4A5A70; --text-3: #8A9AB0;
    --shadow: rgba(30,45,74,0.06); --shadow-heavy: rgba(30,45,74,0.16);
    --overlay: rgba(20,30,55,0.6);
    --accent: #C9A456; --accent-light: #E0BC74; --accent-text: #1E2D4A;
    --accent-subtle: #FBF5E4; --accent-border: #DCBE7A;
    --sidebar-bg: #1E2D4A; --sidebar-border: #28395E;
    --sidebar-active: #2A3D5E; --sidebar-hover: #253558;
    --sidebar-text: #F0EAE0; --sidebar-text-muted: #6A7A96; --sidebar-icon: #8A9AB6;
    --badge-neutral-bg: #EEF0F4; --badge-neutral-text: #4A5A70; --badge-neutral-border: #CED4E0;
    --badge-blue-bg: #E8EFF8; --badge-blue-text: #1A4A90; --badge-blue-border: #AABEE0;
    --badge-amber-bg: #FBF5E0; --badge-amber-text: #805A00; --badge-amber-border: #DEC870;
    --badge-orange-bg: #FBF0E4; --badge-orange-text: #804000; --badge-orange-border: #DEB870;
    --badge-green-bg: #E8F5EE; --badge-green-text: #186838; --badge-green-border: #96CCA8;
    --badge-red-bg: #FBE8E6; --badge-red-text: #902018; --badge-red-border: #E0A8A0;
    --badge-purple-bg: #EEE8F8; --badge-purple-text: #481898; --badge-purple-border: #BEA4E8;
    --badge-accent-bg: #1E2D4A; --badge-accent-text: #C9A456; --badge-accent-border: #C9A456;
  }
  [data-theme="dark"] {
    --bg: #111928; --bg-subtle: #172030; --card: #1C2638;
    --row-hover: #223040; --border: #2C3C54; --border-subtle: #243050;
    --text: #EEE8DC; --text-2: #8A9AB6; --text-3: #566478;
    --shadow: rgba(0,0,0,0.3); --shadow-heavy: rgba(0,0,0,0.5);
    --overlay: rgba(0,0,0,0.72);
    --accent: #D4AA5C; --accent-light: #ECC870; --accent-text: #111928;
    --accent-subtle: #1E2808; --accent-border: #5A4A18;
    --sidebar-bg: #0E1828; --sidebar-border: #1A2840;
    --sidebar-active: #1A2E48; --sidebar-hover: #162438;
    --sidebar-text: #EEE8DC; --sidebar-text-muted: #566478; --sidebar-icon: #6A7A96;
    --badge-neutral-bg: #1C2838; --badge-neutral-text: #8A9AB6; --badge-neutral-border: #2C3C54;
    --badge-blue-bg: #0E1E38; --badge-blue-text: #80AAEE; --badge-blue-border: #1E3A64;
    --badge-amber-bg: #20180A; --badge-amber-text: #E8C040; --badge-amber-border: #584010;
    --badge-orange-bg: #201008; --badge-orange-text: #E89860; --badge-orange-border: #582010;
    --badge-green-bg: #0E2018; --badge-green-text: #68CC88; --badge-green-border: #1A4830;
    --badge-red-bg: #200E10; --badge-red-text: #EE8880; --badge-red-border: #581018;
    --badge-purple-bg: #160E28; --badge-purple-text: #AA88EE; --badge-purple-border: #341860;
    --badge-accent-bg: #1E2808; --badge-accent-text: #D4AA5C; --badge-accent-border: #5A4A18;
  }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

// ══════════════════════════════════════════════════════════
// CONSTANTS
// ══════════════════════════════════════════════════════════

const GOLD = 'var(--accent)';
const SIDEBAR_W = 220;

const NAV_ITEMS = [
  { id: 'dashboard',  label: 'Dashboard',         icon: '▦' },
  { id: 'shipments',  label: 'Shipments',          icon: '⬡' },
  { id: 'dhl',        label: 'DHL Clearance',      icon: '✈' },
  { id: 'customs',    label: 'Customs Documents',  icon: '⊟' },
  { id: 'warehouse_scanner', label: 'Warehouse Scanner', icon: '⊡', href: '/dashboard/warehouse.html' },
  { id: 'pz',         label: 'PZ / Accounting',    icon: '⊞' },
  { id: 'wfirma',     label: 'wFirma',             icon: '↗' },
  { id: 'reports',       label: 'Analytics',          icon: '≡' },
  { id: 'intelligence',  label: 'Intelligence',       icon: '◈' },
  { id: 'ai_bridge',    label: 'AI Bridge',          icon: '⇌' },
  { id: 'learning',      label: 'Learning / Parser',  icon: '◎' },
  { id: 'admin',         label: 'Admin / Settings',   icon: '⚙' },
];

const STATUS_MAP = {
  'Draft':                 { bg: 'var(--badge-neutral-bg)', text: 'var(--badge-neutral-text)', border: 'var(--badge-neutral-border)' },
  'In Transit':            { bg: 'var(--badge-blue-bg)',    text: 'var(--badge-blue-text)',    border: 'var(--badge-blue-border)' },
  'Pre-check Pending':     { bg: 'var(--badge-amber-bg)',   text: 'var(--badge-amber-text)',   border: 'var(--badge-amber-border)' },
  'Pre-check Completed':   { bg: 'var(--badge-green-bg)',   text: 'var(--badge-green-text)',   border: 'var(--badge-green-border)' },
  'Awaiting DHL Email':    { bg: 'var(--badge-orange-bg)',  text: 'var(--badge-orange-text)',  border: 'var(--badge-orange-border)' },
  'DHL Email Received':    { bg: 'var(--badge-blue-bg)',    text: 'var(--badge-blue-text)',    border: 'var(--badge-blue-border)' },
  'Reply Sent':            { bg: 'var(--badge-green-bg)',   text: 'var(--badge-green-text)',   border: 'var(--badge-green-border)' },
  'Reply Queued':          { bg: 'var(--badge-amber-bg)',   text: 'var(--badge-amber-text)',   border: 'var(--badge-amber-border)' },
  'SAD Pending':           { bg: 'var(--badge-amber-bg)',   text: 'var(--badge-amber-text)',   border: 'var(--badge-amber-border)' },
  'SAD Uploaded':          { bg: 'var(--badge-blue-bg)',    text: 'var(--badge-blue-text)',    border: 'var(--badge-blue-border)' },
  'Customs Parsed':        { bg: 'var(--badge-green-bg)',   text: 'var(--badge-green-text)',   border: 'var(--badge-green-border)' },
  'Verification Needed':   { bg: 'var(--badge-red-bg)',     text: 'var(--badge-red-text)',     border: 'var(--badge-red-border)' },
  'Customs Verified':      { bg: 'var(--badge-green-bg)',   text: 'var(--badge-green-text)',   border: 'var(--badge-green-border)' },
  'Locked':                { bg: 'var(--badge-neutral-bg)', text: 'var(--badge-neutral-text)', border: 'var(--badge-neutral-border)' },
  'Ready for PZ':          { bg: 'var(--badge-green-bg)',   text: 'var(--badge-green-text)',   border: 'var(--badge-green-border)' },
  'Generated':             { bg: 'var(--badge-green-bg)',   text: 'var(--badge-green-text)',   border: 'var(--badge-green-border)' },
  'Ready for Booking':     { bg: 'var(--badge-purple-bg)',  text: 'var(--badge-purple-text)',  border: 'var(--badge-purple-border)' },
  'Exported':              { bg: 'var(--badge-accent-bg)',  text: 'var(--badge-accent-text)',  border: 'var(--badge-accent-border)' },
  'Awaiting DHL':          { bg: 'var(--badge-amber-bg)',   text: 'var(--badge-amber-text)',   border: 'var(--badge-amber-border)' },
  'Awaiting SAD':          { bg: 'var(--badge-orange-bg)',  text: 'var(--badge-orange-text)',  border: 'var(--badge-orange-border)' },
  'Action Required':       { bg: 'var(--badge-red-bg)',     text: 'var(--badge-red-text)',     border: 'var(--badge-red-border)' },
  'In Preparation':        { bg: 'var(--badge-neutral-bg)', text: 'var(--badge-neutral-text)', border: 'var(--badge-neutral-border)' },
  'Completed':             { bg: 'var(--badge-green-bg)',   text: 'var(--badge-green-text)',   border: 'var(--badge-green-border)' },
  'Pending':               { bg: 'var(--badge-amber-bg)',   text: 'var(--badge-amber-text)',   border: 'var(--badge-amber-border)' },
  'Live':                  { bg: 'var(--badge-green-bg)',   text: 'var(--badge-green-text)',   border: 'var(--badge-green-border)' },
  'Awaiting Clearance':    { bg: 'var(--badge-blue-bg)',    text: 'var(--badge-blue-text)',    border: 'var(--badge-blue-border)' },
};

// ══════════════════════════════════════════════════════════
// HELPERS
// ══════════════════════════════════════════════════════════

function fmtPLN(n) {
  if (n == null || n === '') return '—';
  const num = Number(n);
  if (isNaN(num)) return '—';
  return 'PLN ' + num.toLocaleString('pl-PL', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function mapOverall(status) {
  const m = {
    success: 'Ready for Booking', partial: 'Action Required',
    blocked: 'Action Required', failed: 'Action Required',
    awaiting_dhl_email: 'Awaiting DHL', awaiting_sad: 'Awaiting SAD',
    awaiting_clearance: 'Awaiting Clearance',
    in_preparation: 'In Preparation', draft: 'Draft',
    ready: 'Ready for PZ', processing: 'In Preparation',
    collecting: 'In Preparation',
  };
  return m[status] || (status ? status.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase()) : 'Pending');
}

function mapDhlStatus(s) {
  if (!s) return '—';
  const m = {
    awaiting_dhl_email: 'Awaiting DHL Email',
    dhl_email_received: 'DHL Email Received',
    reply_sent: 'Reply Sent',
    reply_queued: 'Reply Queued',
    pre_check_completed: 'Pre-check Completed',
    pre_check_pending: 'Pre-check Pending',
    reply_package_prepared: 'Reply Package Prepared',
  };
  return m[s] || s.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
}

function mapSadStatus(s) {
  if (!s) return 'SAD Pending';
  const m = {
    // frontend legacy values
    sad_pending:          'SAD Pending',
    sad_uploaded:         'SAD Uploaded',
    customs_parsed:       'Customs Parsed',
    customs_verified:     'Customs Verified',
    verification_needed:  'Verification Needed',
    // backend _derive_sad_status() values
    missing:              'SAD Pending',
    uploaded:             'SAD Uploaded',
    uploaded_parsed:      'Customs Parsed',
  };
  return m[s] || s.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
}

function mapPzStatus(s) {
  if (!s) return 'Locked';
  const m = { locked: 'Locked', ready: 'Ready for PZ', generated: 'Generated', exported: 'Exported' };
  return m[s] || s.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
}

function transformBatch(b) {
  return {
    id:        b.batch_id,
    batch_id:  b.batch_id,
    awb:       b.tracking_no || b.doc_no || b.batch_id,
    carrier:   b.carrier || '—',
    dhlStatus: mapDhlStatus(b.dhl_status),
    dhlRec:    b.dhl_status === 'reply_sent' ? 'Completed'
             : b.dhl_status === 'reply_queued' ? 'Queued'
             : b.dhl_status === 'pre_check_completed' ? 'No Reply Needed'
             : b.dhl_status === 'dhl_email_received' ? 'Reply Required' : '—',
    sadStatus: mapSadStatus(b.sad_status),
    mrn:       b.mrn || '—',
    pzStatus:  mapPzStatus(b.pz_status),
    net:       fmtPLN(b.net),
    gross:     fmtPLN(b.gross),
    duty:      fmtPLN(b.duty),
    overall:   mapOverall(b.status),
    doc_no:    b.doc_no || '',
    timestamp: b.timestamp || '',
    has_sad:   b.has_sad,
    warehouseHint: b.warehouse_status_hint || 'n/a',
    salesHint:     b.sales_status_hint || 'n/a',
    wfirmaHint:    b.wfirma_status_hint || 'n/a',
    _raw:      b,
  };
}

async function apiFetch(url, opts = {}) {
  let res;
  try {
    res = await fetch(url, { credentials: 'include', ...opts });
  } catch (netErr) {
    // Network-level failure (service down, no connection)
    const err = new Error('Service unreachable — check that the backend is running.');
    err.type = 'network';
    throw err;
  }
  if (res.status === 401 || res.status === 403) {
    const err = new Error('Session expired or access denied.');
    err.type = 'auth';
    err.status = res.status;
    throw err;
  }
  if (!res.ok) {
    const text = await res.text().catch(() => '');
    throw new Error(`HTTP ${res.status}: ${text.slice(0, 200)}`);
  }
  const ct = res.headers.get('content-type') || '';
  return ct.includes('json') ? res.json() : res.text();
}

// ══════════════════════════════════════════════════════════
// SESSION BANNER
// ══════════════════════════════════════════════════════════

function SessionBanner({ type, onDismiss }) {
  // type: 'auth' | 'network'
  const isAuth = type === 'auth';
  return (
    <div style={{
      position: 'fixed', top: 0, left: 0, right: 0, zIndex: 9999,
      background: isAuth ? '#7A2000' : '#4A3A00',
      color: '#FFF', padding: '10px 20px',
      display: 'flex', alignItems: 'center', gap: 12,
      fontSize: 13, fontWeight: 500, boxShadow: '0 2px 8px rgba(0,0,0,0.3)',
      animation: 'fadeIn 0.2s ease',
    }}>
      <span style={{ fontSize: 16 }}>{isAuth ? '🔒' : '⚠️'}</span>
      <span style={{ flex: 1 }}>
        {isAuth
          ? 'Session expired or access denied.'
          : 'Service unreachable — the backend may be down.'}
        {' '}
        {isAuth
          ? <a href="/login" style={{ color: '#FFD080', textDecoration: 'underline' }}>Sign in again</a>
          : <span style={{ color: '#FFD080', cursor: 'pointer', textDecoration: 'underline' }}
              onClick={() => window.location.reload()}>Retry</span>}
      </span>
      {onDismiss && (
        <button onClick={onDismiss} style={{
          background: 'none', border: 'none', color: '#FFF', cursor: 'pointer',
          fontSize: 16, padding: '0 4px', lineHeight: 1,
        }}>✕</button>
      )}
    </div>
  );
}

// ══════════════════════════════════════════════════════════
// BASE COMPONENTS
// ══════════════════════════════════════════════════════════

function Badge({ status, small }) {
  const s = STATUS_MAP[status] || { bg: 'var(--badge-neutral-bg)', text: 'var(--badge-neutral-text)', border: 'var(--badge-neutral-border)' };
  return (
    <span style={{
      display: 'inline-flex', alignItems: 'center',
      background: s.bg, color: s.text, border: `1px solid ${s.border}`,
      borderRadius: 4, padding: small ? '1px 6px' : '2px 8px',
      fontSize: small ? 10 : 11, fontWeight: 600, letterSpacing: '0.03em', whiteSpace: 'nowrap',
    }}>{status || 'Unknown'}</span>
  );
}

function Card({ children, style, onClick }) {
  return (
    <div onClick={onClick} style={{
      background: 'var(--card)', borderRadius: 8,
      border: '1px solid var(--border)',
      boxShadow: '0 1px 3px var(--shadow)', ...style,
    }}>{children}</div>
  );
}

function Btn({ children, onClick, variant = 'default', small, disabled, style: xs }) {
  const variants = {
    default: { background: 'var(--text)', color: 'var(--card)', border: '1px solid var(--text)' },
    gold:    { background: 'var(--accent)', color: 'var(--accent-text)', border: '1px solid var(--accent)' },
    outline: { background: 'transparent', color: 'var(--text)', border: '1px solid var(--border)' },
    ghost:   { background: 'transparent', color: 'var(--text-2)', border: '1px solid transparent' },
    danger:  { background: 'var(--badge-red-bg)', color: 'var(--badge-red-text)', border: '1px solid var(--badge-red-border)' },
    success: { background: 'var(--badge-green-bg)', color: 'var(--badge-green-text)', border: '1px solid var(--badge-green-border)' },
  };
  const v = variants[variant] || variants.default;
  return (
    <button onClick={onClick} disabled={disabled} style={{
      ...v, borderRadius: 6, cursor: disabled ? 'not-allowed' : 'pointer',
      padding: small ? '4px 10px' : '7px 14px',
      fontSize: small ? 11 : 12, fontWeight: 600,
      opacity: disabled ? 0.45 : 1,
      display: 'inline-flex', alignItems: 'center', gap: 4,
      whiteSpace: 'nowrap', transition: 'opacity 0.15s',
      fontFamily: 'inherit', ...xs,
    }}>{children}</button>
  );
}

function Modal({ title, onClose, children, wide }) {
  return (
    <div style={{
      position: 'fixed', inset: 0, background: 'var(--overlay)',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      zIndex: 1000, padding: 24,
    }} onClick={e => e.target === e.currentTarget && onClose()}>
      <div style={{
        background: 'var(--card)', borderRadius: 10,
        width: wide ? 680 : 480, maxWidth: '100%',
        maxHeight: '90vh', overflow: 'auto',
        boxShadow: '0 20px 60px var(--shadow-heavy)',
        border: '1px solid var(--border)',
      }}>
        <div style={{ padding: '18px 24px', borderBottom: '1px solid var(--border)', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
          <h2 style={{ margin: 0, fontSize: 16, fontWeight: 700, fontFamily: '"DM Serif Display",serif', color: 'var(--text)' }}>{title}</h2>
          <button onClick={onClose} style={{ background: 'none', border: 'none', cursor: 'pointer', fontSize: 18, color: 'var(--text-3)' }}>×</button>
        </div>
        <div style={{ padding: 24 }}>{children}</div>
      </div>
    </div>
  );
}

function FormField({ label, children, hint }) {
  return (
    <div style={{ marginBottom: 16 }}>
      <label style={{ display: 'block', fontSize: 11, fontWeight: 600, color: 'var(--text-2)', marginBottom: 5, letterSpacing: '0.04em', textTransform: 'uppercase' }}>{label}</label>
      {children}
      {hint && <div style={{ fontSize: 10, color: 'var(--text-3)', marginTop: 3 }}>{hint}</div>}
    </div>
  );
}

function Inp({ value, onChange, placeholder, type = 'text', style: s }) {
  return (
    <input value={value} onChange={onChange} placeholder={placeholder} type={type} style={{
      width: '100%', padding: '8px 10px', borderRadius: 6,
      border: '1px solid var(--border)', fontSize: 12, color: 'var(--text)',
      background: 'var(--bg-subtle)', outline: 'none',
      boxSizing: 'border-box', fontFamily: 'inherit', ...s,
    }} />
  );
}

function Sel({ value, onChange, children }) {
  return (
    <select value={value} onChange={onChange} style={{
      width: '100%', padding: '8px 10px', borderRadius: 6,
      border: '1px solid var(--border)', fontSize: 12, color: 'var(--text)',
      background: 'var(--bg-subtle)', outline: 'none',
      boxSizing: 'border-box', fontFamily: 'inherit',
    }}>{children}</select>
  );
}

function SectionHeader({ icon, title, subtitle, status }) {
  return (
    <div style={{ display: 'flex', alignItems: 'center', gap: 12, padding: '14px 20px', borderBottom: '1px solid var(--border)', background: 'var(--bg-subtle)' }}>
      <div style={{ width: 32, height: 32, borderRadius: 6, background: 'var(--accent-subtle)', border: '1px solid var(--accent-border)', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 14, color: 'var(--accent)' }}>{icon}</div>
      <div style={{ flex: 1 }}>
        <div style={{ fontSize: 13, fontWeight: 700, color: 'var(--text)' }}>{title}</div>
        {subtitle && <div style={{ fontSize: 11, color: 'var(--text-2)', marginTop: 1 }}>{subtitle}</div>}
      </div>
      {status && <Badge status={status} />}
    </div>
  );
}

function InfoRow({ label, value, mono }) {
  return (
    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline', padding: '6px 0', borderBottom: '1px solid var(--border-subtle)' }}>
      <span style={{ fontSize: 11, color: 'var(--text-2)', fontWeight: 500 }}>{label}</span>
      <span style={{ fontSize: 11, color: 'var(--text)', fontWeight: 600, fontFamily: mono ? 'monospace' : 'inherit', textAlign: 'right', maxWidth: '60%', wordBreak: 'break-all' }}>{value ?? '—'}</span>
    </div>
  );
}

function Toast({ msg, type }) {
  const colors = { success: 'var(--badge-green-text)', info: 'var(--badge-blue-text)', error: 'var(--badge-red-text)', warn: 'var(--badge-amber-text)' };
  return (
    <div style={{
      position: 'fixed', top: 70, right: 24, zIndex: 9999,
      background: colors[type] || colors.info,
      color: '#fff', padding: '10px 18px', borderRadius: 8,
      fontSize: 12, fontWeight: 600, boxShadow: '0 4px 16px rgba(0,0,0,0.15)',
      animation: 'fadeIn 0.2s', maxWidth: 380, wordBreak: 'break-word',
    }}>{msg}</div>
  );
}

// ══════════════════════════════════════════════════════════
// SIDEBAR
// ══════════════════════════════════════════════════════════

function Sidebar({ active, onNav, collapsed, onToggle }) {
  return (
    <aside style={{
      width: collapsed ? 52 : SIDEBAR_W, minWidth: collapsed ? 52 : SIDEBAR_W,

      <button onClick={onToggle} style={{ padding: '12px 16px', background: 'transparent', border: 'none', borderTop: '1px solid var(--sidebar-border)', cursor: 'pointer', color: 'var(--sidebar-icon)', fontSize: 12, display: 'flex', justifyContent: collapsed ? 'center' : 'flex-end' }}>
        {collapsed ? '›' : '‹'}
      </button>
    </aside>
  );
}

const IntakeFileDropZone = ({ accept, multiple, hint, files, onChange, compact }) => {

        onChange={e => onChange(Array.from(e.target.files))} style={{ display:'none' }} />

        {files && files.length > 0 ? '✓' : (accept.includes('.pdf') ? '📄' : '📊')}
      </span>
      <span style={{ fontSize:11, color: files && files.length > 0 ? 'var(--badge-green-text)' : 'var(--text-2)',

const IntakeRemoveBtn = ({ onClick }) => (

      cursor:'pointer', fontFamily:'inherit', fontWeight:600 }}>✕ Remove</button>
);

// ── Main modal ─────────────────────────────────────────────
function NewShipmentModal({ onClose, onCreated }) {
  // Step: 1=form, 2=uploading, 3=success
  const [step, setStep] = React.useState(1);
  const [error, setError] = React.useState('');

  // A. Shipment / AWB
  const [awbNo, setAwbNo]     = React.useState('');
  const [carrier, setCarrier] = React.useState('DHL');
  const [awbFile, setAwbFile] = React.useState([]);    // [File]

  // B. Purchase blocks: [{invoiceFiles, packingFiles, supplierName}]
  const emptyPurchase = () => ({ id: Math.random(), invoiceFiles:[], packingFiles:[], supplierName:'' });
  const [purchaseBlocks, setPurchaseBlocks] = React.useState([emptyPurchase()]);

  const addPurchaseBlock    = () => setPurchaseBlocks(b => [...b, emptyPurchase()]);
  const removePurchaseBlock = (id) => setPurchaseBlocks(b => b.filter(x => x.id !== id));
  const updatePurchase      = (id, patch) =>
    setPurchaseBlocks(b => b.map(x => x.id === id ? { ...x, ...patch } : x));

  // C. Sales blocks: [{salesFiles, salesPackingFiles, clientName, clientRef}]
  const emptySales = () => ({ id: Math.random(), salesFiles:[], salesPackingFiles:[], clientName:'', clientRef:'' });
  const [salesBlocks, setSalesBlocks] = React.useState([]);

  const addSalesBlock    = () => setSalesBlocks(b => [...b, emptySales()]);
  const removeSalesBlock = (id) => setSalesBlocks(b => b.filter(x => x.id !== id));
  const updateSales      = (id, patch) =>
    setSalesBlocks(b => b.map(x => x.id === id ? { ...x, ...patch } : x));

  const hasInvoices = purchaseBlocks.some(b => b.invoiceFiles.length > 0);

  const handleSubmit = async () => {
    if (!awbNo.trim()) { setError('AWB / Tracking number is required.'); return; }
    if (!hasInvoices)  { setError('At least one purchase invoice is required.'); return; }
    setStep(2); setError('');

    try {
      const fd = new FormData();
      fd.append('tracking_no', awbNo.trim());
      fd.append('carrier', carrier);
      if (awbFile.length > 0) fd.append('awb', awbFile[0]);

      // Build metadata + flatten files
      const purchaseMeta = [];
      let invIdx = 0, packIdx = 0;
      purchaseBlocks.forEach(block => {
        block.invoiceFiles.forEach(f => fd.append('invoices', f));
        const blockMeta = { invoice_index: invIdx, packing_index: packIdx, supplier_name: block.supplierName };
        if (block.packingFiles.length > 0) {
          block.packingFiles.forEach(f => fd.append('packing_lists', f));
          purchaseMeta.push(blockMeta);
          packIdx += block.packingFiles.length;
        } else {
          purchaseMeta.push({ ...blockMeta, packing_index: -1 });
        }
        invIdx += block.invoiceFiles.length;
      });

      const salesMeta = [];
      let sDocIdx = 0, sPackIdx = 0;
      salesBlocks.forEach(block => {
        block.salesFiles.forEach(f => fd.append('sales_documents', f));
        block.salesPackingFiles.forEach(f => fd.append('sales_packing_lists', f));
        salesMeta.push({
          document_index: sDocIdx,
          packing_index:  sPackIdx,
          client_name:    block.clientName,
          client_ref:     block.clientRef,
        });
        sDocIdx  += block.salesFiles.length;
        sPackIdx += block.salesPackingFiles.length;
      });

      fd.append('metadata', JSON.stringify({
        purchase_blocks: purchaseMeta,
        sales_blocks:    salesMeta,
      }));

      const r = await fetch('/api/v1/shipment/intake', {
        method: 'POST', body: fd, credentials: 'include',
      });
      if (!r.ok) {
        const msg = await r.text().catch(() => 'Upload failed');
        throw new Error(msg);
      }
      const data = await r.json();
      setStep(3);
      setTimeout(() => onCreated({ awb: awbNo, carrier, batchId: data.batch_id }), 900);
    } catch (e) {
      setStep(1);
      setError(e.message || 'Upload failed. Check the server.');
    }
  };

  // ── Section A styles ─────────────────────────────────────
  const sectionStyle = {
    marginBottom: 22,
    padding: '16px 18px',
    borderRadius: 8,
    border: '1px solid var(--border)',
    background: 'var(--bg-subtle)',
  };

  const blockStyle = {
    marginBottom: 14,
    padding: '14px 16px',
    borderRadius: 7,
    border: '1px solid var(--border-subtle)',
    background: 'var(--card)',
    position: 'relative',
  };

  return (
    <Modal title="New Shipment" onClose={onClose} wide>
      {step === 1 && (
        <>
          {error && (
            <div style={{ marginBottom:14, padding:'10px 14px', borderRadius:6,
              background:'var(--badge-red-bg)', border:'1px solid var(--badge-red-border)',
              fontSize:12, color:'var(--badge-red-text)' }}>{error}</div>
          )}

          {/* ── A. Shipment / AWB ─────────────────────── */}
          <div style={sectionStyle}>
            <IntakeSectionHeader icon="✈" label="A. Shipment / AWB" sub="Tracking number becomes the shipment key" />
            <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:14, marginBottom:14 }}>
              <FormField label="AWB / Tracking Number" hint="Required">
                <Inp value={awbNo} onChange={e => setAwbNo(e.target.value)} placeholder="e.g. 2824221912" />
              </FormField>
              <FormField label="Carrier">
                <Sel value={carrier} onChange={e => setCarrier(e.target.value)}>
                  <option>DHL</option><option>FedEx</option><option>Other</option>
                </Sel>
              </FormField>
            </div>
            <FormField label="AWB PDF" hint="Optional — system will extract shipper, receiver, customs value">
              <IntakeFileDropZone
                accept=".pdf"
                hint="Click to upload AWB / Tracking PDF"
                files={awbFile}
                onChange={setAwbFile}
                compact
              />
            </FormField>
          </div>

          {/* ── B. Purchase Documents ─────────────────── */}
          <div style={sectionStyle}>
            <IntakeSectionHeader icon="📄" label="B. Purchase Documents"
              sub="One block per supplier invoice. Packing list is optional at intake." />

            {purchaseBlocks.map((block, bIdx) => (
              <div key={block.id} style={blockStyle}>
                <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:12 }}>
                  <span style={{ fontSize:12, fontWeight:700, color:'var(--text-2)' }}>
                    Invoice Block {bIdx + 1}
                  </span>
                  {purchaseBlocks.length > 1 && (
                    <IntakeRemoveBtn onClick={() => removePurchaseBlock(block.id)} />
                  )}
                </div>
                <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:12 }}>
                  <FormField label="Purchase Invoice PDF" hint="Required">
                    <IntakeFileDropZone
                      accept=".pdf"
                      multiple
                      hint="Click to upload invoice PDF(s)"
                      files={block.invoiceFiles}
                      onChange={files => updatePurchase(block.id, { invoiceFiles: files })}
                    />
                  </FormField>
                  <FormField label="Packing List" hint="PDF or XLS — optional">
                    <IntakeFileDropZone
                      accept=".pdf,.xlsx,.xls"
                      hint="Click to upload packing list"
                      files={block.packingFiles}
                      onChange={files => updatePurchase(block.id, { packingFiles: files })}
                    />
                  </FormField>
                </div>
                <FormField label="Supplier Name" hint="Optional">
                  <Inp
                    value={block.supplierName}
                    onChange={e => updatePurchase(block.id, { supplierName: e.target.value })}
                    placeholder="e.g. SEEPZ Manufacturer Pvt Ltd"
                  />
                </FormField>
              </div>
            ))}

            <button onClick={addPurchaseBlock}
              style={{ display:'flex', alignItems:'center', gap:6, background:'transparent',
                border:'1px dashed var(--accent-border)', borderRadius:6,
                padding:'8px 14px', fontSize:12, fontWeight:600, color:'var(--accent)',
                cursor:'pointer', fontFamily:'inherit', width:'100%', justifyContent:'center' }}>
              <span style={{ fontSize:16, lineHeight:1 }}>+</span> Add Purchase Invoice
            </button>
          </div>

          {/* ── C. Sales / Client Documents ───────────── */}
          <div style={sectionStyle}>
            <IntakeSectionHeader icon="🛒" label="C. Sales / Client Documents"
              sub="Optional — attach outgoing sales orders or dispatch documents" />

            {salesBlocks.length === 0 && (
              <div style={{ fontSize:12, color:'var(--text-3)', textAlign:'center', padding:'10px 0', marginBottom:12 }}>
                No sales documents yet. Click below to add.
              </div>
            )}

            {salesBlocks.map((block, bIdx) => (
              <div key={block.id} style={blockStyle}>
                <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:12 }}>
                  <span style={{ fontSize:12, fontWeight:700, color:'var(--text-2)' }}>
                    Sales Block {bIdx + 1}
                  </span>
                  <IntakeRemoveBtn onClick={() => removeSalesBlock(block.id)} />
                </div>
                <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:12, marginBottom:12 }}>
                  <FormField label="Client Name">
                    <Inp
                      value={block.clientName}
                      onChange={e => updateSales(block.id, { clientName: e.target.value })}
                      placeholder="e.g. Acme Jewels GmbH"
                    />
                  </FormField>
                  <FormField label="Client Reference / Order No.">
                    <Inp
                      value={block.clientRef}
                      onChange={e => updateSales(block.id, { clientRef: e.target.value })}
                      placeholder="e.g. PO-2026-001"
                    />
                  </FormField>
                </div>
                <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:12 }}>
                  <FormField label="Sales Invoice / Order" hint="PDF">
                    <IntakeFileDropZone
                      accept=".pdf"
                      multiple
                      hint="Click to upload sales invoice or order"
                      files={block.salesFiles}
                      onChange={files => updateSales(block.id, { salesFiles: files })}
                    />
                  </FormField>
                  <FormField label="Sales Packing List" hint="PDF or XLS">
                    <IntakeFileDropZone
                      accept=".pdf,.xlsx,.xls"
                      hint="Click to upload sales packing list"
                      files={block.salesPackingFiles}
                      onChange={files => updateSales(block.id, { salesPackingFiles: files })}
                    />
                  </FormField>
                </div>
              </div>
            ))}

            <button onClick={addSalesBlock}
              style={{ display:'flex', alignItems:'center', gap:6, background:'transparent',
                border:'1px dashed var(--badge-neutral-border)', borderRadius:6,
                padding:'8px 14px', fontSize:12, fontWeight:600, color:'var(--text-2)',
                cursor:'pointer', fontFamily:'inherit', width:'100%', justifyContent:'center' }}>
              <span style={{ fontSize:16, lineHeight:1 }}>+</span> Add Sales Document
            </button>
          </div>

          {/* ── Info + Submit ─────────────────────────── */}
          <div style={{ padding:'10px 14px', borderRadius:6, background:'var(--badge-amber-bg)',
            border:'1px solid var(--badge-amber-border)', fontSize:11, color:'#8A5A00', marginBottom:16 }}>
            ℹ All documents are saved as evidence. SAD / ZC429 is uploaded separately after customs clearance.
            PZ number is assigned at the end of the workflow.
          </div>
          <div style={{ display:'flex', justifyContent:'flex-end', gap:8, paddingTop:14, borderTop:'1px solid var(--border)' }}>
            <Btn variant="outline" onClick={onClose}>Cancel</Btn>
            <Btn variant="gold" onClick={handleSubmit} disabled={!awbNo.trim() || !hasInvoices}>
              Submit Intake
            </Btn>
          </div>
        </>
      )}

      {step === 2 && (
        <div style={{ padding:'48px 0', textAlign:'center' }}>
          <div style={{ fontSize:36, marginBottom:12, display:'inline-block', animation:'spin 1s linear infinite' }}>⟳</div>
          <div style={{ fontSize:14, fontWeight:600, color:'var(--text)' }}>Creating shipment…</div>
          <div style={{ fontSize:12, color:'var(--text-2)', marginTop:4 }}>
            Saving files · Registering documents · Parsing AWB…
          </div>
        </div>
      )}

      {step === 3 && (
        <div style={{ padding:'48px 0', textAlign:'center' }}>
          <div style={{ fontSize:36, marginBottom:12 }}>✅</div>
          <div style={{ fontSize:14, fontWeight:600, color:'var(--badge-green-text)' }}>Shipment created!</div>
          <div style={{ fontSize:12, color:'var(--text-2)', marginTop:4 }}>Redirecting to shipment detail…</div>
        </div>
      )}
    </Modal>
  );
}

// DASHBOARD PAGE (real API)
