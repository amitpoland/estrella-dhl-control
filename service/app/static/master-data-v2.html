<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Master Data V2 — Estrella PZ</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <!--
    master-data-v2.html — Master Data V2 page (Lesson F discipline).

    Authority isolation:
      - One page, one domain: master data ONLY
      - No proforma, PZ, DHL, customs, wFirma writes, FX engine, or
        production environment logic is invoked from this page.
      - All API calls are restricted to /api/v1/{entity}/ and
        /api/v1/master/audit/.
      - dashboard-shared.js is used for visual primitives only
        (Btn/Badge/Card/Sel/Toast). NO domain props are passed in.

    Backend contract for each entity:
      - Today (post-Phase-1): every write produces a master_audit row.
      - DELETE is HARD delete. UI surfaces this explicitly.
      - Soft-delete and Restore are NOT yet supported by the backend,
        so this page does NOT render those buttons. They will appear in
        the V2 page once Phase 4 lands.

    Phase 3 entities (metals, stones, warehouses) are surfaced as
    "Coming in next release" cards. The nav entry is visible so the
    operator knows the shape of the catalog, but no broken API call
    is issued.
  -->
  <style>
    :root {
      --bg:           #f6f7f9;
      --panel:        #ffffff;
      --text:         #1a1f29;
      --text-dim:     #5b6573;
      --text-soft:    #8a93a0;
      --border:       #e3e6eb;
      --border-soft:  #eef0f3;
      --accent:       #1f6feb;
      --accent-soft:  #e8f0fe;
      --danger:       #c0392b;
      --danger-soft:  #fdecea;
      --warning:      #b7791f;
      --warning-soft: #fff8e1;
      --ok:           #1e7e3d;
      --ok-soft:      #e6f4ea;
      --badge-ref-bg:#eaf1ff;
      --badge-ref-fg:#1f3c7a;
      --badge-auth-bg:#fff4d6;
      --badge-auth-fg:#7a5a00;
      --shadow:       0 1px 2px rgba(0,0,0,.04), 0 4px 12px rgba(0,0,0,.05);
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0; height: 100%;
      background: var(--bg); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                   "Helvetica Neue", Arial, sans-serif;
      font-size: 14px; line-height: 1.45;
    }
    a { color: var(--accent); text-decoration: none; }
    .layout       { display: grid; grid-template-columns: 240px 1fr; min-height: 100vh; }
    .sidebar      { background: #11151c; color: #d6dbe3; padding: 16px 0; }
    .sidebar h1   { margin: 0 16px 16px; font-size: 14px;
                    color: #8a93a0; text-transform: uppercase;
                    letter-spacing: .5px; font-weight: 600; }
    .nav-item     { display: flex; align-items: center; justify-content: space-between;
                    padding: 8px 16px; cursor: pointer;
                    border-left: 3px solid transparent; color: #d6dbe3; }
    .nav-item:hover     { background: #1c222c; }
    .nav-item.active    { background: #1c222c; border-left-color: var(--accent); color: #fff; }
    .nav-item .badge    { font-size: 11px; background: #2b3340; padding: 2px 8px;
                          border-radius: 10px; color: #aab3c0; }
    .nav-item.coming    { color: #6b7382; }
    .main         { padding: 24px 32px; max-width: 1280px; }
    .page-header  { display: flex; align-items: baseline; justify-content: space-between;
                    margin-bottom: 6px; }
    .page-header h2 { margin: 0; font-size: 22px; font-weight: 600; }
    .page-sub     { color: var(--text-dim); margin: 0 0 16px; }

    .authority-banner {
      padding: 10px 14px; border-radius: 6px; margin: 0 0 16px;
      font-size: 13px; display: flex; align-items: center; gap: 10px;
    }
    .banner-ref  { background: var(--badge-ref-bg);  color: var(--badge-ref-fg); }
    .banner-auth { background: var(--badge-auth-bg); color: var(--badge-auth-fg); }
    .banner-warn { background: var(--warning-soft);  color: var(--warning); }
    .auth-pill   { font-size: 11px; padding: 2px 8px; border-radius: 12px;
                   text-transform: uppercase; letter-spacing: .4px;
                   font-weight: 600; }
    .pill-ref    { background: var(--badge-ref-bg);  color: var(--badge-ref-fg); }
    .pill-auth   { background: var(--badge-auth-bg); color: var(--badge-auth-fg); }

    .toolbar     { display: flex; gap: 12px; align-items: center;
                   margin-bottom: 12px; flex-wrap: wrap; }
    .toolbar input[type=search] {
      flex: 1; min-width: 220px;
      padding: 8px 12px; border: 1px solid var(--border);
      border-radius: 6px; background: var(--panel);
    }
    .btn {
      padding: 7px 12px; border: 1px solid var(--border);
      background: var(--panel); border-radius: 6px;
      cursor: pointer; font-size: 13px; color: var(--text);
    }
    .btn:hover         { background: #f1f3f6; }
    .btn-primary       { background: var(--accent); color: #fff;
                          border-color: var(--accent); }
    .btn-primary:hover { background: #1859bd; }
    .btn-danger        { background: var(--danger); color: #fff;
                          border-color: var(--danger); }
    .btn-danger:hover  { background: #9d2d22; }
    .btn-ghost         { background: transparent; border-color: transparent;
                          color: var(--accent); }
    .btn[disabled]     { opacity: .5; cursor: not-allowed; }

    .card {
      background: var(--panel); border: 1px solid var(--border);
      border-radius: 8px; box-shadow: var(--shadow);
    }
    .table       { width: 100%; border-collapse: collapse; }
    .table th    { text-align: left; padding: 10px 14px;
                   font-size: 12px; font-weight: 600;
                   color: var(--text-dim); text-transform: uppercase;
                   letter-spacing: .4px;
                   border-bottom: 1px solid var(--border); }
    .table td    { padding: 10px 14px; border-bottom: 1px solid var(--border-soft); }
    .table tr:last-child td { border-bottom: none; }
    .table tr:hover td      { background: #fafbfc; }
    .row-actions { display: flex; gap: 4px; }
    .empty       { padding: 32px; text-align: center; color: var(--text-dim); }

    .badge-ok   { background: var(--ok-soft);     color: var(--ok);     padding: 2px 8px; border-radius: 10px; font-size: 12px; }
    .badge-off  { background: #f0f1f4;            color: var(--text-soft); padding: 2px 8px; border-radius: 10px; font-size: 12px; }

    /* Drawer */
    .drawer-bg   { position: fixed; inset: 0; background: rgba(0,0,0,.35);
                   display: flex; justify-content: flex-end; z-index: 50; }
    .drawer      { width: 520px; max-width: 100vw; background: var(--panel);
                   height: 100vh; overflow-y: auto; padding: 24px;
                   box-shadow: -8px 0 16px rgba(0,0,0,.08); }
    .drawer h3   { margin-top: 0; }
    .drawer .row { display: grid; grid-template-columns: 1fr 2fr;
                   gap: 8px; padding: 6px 0; border-bottom: 1px solid var(--border-soft); }
    .drawer .row label { color: var(--text-dim); }
    .drawer-footer { display: flex; justify-content: flex-end; gap: 8px;
                      margin-top: 16px; padding-top: 16px;
                      border-top: 1px solid var(--border); }

    /* Modal */
    .modal-bg    { position: fixed; inset: 0; background: rgba(0,0,0,.45);
                   display: flex; align-items: center; justify-content: center;
                   z-index: 60; }
    .modal       { width: 480px; max-width: 90vw; background: var(--panel);
                   border-radius: 8px; padding: 24px; box-shadow: var(--shadow); }
    .modal h3    { margin: 0 0 12px; }
    .modal-warning { background: var(--danger-soft); color: var(--danger);
                     padding: 10px 12px; border-radius: 6px; margin: 12px 0;
                     font-size: 13px; }
    .modal-footer{ display: flex; justify-content: flex-end; gap: 8px;
                   margin-top: 16px; }

    /* Audit drawer */
    .audit-row   { padding: 10px 0; border-bottom: 1px solid var(--border-soft); }
    .audit-row:last-child { border-bottom: none; }
    .audit-meta  { font-size: 12px; color: var(--text-dim); margin-bottom: 4px; }
    .audit-op    { display: inline-block; padding: 2px 8px; border-radius: 10px;
                   background: var(--accent-soft); color: var(--accent);
                   font-size: 11px; font-weight: 600; margin-right: 6px;
                   text-transform: uppercase; }
    .audit-diff  { background: #f9fafb; border: 1px solid var(--border-soft);
                   border-radius: 4px; padding: 8px; font-family: monospace;
                   font-size: 12px; white-space: pre-wrap; word-break: break-word; }

    /* Toast */
    #toast       { position: fixed; top: 16px; right: 16px; z-index: 100; }
    .toast       { background: var(--panel); border: 1px solid var(--border);
                   border-radius: 6px; padding: 10px 16px; margin-bottom: 8px;
                   box-shadow: var(--shadow); font-size: 13px;
                   min-width: 240px; }
    .toast.error { border-left: 4px solid var(--danger); }
    .toast.ok    { border-left: 4px solid var(--ok); }

    /* Form */
    .form-grid   { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .form-grid label { display: block; }
    .form-grid .full { grid-column: 1 / -1; }
    .form-grid input, .form-grid textarea, .form-grid select {
      width: 100%; padding: 7px 10px; border: 1px solid var(--border);
      border-radius: 6px; font-size: 14px; background: var(--panel);
    }
    .form-grid textarea { min-height: 60px; resize: vertical; }
  </style>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.26.4/babel.min.js"></script>

  <script type="text/babel" data-presets="env,react"
          src="/dashboard/dashboard-shared.js"></script>
</head>

<body>
  <div id="root"></div>
  <div id="toast"></div>

  <script type="text/babel" data-presets="env,react">
"use strict";

const { apiFetch } = window.EstrellaShared || {};

// ── Entity registry ─────────────────────────────────────────────────────────

// One descriptor per entity. Drives nav, table columns, edit form, authority

//   comingNext: declared but Phase 3 backend not built yet

// Authority kind:
//   "local"      — local CRUD is the authority
//   "reference"  — local table is reference / observation only;

//   "external"   — external system (wFirma) is authority; local is overlay/mirror

const ENTITIES = [
  {
    key: "customers", label: "Customers", available: true,
    apiBase: "/api/v1/customer-master",
    listKey: "customers", pkField: "contractor_id",
    auditEntity: "customers",
    authority: "external",

      { key: "contractor_id", label: "Contractor ID" },
      { key: "bill_to_name",  label: "Bill-to name" },
      { key: "country",       label: "Country" },

      { key: "vat_id",        label: "VAT ID" },
    ],
  },
  // Phase 4B Wave 2 — composite-key customer child entities.
  //

  // queryable by composite pk. The actual record editing UI for these
  // sub-entities lives on the Customers detail page (rendered by V1 today,
  // to be ported to V2 in a later phase). The placeholder page below
  // explains the scope and the stable audit pk format.
  {
    key: "addresses", label: "Addresses", available: true,
    apiBase: "/api/v1/customer-master",   // contractor scope is required
    auditEntity: "client_addresses",
    authority: "local",
    softDeleteEnabled: true,
    parentScope: "customer",
    banner: "Shipping addresses are scoped per contractor. Soft-delete and Restore work — open the Customers detail flow to manage individual addresses, or query the audit log by composite pk customer:{contractor_id}:address:{addr_id}.",
  },
  {
    key: "carrier_accounts", label: "Carrier Accounts", available: true,
    apiBase: "/api/v1/customer-master",
    auditEntity: "client_carrier_accounts",
    authority: "local",
    softDeleteEnabled: true,
    parentScope: "customer",
    banner: "Carrier accounts are scoped per contractor. Soft-delete and Restore work — open the Customers detail flow to manage individual accounts, or query the audit log by composite pk customer:{contractor_id}:carrier_account:{acct_id}.",
    // Phase 4D-ext — declarative field map for the inline editor that
    // ships with the V2 customer-detail surface. EditDrawer routes
    // ``pickerSource`` fields through <ReferencePicker> so operators
    // cannot save a missing/inactive carrier (which Phase 4C-ext would

    formFields: [
      {
        key: "carrier",

        required: true,
        pickerSource: "/api/v1/carriers-config/?active=true",

      { key: "service_level",  label: "Service level" },

    ],
  },
  {
    key: "suppliers", label: "Suppliers", available: true,
    apiBase: "/api/v1/suppliers",
    listKey: "suppliers", pkField: "id",
    auditEntity: "suppliers",
    authority: "local",
    softDeleteEnabled: true,   // Phase 4B Wave 3b-1
    banner: null,
    columns: [
      { key: "id",            label: "ID" },
      { key: "supplier_code", label: "Code" },
      { key: "name",          label: "Name" },
      { key: "country",       label: "Country" },
    ],
    formFields: [
      { key: "supplier_code", label: "Supplier code", required: true, pkOnCreate: true },
      { key: "name",          label: "Name", required: true },
      { key: "country",       label: "Country (ISO-2)", required: true },

    createsViaPost: true,

  {

    apiBase: "/api/v1/product-local",

    softDeleteEnabled: true,   // Phase 4B Wave 4 — deactivate = stop applying overlay

      { key: "product_code",     label: "Product code" },
      { key: "hs_code_override", label: "HS override" },
      { key: "unit_override",    label: "Unit override" },
      { key: "origin_country",   label: "Origin" },
    ],
    formFields: [
      { key: "product_code",     label: "Product code", required: true, pkOnCreate: true },

        pickerValueField: "hs_code",

        pickerListKey: "hs_codes",
        pickerNoun: "HS codes",

      { key: "unit_override",    label: "Unit override" },
      { key: "origin_country",   label: "Origin (ISO-2)" },

  {
    key: "designs", label: "Designs", available: true,

      { key: "metal",         label: "Metal" },

    key: "hs_codes", label: "HS Codes", available: true,
    apiBase: "/api/v1/hs-codes",
    listKey: "hs_codes", pkField: "hs_code",
    auditEntity: "hs_codes",
    authority: "local",
    softDeleteEnabled: true,   // Phase 4B Wave 1
    banner: null,
    columns: [
      { key: "hs_code",        label: "Code" },
      { key: "description_pl", label: "Description (PL)" },
      { key: "duty_rate_pct",  label: "Duty %" },
      { key: "vat_rate_pct",   label: "VAT %" },
    ],
    formFields: [
      { key: "hs_code",        label: "HS code (4–12 digits)", required: true, pkOnCreate: true },
      { key: "description_pl", label: "Description (Polish)" },
      { key: "description_en", label: "Description (English)" },
      { key: "duty_rate_pct",  label: "Duty rate %" },
      { key: "vat_rate_pct",   label: "VAT rate %" },
      { key: "notes",          label: "Notes", multiline: true, full: true },
    ],
  },
  {
    key: "units", label: "Units", available: true,
    apiBase: "/api/v1/units",
    listKey: "units", pkField: "code",
    auditEntity: "units",
    authority: "local",
    softDeleteEnabled: true,   // Phase 4B Wave 1
    banner: null,
    columns: [
      { key: "code",      label: "Code" },
      { key: "name_pl",   label: "Name (PL)" },
      { key: "unit_type", label: "Type" },
    ],
    formFields: [
      { key: "code",      label: "Code", required: true, pkOnCreate: true },
      { key: "name_pl",   label: "Name (Polish)" },
      { key: "name_en",   label: "Name (English)" },
      { key: "unit_type", label: "Type (piece/weight/volume)" },
    ],
  },
  {
    key: "incoterms", label: "Incoterms", available: true,
    apiBase: "/api/v1/incoterms",
    listKey: "incoterms", pkField: "code",
    auditEntity: "incoterms",
    authority: "local",
    softDeleteEnabled: true,   // Phase 4B Wave 1
    banner: null,
    columns: [
      { key: "code", label: "Code" },
      { key: "name", label: "Name" },
      { key: "risk_transfer_point", label: "Risk transfer" },
    ],
    formFields: [
      { key: "code",                label: "Code (e.g. EXW)", required: true, pkOnCreate: true },
      { key: "name",                label: "Name" },
      { key: "risk_transfer_point", label: "Risk transfer point" },

    apiBase: "/api/v1/vat-config",

      { key: "id",       label: "ID" },
      { key: "country",  label: "Country" },
      { key: "rate_pct", label: "Rate %" },
      { key: "rate_code",label: "wFirma code" },
    ],
    formFields: [
      { key: "country",   label: "Country (ISO-2)", required: true },
      { key: "rate_pct",  label: "Rate %", required: true },
      { key: "rate_code", label: "wFirma rate code" },
      { key: "notes",     label: "Notes", multiline: true, full: true },

  {
    key: "fx_rates", label: "FX Rates", available: true,
    apiBase: "/api/v1/fx-rates",
    listKey: "fx_rates", pkField: "id",

    softDeleteEnabled: true,   // Phase 4B Wave 1

      { key: "rate_date",     label: "Date" },

      { key: "rate",          label: "Rate" },
      { key: "source",        label: "Source" },

    formFields: [
      { key: "rate_date",     label: "Date (YYYY-MM-DD)", required: true },
      { key: "from_currency", label: "From (ISO 4217)", required: true },

      { key: "rate",          label: "Rate (decimal)", required: true },
      { key: "source",        label: "Source" },

  {

    apiBase: "/api/v1/carriers-config",
    listKey: "carriers", pkField: "carrier_code",
    auditEntity: "carriers_config",
    authority: "reference",
    softDeleteEnabled: true,   // Phase 4B Wave 3a
    banner: "Configuration only. Carrier API credentials live in .env and are NEVER stored or shown here.",

      { key: "carrier_code", label: "Code" },
      { key: "name",         label: "Name" },
      { key: "parser_type",  label: "Parser" },
      { key: "api_type",     label: "API type" },
    ],
    formFields: [
      { key: "carrier_code",       label: "Code", required: true, pkOnCreate: true },
      { key: "name",               label: "Name" },
      { key: "parser_type",        label: "Parser type" },
      { key: "inbox_email",        label: "Inbox email" },
      { key: "api_type",           label: "API type (api/portal/email_only)" },
      { key: "supported_services", label: "Supported services" },

// ── Audit drawer ────────────────────────────────────────────────────────────
function AuditDrawer({ entity, pk, onClose }) {
  const [rows, setRows] = React.useState(null);
  const [err, setErr]   = React.useState(null);

  React.useEffect(() => {
    let cancelled = false;
    (async () => {
      try {
        const qs = new URLSearchParams({ entity: entity.auditEntity, pk: String(pk) });
        const d = await apiFetch(`/api/v1/master/audit/?${qs.toString()}`);
        if (!cancelled) setRows((d && d.rows) || []);
      } catch (e) {
        if (!cancelled) setErr(e.message || "Audit fetch failed");
      }
    })();
    return () => { cancelled = true; };
  }, [entity, pk]);

  return (
    <div className="drawer-bg" data-testid="audit-drawer" onClick={onClose}>
      <div className="drawer" onClick={e => e.stopPropagation()}>
        <h3>Audit history</h3>
        <div className="audit-meta">
          {entity.label} · pk: <code>{String(pk)}</code>
        </div>
        {err && <div className="modal-warning" data-testid="audit-error">{err}</div>}
        {!rows && !err && <div className="empty">Loading…</div>}
        {rows && rows.length === 0 &&
          <div className="empty" data-testid="audit-empty">No audit entries for this record yet.</div>}
        {rows && rows.length > 0 && rows.map(r => (
          <div key={r.id} className="audit-row" data-testid="audit-row">
            <div className="audit-meta">
              <span className="audit-op">{r.op}</span>
              <code>{r.created_at}</code> · {r.actor}
              {r.reason ? <> · reason: <em>{r.reason}</em></> : null}
              {r.request_id ? <> · req: <code>{r.request_id}</code></> : null}
            </div>
            {r.diff_json && (
              <div className="audit-diff">{JSON.stringify(r.diff_json, null, 2)}</div>
            )}
          </div>
        ))}
        <div className="drawer-footer">
          <button className="btn" onClick={onClose} data-testid="audit-close">Close</button>
        </div>
      </div>
    </div>
  );
}


// ── Reference picker (Phase 4D-ext, generalized in 4D-ext-2) ───────────────
//
// Replaces a free-text reference input with a picker of ACTIVE referents
// loaded from a master-data list endpoint. Closes the Phase 4C / 4C-ext
// 409 reference_conflict loop at the UI layer — the operator literally
// cannot pick a missing or inactive referent.
//
// Used today by:
//   - carrier_accounts.carrier        → /api/v1/carriers-config/?active=true
//   - product_local.hs_code_override  → /api/v1/hs-codes/?active=true
//   - designs.hs_code                 → /api/v1/hs-codes/?active=true
//
// Contract (declared by the entity field):
//   pickerSource:      "<list endpoint with ?active=true>"
//   pickerValueField:  "<option value field>"          e.g. "hs_code"
//   pickerLabelFields: ["<preferred>", "<fallback>"]    first non-empty
//   pickerListKey:     "<envelope array key>"           e.g. "hs_codes"
//   pickerNoun:        "<plural noun for failure copy>" e.g. "HS codes"
//
// Behavior:
//   - Loads on mount via apiFetch (auth + Phase 4D structured errors);
//     shows a disabled "Loading…" while pending.
//   - On fetch failure, falls back to a plain <input> + explanatory copy:
//     "Could not load active <noun>. You can still save only if the
//     backend accepts the <singular>." — never raw JSON.
//   - If the current value is not in the active list (legacy row whose
//     referent went inactive), surfaces it as a DISABLED option labeled
//     "Current: {value} (inactive or unavailable)".
//   - Only ever chooses a key value — never renders a credential field.
function ReferencePicker({ field, value, onChange }) {
  const [loaded,  setLoaded]  = React.useState(false);
  const [failed,  setFailed]  = React.useState(false);
  const [options, setOptions] = React.useState([]);

  const noun     = field.pickerNoun || "options";
  const nounOne  = field.pickerNounSingular || "value";

  React.useEffect(() => {
    let cancelled = false;
    (async () => {
      try {
        const d = await apiFetch(field.pickerSource);
        const list = (d && d[field.pickerListKey || "items"]) || [];
        if (!cancelled) {
          setOptions(list);
          setLoaded(true);
        }
      } catch (e) {
        if (!cancelled) {
          setFailed(true);
          setLoaded(true);
        }
      }
    })();
    return () => { cancelled = true; };
  }, [field.pickerSource]);

  if (!loaded) {
    return <select disabled data-testid="reference-picker-loading"><option>Loading…</option></select>;
  }
  if (failed) {
    return (
      <div data-testid="reference-picker-failed">
        <input
          value={value ?? ""}
          onChange={e => onChange(e.target.value)}
          data-testid={`edit-field-${field.key}`}
        />
        <div style={{color:"var(--text-dim)", fontSize:12, marginTop:4}}
             data-testid={`reference-picker-failed-copy-${field.key}`}>
          Could not load active {noun}. You can still save only if the
          backend accepts the {nounOne}.
        </div>
      </div>
    );
  }

  const valueKey = field.pickerValueField || "code";
  const labelKeys = field.pickerLabelFields || [valueKey];
  function _label(opt) {
    for (const k of labelKeys) {
      const v = opt[k];
      if (v != null && v !== "") return String(v);
    }
    return String(opt[valueKey] ?? "");
  }

  const knownCodes = new Set(options.map(o => String(o[valueKey])));
  const currentIsKnown = value == null || value === "" || knownCodes.has(String(value));

  return (
    <select
      value={value ?? ""}
      onChange={e => onChange(e.target.value)}
      data-testid={`edit-field-${field.key}`}
    >
      <option value="">— select —</option>
      {options.map(opt => (
        <option key={opt[valueKey]} value={opt[valueKey]}>
          {_label(opt)}
        </option>
      ))}
      {!currentIsKnown && (
        <option value={value} disabled
                data-testid="reference-picker-current-fallback">
          Current: {value} (inactive or unavailable)
        </option>
      )}
    </select>
  );
}


// ── Edit drawer ─────────────────────────────────────────────────────────────
function EditDrawer({ entity, record, onCancel, onSaved }) {
  const isCreate = !record;
  const initial  = record || {};
  const [values, setValues] = React.useState(() => {
    const v = {};
    entity.formFields.forEach(f => { v[f.key] = initial[f.key] ?? ""; });
    return v;
  });
  const [err, setErr] = React.useState(null);
  const [busy, setBusy] = React.useState(false);

  const set = (k, v) => setValues(prev => ({ ...prev, [k]: v }));

  async function save() {
    setErr(null);
    // Required-field check (UI-side; backend re-validates).
    for (const f of entity.formFields) {
      if (f.required && !values[f.key]) {
        setErr(`Required: ${f.label}`); return;
      }
    }
    setBusy(true);
    try {
      let url, method, body;
      if (isCreate) {
        if (entity.createsViaPost) {
          // POST /entity/  — surrogate-id or supplier-style create
          url    = `${entity.apiBase}/`;
          method = "POST";
          body   = { ...values };
        } else {
          // PUT /entity/{pk} — natural-keyed upsert
          const pk = values[entity.pkField] || values[entity.formFields.find(f=>f.pkOnCreate)?.key];
          if (!pk) { setErr("Missing primary key"); setBusy(false); return; }
          url    = `${entity.apiBase}/${encodeURIComponent(pk)}`;
          method = "PUT";
          body   = { ...values };
        }
      } else {
        const pk = record[entity.pkField];
        url    = `${entity.apiBase}/${encodeURIComponent(pk)}`;
        method = "PUT";
        body   = { ...values };
      }
      await apiFetch(url, {
        method,
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body),
      });
      onSaved();
    } catch (e) {
      // Phase 4D — formatApiError converts 409 reference_conflict
      // bodies into operator-readable prose; falls back to the raw
      // message for any other error.
      setErr(formatApiError(e) || "Save failed");
    } finally {
      setBusy(false);
    }
  }

  return (
    <div className="drawer-bg" data-testid="edit-drawer" onClick={onCancel}>
      <div className="drawer" onClick={e => e.stopPropagation()}>
        <h3>{isCreate ? `Add new ${entity.label.toLowerCase().replace(/s$/,'')}` : `Edit ${entity.label.toLowerCase().replace(/s$/,'')}`}</h3>
        {err && <div className="modal-warning" data-testid="edit-error">{err}</div>}
        <div className="form-grid">
          {entity.formFields.map(f => (
            <label key={f.key} className={f.full ? "full" : ""}>
              <div style={{color:"var(--text-dim)", marginBottom:4, fontSize:13}}>
                {f.label}{f.required ? " *" : ""}
              </div>
              {f.pickerSource
                /* Phase 4D-ext / 4D-ext-2 — picker fields go through the
                   generic ReferencePicker so the operator can only choose
                   active referents (carriers, HS codes, …). */
                ? <ReferencePicker field={f}
                                   value={values[f.key]}
                                   onChange={v => set(f.key, v)} />
                : f.multiline
                  ? <textarea value={values[f.key] ?? ""}
                              onChange={e => set(f.key, e.target.value)}
                              data-testid={`edit-field-${f.key}`} />
                  : <input value={values[f.key] ?? ""}
                           onChange={e => set(f.key, e.target.value)}
                           disabled={!isCreate && f.pkOnCreate}
                           data-testid={`edit-field-${f.key}`} />}
            </label>
          ))}
        </div>
        <div className="drawer-footer">
          <button className="btn" onClick={onCancel} disabled={busy}
                  data-testid="edit-cancel-btn">
            Cancel
          </button>
          <button className="btn btn-primary" onClick={save} disabled={busy}
                  data-testid="edit-save-btn">
            {busy ? "Saving…" : "Save changes"}
          </button>
        </div>
      </div>
    </div>
  );
}

// ── Toast ───────────────────────────────────────────────────────────────────
function showToast(msg, type) {
  const root = document.getElementById("toast");
  if (!root) return;
  const el = document.createElement("div");
  el.className = `toast ${type || ""}`;
  // textContent (not innerHTML) — no HTML / JSON injection into the toast.
  el.textContent = msg;
  root.appendChild(el);
  setTimeout(() => el.remove(), 4500);
}


// ── Phase 4D — structured backend-error formatter ──────────────────────────
//
// The Phase 4C referential-integrity layer returns:
//   HTTP/1.1 409 Conflict
//   {"detail":{"error":"reference_conflict",
//              "field":"<field>","entity":"<entity>",
//              "key":"<key>","reason":"missing"|"inactive"}}
//
// dashboard-shared.js `apiFetch` throws Error(`HTTP <code>: <body>`). This
// helper extracts the JSON body from the error message and — when it is
// a reference_conflict — returns an operator-friendly sentence. For
// everything else it returns the original message (generic fallback).
//
// Raw JSON is NEVER surfaced in the toast for reference_conflict — only
// the formatted prose. Console logging of the raw error is left to the
// callers' existing console.error/console.debug paths.
function formatApiError(err) {
  const raw = err && err.message ? String(err.message) : "Unknown error";
  const jsonStart = raw.indexOf("{");
  if (jsonStart === -1) return raw;
  let body = null;
  try {
    body = JSON.parse(raw.slice(jsonStart));
  } catch (parseErr) {
    return raw;
  }
  const detail = (body && body.detail) || body;
  if (!detail || detail.error !== "reference_conflict") return raw;
  const field  = detail.field  || "(unknown field)";
  const entity = detail.entity || "(unknown entity)";
  const key    = detail.key    || "(unknown key)";
  if (detail.reason === "missing") {
    return `Cannot save. The referenced ${entity} \`${key}\` does not exist. `
         + `Field: ${field}.`;
  }
  if (detail.reason === "inactive") {
    return `Cannot save. The referenced ${entity} \`${key}\` is inactive. `
         + `Restore it first or choose another value. Field: ${field}.`;
  }
  // reference_conflict with an unknown reason — surface the structured
  // shape in prose, never as raw JSON.
  return `Cannot save. Reference conflict on field ${field} `
       + `(${entity} ${key}, reason: ${detail.reason || "unknown"}).`;
}

// ── Entity page (the reusable surface) ─────────────────────────────────────
function EntityPage({ entity, onOpenDetail }) {
  if (entity.comingNext || !entity.available) {
    return <ComingSoonPage entity={entity} />;
  }
  if (entity.parentScope) {
    return <ParentScopedPage entity={entity} />;
  }

  const [rows, setRows]    = React.useState([]);
  const [loading, setL]    = React.useState(false);
  const [search, setSearch]= React.useState("");
  const [showInactive, setShowInactive] = React.useState(false);
  const [viewRec, setView] = React.useState(null);
  const [editRec, setEdit] = React.useState(null);          // {} = create
  const [delRec,  setDel]  = React.useState(null);
  const [restoreRec, setRestore] = React.useState(null);
  const [auditRec, setAud] = React.useState(null);

  async function reload() {
    setL(true);
    try {
      const d = await apiFetch(`${entity.apiBase}/`);
      const list = (d && (d[entity.listKey] || d.items || [])) || [];
      setRows(list);
    } catch (e) {
      showToast(`Failed to load ${entity.label}: ${formatApiError(e)}`, "error");
    } finally {
      setL(false);
    }
  }

  React.useEffect(() => { reload(); /* eslint-disable-next-line */ }, [entity.key]);

  async function confirmDelete(reason) {
    const pk = delRec[entity.pkField];
    const headers = reason ? { "X-Change-Reason": reason } : {};
    const soft = !!entity.softDeleteEnabled;
    try {
      await apiFetch(`${entity.apiBase}/${encodeURIComponent(pk)}`,
                     { method: "DELETE", headers });
      showToast(`${entity.label} ${pk} ${soft ? "deactivated" : "deleted"}.`, "ok");
      setDel(null);
      reload();
    } catch (e) {
      showToast(`${soft ? "Deactivate" : "Delete"} failed: ${formatApiError(e)}`, "error");
    }
  }

  async function confirmRestore() {
    const pk = restoreRec[entity.pkField];
    try {
      await apiFetch(`${entity.apiBase}/${encodeURIComponent(pk)}/restore`,
                     { method: "POST" });
      showToast(`${entity.label} ${pk} restored.`, "ok");
      setRestore(null);
      reload();
    } catch (e) {
      showToast(`Restore failed: ${formatApiError(e)}`, "error");
    }
  }

  const filtered = rows.filter(r => {
    if (!showInactive && r.active === false) return false;
    if (!search) return true;
    const s = search.toLowerCase();
    return entity.columns.some(c => {
      const v = r[c.key];
      return v != null && String(v).toLowerCase().includes(s);
    });
  });

  return (
    <div data-testid={`page-${entity.key}`}>
      <div className="page-header">
        <div>
          <h2>{entity.label} {authorityPill(entity.authority)}</h2>
          <p className="page-sub">{rows.length} record{rows.length === 1 ? "" : "s"}</p>
        </div>
        <button className="btn btn-primary"
                onClick={() => setEdit({})}
                data-testid={`btn-add-${entity.key}`}>
          + Add new
        </button>
      </div>

      {entity.banner && (
        <div className={`authority-banner ${entity.authority === "reference" ? "banner-ref" : "banner-auth"}`}
             data-testid={`banner-${entity.key}`}>
          <strong>{entity.authority === "reference" ? "Reference only." : "External authority."}</strong>
          {entity.banner}
        </div>
      )}

      <div className="toolbar">
        <input type="search" placeholder={`Search ${entity.label.toLowerCase()}…`}
               value={search} onChange={e => setSearch(e.target.value)}
               data-testid={`search-${entity.key}`} />
        <label style={{display:"flex", gap:6, alignItems:"center", color:"var(--text-dim)"}}>
          <input type="checkbox" checked={showInactive}
                 onChange={e => setShowInactive(e.target.checked)}
                 data-testid={`toggle-inactive-${entity.key}`} />
          Show inactive
        </label>
      </div>

      <div className="card">
        {loading && <div className="empty">Loading…</div>}
        {!loading && filtered.length === 0 && (
          <div className="empty" data-testid={`empty-${entity.key}`}>
            No records to show.
          </div>
        )}
        {!loading && filtered.length > 0 && (
          <table className="table" data-testid={`table-${entity.key}`}>
            <thead>
              <tr>
                {entity.columns.map(c => <th key={c.key}>{c.label}</th>)}
                <th>Active</th>
                <th style={{width:280}}>Actions</th>
              </tr>
            </thead>
            <tbody>
              {filtered.map(r => {
                const pk = r[entity.pkField];
                return (
                  <tr key={pk} data-testid={`row-${entity.key}-${pk}`}>
                    {entity.columns.map(c =>
                      <td key={c.key}>{r[c.key] == null ? "—" : String(r[c.key])}</td>)}
                    <td>
                      {r.active === false
                        ? <span className="badge-off">inactive</span>
                        : <span className="badge-ok">active</span>}
                    </td>
                    <td>
                      <div className="row-actions">
                        {onOpenDetail && (
                          <button className="btn btn-primary" onClick={() => onOpenDetail(pk)}
                                  data-testid={`action-manage-${entity.key}-${pk}`}>Manage</button>
                        )}
                        <button className="btn" onClick={() => setView(r)}
                                data-testid={`action-view-${entity.key}-${pk}`}>View</button>
                        <button className="btn" onClick={() => setEdit(r)}
                                data-testid={`action-edit-${entity.key}-${pk}`}>Edit</button>
                        {entity.softDeleteEnabled && r.active === false ? (
                          <button className="btn btn-primary" onClick={() => setRestore(r)}
                                  data-testid={`action-restore-${entity.key}-${pk}`}>Restore</button>
                        ) : (
                          <button className="btn btn-danger" onClick={() => setDel(r)}
                                  data-testid={`action-delete-${entity.key}-${pk}`}>
                            {entity.softDeleteEnabled ? "Deactivate" : "Delete"}
                          </button>
                        )}
                        <button className="btn btn-ghost" onClick={() => setAud(r)}
                                data-testid={`action-audit-${entity.key}-${pk}`}>View audit</button>
                      </div>
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        )}
      </div>

      {viewRec && <ViewDrawer entity={entity} record={viewRec} onClose={() => setView(null)} />}
      {editRec && <EditDrawer entity={entity}
                              record={Object.keys(editRec).length ? editRec : null}
                              onCancel={() => setEdit(null)}
                              onSaved={() => { setEdit(null); reload(); showToast("Saved.", "ok"); }} />}
      {delRec  && <ConfirmDeleteModal entity={entity}
                                       label={String(delRec[entity.pkField])}
                                       onCancel={() => setDel(null)}
                                       onConfirm={confirmDelete} />}
      {restoreRec && <ConfirmRestoreModal entity={entity}
                                           label={String(restoreRec[entity.pkField])}
                                           onCancel={() => setRestore(null)}
                                           onConfirm={confirmRestore} />}
      {auditRec && <AuditDrawer entity={entity}
                                 pk={auditRec[entity.pkField]}
                                 onClose={() => setAud(null)} />}
    </div>
  );
}

function SubResourceSection({ contractorId, config }) {

  const [auditRec, setAud] = React.useState(null);

  const subEntity = {
    key: config.key,
    label: config.label,
    apiBase: base,
    listKey: config.listKey,
    pkField: config.pkField,

    return `customer:${contractorId}:${config.auditKeyword}:${id}`;

      await apiFetch(`${base}/${encodeURIComponent(id)}`, { method: "DELETE", headers });

            + Add {config.label.toLowerCase().replace(/s$/,'')}

      {loading && <div className="empty">Loading…</div>}
      {!loading && rows.length === 0 && (
        <div className="empty" data-testid={`subresource-empty-${config.key}`}>

// ── Description Authority Editor ────────────────────────────────────────────
//
// Custom panel for editing product_descriptions rows (source='manual').
// GET  /api/v1/description-admin/product/{code}   — fetch + validate
// POST /api/v1/description-admin/product/{code}/validate — live feedback
// PUT  /api/v1/description-admin/product/{code}   — save (audit event)
//
// Authority: product_descriptions master row only. Posted/issued/locked
// draft snapshots are immutable. Future drafts pick up new values via
// get_description_block(). (PR #741)

function DescriptionAdminPanel() {
  const [code,     setCode]     = React.useState("");
  const [row,      setRow]      = React.useState(null);
  const [fetchErr, setFetchErr] = React.useState(null);
  const [loading,  setLoading]  = React.useState(false);

  // Edit state
  const [editing,    setEditing]    = React.useState(false);
  const [editPl,     setEditPl]     = React.useState("");
  const [editEn,     setEditEn]     = React.useState("");
  const [editName,   setEditName]   = React.useState("");
  const [liveResult, setLiveResult] = React.useState(null);
  const [valBusy,    setValBusy]    = React.useState(false);
  const [saveBusy,   setSaveBusy]   = React.useState(false);
  const [saveErr,    setSaveErr]    = React.useState(null);
  const valTimer = React.useRef(null);

  async function doLookup(e) {
    if (e) e.preventDefault();
    const pc = code.trim();
    if (!pc) return;
    setFetchErr(null); setRow(null); setEditing(false); setLoading(true);
    try {
      const d = await apiFetch(`/api/v1/description-admin/product/${encodeURIComponent(pc)}`);
      setRow(d);
    } catch (ex) {
      setFetchErr(formatApiError(ex));
    } finally {
      setLoading(false);
    }
  }

  function startEdit() {
    setEditPl(row.description_pl || "");
    setEditEn(row.description_en || "");
    setEditName(row.name_pl || "");
    setLiveResult({ gate: row.gate, validation: row.validation, rendered_line: row.rendered_line });
    setSaveErr(null);
    setEditing(true);
  }

  async function doValidate(pl, en) {
    if (!row) return;
    setValBusy(true);
    try {
      const d = await apiFetch(
        `/api/v1/description-admin/product/${encodeURIComponent(row.product_code)}/validate`,
        { method: "POST", headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ description_pl: pl, description_en: en }) }
      );
      setLiveResult(d);
    } catch (_) { /* non-fatal */ }
    finally { setValBusy(false); }
  }

  function scheduleValidate(pl, en) {
    clearTimeout(valTimer.current);
    valTimer.current = setTimeout(() => doValidate(pl, en), 350);
  }

  function onPlChange(v) { setEditPl(v); scheduleValidate(v, editEn); }
  function onEnChange(v) { setEditEn(v); scheduleValidate(editPl, v); }

  async function doSave() {
    setSaveErr(null); setSaveBusy(true);
    try {
      const d = await apiFetch(
        `/api/v1/description-admin/product/${encodeURIComponent(row.product_code)}`,
        { method: "PUT", headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ description_pl: editPl, description_en: editEn,
                                 name_pl: editName || undefined }) }
      );
      setRow(d);
      setEditing(false);
      showToast("Description saved (source=manual). Future drafts will use new values.", "ok");
    } catch (ex) {
      setSaveErr(formatApiError(ex));
    } finally {
      setSaveBusy(false);
    }
  }

  function GateBadge({ gate }) {
    if (!gate) return null;
    const styles = {
      PASS:    { bg: "var(--ok-soft)",      fg: "var(--ok)" },
      WARN:    { bg: "var(--warning-soft)", fg: "var(--warning)" },
      BLOCKED: { bg: "var(--danger-soft)",  fg: "var(--danger)" },
    }[gate] || { bg: "#f0f1f4", fg: "var(--text-soft)" };
    const icons = { PASS: "✓", WARN: "⚠", BLOCKED: "✗" };
    return (
      <span style={{ display:"inline-block", padding:"2px 10px", borderRadius:10,
                     background: styles.bg, color: styles.fg,
                     fontWeight:600, fontSize:12 }}
            data-testid={`gate-${gate.toLowerCase()}`}>
        {icons[gate] || ""} {gate}
      </span>
    );
  }

  const liveGate   = liveResult && liveResult.gate;
  const liveVal    = liveResult && liveResult.validation;
  const liveRender = liveResult && liveResult.rendered_line;
  const canSave    = liveGate === "PASS" && !saveBusy;

  return (
    <div data-testid="description-admin-panel">
      <div className="page-header">
        <div>
          <h2 style={{ margin: 0 }}>Description Authority Editor</h2>
          <p className="page-sub">
            Edit canonical <code>description_pl</code> / <code>description_en</code> for a product.
          </p>
        </div>
      </div>

      <div className="authority-banner banner-auth" data-testid="desc-authority-banner">
        <strong>Description authority (PR #741).</strong>{" "}
        Edits here set <code>source=&apos;manual&apos;</code> in <code>product_descriptions</code>.
        Posted / issued / locked draft snapshots are <strong>immutable</strong> — new values
        flow to future drafts only via <code>get_description_block()</code>.
      </div>

      {/* Lookup form */}
      <form onSubmit={doLookup}
            style={{ display:"flex", gap:8, marginBottom:16 }}>
        <input
          type="text"
          placeholder="Product code, e.g. EJL/26/27/1"
          value={code}
          onChange={e => setCode(e.target.value)}
          style={{ flex:1, padding:"8px 12px", border:"1px solid var(--border)",
                   borderRadius:6, fontSize:14, background:"var(--panel)" }}
          data-testid="desc-product-code-input"
        />
        <button type="submit" className="btn btn-primary"
                disabled={loading || !code.trim()}
                data-testid="desc-lookup-btn">
          {loading ? "Loading…" : "Look up"}
        </button>
      </form>

      {fetchErr && (
        <div className="modal-warning" data-testid="desc-fetch-error">{fetchErr}</div>
      )}

      {/* Read view */}
      {row && !editing && (
        <div className="card" style={{ padding:20 }} data-testid="desc-row-view">
          <div style={{ display:"flex", justifyContent:"space-between",
                        alignItems:"flex-start", marginBottom:16 }}>
            <div>
              <h3 style={{ margin:"0 0 4px" }}>{row.product_code}</h3>
              <div style={{ fontSize:13, color:"var(--text-dim)" }}>
                source: <code>{row.source}</code>
                &nbsp;·&nbsp;item_type: <code>{row.item_type || "—"}</code>
                &nbsp;·&nbsp;updated: <code>{(row.updated_at || "—").slice(0,19)}</code>
              </div>
            </div>
            <div style={{ display:"flex", gap:8, alignItems:"center" }}>
              <GateBadge gate={row.gate} />
              <button className="btn" onClick={startEdit}
                      data-testid="desc-edit-btn">
                Edit description
              </button>
            </div>
          </div>

          <table style={{ width:"100%", fontSize:14, borderCollapse:"collapse" }}>
            <tbody>
              {[
                ["description_pl", row.description_pl],
                ["description_en", row.description_en],
                ["Rendered line",  row.rendered_line],
                ["name_pl",        row.name_pl],
              ].map(([label, val]) => (
                <tr key={label}>
                  <td style={{ padding:"7px 16px 7px 0", color:"var(--text-dim)",
                                whiteSpace:"nowrap", width:160, verticalAlign:"top" }}>
                    {label}
                  </td>
                  <td style={{ padding:"7px 0" }}>
                    {label === "Rendered line"
                      ? <em>{val || "—"}</em>
                      : val
                        ? val
                        : <em style={{ color:"var(--text-soft)" }}>
                            {label === "description_en" ? "empty (PL-only)" : "empty"}
                          </em>}
                  </td>
                </tr>
              ))}
            </tbody>
          </table>

          {row.validation && row.validation.advisory && (
            <div style={{ marginTop:12, padding:"10px 12px",
                          background:"var(--warning-soft)", color:"var(--warning)",
                          borderRadius:6, fontSize:13 }}
                 data-testid="desc-view-advisory">
              {row.validation.advisory}
            </div>
          )}
          {row.validation && row.validation.warnings && row.validation.warnings.length > 0 && (
            <ul style={{ margin:"8px 0 0", padding:"0 0 0 20px",
                         fontSize:13, color:"var(--warning)" }}>
              {row.validation.warnings.map((w, i) => <li key={i}>{w}</li>)}
            </ul>
          )}
        </div>
      )}

      {/* Edit form */}
      {row && editing && (
        <div className="card" style={{ padding:20 }} data-testid="desc-edit-form">
          <div style={{ display:"flex", justifyContent:"space-between",
                        alignItems:"center", marginBottom:16 }}>
            <h3 style={{ margin:0 }}>Edit: {row.product_code}</h3>
            <div style={{ display:"flex", gap:8, alignItems:"center" }}>
              {valBusy && (
                <span style={{ fontSize:12, color:"var(--text-dim)" }}>Validating…</span>
              )}
              {liveGate && <GateBadge gate={liveGate} />}
            </div>
          </div>

          {/* description_pl */}
          <div style={{ marginBottom:14 }}>
            <label style={{ display:"block", fontSize:13, fontWeight:600,
                             marginBottom:4, color:"var(--text-dim)" }}>
              description_pl <span style={{ color:"var(--danger)" }}>*</span>
              <span style={{ fontWeight:400, marginLeft:6, color:"var(--text-soft)", fontSize:12 }}>
                (canonical Polish customs description)
              </span>
            </label>
            <textarea
              value={editPl}
              onChange={e => onPlChange(e.target.value)}
              rows={3}
              style={{ width:"100%", padding:"8px 10px",
                       border:"1px solid var(--border)", borderRadius:6,
                       fontSize:14, resize:"vertical" }}
              data-testid="desc-edit-pl"
            />
            {liveVal && liveVal.pl_chars > 0 && (
              <div style={{ fontSize:12, color:"var(--text-dim)", marginTop:2 }}>
                {liveVal.pl_chars} chars (soft limit 160)
              </div>
            )}
          </div>

          {/* description_en */}
          <div style={{ marginBottom:14 }}>
            <label style={{ display:"block", fontSize:13, fontWeight:600,
                             marginBottom:4, color:"var(--text-dim)" }}>
              description_en
              <span style={{ fontWeight:400, marginLeft:6, color:"var(--text-soft)", fontSize:12 }}>
                (leave blank for PL-only render; no supplier shorthand)
              </span>
            </label>
            <textarea
              value={editEn}
              onChange={e => onEnChange(e.target.value)}
              rows={2}
              style={{ width:"100%", padding:"8px 10px",
                       border:"1px solid var(--border)", borderRadius:6,
                       fontSize:14, resize:"vertical" }}
              data-testid="desc-edit-en"
            />
            {liveVal && liveVal.en_chars > 0 && (
              <div style={{ fontSize:12, color:"var(--text-dim)", marginTop:2 }}>
                {liveVal.en_chars} chars (soft limit 90)
              </div>
            )}
          </div>

          {/* name_pl */}
          <div style={{ marginBottom:14 }}>
            <label style={{ display:"block", fontSize:13, fontWeight:600,
                             marginBottom:4, color:"var(--text-dim)" }}>
              name_pl
              <span style={{ fontWeight:400, marginLeft:6, color:"var(--text-soft)", fontSize:12 }}>
                (display name; leave blank to keep current value)
              </span>
            </label>
            <input
              type="text"
              value={editName}
              onChange={e => setEditName(e.target.value)}
              style={{ width:"100%", padding:"8px 10px",
                       border:"1px solid var(--border)", borderRadius:6, fontSize:14 }}
              data-testid="desc-edit-name"
            />
          </div>

          {/* Live preview */}
          {liveRender !== undefined && (
            <div style={{ marginBottom:14, padding:"8px 12px",
                          background:"var(--bg)", borderRadius:6, fontSize:13 }}
                 data-testid="desc-live-preview">
              <span style={{ color:"var(--text-dim)" }}>Rendered: </span>
              <em>{liveRender || "—"}</em>
            </div>
          )}

          {/* Advisory / warnings */}
          {liveVal && liveVal.advisory && (
            <div style={{ marginBottom:12, padding:"10px 12px",
                          background: liveGate === "BLOCKED"
                            ? "var(--danger-soft)" : "var(--warning-soft)",
                          color: liveGate === "BLOCKED"
                            ? "var(--danger)" : "var(--warning)",
                          borderRadius:6, fontSize:13 }}
                 data-testid="desc-edit-advisory">
              {liveVal.advisory}
            </div>
          )}
          {liveVal && liveVal.warnings && liveVal.warnings.length > 0 && (
            <ul style={{ margin:"0 0 12px", padding:"0 0 0 20px",
                         fontSize:13, color:"var(--warning)" }}>
              {liveVal.warnings.map((w, i) => <li key={i}>{w}</li>)}
            </ul>
          )}

          {saveErr && (
            <div className="modal-warning" data-testid="desc-save-error"
                 style={{ marginBottom:12 }}>
              {saveErr}
            </div>
          )}

          <div style={{ display:"flex", justifyContent:"flex-end", gap:8, marginTop:4 }}>
            <button className="btn"
                    onClick={() => { setEditing(false); setSaveErr(null); }}
                    disabled={saveBusy}
                    data-testid="desc-cancel-btn">
              Cancel
            </button>
            <button className="btn btn-primary"
                    onClick={doSave}
                    disabled={!canSave}
                    title={!canSave ? "Fix validation errors before saving" : ""}
                    data-testid="desc-save-btn">
              {saveBusy ? "Saving…" : "Save canonical description"}
            </button>
          </div>
        </div>
      )}
    </div>
  );
}


// ── App shell ───────────────────────────────────────────────────────────────
function App() {
  const [activeKey, setActiveKey] = React.useState("customers");
  const [detailCustomer, setDetailCustomer] = React.useState(null);
  const active = ENTITIES.find(e => e.key === activeKey) || ENTITIES[0];

  function navTo(key) { setActiveKey(key); setDetailCustomer(null); }

  return (
    <div className="layout" data-testid="master-data-v2">
      <aside className="sidebar">
        <h1>Master Data</h1>
        <nav data-testid="master-nav">
          {ENTITIES.map(e => (
            <div key={e.key}
                 className={`nav-item ${activeKey === e.key ? "active" : ""} ${e.comingNext ? "coming" : ""}`}
                 onClick={() => navTo(e.key)}
                 data-testid={`nav-${e.key}`}>
              <span>{e.label}</span>
              {e.comingNext && <span className="badge">Coming</span>}
            </div>
          ))}
          <div style={{ borderTop:"1px solid #2a3040", margin:"8px 0" }} />
          <div className={`nav-item ${activeKey === "descriptions" ? "active" : ""}`}
               onClick={() => navTo("descriptions")}
               data-testid="nav-descriptions">
            <span>Descriptions</span>
          </div>
        </nav>
      </aside>
      <main className="main">
        {activeKey === "descriptions"
          ? <DescriptionAdminPanel />
          : activeKey === "customers" && detailCustomer
            ? <CustomerDetailPage contractorId={detailCustomer}
                                  onBack={() => setDetailCustomer(null)} />
            : <EntityPage key={active.key} entity={active}
                          onOpenDetail={active.key === "customers" ? setDetailCustomer : null} />}
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
