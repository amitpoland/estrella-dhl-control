<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shipment Detail — Estrella Atlas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    :root {
      --bg: #F4F1EA; --bg-subtle: #FAF8F2; --card: #FFFFFF;
      --row-hover: #F6F2EA; --border: #E5DECF; --border-subtle: #EFE9DA;
      --text: #1B2538; --text-2: #4E5A72; --text-3: #8B97AE;
      --shadow: rgba(27,37,56,0.06); --shadow-heavy: rgba(27,37,56,0.16);
      --accent: #B89968; --accent-light: #D4B884; --accent-text: #1B2538;
      --accent-subtle: #F8EFD8; --accent-border: #CFB178;
      --badge-neutral-bg: #EEF0F4; --badge-neutral-text: #4A5A70; --badge-neutral-border: #CED4E0;
      --badge-blue-bg: #E8EFF8;   --badge-blue-text: #1A4A90;   --badge-blue-border: #AABEE0;
      --badge-amber-bg: #FBF5E0;  --badge-amber-text: #805A00;  --badge-amber-border: #DEC870;
      --badge-orange-bg: #FBF0E4; --badge-orange-text: #804000; --badge-orange-border: #DEB870;
      --badge-green-bg: #E8F5EE;  --badge-green-text: #186838;  --badge-green-border: #96CCA8;
      --badge-red-bg: #FBE8E6;    --badge-red-text: #902018;    --badge-red-border: #E0A8A0;
      --badge-purple-bg: #EEE8F8; --badge-purple-text: #481898; --badge-purple-border: #BEA4E8;
      --badge-accent-bg: #1E2D4A; --badge-accent-text: #C9A456; --badge-accent-border: #C9A456;
      --sidebar-bg: #131C2E; --sidebar-border: #25334C;
      --sidebar-active: #1F2A42; --sidebar-hover: #1A2438;
      --sidebar-text: #F2EBD9; --sidebar-text-muted: #7C89A3; --sidebar-icon: #B89968;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #111928; --bg-subtle: #172030; --card: #1C2638;
        --row-hover: #223040; --border: #2C3C54; --border-subtle: #243050;
        --text: #EEE8DC; --text-2: #8A9AB6; --text-3: #566478;
        --shadow: rgba(0,0,0,0.3); --shadow-heavy: rgba(0,0,0,0.5);
        --accent: #D4AA5C; --accent-light: #ECC870; --accent-text: #111928;
        --accent-subtle: #1E2808; --accent-border: #5A4A18;
        --badge-neutral-bg: #1C2838; --badge-neutral-text: #8A9AB6; --badge-neutral-border: #2C3C54;
        --badge-blue-bg: #0E1E38;   --badge-blue-text: #80AAEE;   --badge-blue-border: #1E3A64;
        --badge-amber-bg: #20180A;  --badge-amber-text: #E8C040;  --badge-amber-border: #584010;
        --badge-orange-bg: #201008; --badge-orange-text: #E89860; --badge-orange-border: #582010;
        --badge-green-bg: #0E2018;  --badge-green-text: #68CC88;  --badge-green-border: #1A4830;
        --badge-red-bg: #200E10;    --badge-red-text: #EE8880;    --badge-red-border: #581018;
        --badge-purple-bg: #160E28; --badge-purple-text: #AA88EE; --badge-purple-border: #341860;
        --badge-accent-bg: #1E2808; --badge-accent-text: #D4AA5C; --badge-accent-border: #5A4A18;
        --sidebar-bg: #0E1A30; --sidebar-border: #1A2840;
        --sidebar-active: #1A2E48; --sidebar-hover: #162438;
        --sidebar-text: #EEE8DC; --sidebar-text-muted: #566478; --sidebar-icon: #6A7A96;
      }
    }

    body {
      margin: 0; padding: 0;
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh; font-size: 13px;
    }

    #root { display: flex; flex-direction: column; min-height: 100vh; }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: none; } }
    @keyframes spin { to { transform: rotate(360deg); } }

    .spinner {
      display: inline-block; width: 16px; height: 16px;
      border: 2px solid var(--border); border-top-color: var(--accent);
      border-radius: 50%; animation: spin 0.7s linear infinite;
      vertical-align: middle;
    }

    /* Page layout */
    .page-container {
      display: flex; flex-direction: column; flex: 1;
      padding: 16px; max-width: 1200px; margin: 0 auto;
      gap: 16px;
    }

    .page-header {
      display: flex; align-items: center; justify-content: space-between;
      flex-wrap: wrap; gap: 12px;
    }

    .back-link {
      color: var(--accent); text-decoration: none; font-weight: 500;
      display: flex; align-items: center; gap: 6px;
    }
    .back-link:hover { color: var(--accent-light); }

    /* Pipeline timeline */
    .pipeline-timeline {
      display: flex; gap: 8px; align-items: center;
      overflow-x: auto; padding: 4px 0;
    }

    .phase-chip {
      display: flex; align-items: center; gap: 6px;
      padding: 6px 12px; border-radius: 6px;
      font-size: 11px; font-weight: 600; white-space: nowrap;
      border: 1px solid var(--border);
    }

    .phase-chip.complete { background: var(--badge-green-bg); color: var(--badge-green-text); border-color: var(--badge-green-border); }
    .phase-chip.active { background: var(--badge-blue-bg); color: var(--badge-blue-text); border-color: var(--badge-blue-border); }
    .phase-chip.blocked { background: var(--badge-red-bg); color: var(--badge-red-text); border-color: var(--badge-red-border); }
    .phase-chip.pending { background: var(--badge-neutral-bg); color: var(--badge-neutral-text); border-color: var(--badge-neutral-border); }

    .phase-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: currentColor; opacity: 0.7;
    }

    /* Grid layout for main content */
    .content-grid {
      display: grid; grid-template-columns: 2fr 1fr; gap: 16px;
      align-items: start;
    }

    @media (max-width: 768px) {
      .content-grid { grid-template-columns: 1fr; }
    }

    /* Link buttons */
    .link-section {
      display: flex; gap: 12px; flex-wrap: wrap;
    }

    /* Document links */
    .doc-link {
      color: var(--accent); text-decoration: none; font-size: 12px;
      padding: 4px 8px; border-radius: 4px; border: 1px solid var(--accent-border);
      background: var(--accent-subtle);
    }
    .doc-link:hover { background: var(--accent-light); color: var(--accent-text); }

    /* Tracking events */
    .tracking-events {
      display: flex; flex-direction: column; gap: 8px;
    }

    .tracking-event {
      padding: 8px 12px; border-radius: 6px;
      border: 1px solid var(--border-subtle);
      background: var(--bg-subtle);
      font-size: 12px;
    }

    .event-header {
      display: flex; justify-content: space-between; align-items: flex-start;
      margin-bottom: 4px;
    }

    .event-status { font-weight: 600; color: var(--text); }
    .event-time { font-size: 11px; color: var(--text-3); }
    .event-location { color: var(--text-2); font-size: 11px; }

    /* Gate blocks */
    .gate-block {
      display: inline-block; padding: 4px 8px; border-radius: 4px;
      font-size: 11px; font-weight: 500;
      background: var(--badge-red-bg); color: var(--badge-red-text);
      border: 1px solid var(--badge-red-border);
      margin-right: 6px; margin-bottom: 4px;
    }
  </style>
</head>
<body>
<div id="root"></div>

<!-- React + Babel CDN -->
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<!-- Shared layer — load order is the dependency order -->
<script type="text/babel" data-presets="env,react" src="/dashboard/dashboard-shared.js"></script>
<script type="text/babel" data-presets="env,react" src="/dashboard/pz-api.js"></script>
<script type="text/babel" data-presets="env,react" src="/dashboard/pz-state.js"></script>
<script type="text/babel" data-presets="env,react" src="/dashboard/pz-components.js"></script>

<!-- Shipment V2 page -->
<script type="text/babel" data-presets="env,react">
(function () {
  'use strict';

  // ── URL params ─────────────────────────────────────────────────────────────
  const _sp = new URLSearchParams(window.location.search);
  const URL_BATCH_ID = (_sp.get('batch_id') || '').trim();

  // ── Destructure shared atoms ───────────────────────────────────────────────
  const {
    Badge, Card, Btn, Sel, Toast, SessionBanner,
    EstrellaMark, GateBlock, SectionHeader, CompactTable, StatusDot, EmptyState,
    apiFetch
  } = window.EstrellaShared;

  // ── Hooks ───────────────────────────────────────────────────────────────────

  function useBatchDetail(batchId) {
    const [data, setData] = React.useState(null);
    const [loading, setLoading] = React.useState(false);
    const [error, setError] = React.useState(null);

    const load = React.useCallback(async () => {
      if (!batchId) return;
      setLoading(true);
      setError(null);
      try {
        const result = await apiFetch(`/api/v1/dashboard/batches/${encodeURIComponent(batchId)}`);
        setData(result);
      } catch (err) {
        setError(err.message);
      } finally {
        setLoading(false);
      }
    }, [batchId]);

    React.useEffect(() => { load(); }, [load]);

    return { data, loading, error, reload: load };
  }

  function useTrackingTimeline(batchId) {
    const [data, setData] = React.useState(null);
    const [loading, setLoading] = React.useState(false);
    const [error, setError] = React.useState(null);

    const load = React.useCallback(async () => {
      if (!batchId) return;
      setLoading(true);
      setError(null);
      try {
        const result = await apiFetch(`/api/v1/tracking/shipment/${encodeURIComponent(batchId)}/timeline`);
        setData(result);
      } catch (err) {
        setError(err.message);
      } finally {
        setLoading(false);
      }
    }, [batchId]);

    React.useEffect(() => { load(); }, [load]);

    return { data, loading, error, reload: load };
  }

  function useReadinessData(batchId) {
    const [data, setData] = React.useState(null);
    const [loading, setLoading] = React.useState(false);
    const [error, setError] = React.useState(null);

    const load = React.useCallback(async () => {
      if (!batchId) return;
      setLoading(true);
      setError(null);
      try {
        const result = await apiFetch(`/api/v1/dashboard/batches/${encodeURIComponent(batchId)}/proforma-readiness`);
        setData(result);
      } catch (err) {
        setError(err.message);
      } finally {
        setLoading(false);
      }
    }, [batchId]);

    React.useEffect(() => { load(); }, [load]);

    return { data, loading, error, reload: load };
  }

  function useAgentDecision(batchId) {
    const [data, setData] = React.useState(null);
    const [loading, setLoading] = React.useState(false);
    const [error, setError] = React.useState(null);

    const load = React.useCallback(async () => {
      if (!batchId) return;
      setLoading(true);
      setError(null);
      try {
        const result = await apiFetch(`/api/v1/agents/decision/${encodeURIComponent(batchId)}`);
        setData(result);
      } catch (err) {
        // 404 is expected for batches without AI decisions - don't show error
        if (err.message.includes('404')) {
          setData(null);
        } else {
          setError(err.message);
        }
      } finally {
        setLoading(false);
      }
    }, [batchId]);

    React.useEffect(() => { load(); }, [load]);

    return { data, loading, error, reload: load };
  }

  // ── Components ──────────────────────────────────────────────────────────────

  function BatchHeader({ batch }) {
    if (!batch) return null;

    const awb = batch.awb || batch.tracking_no || '—';
    const carrier = batch.carrier || 'Unknown';
    const status = batch.status || 'draft';
    const timestamp = batch.timestamp ? new Date(batch.timestamp).toLocaleString() : '—';

    return (
      <Card data-testid="batch-header" style={{ padding: '16px 20px' }}>
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: 16 }}>
          <div>
            <div style={{ fontSize: 18, fontWeight: 700, color: 'var(--text)', marginBottom: 4 }}>
              <span data-testid="batch-awb">AWB: {awb}</span>
            </div>
            <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
              <Badge data-testid="carrier-badge" status={carrier} />
              <span style={{ fontSize: 12, color: 'var(--text-2)' }}>Shipment date: {timestamp}</span>
            </div>
          </div>
          <div>
            <Badge status={status} />
          </div>
        </div>
      </Card>
    );
  }

  function PipelineTimeline({ batch, readiness }) {
    if (!batch) return null;

    // Phase status derivation based on the requirements
    const getPhaseStatus = (phase) => {
      const status = batch.status || '';
      const clearanceStatus = batch.clearance_status || '';
      const sadStatus = batch.sad_status || '';
      const pzStatus = batch.pz_status || '';
      const clearanceDate = batch.clearance_date;
      const inputs = batch.inputs || {};

      switch (phase) {
        case 'precheck':
          return inputs.zc429 ? 'complete' : 'pending';
        case 'dhl-email':
          return clearanceStatus !== 'pending' ? 'complete' : 'pending';
        case 'sad':
          return sadStatus === 'parsed' || sadStatus === 'uploaded' ? 'complete' : 'pending';
        case 'customs':
          return clearanceDate ? 'complete' : 'pending';
        case 'ready-pz':
          return ['generated', 'booked'].includes(pzStatus) ? 'complete' : 'pending';
        default:
          return 'pending';
      }
    };

    const phases = [
      { key: 'precheck', label: 'Pre-check', testid: 'phase-precheck' },
      { key: 'dhl-email', label: 'DHL Email', testid: 'phase-dhl-email' },
      { key: 'sad', label: 'SAD', testid: 'phase-sad' },
      { key: 'customs', label: 'Customs', testid: 'phase-customs' },
      { key: 'ready-pz', label: 'Ready for PZ', testid: 'phase-ready-pz' },
    ];

    return (
      <Card data-testid="pipeline-timeline" style={{ padding: '16px 20px' }}>
        <SectionHeader label="Pipeline Status" />
        <div className="pipeline-timeline">
          {phases.map(phase => {
            const phaseStatus = getPhaseStatus(phase.key);
            return (
              <div
                key={phase.key}
                className={`phase-chip ${phaseStatus}`}
                data-testid={phase.testid}
              >
                <div className="phase-dot"></div>
                {phase.label}
              </div>
            );
          })}
        </div>
      </Card>
    );
  }

  function DhlTrackingSection({ timeline }) {
    if (!timeline || !timeline.timeline) return null;

    const events = timeline.timeline || [];
    const latestEvent = events[0]; // Assuming events are sorted newest first

    return (
      <Card data-testid="tracking-section" style={{ padding: '16px 20px' }}>
        <SectionHeader label="DHL Tracking" />

        {events.length === 0 ? (
          <EmptyState state="empty" message="No tracking events available." />
        ) : (
          <div>
            {latestEvent && (
              <div style={{ marginBottom: 16, padding: 12, background: 'var(--accent-subtle)', borderRadius: 6, border: '1px solid var(--accent-border)' }}>
                <div style={{ fontWeight: 600, marginBottom: 4 }}>Latest Status</div>
                <div>{latestEvent.event || '—'}</div>
                {latestEvent.detail?.location && (
                  <div style={{ fontSize: 11, color: 'var(--text-2)' }}>Location: {latestEvent.detail.location}</div>
                )}
                {latestEvent.ts && (
                  <div style={{ fontSize: 11, color: 'var(--text-3)' }}>{new Date(latestEvent.ts).toLocaleString()}</div>
                )}
              </div>
            )}

            <details>
              <summary style={{ cursor: 'pointer', fontWeight: 600, marginBottom: 8 }}>
                All Events ({events.length})
              </summary>
              <div className="tracking-events">
                {events.slice(0, 10).map((event, idx) => (
                  <div key={idx} className="tracking-event">
                    <div className="event-header">
                      <div className="event-status">{event.event || '—'}</div>
                      <div className="event-time">
                        {event.ts ? new Date(event.ts).toLocaleString() : '—'}
                      </div>
                    </div>
                    {event.detail?.location && (
                      <div className="event-location">Location: {event.detail.location}</div>
                    )}
                  </div>
                ))}
                {events.length > 10 && (
                  <div style={{ textAlign: 'center', padding: 8, color: 'var(--text-3)', fontSize: 11 }}>
                    ... and {events.length - 10} more events
                  </div>
                )}
              </div>
            </details>
          </div>
        )}
      </Card>
    );
  }

  function ClearanceSection({ batch, readiness }) {
    if (!batch) return null;

    const clearanceStatus = batch.clearance_status || 'pending';
    const clearanceDate = batch.clearance_date;
    const blockingReasons = readiness?.blocking_reasons || [];
    const filesDetail = batch.files_detail || {};

    const getStatusDotColor = () => {
      if (clearanceDate) return 'green';
      if (blockingReasons.length > 0) return 'red';
      if (clearanceStatus !== 'pending') return 'blue';
      return 'amber';
    };

    const getPhaseLabel = () => {
      if (clearanceDate) return 'Customs Cleared';
      if (clearanceStatus === 'parsed') return 'SAD Parsed';
      if (clearanceStatus === 'uploaded') return 'SAD Uploaded';
      return 'Awaiting Clearance';
    };

    return (
      <Card data-testid="clearance-section" style={{ padding: '16px 20px' }}>
        <SectionHeader label="Clearance Status" />

        <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 12 }}>
          <StatusDot color={getStatusDotColor()} />
          <span style={{ fontWeight: 600 }}>{getPhaseLabel()}</span>
          {clearanceDate && (
            <span style={{ fontSize: 12, color: 'var(--text-2)' }}>
              on {new Date(clearanceDate).toLocaleDateString()}
            </span>
          )}
        </div>

        {blockingReasons.length > 0 && (
          <div style={{ marginBottom: 12 }}>
            <div style={{ fontSize: 12, fontWeight: 600, marginBottom: 6, color: 'var(--badge-red-text)' }}>
              Blocking Issues:
            </div>
            <div>
              {blockingReasons.map((reason, idx) => (
                <span key={idx} className="gate-block">{reason}</span>
              ))}
            </div>
          </div>
        )}

        <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
          <div style={{ fontSize: 12, fontWeight: 600, color: 'var(--text-2)' }}>Documents:</div>
          <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap' }}>
            {filesDetail.sad_pdf && (
              <a href={`/api/v1/dashboard/batches/${batch.batch_id}/files/sad_pdf`}
                 target="_blank" rel="noopener" className="doc-link">
                SAD PDF
              </a>
            )}
            {filesDetail.zc429_pdf && (
              <a href={`/api/v1/dashboard/batches/${batch.batch_id}/files/zc429_pdf`}
                 target="_blank" rel="noopener" className="doc-link">
                ZC429 PDF
              </a>
            )}
            {filesDetail.packing_list && (
              <a href={`/api/v1/dashboard/batches/${batch.batch_id}/files/packing_list`}
                 target="_blank" rel="noopener" className="doc-link">
                Packing List
              </a>
            )}
          </div>
          {(!filesDetail.sad_pdf && !filesDetail.zc429_pdf && !filesDetail.packing_list) && (
            <div style={{ fontSize: 12, color: 'var(--text-3)' }}>No documents available</div>
          )}
        </div>
      </Card>
    );
  }

  function AgencySection({ batch, agentDecision }) {
    const agencyEmail = batch?.agency_email;
    const agencyReply = batch?.agency_reply;
    const hasAgencyData = agencyEmail || agencyReply || agentDecision;

    if (!hasAgencyData) return null;

    return (
      <Card data-testid="agency-section" style={{ padding: '16px 20px' }}>
        <SectionHeader label="Agency Communication" />

        {agencyEmail && (
          <div style={{ marginBottom: 12 }}>
            <div style={{ fontSize: 12, fontWeight: 600, marginBottom: 4 }}>Agency Email:</div>
            <div style={{ fontSize: 12, color: 'var(--text-2)' }}>{agencyEmail}</div>
          </div>
        )}

        {agencyReply && (
          <div style={{ marginBottom: 12 }}>
            <div style={{ fontSize: 12, fontWeight: 600, marginBottom: 4 }}>Reply Status:</div>
            <Badge status={agencyReply.status || 'Pending'} />
          </div>
        )}

        {agentDecision && (
          <div>
            <div style={{ fontSize: 12, fontWeight: 600, marginBottom: 4 }}>AI Decision:</div>
            <div style={{ fontSize: 12, color: 'var(--text-2)', padding: 8, background: 'var(--bg-subtle)', borderRadius: 4 }}>
              {agentDecision.decision || 'No decision available'}
            </div>
          </div>
        )}
      </Card>
    );
  }

  function QuickLinks({ batchId }) {
    if (!batchId) return null;

    return (
      <Card data-testid="quick-links" style={{ padding: '16px 20px' }}>
        <SectionHeader label="Quick Actions" />
        <div className="link-section">
          <Btn
            variant="outline"
            data-testid="btn-view-proforma"
            onClick={() => window.location.href = `/dashboard/proforma-v2.html?batch_id=${encodeURIComponent(batchId)}`}
          >
            View Proforma →
          </Btn>
          <Btn
            variant="outline"
            data-testid="btn-view-pz"
            onClick={() => window.location.href = `/dashboard/pz-v2.html?batch_id=${encodeURIComponent(batchId)}`}
          >
            View PZ →
          </Btn>
        </div>
      </Card>
    );
  }

  // ── Main Component ──────────────────────────────────────────────────────────

  function ShipmentV2Root() {
    const [sessionError, setSessionError] = React.useState(null);

    const batchHook = useBatchDetail(URL_BATCH_ID);
    const timelineHook = useTrackingTimeline(URL_BATCH_ID);
    const readinessHook = useReadinessData(URL_BATCH_ID);
    const agentDecisionHook = useAgentDecision(URL_BATCH_ID);

    // Handle session errors
    React.useEffect(() => {
      const errors = [batchHook.error, timelineHook.error, readinessHook.error, agentDecisionHook.error]
        .filter(Boolean);

      const authError = errors.find(e => e.includes('Session expired') || e.includes('401') || e.includes('403'));
      if (authError) {
        setSessionError({ type: 'auth', message: authError });
      }
    }, [batchHook.error, timelineHook.error, readinessHook.error, agentDecisionHook.error]);

    // Missing batch_id param
    if (!URL_BATCH_ID) {
      return (
        <div className="page-container" data-testid="shipment-v2-root">
          <EmptyState
            state="error"
            message="Missing batch_id in URL. Use ?batch_id=SHIPMENT_..."
          />
        </div>
      );
    }

    // Show session error banner if present
    if (sessionError) {
      return (
        <div className="page-container" data-testid="shipment-v2-root">
          <SessionBanner
            type={sessionError.type}
            onDismiss={() => setSessionError(null)}
          />
        </div>
      );
    }

    // Batch not found error
    if (batchHook.error && batchHook.error.includes('404')) {
      return (
        <div className="page-container" data-testid="shipment-v2-root">
          <EmptyState state="error" message="Shipment not found." />
        </div>
      );
    }

    const batch = batchHook.data;
    const timeline = timelineHook.data;
    const readiness = readinessHook.data;
    const agentDecision = agentDecisionHook.data;

    return (
      <div className="page-container" data-testid="shipment-v2-root">
        {/* Page Header */}
        <div className="page-header">
          <a href="/dashboard/" className="back-link" data-testid="back-to-dashboard-link">
            ← Back to Dashboard
          </a>
          {batch && (
            <div style={{ fontSize: 12, color: 'var(--text-3)' }}>
              Batch ID: {batch.batch_id}
            </div>
          )}
        </div>

        {/* Loading state for main batch */}
        {batchHook.loading && (
          <div style={{ textAlign: 'center', padding: 40 }}>
            <span className="spinner" />
            <span style={{ marginLeft: 8, color: 'var(--text-3)' }}>Loading shipment...</span>
          </div>
        )}

        {/* Main content */}
        {batch && (
          <>
            {/* Batch Header */}
            <BatchHeader batch={batch} />

            {/* Pipeline Timeline */}
            <PipelineTimeline batch={batch} readiness={readiness} />

            {/* Content Grid */}
            <div className="content-grid">
              {/* Left Column */}
              <div style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
                {/* DHL Tracking */}
                {timelineHook.loading ? (
                  <Card style={{ padding: '16px 20px' }}>
                    <span className="spinner" />
                    <span style={{ marginLeft: 8, fontSize: 12, color: 'var(--text-3)' }}>Loading tracking...</span>
                  </Card>
                ) : (
                  <DhlTrackingSection timeline={timeline} />
                )}

                {/* Clearance Status */}
                <ClearanceSection batch={batch} readiness={readiness} />
              </div>

              {/* Right Column */}
              <div style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
                {/* Agency Section (conditional) */}
                <AgencySection batch={batch} agentDecision={agentDecision} />

                {/* Quick Links */}
                <QuickLinks batchId={URL_BATCH_ID} />
              </div>
            </div>
          </>
        )}
      </div>
    );
  }

  // ── Render ──────────────────────────────────────────────────────────────────

  const container = document.getElementById('root');
  const root = ReactDOM.createRoot(container);
  root.render(<ShipmentV2Root />);

})();
</script>
</body>
</html>
