<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Accounting — Estrella Atlas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    :root {
      --bg: #F4F1EA; --bg-subtle: #FAF8F2; --card: #FFFFFF;
      --row-hover: #F6F2EA; --border: #E5DECF; --border-subtle: #EFE9DA;
      --text: #1B2538; --text-2: #4E5A72; --text-3: #8B97AE;
      --shadow: rgba(27,37,56,0.06); --shadow-heavy: rgba(27,37,56,0.16);
      --accent: #B89968; --accent-light: #D4B884; --accent-text: #1B2538;
      --accent-subtle: #F8EFD8; --accent-border: #CFB178;
      --badge-neutral-bg: #EEF0F4; --badge-neutral-text: #4A5A70; --badge-neutral-border: #CED4E0;
      --badge-blue-bg: #E8EFF8;   --badge-blue-text: #1A4A90;   --badge-blue-border: #AABEE0;
      --badge-amber-bg: #FBF5E0;  --badge-amber-text: #805A00;  --badge-amber-border: #DEC870;
      --badge-green-bg: #E8F5EE;  --badge-green-text: #186838;  --badge-green-border: #96CCA8;
      --badge-red-bg: #FBE8E6;    --badge-red-text: #902018;    --badge-red-border: #E0A8A0;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #111928; --bg-subtle: #172030; --card: #1C2638;
        --row-hover: #223040; --border: #2C3C54; --border-subtle: #243050;
        --text: #EEE8DC; --text-2: #8A9AB6; --text-3: #566478;
        --badge-neutral-bg: #1C2838; --badge-neutral-text: #8A9AB6; --badge-neutral-border: #2C3C54;
        --badge-blue-bg: #0E1E38;   --badge-blue-text: #80AAEE;   --badge-blue-border: #1E3A64;
        --badge-amber-bg: #20180A;  --badge-amber-text: #E8C040;  --badge-amber-border: #584010;
        --badge-green-bg: #0E2018;  --badge-green-text: #68CC88;  --badge-green-border: #1A4830;
        --badge-red-bg: #200E10;    --badge-red-text: #EE8880;    --badge-red-border: #581018;
      }
    }
    body {
      margin: 0; font-family: 'Plus Jakarta Sans', sans-serif;
      background: var(--bg); color: var(--text); font-size: 13px; min-height: 100vh;
    }
    #root { min-height: 100vh; }
  </style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone@7.26.4/babel.min.js"></script>

<script type="text/babel" data-presets="env,react" src="/dashboard/dashboard-shared.js"></script>
<script type="text/babel" data-presets="env,react" src="/dashboard/pz-api.js"></script>
<script type="text/babel" data-presets="env,react" src="/dashboard/pz-state.js"></script>
<script type="text/babel" data-presets="env,react" src="/dashboard/pz-components.js"></script>

<script type="text/babel" data-presets="env,react">
(function () {
  'use strict';
  const { useState, useCallback } = React;
  const { apiFetch } = window.EstrellaShared;

  // ── Shared UI atoms ──────────────────────────────────────────────────────────

  function Label({ children }) {
    return (
      <div style={{ fontSize: 10, fontWeight: 700, letterSpacing: '0.08em', textTransform: 'uppercase', color: 'var(--text-3)', marginBottom: 6 }}>
        {children}
      </div>
    );
  }

  function Input({ value, onChange, placeholder, type = 'text', style, ...rest }) {
    return (
      <input
        type={type} value={value} onChange={e => onChange(e.target.value)}
        placeholder={placeholder}
        style={{
          width: '100%', padding: '7px 10px', borderRadius: 6,
          border: '1px solid var(--border)', background: 'var(--bg-subtle)',
          color: 'var(--text)', fontSize: 12, fontFamily: 'monospace',
          outline: 'none', ...style,
        }}
        {...rest}
      />
    );
  }

  function FetchBtn({ onClick, loading, label, disabled, ...rest }) {
    return (
      <button
        onClick={onClick} disabled={disabled || loading}
        style={{
          padding: '7px 14px', borderRadius: 6, border: '1px solid var(--accent-border)',
          background: loading ? 'var(--bg-subtle)' : 'var(--accent-subtle)',
          color: loading ? 'var(--text-3)' : 'var(--accent-text)',
          fontSize: 12, fontWeight: 600, cursor: disabled || loading ? 'not-allowed' : 'pointer',
          opacity: disabled ? 0.45 : 1,
        }}
        {...rest}
      >
        {loading ? '…' : label}
      </button>
    );
  }

  function ResultBox({ data, error }) {
    if (!data && !error) return null;
    if (error) return (
      <div style={{ marginTop: 10, padding: '10px 12px', background: 'var(--badge-red-bg)', border: '1px solid var(--badge-red-border)', borderRadius: 6, fontSize: 11, color: 'var(--badge-red-text)', fontFamily: 'monospace' }}>
        {error}
      </div>
    );
    return (
      <pre style={{
        marginTop: 10, padding: '12px 14px', background: 'var(--bg-subtle)',
        border: '1px solid var(--border)', borderRadius: 6,
        fontSize: 11, color: 'var(--text)', overflowX: 'auto', maxHeight: 320,
        overflowY: 'auto', whiteSpace: 'pre-wrap', wordBreak: 'break-all',
        fontFamily: 'monospace', lineHeight: 1.5,
      }}>
        {JSON.stringify(data, null, 2)}
      </pre>
    );
  }

  function Panel({ title, subtitle, children }) {
    return (
      <div style={{ background: 'var(--card)', border: '1px solid var(--border)', borderRadius: 10, overflow: 'hidden', boxShadow: '0 1px 3px var(--shadow)', marginBottom: 20 }}>
        <div style={{ padding: '14px 20px', borderBottom: '1px solid var(--border-subtle)', background: 'var(--bg-subtle)' }}>
          <div style={{ fontSize: 13, fontWeight: 700, color: 'var(--text)' }}>{title}</div>
          {subtitle && <div style={{ fontSize: 11, color: 'var(--text-3)', marginTop: 2 }}>{subtitle}</div>}
        </div>
        <div style={{ padding: '16px 20px' }}>{children}</div>
      </div>
    );
  }

  // ── Section A: Draft accounting inspector ────────────────────────────────────
  // Endpoints: /draft/{id}/invoice-link  /draft/{id}/to-invoice-preview  /draft/{id}/disclose-convert

  function DraftPanel() {
    const [draftId, setDraftId] = useState('');
    const [activeEndpoint, setActiveEndpoint] = useState('');
    const [loading, setLoading] = useState(false);
    const [result, setResult] = useState(null);
    const [error, setError] = useState(null);

    const fetch = useCallback(async (endpoint, label) => {
      if (!draftId.trim()) return;
      setActiveEndpoint(label);
      setLoading(true); setResult(null); setError(null);
      try {
        const data = await apiFetch(`/api/v1/proforma/draft/${encodeURIComponent(draftId.trim())}${endpoint}`);
        setResult(data);
      } catch (e) {
        setError((e && e.message) || String(e));
      } finally {
        setLoading(false);
      }
    }, [draftId]);

    const endpoints = [
      { path: '/invoice-link',       label: 'Invoice link',       testid: 'btn-invoice-link' },
      { path: '/to-invoice-preview', label: 'To-invoice preview', testid: 'btn-to-invoice-preview' },
      { path: '/disclose-convert',   label: 'Disclose convert',   testid: 'btn-disclose-convert' },
    ];

    return (
      <Panel title="Draft accounting" subtitle="Read proforma → invoice status and conversion preview (read-only)">
        <Label>Draft ID</Label>
        <Input value={draftId} onChange={setDraftId} placeholder="e.g. 42" data-testid="input-draft-id" />
        <div style={{ display: 'flex', gap: 8, marginTop: 10, flexWrap: 'wrap' }}>
          {endpoints.map(ep => (
            <FetchBtn
              key={ep.path}
              onClick={() => fetch(ep.path, ep.label)}
              loading={loading && activeEndpoint === ep.label}
              label={loading && activeEndpoint === ep.label ? '…' : ep.label}
              disabled={!draftId.trim()}
              data-testid={ep.testid}
            />
          ))}
        </div>
        <ResultBox data={result} error={error} />
        <div style={{ marginTop: 10, fontSize: 10, color: 'var(--text-3)' }}>
          Read-only. No write calls are made from this panel.
        </div>
      </Panel>
    );
  }

  // ── Section B: Batch valuation ───────────────────────────────────────────────
  // Endpoints: /{batch_id}/{client}/dual-valuation  /pipeline/{batch_id}

  function BatchPanel() {
    const [batchId, setBatchId] = useState('');
    const [client, setClient]   = useState('');
    const [loading, setLoading] = useState(false);
    const [activeEndpoint, setActiveEndpoint] = useState('');
    const [result, setResult] = useState(null);
    const [error, setError]   = useState(null);

    const fetchDual = useCallback(async () => {
      if (!batchId.trim() || !client.trim()) return;
      setActiveEndpoint('dual'); setLoading(true); setResult(null); setError(null);
      try {
        const data = await apiFetch(
          `/api/v1/proforma/${encodeURIComponent(batchId.trim())}/${encodeURIComponent(client.trim())}/dual-valuation`
        );
        setResult(data);
      } catch (e) { setError((e && e.message) || String(e)); }
      finally { setLoading(false); }
    }, [batchId, client]);

    const fetchPipeline = useCallback(async () => {
      if (!batchId.trim()) return;
      setActiveEndpoint('pipeline'); setLoading(true); setResult(null); setError(null);
      try {
        const data = await apiFetch(`/api/v1/proforma/pipeline/${encodeURIComponent(batchId.trim())}`);
        setResult(data);
      } catch (e) { setError((e && e.message) || String(e)); }
      finally { setLoading(false); }
    }, [batchId]);

    return (
      <Panel title="Batch valuation" subtitle="Purchase vs sales dual-valuation and proforma pipeline summary (read-only)">
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12, marginBottom: 10 }}>
          <div>
            <Label>Batch ID</Label>
            <Input value={batchId} onChange={setBatchId} placeholder="e.g. SHIPMENT_…" data-testid="input-batch-id" />
          </div>
          <div>
            <Label>Client name (for dual-valuation)</Label>
            <Input value={client} onChange={setClient} placeholder="e.g. Diamond Point" data-testid="input-client" />
          </div>
        </div>
        <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap' }}>
          <FetchBtn
            onClick={fetchDual}
            loading={loading && activeEndpoint === 'dual'}
            label="Dual valuation"
            disabled={!batchId.trim() || !client.trim()}
            data-testid="btn-dual-valuation"
          />
          <FetchBtn
            onClick={fetchPipeline}
            loading={loading && activeEndpoint === 'pipeline'}
            label="Pipeline summary"
            disabled={!batchId.trim()}
            data-testid="btn-pipeline"
          />
        </div>
        <ResultBox data={result} error={error} />
        <div style={{ marginTop: 10, fontSize: 10, color: 'var(--text-3)' }}>
          Read-only. No write calls are made from this panel.
        </div>
      </Panel>
    );
  }

  // ── Section C: Client ledger ─────────────────────────────────────────────────
  // Endpoints: /ledgers/clients/{id}/invoice-ledger.json  /ledgers/clients/{id}/statement.json
  //            /ledgers/clients/{id}/statement.pdf (link only)

  function LedgerPanel() {
    const [contractorId, setContractorId] = useState('');
    const [from, setFrom] = useState('');
    const [to,   setTo]   = useState('');
    const [activeEndpoint, setActiveEndpoint] = useState('');
    const [loading, setLoading] = useState(false);
    const [result, setResult] = useState(null);
    const [error, setError]   = useState(null);

    const base = () => `/api/v1/ledgers/clients/${encodeURIComponent(contractorId.trim())}`;
    const qs   = () => `?from=${encodeURIComponent(from)}&to=${encodeURIComponent(to)}`;
    const ready = contractorId.trim() && from && to;

    const fetchJson = useCallback(async (path, label) => {
      if (!ready) return;
      setActiveEndpoint(label); setLoading(true); setResult(null); setError(null);
      try {
        const data = await apiFetch(`${base()}${path}${qs()}`);
        setResult(data);
      } catch (e) { setError((e && e.message) || String(e)); }
      finally { setLoading(false); }
    }, [contractorId, from, to]);

    const pdfUrl = ready
      ? `${base()}/statement.pdf${qs()}`
      : null;

    return (
      <Panel title="Client ledger" subtitle="Invoice ledger and statement of account by contractor ID and date range (read-only)">
        <div style={{ display: 'grid', gridTemplateColumns: '2fr 1fr 1fr', gap: 12, marginBottom: 10 }}>
          <div>
            <Label>Contractor ID (wFirma)</Label>
            <Input value={contractorId} onChange={setContractorId} placeholder="e.g. 38142296" data-testid="input-contractor-id" />
          </div>
          <div>
            <Label>From (YYYY-MM-DD)</Label>
            <Input type="date" value={from} onChange={setFrom} data-testid="input-from" />
          </div>
          <div>
            <Label>To (YYYY-MM-DD)</Label>
            <Input type="date" value={to} onChange={setTo} data-testid="input-to" />
          </div>
        </div>
        <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap', alignItems: 'center' }}>
          <FetchBtn
            onClick={() => fetchJson('/invoice-ledger.json', 'ledger')}
            loading={loading && activeEndpoint === 'ledger'}
            label="Invoice ledger"
            disabled={!ready}
            data-testid="btn-invoice-ledger"
          />
          <FetchBtn
            onClick={() => fetchJson('/statement.json', 'statement')}
            loading={loading && activeEndpoint === 'statement'}
            label="Statement JSON"
            disabled={!ready}
            data-testid="btn-statement-json"
          />
          {pdfUrl && (
            <a
              href={pdfUrl}
              target="_blank"
              rel="noopener noreferrer"
              data-testid="link-statement-pdf"
              style={{
                padding: '7px 14px', borderRadius: 6, border: '1px solid var(--border)',
                background: 'transparent', color: 'var(--text-2)',
                fontSize: 12, fontWeight: 600, textDecoration: 'none', display: 'inline-block',
              }}
            >
              Statement PDF ↗
            </a>
          )}
        </div>
        <ResultBox data={result} error={error} />
        <div style={{ marginTop: 10, fontSize: 10, color: 'var(--text-3)' }}>
          Read-only. Statement PDF opens in new tab — no download initiated automatically.
          Contractor IDs can be found in the Customer Master page.
        </div>
      </Panel>
    );
  }

  // ── App ──────────────────────────────────────────────────────────────────────

  function App() {
    return (
      <div style={{ maxWidth: 900, margin: '0 auto', padding: '28px 24px' }} data-testid="accounting-hub-root">
        <div style={{ marginBottom: 24 }}>
          <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: '0.10em', textTransform: 'uppercase', color: 'var(--text-3)', marginBottom: 4 }}>
            Accounting
          </div>
          <h1 style={{ margin: 0, fontSize: 22, fontWeight: 700, color: 'var(--text)' }}>
            Accounting Hub
          </h1>
          <p style={{ margin: '8px 0 0', fontSize: 12, color: 'var(--text-2)', lineHeight: 1.5 }}>
            Read-only accounting toolkit. Fetches data from real backend routes.
            All panels require operator-provided IDs — no data is pre-loaded or hardcoded.
            No write actions are available from this page.
          </p>
        </div>

        <DraftPanel />
        <BatchPanel />
        <LedgerPanel />

        <div style={{ marginTop: 8, padding: '12px 16px', background: 'var(--bg-subtle)', border: '1px solid var(--border)', borderRadius: 8, fontSize: 11, color: 'var(--text-3)', lineHeight: 1.5 }}>
          <strong style={{ color: 'var(--text-2)' }}>Available endpoints:</strong>{' '}
          /proforma/draft/&#123;id&#125;/invoice-link · /proforma/draft/&#123;id&#125;/to-invoice-preview ·
          /proforma/draft/&#123;id&#125;/disclose-convert · /proforma/&#123;batch_id&#125;/&#123;client&#125;/dual-valuation ·
          /proforma/pipeline/&#123;batch_id&#125; · /ledgers/clients/&#123;id&#125;/invoice-ledger.json ·
          /ledgers/clients/&#123;id&#125;/statement.json · /ledgers/clients/&#123;id&#125;/statement.pdf
        </div>
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
})();
</script>
</body>
</html>
